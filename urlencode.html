<body>
<div class="toolwrap">
  <h1>URL 인코딩 / 디코딩</h1>
  <p class="sub">URL·쿼리 문자열의 한글·특수문자·공백을 퍼센트 인코딩하거나, 인코딩된 주소를 사람이 읽을 수 있게 디코딩합니다.</p>

  <div class="card">
    <label for="input">입력</label>
    <textarea id="input" placeholder="예: https://example.com/검색?q=한글 검색어&page=1"></textarea>
    <div class="opts">
      <label><input type="radio" name="scope" value="component" checked/> 구성요소 (encodeURIComponent)</label>
      <label><input type="radio" name="scope" value="uri"/> 전체 URL (encodeURI)</label>
    </div>
    <div class="actions">
      <button class="btn" id="enc" type="button">인코딩 ↓</button>
      <button class="btn" id="dec" type="button">디코딩 ↓</button>
      <button class="btn btn-ghost" id="swap" type="button">⇅ 입력↔출력</button>
      <button class="btn btn-ghost" id="clear" type="button">지우기</button>
    </div>
    <div class="arrow">↓</div>
    <label for="output">결과</label>
    <textarea id="output" readonly placeholder="결과가 여기에 표시됩니다"></textarea>
    <div class="err" id="err"></div>
    <div class="actions"><button class="btn btn-ghost" id="copy" type="button">📋 결과 복사</button></div>
    <div class="note">
      <strong>구성요소</strong>는 쿼리 값·경로 조각처럼 부분 문자열에 쓰며 <code>?&=/:#</code> 등도 모두 인코딩합니다. <strong>전체 URL</strong>은 주소 전체를 인코딩하되 <code>:/?#&=</code> 등 URL 구조 문자는 보존합니다. 입력·결과는 서버로 전송되지 않습니다.
    </div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  function scope(){ return document.querySelector('input[name=scope]:checked').value; }
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }

  function run(decode){
    $('err').textContent='';
    var src=$('input').value;
    try{
      var out = scope()==='uri'
        ? (decode ? decodeURI(src) : encodeURI(src))
        : (decode ? decodeURIComponent(src) : encodeURIComponent(src));
      $('output').value = out;
    }catch(e){
      $('output').value='';
      $('err').textContent = '디코딩 실패: 올바른 퍼센트 인코딩 형식이 아닙니다 ('+e.message+')';
    }
  }
  $('enc').addEventListener('click', function(){ run(false); });
  $('dec').addEventListener('click', function(){ run(true); });
  $('swap').addEventListener('click', function(){ $('input').value=$('output').value; $('output').value=''; $('err').textContent=''; });
  $('clear').addEventListener('click', function(){ $('input').value=''; $('output').value=''; $('err').textContent=''; $('input').focus(); });
  $('copy').addEventListener('click', function(){ if(!$('output').value) return; navigator.clipboard.writeText($('output').value).then(function(){ toast('복사됐습니다'); }); });
</script>
</body>
