<div class="toast" id="toast"></div>
<script>
  function T(k){ return window.t ? window.t(k) : k; }
  function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1700);}
  var input=document.getElementById('input'), output=document.getElementById('output'), statusEl=document.getElementById('status'),
      indentSel=document.getElementById('indent'), sortChk=document.getElementById('sort');
  var lastMin=false;
  function sortDeep(v){
    if(Array.isArray(v)) return v.map(sortDeep);
    if(v && typeof v==='object'){ var o={}; Object.keys(v).sort().forEach(function(k){ o[k]=sortDeep(v[k]); }); return o; }
    return v;
  }
  function indentVal(){ var s=indentSel.value; return s==='tab' ? '\t' : parseInt(s,10); }
  function setStatus(kind, msg){
    statusEl.textContent = msg;
    statusEl.className = 'stat' + (kind ? ' '+kind : '');
  }
  function validate(){
    var t=input.value.trim();
    if(!t){ setStatus('','' ); return null; }
    try{ var v=JSON.parse(t); setStatus('ok', T('jn.valid')); return v; }
    catch(e){ setStatus('err', T('jn.error').replace('{m}', e.message)); return undefined; }
  }
  function run(min){
    lastMin=min;
    var t=input.value.trim();
    if(!t){ setStatus('', T('jn.empty')); output.value=''; return; }
    var v; try{ v=JSON.parse(t); }catch(e){ setStatus('err', T('jn.error').replace('{m}', e.message)); output.value=''; return; }
    if(sortChk.checked) v=sortDeep(v);
    output.value = min ? JSON.stringify(v) : JSON.stringify(v, null, indentVal());
    setStatus('ok', T('jn.valid'));
  }
  input.addEventListener('input', function(){ run(lastMin); });
  document.getElementById('format').addEventListener('click', function(){ run(false); });
  document.getElementById('min').addEventListener('click', function(){ run(true); });
  indentSel.addEventListener('change', function(){ if(output.value) run(lastMin); });
  sortChk.addEventListener('change', function(){ if(output.value) run(lastMin); });
  document.getElementById('copy').addEventListener('click', function(){
    if(!output.value){ toast(T('toast.nocopy')); return; }
    navigator.clipboard.writeText(output.value).then(function(){toast(T('toast.copied'));}).catch(function(){toast(T('toast.copied'));});
  });
  document.getElementById('clear').addEventListener('click', function(){ input.value=''; output.value=''; setStatus('',''); input.focus(); });
  window.onI18n = function(){ if(output.value) run(lastMin); else validate(); };
</script>
