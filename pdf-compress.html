<div class="toolwrap">
  <a class="back" href="index.html" data-i18n="back">← 전체 도구</a>
  <h1 data-i18n="tool.pcompress.t">PDF 압축</h1>
  <p class="sub" data-i18n="pc.sub">스캔·이미지 PDF의 용량을 줄입니다.</p>

  <div class="card">
    <label for="file" data-i18n="pc.pick">PDF 파일 선택</label>
    <input type="file" id="file" accept="application/pdf"/>
    <p class="hint" id="orig" data-i18n="pc.empty">선택된 PDF가 없습니다.</p>

    <div id="opts" style="display:none;">
      <label for="q" style="margin-top:1rem;"><span data-i18n="pc.q">품질</span>: <b id="qv" style="color:var(--text);">60</b></label>
      <input type="range" id="q" min="20" max="90" step="5" value="60"/>
      <label for="scale" style="margin-top:1rem;"><span data-i18n="pc.scale">해상도</span>: <b id="scalev" style="color:var(--text);">100</b>%</label>
      <input type="range" id="scale" min="50" max="200" step="10" value="100"/>
      <p class="hint" data-i18n="pc.warn">※ 텍스트가 이미지로 변환되어 선택·검색이 불가해집니다. 스캔 문서·이미지 PDF에 적합합니다.</p>
      <div class="row" style="margin-top:.6rem;">
        <button class="btn" id="go" data-i18n="pc.go">🗜️ 압축하기</button>
      </div>
    </div>
    <p class="hint" data-i18n="pdf.note">모든 처리는 브라우저에서 이루어지며, 파일은 서버로 전송되지 않습니다.</p>
  </div>

  <div class="card" id="resultCard" style="display:none;">
    <p class="hint" id="result" style="margin:0 0 .6rem;"></p>
    <div class="row"><button class="btn" id="download" data-i18n="im.dl">⬇️ 다운로드</button></div>
  </div>

<div class="toast" id="toast"></div>
<script>
  function T(k){ return window.t ? window.t(k) : k; }
  function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},2000);}
  function kb(n){ return n<1024 ? n+' B' : n<1048576 ? (n/1024).toFixed(1)+' KB' : (n/1048576).toFixed(2)+' MB'; }
  if(window.pdfjsLib){ pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js'; }

  var fileEl=document.getElementById('file'), orig=document.getElementById('orig'), opts=document.getElementById('opts'),
      qEl=document.getElementById('q'), qv=document.getElementById('qv'), scaleEl=document.getElementById('scale'), scalev=document.getElementById('scalev'),
      goBtn=document.getElementById('go'), resultCard=document.getElementById('resultCard'), result=document.getElementById('result'), dl=document.getElementById('download');
  var srcBuf=null, origSize=0, outBlob=null;

  function renderOrig(){ if(origSize) orig.textContent = T('pc.orig').replace('{s}', kb(origSize)); else orig.textContent = T('pc.empty'); }
  fileEl.addEventListener('change', async function(){
    var f=fileEl.files[0]; if(!f) return;
    srcBuf = await f.arrayBuffer(); origSize=f.size; renderOrig(); opts.style.display=''; resultCard.style.display='none';
  });
  qEl.addEventListener('input', function(){ qv.textContent=qEl.value; });
  scaleEl.addEventListener('input', function(){ scalev.textContent=scaleEl.value; });

  goBtn.addEventListener('click', async function(){
    if(!srcBuf){ toast(T('pc.empty')); return; }
    if(!window.pdfjsLib){ toast(T('pdf.err')); return; }
    goBtn.disabled=true; var label=goBtn.textContent; goBtn.textContent=T('pdf.processing');
    try{
      var quality = parseInt(qEl.value,10)/100, scale = parseInt(scaleEl.value,10)/100;
      // ① 래스터화(JPEG 재인코딩) — 스캔·이미지 PDF에 효과적
      var data = new Uint8Array(srcBuf.slice(0));
      var pdf = await pdfjsLib.getDocument({data:data}).promise;
      var rout = await PDFLib.PDFDocument.create();
      for(var i=1;i<=pdf.numPages;i++){
        goBtn.textContent = T('pdf.processing') + ' ' + i + '/' + pdf.numPages;
        var page = await pdf.getPage(i);
        var vp = page.getViewport({scale:scale});
        var cv=document.createElement('canvas'); cv.width=Math.round(vp.width); cv.height=Math.round(vp.height);
        var ctx=cv.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,cv.width,cv.height);
        await page.render({canvasContext:ctx, viewport:vp}).promise;
        var dataUrl = cv.toDataURL('image/jpeg', quality);
        var jpg = await (await fetch(dataUrl)).arrayBuffer();
        var img = await rout.embedJpg(jpg);
        var pg = rout.addPage([cv.width, cv.height]);
        pg.drawImage(img, {x:0, y:0, width:cv.width, height:cv.height});
      }
      var best = await rout.save();
      // ② 무손실 재저장(구조 최적화) — 텍스트 PDF에 효과적. 더 작으면 채택
      try{
        var ld = await PDFLib.PDFDocument.load(new Uint8Array(srcBuf.slice(0)), {ignoreEncryption:true});
        var lossless = await ld.save({useObjectStreams:true});
        if(lossless.length < best.length) best = lossless;
      }catch(e){}
      goBtn.textContent=label; goBtn.disabled=false;
      // ③ 원본보다 작을 때만 결과 제공 — 절대 더 큰 파일을 내주지 않음
      if(best.length < origSize){
        outBlob = new Blob([best], {type:'application/pdf'});
        var pct = Math.round((1 - outBlob.size/origSize)*100);
        result.textContent = T('pc.result').replace('{a}', kb(origSize)).replace('{b}', kb(outBlob.size)) + T('pc.saving').replace('{p}', pct);
        dl.style.display=''; resultCard.style.display='';
      } else {
        outBlob = null;
        result.textContent = T('pc.kept').replace('{a}', kb(origSize));
        dl.style.display='none'; resultCard.style.display='';
      }
      return;
    }catch(err){ toast(T('pdf.err')); }
    goBtn.textContent=label; goBtn.disabled=false;
  });
  dl.addEventListener('click', function(){
    if(!outBlob) return;
    var a=document.createElement('a'); a.href=URL.createObjectURL(outBlob); a.download='compressed.pdf';
    document.body.appendChild(a); a.click(); a.remove();
  });
  window.onI18n = renderOrig;
</script>
