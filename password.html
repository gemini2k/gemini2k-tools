<div class="toolwrap">
  <a class="back" href="index.html">← 전체 도구</a>
  <h1>비밀번호 생성기</h1>
  <p class="sub">안전한 무작위 비밀번호를 원하는 조건으로 만들어 드립니다.</p>

  <div class="card">
    <div class="result" style="margin-bottom:1rem;">
      <span class="val" id="out">비밀번호 생성 중…</span>
      <button class="btn btn-ghost" id="copy" style="padding:.5rem .8rem;">복사</button>
    </div>
    <div id="bar" style="height:8px;border-radius:999px;background:#EEF0F4;overflow:hidden;">
      <div id="barfill" style="height:100%;width:0;border-radius:999px;transition:width .2s,background .2s;"></div>
    </div>
    <p class="hint" id="strength" style="margin-top:.5rem;"></p>

    <label for="len" style="margin-top:1.2rem;">길이: <b id="lenval" style="color:var(--text);">16</b></label>
    <input type="range" id="len" min="6" max="40" value="16"/>

    <div class="checks">
      <label class="chk"><input type="checkbox" id="lower" checked/> 소문자 (a–z)</label>
      <label class="chk"><input type="checkbox" id="upper" checked/> 대문자 (A–Z)</label>
      <label class="chk"><input type="checkbox" id="digit" checked/> 숫자 (0–9)</label>
      <label class="chk"><input type="checkbox" id="symbol" checked/> 특수문자 (!@#…)</label>
      <label class="chk"><input type="checkbox" id="noamb"/> 헷갈리는 문자 제외 (Il1O0)</label>
    </div>

    <div class="row" style="margin-top:1.3rem;">
      <button class="btn" id="gen">🔄 새로 생성</button>
    </div>
    <p class="hint">암호학적 난수(crypto)로 브라우저에서 생성하며, 어디에도 전송·저장되지 않습니다.</p>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
  var SETS = {
    lower: 'abcdefghijklmnopqrstuvwxyz',
    upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    digit: '0123456789',
    symbol: '!@#$%^&*()-_=+[]{};:,.?'
  };
  var AMB = /[Il1O0]/g;
  var out = document.getElementById('out'), len = document.getElementById('len'),
      lenval = document.getElementById('lenval'), strength = document.getElementById('strength'),
      barfill = document.getElementById('barfill');
  function toast(m){ var el=document.getElementById('toast'); el.textContent=m; el.classList.add('show');
    clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1600); }
  function rand(max){ // 0..max-1, 편향 없는 암호학적 난수
    var arr = new Uint32Array(1), limit = Math.floor(0xFFFFFFFF / max) * max, x;
    do { crypto.getRandomValues(arr); x = arr[0]; } while (x >= limit);
    return x % max;
  }
  function pick(str){ return str[rand(str.length)]; }
  function selectedSets(){
    var keys = ['lower','upper','digit','symbol'].filter(function(k){ return document.getElementById(k).checked; });
    var noamb = document.getElementById('noamb').checked;
    return keys.map(function(k){ var s = SETS[k]; return noamb ? s.replace(AMB,'') : s; }).filter(function(s){ return s.length; });
  }
  function generate(){
    var n = parseInt(len.value,10);
    var sets = selectedSets();
    if(!sets.length){ out.textContent = '문자 종류를 하나 이상 선택하세요'; barfill.style.width='0'; strength.textContent=''; return; }
    var pool = sets.join('');
    var chars = [];
    sets.forEach(function(s){ if(chars.length < n) chars.push(pick(s)); });   // 각 종류 최소 1개
    while(chars.length < n) chars.push(pick(pool));
    for(var i=chars.length-1;i>0;i--){ var j=rand(i+1); var tmp=chars[i]; chars[i]=chars[j]; chars[j]=tmp; } // 셔플
    out.textContent = chars.join('');
    scoreOf(n, sets.length, pool.length);
  }
  function scoreOf(n, variety, poolSize){
    var bits = n * Math.log2(poolSize);   // 대략적 엔트로피
    var label, color, pct;
    if(bits < 40){ label='약함'; color='#E5484D'; pct=30; }
    else if(bits < 60){ label='보통'; color='#E8853A'; pct=55; }
    else if(bits < 80){ label='강함'; color='#0EA46A'; pct=80; }
    else { label='매우 강함'; color='#0EA46A'; pct=100; }
    barfill.style.width = pct + '%'; barfill.style.background = color;
    strength.textContent = '강도: ' + label + ' (약 ' + Math.round(bits) + ' 비트)';
  }
  len.addEventListener('input', function(){ lenval.textContent = len.value; generate(); });
  ['lower','upper','digit','symbol','noamb'].forEach(function(id){
    document.getElementById(id).addEventListener('change', generate);
  });
  document.getElementById('gen').addEventListener('click', generate);
  document.getElementById('copy').addEventListener('click', function(){
    var v = out.textContent;
    if(!v || v.indexOf('선택')>=0){ toast('복사할 비밀번호가 없습니다'); return; }
    navigator.clipboard.writeText(v).then(function(){toast('복사됐습니다');})
      .catch(function(){ toast('복사 실패'); });
  });
  generate();
</script>
