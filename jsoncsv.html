<body>

<div class="toolwrap">
  <h1>JSON ↔ CSV 변환</h1>
  <p class="sub">JSON 객체 배열과 CSV 표를 양쪽으로 변환합니다. 엑셀에 붙이거나 코드에 넣기 좋게.</p>

  <div class="card">
    <div class="dir">
      <button id="d-j2c" class="on">JSON → CSV</button>
      <button id="d-c2j">CSV → JSON</button>
    </div>
    <div class="io">
      <label id="in-lbl">입력 (JSON 배열)</label>
      <textarea id="input" placeholder='[{"name":"철수","age":20},{"name":"영희","age":22}]'></textarea>
      <div class="row" style="margin-top:.8rem;">
        <button class="btn" id="convert">변환</button>
        <button class="btn btn-ghost" id="copy">📋 결과 복사</button>
        <button class="btn btn-ghost" id="download">⬇ 다운로드</button>
      </div>
      <div class="err" id="err" style="display:none;"></div>
      <label id="out-lbl">결과 (CSV)</label>
      <textarea id="output" readonly placeholder="결과가 여기에 표시됩니다"></textarea>
    </div>
    <div class="note">
      JSON → CSV는 객체 배열의 모든 키를 모아 머리글로 만들고, 값에 쉼표·따옴표·줄바꿈이 있으면 자동으로 따옴표 처리합니다. CSV → JSON은 첫 줄을 머리글로 보고 객체 배열을 만듭니다. 모든 변환은 브라우저에서만 이루어집니다.
    </div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  var dir = 'j2c';

  function csvCell(v){
    if(v===null||v===undefined) return '';
    var s = (typeof v==='object') ? JSON.stringify(v) : String(v);
    if(/[",\n\r]/.test(s)) s = '"' + s.replace(/"/g,'""') + '"';
    return s;
  }
  function jsonToCsv(text){
    var data = JSON.parse(text);
    if(!Array.isArray(data)) throw new Error('JSON은 객체 배열 [ {...}, {...} ] 형태여야 합니다.');
    if(data.length===0) return '';
    var keys=[]; data.forEach(function(o){ if(o&&typeof o==='object') Object.keys(o).forEach(function(k){ if(keys.indexOf(k)<0) keys.push(k); }); });
    var lines=[ keys.map(csvCell).join(',') ];
    data.forEach(function(o){ lines.push(keys.map(function(k){ return csvCell(o?o[k]:''); }).join(',')); });
    return lines.join('\n');
  }
  function parseCsv(text){
    var rows=[], row=[], cur='', i=0, inq=false, c;
    text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    while(i<text.length){ c=text[i];
      if(inq){ if(c==='"'){ if(text[i+1]==='"'){ cur+='"'; i++; } else inq=false; } else cur+=c; }
      else { if(c==='"') inq=true; else if(c===','){ row.push(cur); cur=''; } else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; } else cur+=c; }
      i++;
    }
    row.push(cur); rows.push(row);
    // 마지막 빈 줄 제거
    if(rows.length && rows[rows.length-1].length===1 && rows[rows.length-1][0]==='') rows.pop();
    return rows;
  }
  function csvToJson(text){
    var rows=parseCsv(text);
    if(rows.length<1) return '[]';
    var headers=rows[0], out=[];
    for(var r=1;r<rows.length;r++){ var o={}; for(var c=0;c<headers.length;c++){ o[headers[c]] = rows[r][c]!==undefined?rows[r][c]:''; } out.push(o); }
    return JSON.stringify(out, null, 2);
  }
  function convert(){
    $('err').style.display='none';
    var inp=$('input').value.trim();
    if(!inp){ $('output').value=''; return; }
    try{ $('output').value = (dir==='j2c') ? jsonToCsv(inp) : csvToJson(inp); }
    catch(e){ $('err').textContent='오류: '+e.message; $('err').style.display=''; $('output').value=''; }
  }
  function setDir(d){
    dir=d;
    $('d-j2c').classList.toggle('on', d==='j2c'); $('d-c2j').classList.toggle('on', d==='c2j');
    $('in-lbl').textContent = d==='j2c' ? '입력 (JSON 배열)' : '입력 (CSV)';
    $('out-lbl').textContent = d==='j2c' ? '결과 (CSV)' : '결과 (JSON)';
    $('input').placeholder = d==='j2c' ? '[{"name":"철수","age":20}]' : 'name,age\n철수,20';
    convert();
  }
  function toast(m){ var el=$('toast'); el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }
  $('d-j2c').addEventListener('click', function(){ setDir('j2c'); });
  $('d-c2j').addEventListener('click', function(){ setDir('c2j'); });
  $('convert').addEventListener('click', convert);
  $('input').addEventListener('input', convert);
  $('copy').addEventListener('click', function(){ if(!$('output').value){ toast('결과가 없습니다'); return; }
    navigator.clipboard.writeText($('output').value).then(function(){ toast('복사됐습니다'); }); });
  $('download').addEventListener('click', function(){ var v=$('output').value; if(!v){ toast('결과가 없습니다'); return; }
    var ext=dir==='j2c'?'csv':'json'; var mime=dir==='j2c'?'text/csv':'application/json';
    var bom = dir==='j2c' ? '﻿' : '';   // CSV 엑셀 한글 호환
    var a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([bom+v],{type:mime+';charset=utf-8'})); a.download='converted.'+ext; a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); },1000); toast('다운로드'); });
</script>
