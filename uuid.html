  <h1>UUID 생성기 (v4)</h1>
  <p class="sub">암호학적 난수로 UUID 버전 4를 한 번에 여러 개 만듭니다. 개발·테스트 데이터의 고유 식별자로 쓰세요.</p>

  <div class="card">
    <div class="opts">
      <label class="fld">개수 <input id="count" type="number" value="5" min="1" max="100"/></label>
      <label class="fld"><input id="upper" type="checkbox"/> 대문자</label>
      <label class="fld"><input id="nohyphen" type="checkbox"/> 하이픈 제거</label>
    </div>
    <div class="row">
      <button class="btn" id="gen">새로 생성</button>
      <button class="btn btn-ghost" id="copyall">📋 전체 복사</button>
    </div>
    <div class="list" id="list" style="margin-top:1rem;"></div>
    <div class="note">
      UUID v4는 122비트 난수로 만들어져 사실상 중복되지 않는 식별자입니다. 이 도구는 브라우저의 암호학적 난수 생성기(crypto)를 사용하며, 생성된 값은 서버로 전송되지 않습니다.
    </div>
  </div>

<div class="toast" id="toast"></div>
<script>
  var $ = function(id){ return document.getElementById(id); };
  function uuid4(){
    if(crypto.randomUUID) return crypto.randomUUID();
    var b = crypto.getRandomValues(new Uint8Array(16));
    b[6] = (b[6] & 0x0f) | 0x40; b[8] = (b[8] & 0x3f) | 0x80;
    var h = []; for(var i=0;i<16;i++) h.push(b[i].toString(16).padStart(2,'0'));
    return h.slice(0,4).join('')+'-'+h.slice(4,6).join('')+'-'+h.slice(6,8).join('')+'-'+h.slice(8,10).join('')+'-'+h.slice(10,16).join('');
  }
  function fmt(u){ if($('nohyphen').checked) u=u.replace(/-/g,''); if($('upper').checked) u=u.toUpperCase(); return u; }
  var current = [];
  function gen(){
    var n = Math.min(100, Math.max(1, parseInt($('count').value)||1));
    current = []; for(var i=0;i<n;i++) current.push(uuid4());
    render();
  }
  function render(){
    $('list').innerHTML = current.map(function(u){ var v=fmt(u);
      return '<div class="urow"><span>'+v+'</span><span class="cp" data-v="'+v+'">복사</span></div>'; }).join('');
  }
  function toast(m){ var el=$('toast'); el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }
  $('gen').addEventListener('click', gen);
  $('upper').addEventListener('change', render);
  $('nohyphen').addEventListener('change', render);
  $('copyall').addEventListener('click', function(){ if(!current.length) return;
    navigator.clipboard.writeText(current.map(fmt).join('\n')).then(function(){ toast(current.length+'개 복사됐습니다'); }); });
  $('list').addEventListener('click', function(e){ var c=e.target.closest('.cp'); if(!c) return;
    navigator.clipboard.writeText(c.dataset.v).then(function(){ toast('복사됐습니다'); }); });
  gen();
</script>
