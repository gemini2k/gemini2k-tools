<style>
  .wcrow{ display:flex; gap:.55rem; align-items:center; flex-wrap:wrap; margin-bottom:.7rem; }
  .wcrow select{ width:auto; min-width:200px; max-width:100%; padding:.5rem .6rem; }
  .wcrow .chk{ margin:0; font-weight:600; }
  .clocks{ display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.8rem; }
  .clock{ border:1px solid var(--border); border-radius:14px; padding:1rem 1.1rem; background:var(--surface); position:relative; }
  .clock .x{ position:absolute; top:.5rem; right:.6rem; border:none; background:none; cursor:pointer; color:var(--muted); font-size:1rem; line-height:1; }
  .clock .x:hover{ color:#E5484D; }
  .clock .city{ font-weight:700; font-size:.98rem; display:flex; align-items:center; gap:.35rem; }
  .clock .t{ font-size:1.9rem; font-weight:800; letter-spacing:.02em; margin:.25rem 0 .1rem; font-variant-numeric:tabular-nums; }
  .clock .d{ color:var(--muted); font-size:.85rem; }
  .clock .gmt{ color:var(--accent); font-size:.78rem; font-weight:700; margin-top:.2rem; }

<div class="toolwrap" style="max-width:1000px;">
  <a class="back" href="index.html" data-i18n="back">← 전체 도구</a>
  <h1 data-i18n="tool.worldclock.t">세계 시계</h1>
  <p class="sub" data-i18n="wc.sub">세계 주요 도시의 현재 시각을 한눈에. 회의 시각도 변환하세요.</p>

  <div class="card">
    <div class="wcrow">
      <label class="chk"><input type="checkbox" id="custom"/> <span data-i18n="wc.custom">사용자 지정 시각</span></label>
      <input type="date" id="refdate" style="width:auto;"/>
      <input type="time" id="reftime" style="width:auto;"/>
      <span class="lbl" data-i18n="wc.refcity" style="font-weight:700;font-size:.86rem;">기준 도시</span>
      <select id="refzone"></select>
    </div>

      <select id="addsel"></select>
      <button class="btn" id="add" data-i18n="wc.add">추가</button>

    <p class="hint" data-i18n="wc.note">모든 계산은 브라우저에서 이루어집니다. 도시 목록은 이 브라우저에 저장됩니다.</p>

<script>
  function T(k){ return window.t ? window.t(k) : k; }
  var BASE=['Asia/Seoul','Asia/Tokyo','Asia/Shanghai','America/New_York','Europe/London','Europe/Paris','Asia/Singapore','America/Los_Angeles'];
  function defaultZones(){
    var l=(window.curLang?window.curLang():'ko');
    var pri = l==='ja' ? 'Asia/Tokyo' : l==='zh' ? 'Asia/Shanghai' : 'Asia/Seoul';   // 언어별 기준 도시, 그 외 서울
    return [pri].concat(BASE.filter(function(z){ return z!==pri; }));
  }
  var zones=[]; try{ var s=localStorage.getItem('wc_zones2'); if(s) zones=JSON.parse(s); }catch(e){}
  if(!Array.isArray(zones)||!zones.length) zones=defaultZones();
  var ALL=[]; try{ if(Intl.supportedValuesOf) ALL=Intl.supportedValuesOf('timeZone'); }catch(e){}
  if(!ALL.length) ALL=BASE.concat(['Asia/Hong_Kong','Asia/Taipei','Asia/Kolkata','Asia/Dubai','Asia/Bangkok','Europe/Berlin','Europe/Moscow','America/Chicago','America/Sao_Paulo','Australia/Sydney','Pacific/Auckland','UTC']);

  var CITY={
    'Asia/Seoul':{ko:'서울',en:'Seoul',zh:'首尔',ja:'ソウル'},
    'Asia/Pyongyang':{ko:'평양',en:'Pyongyang',zh:'平壤',ja:'平壌'},
    'Asia/Tokyo':{ko:'도쿄',en:'Tokyo',zh:'东京',ja:'東京'},
    'Asia/Shanghai':{ko:'상하이',en:'Shanghai',zh:'上海',ja:'上海'},
    'Asia/Hong_Kong':{ko:'홍콩',en:'Hong Kong',zh:'香港',ja:'香港'},
    'Asia/Taipei':{ko:'타이베이',en:'Taipei',zh:'台北',ja:'台北'},
    'Asia/Singapore':{ko:'싱가포르',en:'Singapore',zh:'新加坡',ja:'シンガポール'},
    'Asia/Bangkok':{ko:'방콕',en:'Bangkok',zh:'曼谷',ja:'バンコク'},
    'Asia/Ho_Chi_Minh':{ko:'호치민',en:'Ho Chi Minh',zh:'胡志明市',ja:'ホーチミン'},
    'Asia/Jakarta':{ko:'자카르타',en:'Jakarta',zh:'雅加达',ja:'ジャカルタ'},
    'Asia/Manila':{ko:'마닐라',en:'Manila',zh:'马尼拉',ja:'マニラ'},
    'Asia/Kolkata':{ko:'인도(콜카타)',en:'India (Kolkata)',zh:'印度(加尔各答)',ja:'インド(コルカタ)'},
    'Asia/Dubai':{ko:'두바이',en:'Dubai',zh:'迪拜',ja:'ドバイ'},
    'Europe/London':{ko:'런던',en:'London',zh:'伦敦',ja:'ロンドン'},
    'Europe/Paris':{ko:'파리',en:'Paris',zh:'巴黎',ja:'パリ'},
    'Europe/Berlin':{ko:'베를린',en:'Berlin',zh:'柏林',ja:'ベルリン'},
    'Europe/Madrid':{ko:'마드리드',en:'Madrid',zh:'马德里',ja:'マドリード'},
    'Europe/Rome':{ko:'로마',en:'Rome',zh:'罗马',ja:'ローマ'},
    'Europe/Moscow':{ko:'모스크바',en:'Moscow',zh:'莫斯科',ja:'モスクワ'},
    'America/New_York':{ko:'뉴욕',en:'New York',zh:'纽约',ja:'ニューヨーク'},
    'America/Chicago':{ko:'시카고',en:'Chicago',zh:'芝加哥',ja:'シカゴ'},
    'America/Los_Angeles':{ko:'로스앤젤레스',en:'Los Angeles',zh:'洛杉矶',ja:'ロサンゼルス'},
    'America/Toronto':{ko:'토론토',en:'Toronto',zh:'多伦多',ja:'トロント'},
    'America/Sao_Paulo':{ko:'상파울루',en:'São Paulo',zh:'圣保罗',ja:'サンパウロ'},
    'Australia/Sydney':{ko:'시드니',en:'Sydney',zh:'悉尼',ja:'シドニー'},
    'Pacific/Auckland':{ko:'오클랜드',en:'Auckland',zh:'奥克兰',ja:'オークランド'},
    'UTC':{ko:'협정세계시 UTC',en:'UTC',zh:'协调世界时 UTC',ja:'協定世界時 UTC'}
  };
  function cityName(tz){ var l=(window.curLang?window.curLang():'ko'), m=CITY[tz]; return m?(m[l]||m.en):tz.split('/').pop().replace(/_/g,' '); }
  function localeOf(){ var l=(window.curLang?window.curLang():'ko'); return l==='zh'?'zh-CN':l==='ja'?'ja':l==='en'?'en-US':'ko-KR'; }
  function tzOffsetMin(date,tz){ var s=new Date(date.toLocaleString('en-US',{timeZone:tz})), u=new Date(date.toLocaleString('en-US',{timeZone:'UTC'})); return Math.round((s-u)/60000); }
  function gmt(min){ var sign=min<0?'-':'+', a=Math.abs(min); return 'GMT'+sign+Math.floor(a/60)+(a%60?(':'+('0'+(a%60)).slice(-2)):''); }
  function hourIn(instant,tz){ return +new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'2-digit',hour12:false}).format(new Date(instant)).replace(/[^0-9]/g,''); }
  function fmtTime(instant,tz){ return new Intl.DateTimeFormat(localeOf(),{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date(instant)); }
  function fmtDate(instant,tz){ return new Intl.DateTimeFormat(localeOf(),{timeZone:tz,weekday:'short',month:'short',day:'numeric'}).format(new Date(instant)); }

  var customEl=document.getElementById('custom'), refdate=document.getElementById('refdate'), reftime=document.getElementById('reftime'),
      refzone=document.getElementById('refzone'), addsel=document.getElementById('addsel'), clocks=document.getElementById('clocks');

  function instantNow(){
    if(!customEl.checked) return Date.now();
    var d=refdate.value, t=reftime.value; if(!d||!t) return Date.now();
    var p=d.split('-'), q=t.split(':');
    var guess=Date.UTC(+p[0],+p[1]-1,+p[2],+q[0],+q[1],0);
    var off=tzOffsetMin(new Date(guess), refzone.value||zones[0]);
    return guess - off*60000;
  }
  function save(){ try{ localStorage.setItem('wc_zones2', JSON.stringify(zones)); }catch(e){} }
  function fillSelect(sel, list, selected){
    sel.innerHTML = list.map(function(tz){ return '<option value="'+tz+'"'+(tz===selected?' selected':'')+'>'+cityName(tz)+' — '+tz+'</option>'; }).join('');
  }
  function render(){
    var inst=instantNow();
    clocks.innerHTML = zones.map(function(tz){
      var h=hourIn(inst,tz), icon=(h>=6&&h<18)?'☀️':'🌙';
      var off=tzOffsetMin(new Date(inst),tz);
      return '<div class="clock"><button class="x" data-z="'+tz+'" title="'+T('wc.remove')+'">✕</button>'
        + '<div class="city">'+icon+' '+cityName(tz)+'</div>'
        + '<div class="t">'+fmtTime(inst,tz)+'</div>'
        + '<div class="d">'+fmtDate(inst,tz)+'</div>'
        + '<div class="gmt">'+gmt(off)+'</div></div>';
    }).join('');
  }
  clocks.addEventListener('click', function(e){ var b=e.target.closest('.x'); if(!b) return; var tz=b.dataset.z; zones=zones.filter(function(z){return z!==tz;}); save(); fillSelect(refzone, zones, refzone.value); render(); });
  document.getElementById('add').addEventListener('click', function(){ var tz=addsel.value; if(tz && zones.indexOf(tz)<0){ zones.push(tz); save(); fillSelect(refzone, zones, refzone.value); render(); } });
  customEl.addEventListener('change', render);
  [refdate,reftime,refzone].forEach(function(el){ el.addEventListener('input', render); });
  window.onI18n = function(){ fillSelect(addsel, ALL, addsel.value); fillSelect(refzone, zones, refzone.value); render(); };

  fillSelect(addsel, ALL, 'Asia/Seoul');
  fillSelect(refzone, zones, zones[0]);
  (function(){ var t=new Date(); refdate.value=t.getFullYear()+'-'+('0'+(t.getMonth()+1)).slice(-2)+'-'+('0'+t.getDate()).slice(-2); reftime.value=('0'+t.getHours()).slice(-2)+':'+('0'+t.getMinutes()).slice(-2); })();
  render();
  setInterval(render, 1000);
</script>
</body>
