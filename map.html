  .maptools{ display:flex; gap:.4rem; flex-wrap:wrap; align-items:center; margin-bottom:.7rem; }

  #map{ width:100%; height:70vh; min-height:440px; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  /* 지도 커서: 기본 grab, 드래그 중 grabbing, 그리기/측정 모드 crosshair.
     명시 커서를 지정해 타일 로딩 중 브라우저 '로딩(progress) 커서'가 비쳐 보이는 현상을 방지 */
  #map .ol-viewport, #map .ol-viewport canvas{ cursor:grab; }
  #map .ol-viewport:active, #map .ol-viewport:active canvas{ cursor:grabbing; }
  #map.draw-mode .ol-viewport, #map.draw-mode .ol-viewport canvas{ cursor:crosshair; }
  .ol-tooltip{ background:rgba(17,24,39,.78); color:#fff; padding:3px 8px; border-radius:6px; font-size:.82rem; white-space:nowrap; pointer-events:none; }

<div class="toolwrap" style="max-width:1100px;">

  <h1 data-i18n="tool.gmap.t">GIS 웹맵 뷰어</h1>
  <p class="sub" data-i18n="gm.sub">배경지도 위에서 거리·면적 측정, 버퍼, 히트맵, 클러스터를 바로 사용하세요.</p>

  <div class="card">
    <div class="maptools">
      <span class="lbl" style="font-weight:700;font-size:.86rem;" data-i18n="gm.base">배경지도</span>
      <select id="base"></select>
      <button class="btn btn-ghost" data-mode="dist" data-i18n="gm.dist">📏 거리</button>
      <button class="btn btn-ghost" data-mode="area" data-i18n="gm.area">📐 면적</button>
      <button class="btn btn-ghost" data-mode="point" data-i18n="gm.point">📍 점 찍기</button>
      <button class="btn btn-ghost" id="buffer" data-i18n="gm.buffer">⭕ 버퍼</button>
      <button class="btn btn-ghost" id="heat" data-i18n="gm.heat">🔥 히트맵</button>
      <button class="btn btn-ghost" id="cluster" data-i18n="gm.cluster">🔵 클러스터</button>
      <button class="btn btn-ghost" id="clear" data-i18n="gm.clear">🗑 지우기</button>
    </div>
    <p class="hint" id="tip" data-i18n="gm.tip" style="margin-top:0;">측정·점 모드를 켜고 지도를 클릭해 그리세요. 좌상단 ＋/－·전체화면 버튼도 사용할 수 있어요.</p>
    <div id="map"></div>
    <p class="hint" data-i18n="gm.note">© OpenStreetMap 기여자 · VWorld(국토교통부). 모든 처리는 브라우저에서 이루어집니다.</p>

<div class="toast" id="toast"></div>
<script>
  function T(k){ return window.t ? window.t(k) : k; }
  function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1800);}
  var KEY = window.VWORLD_KEY || "";

  // ── 배경지도 레이어 ──
  var osm = new ol.layer.Tile({ source: new ol.source.OSM() });
  var layers = [osm];
  var vbase, vsat, vhyb;
  if(KEY){
    function vxyz(type, ext){ return new ol.layer.Tile({ visible:false, source: new ol.source.XYZ({
      url:'https://api.vworld.kr/req/wmts/1.0.0/'+KEY+'/'+type+'/{z}/{y}/{x}.'+ext, attributions:'© VWorld', maxZoom:19, crossOrigin:null }) }); }
    vbase = vxyz('Base','png'); vsat = vxyz('Satellite','jpeg'); vhyb = vxyz('Hybrid','png');
    layers.push(vbase, vsat, vhyb);
  }

  // ── 벡터 레이어 ──
  var drawSrc = new ol.source.Vector();
  var measureStyle = new ol.style.Style({ stroke:new ol.style.Stroke({color:'#5B5BF5',width:3}),
    fill:new ol.style.Fill({color:'rgba(91,91,245,.15)'}), image:new ol.style.Circle({radius:5,fill:new ol.style.Fill({color:'#5B5BF5'})}) });
  var drawLayer = new ol.layer.Vector({ source:drawSrc, style:measureStyle });

  var bufSrc = new ol.source.Vector();
  var bufLayer = new ol.layer.Vector({ source:bufSrc, style:new ol.style.Style({
    stroke:new ol.style.Stroke({color:'#0EA46A',width:2}), fill:new ol.style.Fill({color:'rgba(14,164,106,.18)'}) }) });

  var ptSrc = new ol.source.Vector();
  var ptNormal = new ol.style.Style({ image:new ol.style.Circle({radius:5,fill:new ol.style.Fill({color:'#E5484D'}),stroke:new ol.style.Stroke({color:'#fff',width:1.5})}) });
  var ptHit = new ol.style.Style({ image:new ol.style.Circle({radius:7,fill:new ol.style.Fill({color:'#0EA46A'}),stroke:new ol.style.Stroke({color:'#fff',width:2})}) });
  var ptLayer = new ol.layer.Vector({ source:ptSrc, style:function(f){ return f.get('hit') ? ptHit : ptNormal; } });
  var heatLayer = new ol.layer.Heatmap({ source:ptSrc, blur:18, radius:12, visible:false });
  var clusterLayer = new ol.layer.Vector({ visible:false, source:new ol.source.Cluster({distance:42, source:ptSrc}),
    style:function(f){ var n=f.get('features').length; return new ol.style.Style({
      image:new ol.style.Circle({radius:11+Math.min(n,18), fill:new ol.style.Fill({color:'rgba(91,91,245,.78)'}), stroke:new ol.style.Stroke({color:'#fff',width:2})}),
      text:new ol.style.Text({text:String(n), fill:new ol.style.Fill({color:'#fff'}), font:'bold 12px Pretendard,sans-serif'}) }); } });

  var map = new ol.Map({
    target:'map',
    layers: layers.concat([bufLayer, drawLayer, ptLayer, heatLayer, clusterLayer]),
    view: new ol.View({ center: ol.proj.fromLonLat([127.6, 36.3]), zoom:7 }),
    controls: [ new ol.control.Zoom(), new ol.control.Attribution({collapsible:true}), new ol.control.ScaleLine(), new ol.control.FullScreen() ]
  });

  // ── 배경지도 전환 ──
  var baseSel = document.getElementById('base');
  function renderBaseOptions(){
    var opts = '<option value="osm">OpenStreetMap</option>';
    if(KEY){ opts += '<option value="vbase">'+T('gm.base.vbase')+'</option><option value="vsat">'+T('gm.base.vsat')+'</option>'; }
    var cur = baseSel.value || 'osm';
    baseSel.innerHTML = opts; baseSel.value = cur;
  }
  function switchBase(v){
    osm.setVisible(v==='osm');
    if(KEY){ vbase.setVisible(v==='vbase'); vsat.setVisible(v==='vsat'); vhyb.setVisible(v==='vsat'); }
  }
  baseSel.addEventListener('change', function(){ switchBase(baseSel.value); });

  // ── 측정 (거리/면적) + 점 찍기 ──
  var draw=null, sketch=null, measureTip=null, measureEl=null;
  function fmtLen(line){ var l=ol.sphere.getLength(line); return l>1000 ? (l/1000).toFixed(2)+' km' : Math.round(l)+' m'; }
  function fmtArea(poly){ var a=ol.sphere.getArea(poly);
    var base = a>1000000 ? (a/1000000).toFixed(2)+' km²' : Math.round(a).toLocaleString()+' m²';
    if((window.curLang?window.curLang():'ko')==='ko') base += ' · ' + Math.round(a/3.305785).toLocaleString()+'평';
    return base; }
  function newMeasureTip(){ if(measureEl) measureEl.remove(); measureEl=document.createElement('div'); measureEl.className='ol-tooltip ol-tooltip-static';
    measureTip=new ol.Overlay({element:measureEl, offset:[0,-12], positioning:'bottom-center', stopEvent:false, insertFirst:false}); map.addOverlay(measureTip); }
  function setMode(mode, btn){
    document.querySelectorAll('.maptools [data-mode]').forEach(function(b){ b.classList.remove('on-btn'); });
    if(draw){ map.removeInteraction(draw); draw=null; }
    document.getElementById('map').classList.toggle('draw-mode', !!mode);
    if(!mode) return;
    btn.classList.add('on-btn');
    var type = mode==='point'?'Point' : mode==='area'?'Polygon':'LineString';
    draw = new ol.interaction.Draw({ source: mode==='point'?ptSrc:drawSrc, type:type, style:measureStyle });
    if(mode!=='point'){
      draw.on('drawstart', function(e){ sketch=e.feature; newMeasureTip();
        sketch.getGeometry().on('change', function(ev){ var g=ev.target;
          measureEl.innerHTML = (g instanceof ol.geom.Polygon)?fmtArea(g):fmtLen(g);
          measureTip.setPosition((g instanceof ol.geom.Polygon)?g.getInteriorPoint().getCoordinates():g.getLastCoordinate()); }); });
      draw.on('drawend', function(){ measureEl.className='ol-tooltip ol-tooltip-static'; measureTip.setOffset([0,-8]); sketch=null; measureEl=null; });
    }
    map.addInteraction(draw);
  }
  document.querySelectorAll('.maptools [data-mode]').forEach(function(b){
    b.addEventListener('click', function(){ if(b.classList.contains('on-btn')) setMode(null); else setMode(b.dataset.mode, b); });
  });

  // ── 버퍼 검색: 중심점 반경 내 점 찾기 (Turf) ──
  document.getElementById('buffer').addEventListener('click', function(){
    if(!ptSrc.getFeatures().length){ toast(T('gm.bufneed')); return; }
    var v = prompt(T('gm.bufferprompt'), '500'); if(v===null) return;
    var radius = parseFloat(v); if(isNaN(radius)||radius<=0){ toast(T('gm.bufbad')); return; }
    setMode(null);
    clusterLayer.setVisible(false); document.getElementById('cluster').classList.remove('on-btn'); ptLayer.setVisible(true);
    toast(T('gm.bufclick'));
    document.getElementById('map').classList.add('draw-mode');  // 중심 클릭 대기 동안 crosshair
    map.once('singleclick', function(evt){
      document.getElementById('map').classList.remove('draw-mode');
      var c = ol.proj.toLonLat(evt.coordinate), circle;
      try{ circle = turf.buffer(turf.point(c), radius/1000, {units:'kilometers'}); }catch(e){ return; }
      var fmt = new ol.format.GeoJSON();
      bufSrc.clear();
      bufSrc.addFeature(fmt.readFeature(circle, {dataProjection:'EPSG:4326', featureProjection:'EPSG:3857'}));
      var n=0;
      ptSrc.getFeatures().forEach(function(f){
        var p = ol.proj.toLonLat(f.getGeometry().getCoordinates());
        var inside = turf.booleanPointInPolygon(turf.point(p), circle);
        f.set('hit', inside); if(inside) n++;
      });
      ptLayer.changed();
      toast(T('gm.bufresult').replace('{r}', radius).replace('{n}', n));
    });
  });

  // ── 히트맵 / 클러스터 토글 ──
  function toggle(layer, btn){ var on=!layer.getVisible(); layer.setVisible(on); btn.classList.toggle('on-btn', on); }
  document.getElementById('heat').addEventListener('click', function(){ toggle(heatLayer, this); });
  document.getElementById('cluster').addEventListener('click', function(){ toggle(clusterLayer, this); ptLayer.setVisible(!clusterLayer.getVisible()); });

  // ── 지우기 ──
  document.getElementById('clear').addEventListener('click', function(){
    drawSrc.clear(); ptSrc.clear(); bufSrc.clear();
    map.getOverlays().clear(); setMode(null);
    heatLayer.setVisible(false); clusterLayer.setVisible(false); ptLayer.setVisible(true);
    document.getElementById('heat').classList.remove('on-btn'); document.getElementById('cluster').classList.remove('on-btn');
  });

  renderBaseOptions(); switchBase('osm');
  window.onI18n = function(){ var v=baseSel.value; renderBaseOptions(); baseSel.value=v; };
</script>
</body>
