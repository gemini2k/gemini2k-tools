<body>

<div class="toolwrap">
  <h1 data-i18n="tool.regex.t">정규식 테스터</h1>
  <p class="sub" data-i18n="rx.sub">패턴과 플래그로 실시간 매칭·그룹·치환을 확인합니다.</p>

  <div class="card">
    <label for="pattern" data-i18n="rx.pattern">정규식 패턴</label>
    <input type="text" id="pattern" data-i18n-ph="rx.patternph" placeholder="예: \d{3}-\d{4}"/>
    <div class="flags">
      <label><input type="checkbox" id="f_g" checked/> g</label>
      <label><input type="checkbox" id="f_i"/> i</label>
      <label><input type="checkbox" id="f_m"/> m</label>
      <label><input type="checkbox" id="f_s"/> s</label>
      <label><input type="checkbox" id="f_u"/> u</label>
      <label><input type="checkbox" id="f_y"/> y</label>
    </div>
    <p class="hint" data-i18n="rx.flaghint" style="margin-top:.5rem;">g 전역 · i 대소문자 무시 · m 여러 줄 · s 점(.)에 줄바꿈 포함 · u 유니코드 · y 고정 위치</p>
    <p class="stat hint" id="status" style="font-weight:700;"></p>
  </div>

  <div class="card">
    <label for="text" data-i18n="rx.text">테스트할 문자열</label>
    <textarea id="text" data-i18n-ph="rx.textph" placeholder="여기에 검사할 텍스트를 입력하세요…"></textarea>
    <p class="cnt" id="count"></p>
    <div class="prev" id="preview"></div>
    <div id="groups" style="margin-top:.8rem;"></div>
  </div>

  <div class="card">
    <label for="repl" data-i18n="rx.replace">치환 (선택)</label>
    <input type="text" id="repl" data-i18n-ph="rx.replaceph" placeholder="치환 문자열 (예: $1)"/>
    <label for="replout" style="margin-top:.9rem;" data-i18n="rx.result">치환 결과</label>
    <textarea id="replout" readonly style="font-family:ui-monospace,monospace;min-height:90px;"></textarea>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  function T(k){ return window.t ? window.t(k) : k; }
  function esc(s){ return s.replace(/[&<>]/g, function(c){ return c==='&'?'&amp;':c==='<'?'&lt;':'&gt;'; }); }
  var pattern=document.getElementById('pattern'), text=document.getElementById('text'),
      preview=document.getElementById('preview'), count=document.getElementById('count'),
      groupsBox=document.getElementById('groups'), status=document.getElementById('status'),
      replIn=document.getElementById('repl'), replOut=document.getElementById('replout');
  function flags(){ return ['g','i','m','s','u','y'].filter(function(f){ return document.getElementById('f_'+f).checked; }).join(''); }
  function run(){
    var pat=pattern.value, fl=flags(), s=text.value;
    if(!pat){ status.textContent=''; count.textContent=''; groupsBox.innerHTML=''; preview.innerHTML=esc(s)||'&nbsp;'; replOut.value=''; return; }
    var scan = fl.indexOf('g')<0 ? fl+'g' : fl, re;
    try{ re=new RegExp(pat, scan); }
    catch(e){ status.textContent=T('rx.invalid').replace('{m}', e.message); status.style.color='#E5484D'; count.textContent=''; groupsBox.innerHTML=''; preview.innerHTML=esc(s)||'&nbsp;'; replOut.value=''; return; }
    status.textContent='';
    var matches=[], m, guard=0;
    while((m=re.exec(s))!==null){
      matches.push(m);
      if(m.index===re.lastIndex) re.lastIndex++;
      if(++guard>200000) break;
    }
    var html='', last=0;
    matches.forEach(function(mm){ var st=mm.index, en=st+mm[0].length; html+=esc(s.slice(last,st))+'<mark>'+esc(s.slice(st,en))+'</mark>'; last=en; });
    html+=esc(s.slice(last));
    preview.innerHTML = html || '&nbsp;';
    count.textContent = matches.length ? T('rx.matches').replace('{n}', matches.length) : T('rx.nomatch');
    count.style.color = matches.length ? '#0EA46A' : 'var(--muted)';
    groupsBox.innerHTML = matches.slice(0,100).map(function(mm,i){
      var parts=['#'+(i+1)+' "'+esc(mm[0])+'"'];
      for(var g=1; g<mm.length; g++) parts.push('$'+g+' = '+(mm[g]==null?'∅':'"'+esc(mm[g])+'"'));
      if(mm.groups) Object.keys(mm.groups).forEach(function(k){ parts.push(k+' = '+(mm.groups[k]==null?'∅':'"'+esc(mm.groups[k])+'"')); });
      return '<div class="grow">'+parts.join('&nbsp; · &nbsp;')+'</div>';
    }).join('');
    if(replIn.value!==''){ try{ replOut.value = s.replace(new RegExp(pat, fl), replIn.value); }catch(e){ replOut.value=''; } }
    else replOut.value='';
  }
  [pattern, text, replIn].forEach(function(el){ el.addEventListener('input', run); });
  ['g','i','m','s','u','y'].forEach(function(f){ document.getElementById('f_'+f).addEventListener('change', run); });
  window.onI18n = run;
  run();
</script>
