<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>gemini2k 도구 — 무료 온라인 도구 모음</title>
<meta name="description" content="설치 없이 브라우저에서 바로 쓰는 무료 도구 모음. 글자수 세기, 만나이·D-Day 계산기, QR코드 생성기, 비밀번호 생성기 등. 입력값은 기기 밖으로 나가지 않습니다."/>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<header class="top"><div class="top-in">
  <a class="logo" href="index.html"><span class="mk">🧰</span> gemini2k 도구</a>
  <nav><a href="https://gemini2k.kr" target="_blank" rel="noopener">블로그</a></nav>
</div></header>

<section class="hero">
  <div class="ey">FREE TOOLS</div>
  <h1>필요한 도구,<br/>바로 여기</h1>
  <p>설치 없이 브라우저에서 바로 쓰는 무료 도구 모음.<br/>입력값은 기기 밖으로 나가지 않습니다.</p>
  <div class="search"><input id="q" type="text" placeholder="도구 검색… (예: 글자수, 날짜, QR, 비밀번호)" aria-label="도구 검색"/></div>
</section>

<div class="chips" id="chips"></div>

<div class="wrap">
  <div class="grid" id="grid"></div>
  <p class="hint" id="empty" style="display:none;text-align:center;">검색 결과가 없습니다.</p>
</div>

<footer class="foot"><div class="foot-in">
  <span>© gemini2k 도구</span>
  <span>· 모든 처리는 브라우저에서 (입력값 전송 없음)</span>
  <span class="sp"></span>
  <a href="https://gemini2k.kr" target="_blank" rel="noopener">빛의여행 블로그 →</a>
</div></footer>

<script>
  // ── 도구 목록: 여기에 한 줄 추가하면 카드·검색·카테고리에 자동 반영 ──
  var TOOLS = [
    { t:'글자수 세기', d:'공백 포함/제외, 단어·줄·원고지 매수를 실시간으로.', h:'char-counter.html', ic:'✍️', chip:'c-blue',   cat:'텍스트',  k:'글자수 character counter 원고지 단어 word count 자소서' },
    { t:'만나이·D-Day 계산기', d:'만 나이, 디데이, 두 날짜 사이 일수를 한 번에.', h:'date-calc.html', ic:'📅', chip:'c-green', cat:'계산기',  k:'만나이 나이 계산 dday 디데이 날짜 차이 date age' },
    { t:'QR코드 생성기', d:'URL·텍스트를 QR코드로 만들고 이미지로 저장.', h:'qr.html', ic:'🔳', chip:'c-violet', cat:'생성기',  k:'qr코드 큐알 생성 url 와이파이' },
    { t:'비밀번호 생성기', d:'안전한 무작위 비밀번호를 원하는 조건으로 생성.', h:'password.html', ic:'🔑', chip:'c-rose', cat:'생성기',  k:'비밀번호 생성 password 랜덤 보안 strong' }
  ];

  var grid = document.getElementById('grid'), chipsBox = document.getElementById('chips'),
      empty = document.getElementById('empty'), q = document.getElementById('q');
  var activeCat = '전체';

  // 카드 렌더
  grid.innerHTML = TOOLS.map(function(x){
    return '<a class="tool" href="'+x.h+'" data-cat="'+x.cat+'" data-k="'+x.k+' '+x.t+'">'
      + '<span class="ic '+x.chip+'">'+x.ic+'</span>'
      + '<div><h3>'+x.t+'</h3><p>'+x.d+'</p></div></a>';
  }).join('');

  // 카테고리 칩 (전체 + 등장 순서대로 고유 카테고리)
  var cats = ['전체']; TOOLS.forEach(function(x){ if(cats.indexOf(x.cat)<0) cats.push(x.cat); });
  chipsBox.innerHTML = cats.map(function(c,i){
    return '<button class="chip'+(i===0?' on':'')+'" data-cat="'+c+'">'+c+'</button>';
  }).join('');

  function apply(){
    var t = q.value.trim().toLowerCase(), shown = 0;
    grid.querySelectorAll('.tool').forEach(function(el){
      var okCat = activeCat==='전체' || el.dataset.cat===activeCat;
      var okQ = !t || (el.dataset.k + ' ' + el.textContent).toLowerCase().indexOf(t)!==-1;
      var hit = okCat && okQ;
      el.style.display = hit ? '' : 'none';
      if(hit) shown++;
    });
    empty.style.display = shown ? 'none' : '';
  }
  q.addEventListener('input', apply);
  chipsBox.addEventListener('click', function(e){
    var b = e.target.closest('.chip'); if(!b) return;
    activeCat = b.dataset.cat;
    chipsBox.querySelectorAll('.chip').forEach(function(c){ c.classList.toggle('on', c===b); });
    apply();
  });
</script>
</body>
</html>
