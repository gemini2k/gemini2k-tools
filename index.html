<script>
  // 도구 정의 (이름·설명은 i18n.js 사전에서 key 로 가져옴). 새 도구 추가 시 한 줄.
  var TOOLS = [
    { key:'char',  h:'char-counter.html', ic:'✍️', chip:'c-blue',   cat:'텍스트', k:'글자수 character counter 원고지 단어 word count 자소서 字数 文字数' },
    { key:'date',  h:'date-calc.html',    ic:'📅', chip:'c-green',  cat:'계산기', k:'만나이 나이 dday 디데이 날짜 date age 年龄 倒数 年齢' },
    { key:'qr',    h:'qr.html',           ic:'🔳', chip:'c-violet', cat:'생성기', k:'qr 큐알 二维码 url 와이파이' },
    { key:'pw',    h:'password.html',     ic:'🔑', chip:'c-rose',   cat:'생성기', k:'비밀번호 password 密码 パスワード 랜덤 보안' },
    { key:'unit',  h:'unit.html',         ic:'📐', chip:'c-amber',  cat:'변환기', k:'단위 변환 unit 单位 単位 길이 무게 온도 평' },
    { key:'color', h:'color.html',        ic:'🎨', chip:'c-cyan',   cat:'변환기', k:'색상 color 颜色 カラー hex rgb hsl' },
    { key:'image', h:'image.html',        ic:'🖼️', chip:'c-green',  cat:'이미지', k:'이미지 압축 리사이즈 image 图片 画像 png jpg webp' },
    { key:'text',  h:'text-tools.html',   ic:'🧹', chip:'c-blue',   cat:'텍스트', k:'텍스트 정리 text 文本 テキスト 대소문자 중복 정렬' },
    { key:'base64',h:'base64.html',       ic:'🔤', chip:'c-cyan',   cat:'변환기', k:'base64 인코딩 디코딩 encode decode 编解码 エンコード' },
    { key:'lotto', h:'lotto.html',        ic:'🎲', chip:'c-rose',   cat:'생성기', k:'로또 lotto 번호 추첨 645 乐透 ロト random' },
    { key:'pmerge',   h:'merge.html',       ic:'📎', chip:'c-rose',   cat:'PDF', k:'pdf 합치기 병합 merge combine 合并 結合 묶기' },
    { key:'psplit',   h:'split.html',       ic:'✂️', chip:'c-amber',  cat:'PDF', k:'pdf 쪼개기 분할 추출 split extract 拆分 分割 페이지' },
    { key:'img2pdf',  h:'img2pdf.html',     ic:'🖼️', chip:'c-green',  cat:'PDF', k:'이미지 pdf 변환 image to pdf jpg png 图片 画像' },
    { key:'pcompress',h:'pdf-compress.html',ic:'📦', chip:'c-blue',   cat:'PDF', k:'pdf 압축 용량 compress 压缩 圧縮 줄이기 reduce' },
    { key:'json',  h:'json.html',     ic:'🧩', chip:'c-amber',  cat:'개발자', k:'json 포맷 검증 formatter validator beautify minify 格式化 整形 파싱 lint' },
    { key:'regex', h:'regex.html',    ic:'🔎', chip:'c-violet', cat:'개발자', k:'정규식 정규표현식 regex regexp 正则 正規表現 패턴 pattern 테스트' },
    { key:'md',    h:'markdown.html', ic:'📝', chip:'c-blue',   cat:'개발자', k:'마크다운 markdown 에디터 editor preview md 编辑 プレビュー 온라인' },
    { key:'favicon',h:'favicon.html', ic:'⭐', chip:'c-amber',  cat:'이미지', k:'파비콘 favicon 즐겨찾기 아이콘 icon ico 图标 アイコン 생성' },
    { key:'diagram',h:'diagram.html', ic:'🔷', chip:'c-violet', cat:'이미지', k:'다이어그램 diagram svg 도식 순서도 flowchart 图示 図解 박스 화살표' }
  ];
  var grid=document.getElementById('grid'), chipsBox=document.getElementById('chips'),
      empty=document.getElementById('empty'), q=document.getElementById('q'), activeCat='전체';

  function applyFilter(){
    var s=q.value.trim().toLowerCase(), shown=0;
    grid.querySelectorAll('.tool').forEach(function(el){
      var okC = activeCat==='전체' || el.dataset.cat===activeCat;
      var okQ = !s || (el.dataset.k+' '+el.textContent).toLowerCase().indexOf(s)!==-1;
      var hit = okC && okQ; el.style.display=hit?'':'none'; if(hit) shown++;
    });
    empty.style.display = shown ? 'none' : '';
  }
  function renderHub(){
    var cats=['전체']; TOOLS.forEach(function(x){ if(cats.indexOf(x.cat)<0) cats.push(x.cat); });
    chipsBox.innerHTML = cats.map(function(c){
      return '<button class="chip'+(c===activeCat?' on':'')+'" data-cat="'+c+'">'+t('cat.'+c)+'</button>';
    }).join('');
    grid.innerHTML = TOOLS.map(function(x){
      return '<a class="tool" href="'+x.h+'" data-cat="'+x.cat+'" data-k="'+x.k+'">'
        +'<span class="ic '+x.chip+'">'+x.ic+'</span>'
        +'<div><h3>'+t('tool.'+x.key+'.t')+'</h3><p>'+t('tool.'+x.key+'.d')+'</p></div></a>';
    }).join('');
    applyFilter();
  }
  window.onI18n = renderHub;                 // 언어 전환 시 재렌더
  document.getElementById('langsel').addEventListener('change', function(e){ setLang(e.target.value); });
  q.addEventListener('input', applyFilter);
  chipsBox.addEventListener('click', function(e){
    var b=e.target.closest('.chip'); if(!b) return;
    activeCat=b.dataset.cat;
    chipsBox.querySelectorAll('.chip').forEach(function(c){ c.classList.toggle('on', c===b); });
    applyFilter();
  });
  if(typeof t === 'function') renderHub();   // 초기 렌더(i18n 로드 후)
</script>
</body>
