<script>
  function T(k){ return window.t ? window.t(k) : k; }
  var VW=900, VH=520, GRID=20, svg=document.getElementById('svg');
  var COLORS=['#EAF2FF','#E6F7F0','#FFF3E0','#FCE7F3','#EDE9FE','#F1F5F9'];
  var nodes=[], edges=[], seq=1, eseq=1, sel=null, connectMode=false, connectFirst=null, drag=null, dragMoved=false, snapOn=false, undoStack=[];
  var newShape='round', newColor=COLORS[0], newLine='solid', newArrow='end', newRoute='straight';
  var shapeSel=document.getElementById('shape'), lineSel=document.getElementById('line'), arrowSel=document.getElementById('arrow'),
      routeSel=document.getElementById('route'), snapChk=document.getElementById('snap');

  function byId(id){ for(var i=0;i<nodes.length;i++) if(nodes[i].id===id) return nodes[i]; return null; }
  function edgeById(id){ for(var i=0;i<edges.length;i++) if(edges[i].id===id) return edges[i]; return null; }
  function esc(s){ return (s||'').replace(/[&<>]/g,function(c){return c==='&'?'&amp;':c==='<'?'&lt;':'&gt;';}); }
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
  function snapV(v){ return snapOn ? Math.round(v/GRID)*GRID : v; }
  function lum(hex){ var c=hex.replace('#',''); return 0.299*parseInt(c.substr(0,2),16)+0.587*parseInt(c.substr(2,2),16)+0.114*parseInt(c.substr(4,2),16); }
  function textColor(bg){ return lum(bg)>150 ? '#1f2937' : '#ffffff'; }
  function nodeW(n){ var base=Math.max(86,(n.text?n.text.length:1)*9+34);
    if(n.shape==='diamond') return Math.round(base*1.4);
    if(n.shape==='ellipse') return base+24;
    if(n.shape==='parallelogram') return base+28;
    return base; }
  function nodeH(n){ return n.shape==='diamond'?64 : n.shape==='ellipse'?56 : n.shape==='cylinder'?60 : 46; }
  function halfW(n){ return nodeW(n)/2; } function halfH(n){ return nodeH(n)/2; }
  function border(n, tx, ty){
    var w=nodeW(n), h=nodeH(n), dx=tx-n.x, dy=ty-n.y;
    if(dx===0&&dy===0) return {x:n.x,y:n.y};
    var s=Math.min((w/2)/Math.abs(dx||1e-6),(h/2)/Math.abs(dy||1e-6));
    return {x:n.x+dx*s, y:n.y+dy*s};
  }
  function orthoGeom(a,b){
    var dx=b.x-a.x, dy=b.y-a.y, pts, lab;
    if(Math.abs(dx)>=Math.abs(dy)){
      var s=a.x+(dx<0?-1:1)*halfW(a), e=b.x-(dx<0?-1:1)*halfW(b), mx=(s+e)/2;
      pts=[[s,a.y],[mx,a.y],[mx,b.y],[e,b.y]]; lab={x:mx,y:(a.y+b.y)/2};
    } else {
      var s2=a.y+(dy<0?-1:1)*halfH(a), e2=b.y-(dy<0?-1:1)*halfH(b), my=(s2+e2)/2;
      pts=[[a.x,s2],[a.x,my],[b.x,my],[b.x,e2]]; lab={x:(a.x+b.x)/2,y:my};
    }
    return {pts:pts, lab:lab};
  }
  function shapeMarkup(n, stroke, sw){
    var w=nodeW(n), h=nodeH(n), x=n.x-w/2, y=n.y-h/2, cx=n.x, cy=n.y, a='fill="'+n.color+'" stroke="'+stroke+'" stroke-width="'+sw+'"', P=function(v){return v.toFixed(1);};
    if(n.shape==='rect') return '<rect x="'+P(x)+'" y="'+P(y)+'" width="'+P(w)+'" height="'+P(h)+'" '+a+'/>';
    if(n.shape==='ellipse') return '<ellipse cx="'+P(cx)+'" cy="'+P(cy)+'" rx="'+P(w/2)+'" ry="'+P(h/2)+'" '+a+'/>';
    if(n.shape==='diamond') return '<polygon points="'+P(cx)+','+P(y)+' '+P(x+w)+','+P(cy)+' '+P(cx)+','+P(y+h)+' '+P(x)+','+P(cy)+'" '+a+'/>';
    if(n.shape==='parallelogram'){ var sk=Math.min(24,w*0.18); return '<polygon points="'+P(x+sk)+','+P(y)+' '+P(x+w)+','+P(y)+' '+P(x+w-sk)+','+P(y+h)+' '+P(x)+','+P(y+h)+'" '+a+'/>'; }
    if(n.shape==='cylinder'){ var ry=9; return '<path d="M '+P(x)+' '+P(y+ry)+' L '+P(x)+' '+P(y+h-ry)+' A '+P(w/2)+' '+ry+' 0 0 0 '+P(x+w)+' '+P(y+h-ry)+' L '+P(x+w)+' '+P(y+ry)+'" '+a+'/><ellipse cx="'+P(cx)+'" cy="'+P(y+ry)+'" rx="'+P(w/2)+'" ry="'+ry+'" '+a+'/>'; }
    return '<rect x="'+P(x)+'" y="'+P(y)+'" width="'+P(w)+'" height="'+P(h)+'" rx="12" '+a+'/>';
  }
  function labelMarkup(text, lx, ly){
    if(!text) return '';
    var lw=text.length*8+12;
    return '<rect x="'+(lx-lw/2).toFixed(1)+'" y="'+(ly-10).toFixed(1)+'" width="'+lw+'" height="20" rx="5" fill="#ffffff" opacity="0.92" style="pointer-events:none"/>'
         + '<text x="'+lx.toFixed(1)+'" y="'+(ly+1).toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" font-family="Pretendard,system-ui,sans-serif" font-size="12" fill="#334155" style="pointer-events:none">'+esc(text)+'</text>';
  }
  function inner(showGrid){
    var parts=['<defs>'
      +'<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#475569"/></marker>'
      +'<marker id="arrSel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#5B5BF5"/></marker>'
      +'<pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0 H0 V20" fill="none" stroke="#eef1f5" stroke-width="1"/></pattern>'
      +'</defs>'];
    if(showGrid && snapOn) parts.push('<rect width="'+VW+'" height="'+VH+'" fill="url(#grid)"/>');
    var selEdgeId=(sel&&sel.t==='edge')?sel.id:null, selNodeId=(sel&&sel.t==='node')?sel.id:null;
    edges.forEach(function(ed){
      var a=byId(ed.a), b=byId(ed.b); if(!a||!b) return;
      var on=(ed.id===selEdgeId), col=on?'#5B5BF5':'#475569', sw=on?3:2, mk=on?'arrSel':'arr';
      var dash=ed.line==='dashed'?' stroke-dasharray="7 5"':'', m='';
      if(ed.arrow==='end'||ed.arrow==='both') m+=' marker-end="url(#'+mk+')"';
      if(ed.arrow==='both') m+=' marker-start="url(#'+mk+')"';
      var lab;
      if(ed.route==='ortho'){
        var g=orthoGeom(a,b), str=g.pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
        parts.push('<polyline data-eid="'+ed.id+'" points="'+str+'" fill="none" stroke="transparent" stroke-width="14" style="cursor:pointer"/>');
        parts.push('<polyline points="'+str+'" fill="none" stroke="'+col+'" stroke-width="'+sw+'" stroke-linejoin="round" stroke-linecap="round"'+dash+m+' style="pointer-events:none"/>');
        lab=g.lab;
      } else {
        var p=border(a,b.x,b.y), q=border(b,a.x,a.y);
        parts.push('<line data-eid="'+ed.id+'" x1="'+p.x.toFixed(1)+'" y1="'+p.y.toFixed(1)+'" x2="'+q.x.toFixed(1)+'" y2="'+q.y.toFixed(1)+'" stroke="transparent" stroke-width="14" style="cursor:pointer"/>');
        parts.push('<line x1="'+p.x.toFixed(1)+'" y1="'+p.y.toFixed(1)+'" x2="'+q.x.toFixed(1)+'" y2="'+q.y.toFixed(1)+'" stroke="'+col+'" stroke-width="'+sw+'" stroke-linecap="round"'+dash+m+' style="pointer-events:none"/>');
        lab={x:(p.x+q.x)/2, y:(p.y+q.y)/2};
      }
      parts.push(labelMarkup(ed.label, lab.x, lab.y));
    });
    nodes.forEach(function(n){
      var on=(n.id===selNodeId)||(n.id===connectFirst);
      var stroke=(n.id===connectFirst)?'#F59E0B':(on?'#5B5BF5':'rgba(15,23,42,.16)'), sw=on?3:1.5;
      parts.push('<g data-id="'+n.id+'" style="cursor:move">'+shapeMarkup(n,stroke,sw)
        +'<text x="'+n.x.toFixed(1)+'" y="'+(n.y+1).toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" font-family="Pretendard,system-ui,sans-serif" font-size="14" font-weight="600" fill="'+textColor(n.color)+'" style="pointer-events:none">'+esc(n.text)+'</text></g>');
    });
    return parts.join('');
  }
  function render(){ svg.innerHTML = inner(true); }
  function pt(e){ var r=svg.getBoundingClientRect(); return { x:(e.clientX-r.left)*(VW/r.width), y:(e.clientY-r.top)*(VH/r.height) }; }
  // 좌표 기반 히트 테스트 (innerHTML SVG 이벤트 위임 대신 — 모든 브라우저에서 안정)
  function nodeAt(p){
    for(var i=nodes.length-1;i>=0;i--){ var n=nodes[i], w=nodeW(n), h=nodeH(n);
      if(p.x>=n.x-w/2 && p.x<=n.x+w/2 && p.y>=n.y-h/2 && p.y<=n.y+h/2) return n; }
    return null;
  }
  function distToSeg(p,a,b){ var dx=b[0]-a[0], dy=b[1]-a[1], L=dx*dx+dy*dy;
    var t=L?((p.x-a[0])*dx+(p.y-a[1])*dy)/L:0; t=Math.max(0,Math.min(1,t));
    var cx=a[0]+t*dx, cy=a[1]+t*dy; return Math.sqrt((p.x-cx)*(p.x-cx)+(p.y-cy)*(p.y-cy)); }
  function edgeAt(p){
    for(var i=edges.length-1;i>=0;i--){ var ed=edges[i], a=byId(ed.a), b=byId(ed.b); if(!a||!b) continue;
      var segs;
      if(ed.route==='ortho'){ segs=orthoGeom(a,b).pts; }
      else { var s=border(a,b.x,b.y), e=border(b,a.x,a.y); segs=[[s.x,s.y],[e.x,e.y]]; }
      for(var j=0;j<segs.length-1;j++){ if(distToSeg(p,segs[j],segs[j+1])<9) return ed; }
    }
    return null;
  }

  function pushUndo(){ undoStack.push(JSON.stringify({nodes:nodes, edges:edges, seq:seq, eseq:eseq})); if(undoStack.length>60) undoStack.shift(); }
  function undo(){ if(!undoStack.length) return; var s=JSON.parse(undoStack.pop()); nodes=s.nodes; edges=s.edges; seq=s.seq; eseq=s.eseq; sel=null; connectFirst=null; render(); }

  function syncControls(){
    var pal=document.getElementById('palette');
    if(sel && sel.t==='node'){ var n=byId(sel.id); if(n){ shapeSel.value=n.shape; newShape=n.shape; newColor=n.color; } }
    else if(sel && sel.t==='edge'){ var ed=edgeById(sel.id); if(ed){ lineSel.value=ed.line; arrowSel.value=ed.arrow; routeSel.value=ed.route||'straight'; newLine=ed.line; newArrow=ed.arrow; newRoute=ed.route||'straight'; } }
    pal.querySelectorAll('.sw').forEach(function(x){ x.classList.toggle('on', x.dataset.c===newColor); });
  }

  svg.addEventListener('pointerdown', function(e){
    e.preventDefault();
    var p=pt(e), n=nodeAt(p);
    if(connectMode){
      if(n){
        if(connectFirst===null) connectFirst=n.id;
        else if(connectFirst!==n.id){ pushUndo(); edges.push({id:eseq++, a:connectFirst, b:n.id, line:newLine, arrow:newArrow, route:newRoute, label:''}); connectFirst=null; }
        else connectFirst=null;
      } else connectFirst=null;
      render(); return;
    }
    if(n){ sel={t:'node', id:n.id}; pushUndo(); dragMoved=false; drag={dx:p.x-n.x, dy:p.y-n.y}; try{svg.setPointerCapture(e.pointerId);}catch(_){}; syncControls(); render(); }
    else { var ed=edgeAt(p); if(ed){ sel={t:'edge', id:ed.id}; syncControls(); render(); } else { sel=null; render(); } }
  });
  svg.addEventListener('pointermove', function(e){
    if(!drag || !sel || sel.t!=='node') return;
    var n=byId(sel.id), p=pt(e); dragMoved=true;
    n.x=clamp(snapV(p.x-drag.dx),45,VW-45); n.y=clamp(snapV(p.y-drag.dy),34,VH-34); render();
  });
  function endDrag(e){ if(drag && !dragMoved) undoStack.pop(); drag=null; try{svg.releasePointerCapture(e.pointerId);}catch(_){} }
  svg.addEventListener('pointerup', endDrag);
  svg.addEventListener('pointercancel', endDrag);
  svg.addEventListener('dblclick', function(e){
    var p=pt(e), n=nodeAt(p);
    if(n){ var t=prompt(T('dg.editprompt'), n.text); if(t!==null){ pushUndo(); n.text=t; render(); } return; }
    var ed=edgeAt(p);
    if(ed){ var l=prompt(T('dg.labelprompt'), ed.label||''); if(l!==null){ pushUndo(); ed.label=l.trim(); render(); } }
  });
  document.addEventListener('keydown', function(e){
    var tag=document.activeElement.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
    if((e.ctrlKey||e.metaKey) && (e.key==='z'||e.key==='Z')){ undo(); e.preventDefault(); return; }
    if((e.key==='Delete'||e.key==='Backspace') && sel){ removeSel(); e.preventDefault(); }
  });

  function addBox(){
    pushUndo();
    var i=nodes.length, n={ id:seq++, x:clamp(snapV(140+(i%4)*180),45,VW-45), y:clamp(snapV(95+Math.floor(i/4)*105),34,VH-34), text:T('dg.box'), color:newColor, shape:newShape };
    nodes.push(n); sel={t:'node',id:n.id}; syncControls(); render();
  }
  function removeSel(){
    if(!sel) return; pushUndo();
    if(sel.t==='node'){ nodes=nodes.filter(function(n){return n.id!==sel.id;}); edges=edges.filter(function(ed){return ed.a!==sel.id&&ed.b!==sel.id;}); }
    else { edges=edges.filter(function(ed){return ed.id!==sel.id;}); }
    sel=null; render();
  }
  document.getElementById('add').addEventListener('click', addBox);
  document.getElementById('del').addEventListener('click', removeSel);
  document.getElementById('undo').addEventListener('click', undo);
  document.getElementById('connect').addEventListener('click', function(){ connectMode=!connectMode; connectFirst=null; this.classList.toggle('on-btn', connectMode); render(); });
  document.getElementById('clear').addEventListener('click', function(){ pushUndo(); nodes=[]; edges=[]; sel=null; connectFirst=null; render(); });
  snapChk.addEventListener('change', function(){ snapOn=snapChk.checked; render(); });

  shapeSel.addEventListener('change', function(){ newShape=shapeSel.value; if(sel&&sel.t==='node'){ pushUndo(); byId(sel.id).shape=newShape; render(); } });
  lineSel.addEventListener('change', function(){ newLine=lineSel.value; if(sel&&sel.t==='edge'){ pushUndo(); edgeById(sel.id).line=newLine; render(); } });
  arrowSel.addEventListener('change', function(){ newArrow=arrowSel.value; if(sel&&sel.t==='edge'){ pushUndo(); edgeById(sel.id).arrow=newArrow; render(); } });
  routeSel.addEventListener('change', function(){ newRoute=routeSel.value; if(sel&&sel.t==='edge'){ pushUndo(); edgeById(sel.id).route=newRoute; render(); } });

  var pal=document.getElementById('palette');
  pal.innerHTML = COLORS.map(function(c,i){ return '<span class="sw'+(i===0?' on':'')+'" data-c="'+c+'" style="background:'+c+'"></span>'; }).join('');
  pal.addEventListener('click', function(e){ var s=e.target.closest('.sw'); if(!s) return; newColor=s.dataset.c;
    pal.querySelectorAll('.sw').forEach(function(x){x.classList.toggle('on',x===s);});
    if(sel&&sel.t==='node'){ pushUndo(); byId(sel.id).color=newColor; render(); } });

  function exportSVG(){ return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+VW+' '+VH+'" width="'+VW+'" height="'+VH+'"><rect width="'+VW+'" height="'+VH+'" fill="#ffffff"/>'+inner(false)+'</svg>'; }
  function stamp(){ var d=new Date(),p=function(n){return(n<10?'0':'')+n;}; return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds()); }
  function dl(blob,name){ var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove(); }
  document.getElementById('dlsvg').addEventListener('click', function(){ var s=sel; sel=null; connectFirst=null; var data=exportSVG(); sel=s; render(); dl(new Blob([data],{type:'image/svg+xml'}),'diagram_'+stamp()+'.svg'); });
  document.getElementById('dlpng').addEventListener('click', function(){
    var s=sel; sel=null; connectFirst=null; var data=exportSVG(); sel=s; render();
    var img=new Image();
    img.onload=function(){ var cv=document.createElement('canvas'); cv.width=VW*2; cv.height=VH*2; var ctx=cv.getContext('2d'); ctx.scale(2,2); ctx.drawImage(img,0,0); cv.toBlob(function(b){ dl(b,'diagram_'+stamp()+'.png'); },'image/png'); };
    img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(data);
  });

  // 시작 예시 — 도형·직각·점선·라벨 데모
  nodes=[ {id:seq++,x:170,y:100,text:T('dg.start'),color:COLORS[1],shape:'ellipse'},
          {id:seq++,x:170,y:250,text:T('dg.process'),color:COLORS[0],shape:'round'},
          {id:seq++,x:470,y:250,text:T('dg.decision'),color:COLORS[2],shape:'diamond'},
          {id:seq++,x:470,y:410,text:T('dg.box'),color:COLORS[0],shape:'round'} ];
  edges=[ {id:eseq++,a:1,b:2,line:'solid',arrow:'end',route:'straight',label:''},
          {id:eseq++,a:2,b:3,line:'solid',arrow:'end',route:'ortho',label:''},
          {id:eseq++,a:3,b:4,line:'dashed',arrow:'end',route:'straight',label:T('dg.yes')} ];
  render();
  window.onI18n = function(){ render(); };
</script>
</body>
</html>
