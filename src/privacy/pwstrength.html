<body>
<div class="toolwrap" style="max-width:620px;">
  <h1 data-i18n="b_pwstrength_title">비밀번호 강도 분석</h1>
  <p class="sub" data-i18n="b_pwstrength_sub">비밀번호의 강도를 점수·예상 해킹 시간으로 평가하고 개선점을 알려 줍니다.</p>
  <div class="card">
    <input type="text" id="pw" value="P@ssw0rd123" data-i18n-ph="b_pwstrength_ph_input" placeholder="비밀번호를 입력하세요"/>
    <div class="bar"><i id="bar" style="width:0%"></i></div>
    <div class="lvl" id="lvl"></div>
    <table><tbody id="tb"></tbody></table>
    <div class="fb" id="fb" style="display:none;"></div>
    <div class="note" data-i18n-html="b_pwstrength_note">오픈소스 <b>zxcvbn</b>(MIT, Dropbox, <a href="https://github.com/dropbox/zxcvbn" target="_blank" rel="noopener">dropbox/zxcvbn</a>)을 자체 호스팅합니다. 입력한 비밀번호는 서버로 전송되지 않고 브라우저에서만 평가됩니다.</div>
  </div>
</div>
<script src="/vendor/zxcvbn-4/zxcvbn.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var levels=[t('b_pwstrength_lvl0'),t('b_pwstrength_lvl1'),t('b_pwstrength_lvl2'),t('b_pwstrength_lvl3'),t('b_pwstrength_lvl4')]; var colors=['#ef4444','#f59e0b','#eab308','#22c55e','#16a34a'];
  function run(){ var pw=$('pw').value; if(!pw){$('bar').style.width='0%';$('lvl').textContent='';$('tb').innerHTML='';$('fb').style.display='none';return;}
    var r=zxcvbn(pw); var s=r.score;
    $('bar').style.width=((s+1)*20)+'%'; $('bar').style.background=colors[s];
    $('lvl').textContent=levels[s]; $('lvl').style.color=colors[s];
    var ct=r.crack_times_display;
    $('tb').innerHTML=
      '<tr><td>'+t('b_pwstrength_row_length')+'</td><td><b>'+pw.length+t('b_pwstrength_unit_char')+'</b></td></tr>'+
      '<tr><td>'+t('b_pwstrength_row_guesses')+'</td><td><b>'+Number(r.guesses).toExponential(2)+'</b></td></tr>'+
      '<tr><td>'+t('b_pwstrength_row_online')+'</td><td><b>'+ct.online_throttling_100_per_hour+'</b></td></tr>'+
      '<tr><td>'+t('b_pwstrength_row_offline')+'</td><td><b>'+ct.offline_fast_hashing_1e10_per_second+'</b></td></tr>';
    var fb=[]; if(r.feedback.warning)fb.push('⚠️ '+r.feedback.warning);
    (r.feedback.suggestions||[]).forEach(function(x){fb.push('• '+x);});
    if(fb.length){$('fb').style.display='';$('fb').innerHTML=fb.join('<br>');}else $('fb').style.display='none';
  }
  window.onI18n=function(){levels=[t('b_pwstrength_lvl0'),t('b_pwstrength_lvl1'),t('b_pwstrength_lvl2'),t('b_pwstrength_lvl3'),t('b_pwstrength_lvl4')];run();};
  $('pw').addEventListener('input',run); run();
</script>
