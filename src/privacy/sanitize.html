<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_sanitize_title">HTML 살균기 (XSS 제거)</h1>
  <p class="sub" data-i18n-html="b_sanitize_sub">신뢰할 수 없는 HTML에서 <code>&lt;script&gt;</code>·<code>onclick</code> 같은 위험 요소를 제거해 안전한 HTML로 만듭니다.</p>
  <div class="card">
    <textarea id="in">&lt;p&gt;안녕하세요 &lt;b&gt;방문자&lt;/b&gt;님&lt;/p&gt;
&lt;img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" onerror="alert('xss')"&gt;
&lt;a href="javascript:alert(1)"&gt;클릭&lt;/a&gt;
&lt;script&gt;steal()&lt;/script&gt;</textarea>
    <div class="opts">
      <label><input type="checkbox" id="links"/> <span data-i18n="b_sanitize_opt_links">링크(&lt;a href&gt;) 허용</span></label>
      <label><input type="checkbox" id="imgs" checked/> <span data-i18n="b_sanitize_opt_imgs">이미지 허용</span></label>
    </div>
    <div class="actions"><button class="btn" id="run" type="button" data-i18n="b_sanitize_btn_run">정화하기</button><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_sanitize_btn_copy">📋 복사</button></div>
    <div class="out" id="out"></div>
    <h3 style="margin:.9rem 0 .3rem;font-size:.95rem;" data-i18n="b_sanitize_preview_title">미리보기 (정화 후)</h3>
    <div class="prev" id="prev"></div>
    <div class="note" data-i18n-html="b_sanitize_note">오픈소스 <b>DOMPurify</b>(Apache-2.0/MPL-2.0, <a href="https://github.com/cure53/DOMPurify" target="_blank" rel="noopener">cure53/DOMPurify</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/dompurify-3/purify.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function run(){ var cfg={}; var forbid=[];
    if(!$('links').checked)forbid.push('a'); if(!$('imgs').checked)forbid.push('img');
    if(forbid.length)cfg.FORBID_TAGS=forbid;
    var clean=DOMPurify.sanitize($('in').value,cfg);
    $('out').textContent=clean; window._c=clean; $('prev').innerHTML=clean; }
  $('run').addEventListener('click',run); ['in','links','imgs'].forEach(function(id){$(id).addEventListener('input',run);$(id).addEventListener('change',run);});
  $('copy').addEventListener('click',function(){if(window._c)navigator.clipboard.writeText(window._c).then(function(){toast(t('b_sanitize_toast_copied'));});});
  run();
</script>
