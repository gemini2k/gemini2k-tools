<style>input,select{padding:.6rem .7rem;border:1px solid var(--border);border-radius:10px;background:var(--input-bg);font-size:1rem;color:var(--text);font-family:inherit;}
.row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin-bottom:.7rem;}.row label{font-weight:700;font-size:.85rem;min-width:80px;}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"TOTP 2단계 인증 코드 생성기","description":"비밀 키로 시간 기반 일회용 인증코드(TOTP)를 생성합니다.","url":"https://gemini2k.co.kr/totp.html","applicationCategory":"SecurityApplication","operatingSystem":"Web","inLanguage":"ko","isAccessibleForFree":true,"license":"https://opensource.org/licenses/MIT","offers":{"@type":"Offer","price":"0","priceCurrency":"KRW"},"publisher":{"@type":"Organization","name":"빛의여행(gemini2k) 도구","url":"https://gemini2k.co.kr/"}}</script>

<body>
<div class="toolwrap" style="max-width:560px;">
  <h1 data-i18n="b_totp_title">TOTP 인증 코드 생성기</h1>
  <p class="sub" data-i18n="b_totp_sub">비밀 키(Secret)를 넣으면 30초마다 바뀌는 2단계 인증(OTP) 코드를 보여 줍니다.</p>
  <div class="card">
    <div class="row"><label data-i18n="b_totp_label_secret">비밀 키</label><input type="text" id="secret" value="JBSWY3DPEHPK3PXP" placeholder="Base32 Secret"/></div>
    <div class="row"><label data-i18n="b_totp_label_digits">자릿수</label><select id="digits"><option>6</option><option>7</option><option>8</option></select>
      <label style="min-width:auto;" data-i18n="b_totp_label_period">주기(초)</label><select id="period"><option>30</option><option>60</option></select>
      <label style="min-width:auto;" data-i18n="b_totp_label_algo">알고리즘</label><select id="algo"><option>SHA1</option><option>SHA256</option><option>SHA512</option></select></div>
    <div class="code" id="code">------</div>
    <div class="bar"><i id="prog" style="width:100%"></i></div>
    <div class="rem" id="rem"></div>
    <div style="text-align:center;margin-top:.7rem;"><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_totp_btn_copy">📋 코드 복사</button></div>
    <div class="note" data-i18n-html="b_totp_note">오픈소스 <b>otpauth</b>(MIT, <a href="https://github.com/hectorm/otpauth" target="_blank" rel="noopener">hectorm/otpauth</a>)를 자체 호스팅합니다. 비밀 키와 코드는 서버로 전송되지 않으며 브라우저에서만 계산됩니다. RFC 6238 기준.</div>
  </div>
</div>
<script src="/vendor/otpauth-9/otpauth.umd.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function tick(){ var period=+$('period').value, secret=$('secret').value.replace(/\s/g,'').toUpperCase();
    try{ var tmp=new OTPAuth.TOTP({algorithm:$('algo').value,digits:+$('digits').value,period:period,secret:OTPAuth.Secret.fromBase32(secret)});
      $('code').textContent=tmp.generate(); }catch(e){ $('code').textContent=t('b_totp_err_key'); }
    var now=Date.now()/1000, left=period-(now%period);
    $('prog').style.width=(left/period*100)+'%'; $('rem').textContent=t('b_totp_rem').replace('{n}',Math.ceil(left)); }
  window.onI18n=tick;
  ['secret','digits','period','algo'].forEach(function(id){$(id).addEventListener('input',tick);$(id).addEventListener('change',tick);});
  $('copy').addEventListener('click',function(){var c=$('code').textContent;if(/^\d+$/.test(c))navigator.clipboard.writeText(c).then(function(){toast(t('b_totp_copied'));});});
  tick(); setInterval(tick,1000);
</script>
</body>
