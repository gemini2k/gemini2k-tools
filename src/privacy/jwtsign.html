<style>.seg{display:inline-flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:.8rem;}.seg button{padding:.5rem .9rem;border:0;background:var(--surface);color:var(--text);font-family:inherit;font-weight:700;cursor:pointer;}.seg button.on{background:var(--accent);color:#fff;}
.field{margin-bottom:.7rem;}.field label{display:block;font-weight:700;font-size:.85rem;margin-bottom:.3rem;}
textarea,input[type=text]{width:100%;padding:.6rem .7rem;border:1px solid var(--border);border-radius:10px;background:var(--input-bg);color:var(--text);font-family:ui-monospace,monospace;font-size:.85rem;}
textarea{min-height:90px;resize:vertical;}select{padding:.5rem;border:1px solid var(--border);border-radius:9px;background:var(--input-bg);color:var(--text);}
.out{width:100%;min-height:60px;border:1px solid var(--border);border-radius:10px;background:var(--ground);padding:.7rem;font-family:ui-monospace,monospace;font-size:.82rem;color:var(--text);white-space:pre-wrap;word-break:break-all;}

<body>
<div class="toolwrap" style="max-width:680px;">
  <h1 data-i18n="b_jwtsign_title">JWT 서명·검증기</h1>
  <p class="sub" data-i18n="b_jwtsign_sub">JWT 토큰을 비밀키로 직접 발급(서명)하거나, 받은 토큰의 서명이 유효한지 확인합니다.</p>
  <div class="card">
    <div class="seg" id="seg"><button data-m="sign" class="on" type="button" data-i18n="b_jwtsign_btn_sign">서명(발급)</button><button data-m="verify" type="button" data-i18n="b_jwtsign_btn_verify">검증</button></div>
    <div id="signbox">
      <div class="field"><label data-i18n="b_jwtsign_lbl_payload">페이로드 (JSON)</label><textarea id="payload">{
  "sub": "1234567890",
  "name": "홍길동",
  "role": "admin"
}</textarea></div>
      <div class="field"><label data-i18n="b_jwtsign_lbl_alg_secret">알고리즘 / 비밀키</label><div style="display:flex;gap:.5rem;"><select id="alg"><option>HS256</option><option>HS384</option><option>HS512</option></select><input type="text" id="secret" value="my-secret-key" style="flex:1;"/></div></div>
      <button class="btn" id="dosign" type="button" data-i18n="b_jwtsign_dosign">서명하기</button>
      <div class="field" style="margin-top:.7rem;"><label data-i18n="b_jwtsign_lbl_token">생성된 토큰</label><div class="out" id="token"></div></div>
    </div>
    <div id="verifybox" style="display:none;">
      <div class="field"><label data-i18n="b_jwtsign_lbl_vtoken">JWT 토큰</label><textarea id="vtoken" placeholder="eyJ..."></textarea></div>
      <div class="field"><label data-i18n="b_jwtsign_lbl_vsecret">비밀키</label><input type="text" id="vsecret" value="my-secret-key"/></div>
      <button class="btn" id="doverify" type="button" data-i18n="b_jwtsign_doverify">검증하기</button>
      <div class="field" style="margin-top:.7rem;"><label data-i18n="b_jwtsign_lbl_vresult">결과</label><div class="out" id="vresult"></div></div>
    </div>
    <div class="note" data-i18n-html="b_jwtsign_note">오픈소스 <b>jsrsasign</b>(MIT, <a href="https://github.com/kjur/jsrsasign" target="_blank" rel="noopener">kjur/jsrsasign</a>)을 자체 호스팅합니다. 토큰과 비밀키는 서버로 전송되지 않고 브라우저에서만 처리됩니다.</div>
  </div>
</div>
<script src="/vendor/jsrsasign-11/jsrsasign-all-min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  $('seg').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;var m=b.dataset.m;
    Array.prototype.forEach.call($('seg').children,function(x){x.classList.toggle('on',x===b);});
    $('signbox').style.display=m==='sign'?'':'none'; $('verifybox').style.display=m==='verify'?'':'none';});
  function doSign(){
    try{ var payload=JSON.parse($('payload').value); var header={alg:$('alg').value,typ:'JWT'};
      var tok=KJUR.jws.JWS.sign(header.alg,JSON.stringify(header),JSON.stringify(payload),{utf8:$('secret').value});
      $('token').textContent=tok; }catch(e){ $('token').textContent='⚠️ '+e.message; }
  }
  function doVerify(){
    var tok=$('vtoken').value.trim(); try{
      var valid=KJUR.jws.JWS.verifyJWT(tok,{utf8:$('vsecret').value},{alg:['HS256','HS384','HS512'],gracePeriod:60*60*24*3650});
      var parts=tok.split('.'); var pl=parts[1]?JSON.parse(decodeURIComponent(escape(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/'))))):{};
      $('vresult').innerHTML=(valid?'<span class="ok">✓ '+t('b_jwtsign_valid')+'</span>':'<span class="no">✗ '+t('b_jwtsign_invalid')+'</span>')+'\n\n'+JSON.stringify(pl,null,2);
    }catch(e){ $('vresult').innerHTML='<span class="no">✗ '+t('b_jwtsign_err_verify')+'</span>: '+e.message; }
  }
  $('dosign').addEventListener('click',doSign);
  $('doverify').addEventListener('click',doVerify);
  window.onI18n=function(){
    var cur=$('seg').querySelector('button.on');
    if(cur&&cur.dataset.m==='sign'&&$('token').textContent){doSign();}
    if(cur&&cur.dataset.m==='verify'&&$('vresult').innerHTML){doVerify();}
  };
  // initial sign
  $('dosign').click();
</script>
</body>
