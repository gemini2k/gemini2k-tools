<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_cvss_title">CVSS 3.1 점수 계산기</h1>
  <p class="sub" data-i18n="b_cvss_sub">취약점의 기본 메트릭으로 CVSS 3.1 기본 점수와 심각도를 산출합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm">
    <label><span data-i18n="b_cvss_lbl_av">공격 경로(AV)</span><select id="AV">
      <option value="0.85" data-i18n="b_cvss_av_n">네트워크(N)</option>
      <option value="0.62" data-i18n="b_cvss_av_a">인접(A)</option>
      <option value="0.55" data-i18n="b_cvss_av_l">로컬(L)</option>
      <option value="0.2" data-i18n="b_cvss_av_p">물리(P)</option>
    </select></label>
    <label><span data-i18n="b_cvss_lbl_ac">공격 복잡도(AC)</span><select id="AC">
      <option value="0.77" data-i18n="b_cvss_low_l">낮음(L)</option>
      <option value="0.44" data-i18n="b_cvss_high_h">높음(H)</option>
    </select></label>
    <label><span data-i18n="b_cvss_lbl_pr">필요 권한(PR)</span><select id="PR">
      <option value="0.85" data-i18n="b_cvss_none_n">없음(N)</option>
      <option value="0.62" data-i18n="b_cvss_low_l">낮음(L)</option>
      <option value="0.27" data-i18n="b_cvss_high_h">높음(H)</option>
    </select></label>
    <label><span data-i18n="b_cvss_lbl_ui">사용자 상호작용(UI)</span><select id="UI">
      <option value="0.85" data-i18n="b_cvss_ui_none">불필요(N)</option>
      <option value="0.62" data-i18n="b_cvss_ui_req">필요(R)</option>
    </select></label>
    <label><span data-i18n="b_cvss_lbl_s">범위(S)</span><select id="S">
      <option value="U" data-i18n="b_cvss_s_u">변경없음(U)</option>
      <option value="C" data-i18n="b_cvss_s_c">변경됨(C)</option>
    </select></label>
    <label><span data-i18n="b_cvss_lbl_c">기밀성(C)</span><select id="C">
      <option value="0.56" data-i18n="b_cvss_high_h">높음(H)</option>
      <option value="0.22" data-i18n="b_cvss_low_l">낮음(L)</option>
      <option value="0" data-i18n="b_cvss_none_n">없음(N)</option>
    </select></label>
    <label><span data-i18n="b_cvss_lbl_i">무결성(I)</span><select id="I">
      <option value="0.56" data-i18n="b_cvss_high_h">높음(H)</option>
      <option value="0.22" data-i18n="b_cvss_low_l">낮음(L)</option>
      <option value="0" data-i18n="b_cvss_none_n">없음(N)</option>
    </select></label>
    <label><span data-i18n="b_cvss_lbl_a">가용성(A)</span><select id="A">
      <option value="0.56" data-i18n="b_cvss_high_h">높음(H)</option>
      <option value="0.22" data-i18n="b_cvss_low_l">낮음(L)</option>
      <option value="0" data-i18n="b_cvss_none_n">없음(N)</option>
    </select></label>
  </div><div class="res" id="res"></div>
    <div class="note" data-i18n="b_cvss_note">FIRST CVSS v3.1 기본점수(Base Score) 공식 기준입니다. 시간·환경 지표는 제외한 기본 평가입니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  function rup(x){return Math.ceil(x*10)/10;}
  function run(){var av=+$('AV').value,ac=+$('AC').value,ui=+$('UI').value,scope=$('S').value;
    var pr=+$('PR').value; if(scope==='C'){if(pr===0.62)pr=0.68;else if(pr===0.27)pr=0.5;}
    var c=+$('C').value,i=+$('I').value,a=+$('A').value;
    var iss=1-(1-c)*(1-i)*(1-a);
    var impact=scope==='C'?7.52*(iss-0.029)-3.25*Math.pow(iss-0.02,15):6.42*iss;
    var expl=8.22*av*ac*pr*ui;
    var base;
    if(impact<=0)base=0;else if(scope==='C')base=Math.min(rup(1.08*(impact+expl)),10);else base=Math.min(rup(impact+expl),10);
    var sev=base===0?t('b_cvss_sev_none'):base<4?t('b_cvss_sev_low'):base<7?t('b_cvss_sev_medium'):base<9?t('b_cvss_sev_high'):t('b_cvss_sev_critical');
    var col=base<4?'#16a34a':base<7?'#d97706':base<9?'#dc2626':'#9333ea';
    var avc={'0.85':'N','0.62':'A','0.55':'L','0.2':'P'}[$('AV').value];
    var vec='CVSS:3.1/AV:'+avc+'/AC:'+($('AC').value==='0.77'?'L':'H')+'/PR:'+({'0.85':'N','0.62':'L','0.27':'H'}[$('PR').value])+'/UI:'+($('UI').value==='0.85'?'N':'R')+'/S:'+scope+'/C:'+({'0.56':'H','0.22':'L','0':'N'}[$('C').value])+'/I:'+({'0.56':'H','0.22':'L','0':'N'}[$('I').value])+'/A:'+({'0.56':'H','0.22':'L','0':'N'}[$('A').value]);
    $('res').innerHTML='<div class="big" style="color:'+col+'">'+base.toFixed(1)+' / 10 · '+sev+'</div><table><tr><td>'+t('b_cvss_res_sev')+'</td><td><b style="color:'+col+'">'+sev+'</b></td></tr><tr><td>'+t('b_cvss_res_vec')+'</td><td style="font-family:ui-monospace,monospace;font-size:.82rem">'+vec+'</td></tr></table>';}
  ['AV','AC','PR','UI','S','C','I','A'].forEach(function(i){$(i).addEventListener('change',run);});
  window.onI18n=run;
  run();
</script>
