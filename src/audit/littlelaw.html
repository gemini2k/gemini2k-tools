<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_littlelaw_title">Little's Law 계산기</h1>
  <p class="sub" data-i18n="b_littlelaw_sub">L = λ × W — 동시 처리수·처리율·응답시간의 관계를 계산합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm"><label><span data-i18n="b_littlelaw_lbl_target">계산할 값</span><select id="target"><option value="L" data-i18n="b_littlelaw_opt_L">동시 처리수 L</option><option value="lam" data-i18n="b_littlelaw_opt_lam">처리율 λ (req/s)</option><option value="W" data-i18n="b_littlelaw_opt_W">평균 응답시간 W (초)</option></select></label></div><div class="frm"><label><span data-i18n="b_littlelaw_lbl_lam">처리율 λ (req/s)</span><input type="number" id="lam" value="50" step="any"></label><label><span data-i18n="b_littlelaw_lbl_W">평균 응답시간 W (초)</span><input type="number" id="W" value="0.2" step="any"></label><label><span data-i18n="b_littlelaw_lbl_L">동시 처리수 L</span><input type="number" id="L" step="any"></label></div><div class="res" id="res"></div>
    <div class="note" data-i18n="b_littlelaw_note">리틀의 법칙: 동시 처리수(L) = 처리율(λ) × 평균 체류시간(W). 부하시험 계획·용량 산정에 쓰입니다. λ는 초당 처리건수(req/s), W는 초 단위입니다.</div>
  </div>

<script>
