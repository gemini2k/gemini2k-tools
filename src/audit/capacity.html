<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_capacity_title">시스템 용량 산정</h1>
  <p class="sub" data-i18n="b_capacity_sub">필요 처리량(TPS)과 데이터 스토리지 용량을 추정합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm">
    <label><span data-i18n="b_capacity_label_users">동시 사용자</span><input type="number" id="users" value="500"></label>
    <label><span data-i18n="b_capacity_label_req">사용자당 요청/시간</span><input type="number" id="req" value="120"></label>
    <label><span data-i18n="b_capacity_label_peak">피크계수</span><input type="number" id="peak" value="2" step="0.1"></label>
  </div><div class="frm">
    <label><span data-i18n="b_capacity_label_rows">일 발생 행 수</span><input type="number" id="rows" value="100000"></label>
    <label><span data-i18n="b_capacity_label_size">행당 크기(byte)</span><input type="number" id="size" value="500"></label>
    <label><span data-i18n="b_capacity_label_years">보존(년)</span><input type="number" id="years" value="3"></label>
  </div><div class="res" id="res"></div>
    <div class="note" data-i18n="b_capacity_note">TPS = 동시사용자 × 사용자당 시간당 요청 ÷ 3600 × 피크계수. 스토리지는 인덱스·여유율을 포함한 근사치입니다. 참고용 추정입니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  function gb(b){if(b<1048576)return (b/1024).toFixed(1)+' KB';if(b<1073741824)return (b/1048576).toFixed(1)+' MB';if(b<1099511627776)return (b/1073741824).toFixed(2)+' GB';return (b/1099511627776).toFixed(2)+' TB';}
  function run(){var u=+$('users').value||0,r=+$('req').value||0,pk=+$('peak').value||1;
    var tps=u*r/3600*pk;
    var rows=+$('rows').value||0,sz=+$('size').value||0,yr=+$('years').value||1;
    var raw=rows*sz*365*yr;var withIdx=raw*1.5;var withFree=withIdx*1.3;
    $('res').innerHTML='<div class="big">'+tps.toFixed(1)+' TPS</div><table>'+
    '<tr><td>'+t('b_capacity_res_tps_label')+'</td><td><b>'+tps.toFixed(1)+' TPS</b> ('+Math.ceil(tps)+t('b_capacity_res_tps_unit')+')</td></tr>'+
    '<tr><td>'+t('b_capacity_res_raw_label').replace('{yr}',yr)+'</td><td><b>'+gb(raw)+'</b></td></tr>'+
    '<tr><td>'+t('b_capacity_res_idx_label')+'</td><td><b>'+gb(withIdx)+'</b></td></tr>'+
    '<tr><td>'+t('b_capacity_res_free_label')+'</td><td><b>'+gb(withFree)+'</b></td></tr></table>';}
  window.onI18n=run;
  ['users','req','peak','rows','size','years'].forEach(function(i){$(i).addEventListener('input',run);});run();
</script>
</body>
