<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_secretscan_title">하드코딩 시크릿·키 탐지</h1>
  <p class="sub" data-i18n="b_secretscan_sub">코드·설정에 노출된 API 키·비밀번호 등 시크릿을 찾아 줍니다.</p>
  <div class="card" style="max-width:none;">
    <textarea class="in" id="in" spellcheck="false">aws_access_key_id = AKIAIOSFODNN7EXAMPLE
GOOGLE_API_KEY="AIzaSyD-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx0"
db.password = "P@ssw0rd!2024"
-----BEGIN RSA PRIVATE KEY-----
slack_token=xoxb-1234567890-abcdefghijkl</textarea><div class="out" id="out" style="margin-top:.6rem"></div>
    <div class="note" data-i18n="b_secretscan_note">정규식 휴리스틱 기반 참고용 점검입니다. 모든 분석은 브라우저에서만 이루어지며 입력은 전송되지 않습니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  function mask(s){return s.length<=8?s[0]+'***':s.slice(0,4)+'****'+s.slice(-3);}
  var RULES=[
    [/AKIA[0-9A-Z]{16}/g,'AWS Access Key'],
    [/AIza[0-9A-Za-z\-_]{35}/g,'Google API Key'],
    [/xox[baprs]-[0-9A-Za-z-]{10,}/g,'Slack Token'],
    [/-----BEGIN(?:\s\w+)? PRIVATE KEY-----/g,'Private Key Block'],
    [/eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{5,}/g,'JWT'],
    [/(?:password|passwd|pwd|secret|token|api[_-]?key)\s*[:=]\s*['"]?([^\s'"]{6,})/gi,t('b_secretscan_rule_hardcoded')]
  ];
  function run(){var txt=$('in').value,lines=txt.split(/\n/),hits=[];
    lines.forEach(function(ln,i){RULES[5][1]=t('b_secretscan_rule_hardcoded');RULES.forEach(function(r){var m;r[1];var re=new RegExp(r[0].source,r[0].flags);while((m=re.exec(ln))){hits.push({line:i+1,type:r[1],val:mask(m[1]||m[0])});}});});
    if(!hits.length){$('out').innerHTML='<span style="color:#16a34a">'+t('b_secretscan_no_found')+'</span>';return;}
    $('out').innerHTML='<b style="color:#dc2626">'+hits.length+t('b_secretscan_found_suffix')+'</b>\n\n'+hits.map(function(h){return 'L'+h.line+' ['+h.type+'] '+h.val;}).join('\n');}
  window.onI18n=function(){RULES[5][1]=t('b_secretscan_rule_hardcoded');run();};
  $('in').addEventListener('input',run);run();
</script>
