var $=function(i){return document.getElementById(i);};var lastDer=null;function dn(a){return a.map(function(x){return x.shortName+"="+x.value;}).join(", ");}function parse(der,pw){$("err").textContent="";try{var asn1=forge.asn1.fromDer(der);var p12=forge.pkcs12.pkcs12FromAsn1(asn1,pw);var certs=[],keys=0;p12.safeContents.forEach(function(sc){sc.safeBags.forEach(function(bag){if(bag.cert){certs.push(bag.cert);}else if(bag.key||bag.type===forge.pki.oids.keyBag||bag.type===forge.pki.oids.pkcs8ShroudedKeyBag){keys++;}});});var html="<table><tr><td>"+t('b_pkcs12_has_key')+"</td><td><b>"+(keys>0?t('b_pkcs12_yes').replace('{n}',keys):t('b_pkcs12_no'))+"</b></td></tr><tr><td>"+t('b_pkcs12_cert_count')+"</td><td><b>"+certs.length+"</b></td></tr></table>";certs.forEach(function(c,i){var na=c.validity.notAfter;var days=Math.ceil((na-new Date())/86400000);html+="<div style=\"border-top:1px solid var(--border);margin-top:.5rem;padding-top:.5rem\"><b>"+t('b_pkcs12_cert_n').replace('{n}',i+1)+"</b><table><tr><td>"+t('b_pkcs12_subject')+"</td><td><b>"+dn(c.subject.attributes)+"</b></td></tr><tr><td>"+t('b_pkcs12_issuer')+"</td><td>"+dn(c.issuer.attributes)+"</td></tr><tr><td>"+t('b_pkcs12_expires')+"</td><td><b style=\"color:"+(days<0?"#dc2626":days<30?"#d97706":"#16a34a")+"\">"+(days<0?t('b_pkcs12_expired'):t('b_pkcs12_dday').replace('{n}',days))+"</b> ("+na.toISOString().slice(0,10)+")</td></tr></table></div>";});$("res").innerHTML=html;}catch(e){$("res").innerHTML="";$("err").textContent=t('b_pkcs12_err_open')+e.message;}}window.onI18n=function(){if(lastDer)parse(lastDer,$("pw").value);};$("file").addEventListener("change",function(){var f=$("file").files[0];if(!f)return;var r=new FileReader();r.onload=function(){lastDer=r.result;parse(r.result,$("pw").value);};r.readAsBinaryString(f);});$("pw").addEventListener("input",function(){if(lastDer)parse(lastDer,$("pw").value);});$("sample").addEventListener("click",function(){var keys=forge.pki.rsa.generateKeyPair(1024);var cert=forge.pki.createCertificate();cert.publicKey=keys.publicKey;cert.serialNumber="01";cert.validity.notBefore=new Date();cert.validity.notAfter=new Date();cert.validity.notAfter.setFullYear(cert.validity.notBefore.getFullYear()+1);var at=[{name:"commonName",value:"sample.gemini2k.co.kr"},{name:"organizationName",value:"gemini2k"},{shortName:"C",value:"KR"}];cert.setSubject(at);cert.setIssuer(at);cert.sign(keys.privateKey,forge.md.sha256.create());var p12=forge.pkcs12.toPkcs12Asn1(keys.privateKey,[cert],"1234",{algorithm:"3des"});lastDer=forge.asn1.toDer(p12).getBytes();$("pw").value="1234";parse(lastDer,"1234");});
