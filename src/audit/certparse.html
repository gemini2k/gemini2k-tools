<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_certparse_title">인증서(PEM) 분석기</h1>
  <p class="sub" data-i18n="b_certparse_sub">X.509 인증서의 발급자·유효기간·만료일을 확인합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm"><button class="btn btn-ghost" id="sample" type="button" data-i18n="b_certparse_sample_btn">예시 인증서 생성</button></div><textarea class="in" id="in" spellcheck="false" placeholder="-----BEGIN CERTIFICATE-----"></textarea><div class="err" id="err"></div><div class="res" id="res" style="margin-top:.6rem"></div>
    <div class="note" data-i18n-html="b_certparse_note">오픈소스 <b>node-forge</b>(BSD, <a href="https://github.com/digitalbazaar/forge" target="_blank" rel="noopener">digitalbazaar/forge</a>)를 자체 호스팅합니다. 인증서는 전송되지 않고 브라우저에서만 분석됩니다.</div>
  </div>
</div>
<script src="/vendor/forge-1/forge.min.js"></script><script src="audit-kit.js"></script><script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  function dn(a){return a.map(function(x){return x.shortName+'='+x.value;}).join(', ');}
  function run(){$('err').textContent='';var pem=$('in').value.trim();if(!pem){$('res').innerHTML='';return;}
    try{var c=forge.pki.certificateFromPem(pem);var na=c.validity.notAfter,nb=c.validity.notBefore;
      var days=Math.ceil((na-new Date())/86400000);var bits=c.publicKey&&c.publicKey.n?c.publicKey.n.bitLength():'-';
      $('res').innerHTML='<table>'+
      '<tr><td>'+t('b_certparse_field_subject')+'</td><td><b>'+dn(c.subject.attributes)+'</b></td></tr>'+
      '<tr><td>'+t('b_certparse_field_issuer')+'</td><td>'+dn(c.issuer.attributes)+'</td></tr>'+
      '<tr><td>'+t('b_certparse_field_validity')+'</td><td>'+nb.toISOString().slice(0,10)+' ~ '+na.toISOString().slice(0,10)+'</td></tr>'+
      '<tr><td>'+t('b_certparse_field_expires_in')+'</td><td><b style="color:'+(days<0?'#dc2626':days<30?'#d97706':'#16a34a')+'">'+(days<0?t('b_certparse_expired'):'D-'+days)+'</b></td></tr>'+
      '<tr><td>'+t('b_certparse_field_serial')+'</td><td style="font-family:ui-monospace,monospace;font-size:.8rem">'+c.serialNumber+'</td></tr>'+
      '<tr><td>'+t('b_certparse_field_sigalg')+'</td><td>'+(forge.pki.oids[c.signatureOid]||c.signatureOid)+'</td></tr>'+
      '<tr><td>'+t('b_certparse_field_pubkey')+'</td><td>'+bits+' bit</td></tr></table>';
    }catch(e){$('res').innerHTML='';$('err').textContent=t('b_certparse_parse_error')+' '+e.message;}}
  window.onI18n=run;
  $('sample').addEventListener('click',function(){
    var keys=forge.pki.rsa.generateKeyPair(512);var c=forge.pki.createCertificate();
    c.publicKey=keys.publicKey;c.serialNumber='01'+Date.now();c.validity.notBefore=new Date();
    c.validity.notAfter=new Date();c.validity.notAfter.setFullYear(c.validity.notBefore.getFullYear()+1);
    var attrs=[{name:'commonName',value:'gemini2k.co.kr'},{name:'organizationName',value:'gemini2k'},{shortName:'C',value:'KR'}];
    c.setSubject(attrs);c.setIssuer(attrs);c.sign(keys.privateKey,forge.md.sha256.create());
    $('in').value=forge.pki.certificateToPem(c);run();});
  $('in').addEventListener('input',run);
</script>
