<script>
var $=function(i){return document.getElementById(i);};function pct(h,f){return f>0?Math.round(h/f*100):100;}function color(p){return p>=80?"#16a34a":p>=50?"#d97706":"#dc2626";}function run(){var txt=$("in").value.replace(/\\n/g,"\n");var recs=txt.split(/end_of_record/);var files=[],T={LF:0,LH:0,FNF:0,FNH:0,BRF:0,BRH:0};recs.forEach(function(r){var sf=(r.match(/SF:(.+)/)||[])[1];if(!sf)return;function g(k){return +((r.match(new RegExp(k+":(\\d+)"))||[])[1]||0);}var o={sf:sf.trim(),LF:g("LF"),LH:g("LH"),FNF:g("FNF"),FNH:g("FNH"),BRF:g("BRF"),BRH:g("BRH")};["LF","LH","FNF","FNH","BRF","BRH"].forEach(function(k){T[k]+=o[k];});files.push(o);});if(!files.length){$("res").innerHTML=t('b_lcovview_no_record');return;}var lp=pct(T.LH,T.LF);var html="<div class=\"ak-rate\"><b style=\"color:"+color(lp)+"\">"+lp+"%</b> "+t('b_lcovview_line_cov')+" <span>&middot; "+t('b_lcovview_fn')+" "+pct(T.FNH,T.FNF)+"% &middot; "+t('b_lcovview_br')+" "+pct(T.BRH,T.BRF)+"%</span></div><div class=\"ak-bar2\"><i style=\"width:"+lp+"%\"></i></div>";html+="<table style=\"margin-top:.6rem\"><tr><td><b>"+t('b_lcovview_col_file')+"</b></td><td><b>"+t('b_lcovview_col_line')+"</b></td><td><b>"+t('b_lcovview_col_fn')+"</b></td><td><b>"+t('b_lcovview_col_br')+"</b></td></tr>"+files.map(function(o){var l=pct(o.LH,o.LF);return "<tr><td>"+o.sf+"</td><td style=\"color:"+color(l)+"\"><b>"+l+"%</b> ("+o.LH+"/"+o.LF+")</td><td>"+pct(o.FNH,o.FNF)+"%</td><td>"+pct(o.BRH,o.BRF)+"%</td></tr>";}).join("")+"</table>";$("res").innerHTML=html;}window.onI18n=run;var _t;$("in").addEventListener("input",function(){clearTimeout(_t);_t=setTimeout(run,300);});run();
