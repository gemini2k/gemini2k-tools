<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_csrgen_title">CSR 생성기</h1>
  <p class="sub" data-i18n="b_csrgen_sub">인증서 발급에 필요한 CSR과 개인키를 만듭니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm"><label><span data-i18n="b_csrgen_lbl_cn">CN(도메인)</span><input type="text" id="cn" value="example.com"></label><label><span data-i18n="b_csrgen_lbl_o">조직(O)</span><input type="text" id="o" value="Example Inc"></label><label><span data-i18n="b_csrgen_lbl_ou">부서(OU)</span><input type="text" id="ou" value="IT"></label><label><span data-i18n="b_csrgen_lbl_l">지역(L)</span><input type="text" id="l" value="Seoul"></label><label><span data-i18n="b_csrgen_lbl_st">시도(ST)</span><input type="text" id="st" value="Seoul"></label><label><span data-i18n="b_csrgen_lbl_c">국가(C)</span><input type="text" id="c" value="KR" style="width:70px"></label><label><span data-i18n="b_csrgen_lbl_bits">키 길이</span><select id="bits"><option>2048</option><option>3072</option><option>4096</option></select></label></div><div class="frm"><button class="btn" id="gen" type="button" data-i18n="b_csrgen_btn_gen">CSR 생성</button><span id="st2" style="color:var(--muted);font-size:.9rem;align-self:center"></span></div><label style="font-weight:700;font-size:.85rem" data-i18n="b_csrgen_lbl_csr">CSR (PEM)</label><textarea class="out" id="csr" readonly style="min-height:140px"></textarea><label style="font-weight:700;font-size:.85rem;margin-top:.5rem;display:block" data-i18n="b_csrgen_lbl_key">개인키 (PEM)</label><textarea class="out" id="key" readonly style="min-height:140px"></textarea>
    <div class="note" data-i18n-html="b_csrgen_note">오픈소스 <b>jsrsasign</b>(MIT, <a href="https://github.com/kjur/jsrsasign" target="_blank" rel="noopener">kjur/jsrsasign</a>)을 자체 호스팅합니다. 개인키와 CSR은 서버로 전송되지 않고 브라우저에서만 생성됩니다. 개인키는 안전하게 보관하세요.</div>
  </div>
</div>
<script src="/vendor/jsrsasign-11/jsrsasign-all-min.js"></script><script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};$("gen").addEventListener("click",function(){$("st2").textContent=t('b_csrgen_status_generating');$("gen").disabled=true;setTimeout(function(){try{var kp=KEYUTIL.generateKeypair("RSA",+$("bits").value);var dn="/C="+$("c").value+"/ST="+$("st").value+"/L="+$("l").value+"/O="+$("o").value+"/OU="+$("ou").value+"/CN="+$("cn").value;var csr=KJUR.asn1.csr.CSRUtil.newCSRPEM({subject:{str:dn},sbjpubkey:kp.pubKeyObj,sigalg:"SHA256withRSA",sbjprvkey:kp.prvKeyObj});$("csr").value=csr;$("key").value=KEYUTIL.getPEM(kp.prvKeyObj,"PKCS8PRV");$("st2").textContent=t('b_csrgen_status_done');}catch(e){$("st2").textContent="⚠️ "+e.message;}$("gen").disabled=false;},30);});
</script>
