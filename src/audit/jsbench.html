var $=function(i){return document.getElementById(i);};function fmt(n){return Benchmark.formatNumber(n>=100?Math.round(n):+n.toFixed(2));}function run(){$("err").textContent="";$("res").innerHTML="";$("st").textContent=t('b_jsbench_status_running');$("run").disabled=true;var setup=$("setup").value;var defs=[["A",$("a").value],["B",$("b").value]];var results=[];var bad=false;var suite=new Benchmark.Suite();defs.forEach(function(d){if(!d[1].trim())return;suite.add(d[0],{fn:d[1],setup:setup});});suite.on("cycle",function(e){var b=e.target;if(b.error)return;results.push({name:b.name,hz:b.hz,rme:b.stats.rme,n:b.stats.sample.length});$("st").textContent=String(b);});suite.on("error",function(e){bad=true;var er=e.target.error;$("err").textContent="⚠️ "+(er&&er.message?er.message:t('b_jsbench_err_runtime'));});suite.on("complete",function(){$("run").disabled=false;if(bad){$("st").textContent="";return;}$("st").textContent=t('b_jsbench_status_done');results.sort(function(x,y){return y.hz-x.hz;});var max=results.length?results[0].hz:0;var head="<tr><td><b>"+t('b_jsbench_col_code')+"</b></td><td><b>ops/sec</b></td><td><b>"+t('b_jsbench_col_rme')+"</b></td><td><b>"+t('b_jsbench_col_sample')+"</b></td><td><b>"+t('b_jsbench_col_ratio')+"</b></td></tr>";var rows=results.map(function(r,i){return "<tr><td>"+r.name+(i===0?" ★":"")+"</td><td><b>"+fmt(r.hz)+"</b></td><td>±"+r.rme.toFixed(1)+"%</td><td>"+r.n+"</td><td>"+(max?(r.hz/max).toFixed(2)+"×":"-")+"</td></tr>";}).join("");var verdict=results.length>1?("<div class=\"ak-rate\" style=\"margin-top:.5rem\"><b>"+results[0].name+"</b> "+t('b_jsbench_verdict_prefix')+" "+(results[0].hz/results[1].hz).toFixed(2)+"× "+t('b_jsbench_verdict_suffix')+"</div>"):"";$("res").innerHTML="<table>"+head+rows+"</table>"+verdict;});try{suite.run({async:true});}catch(e){$("run").disabled=false;$("err").textContent="⚠️ "+e.message;}}$("run").addEventListener("click",run);
