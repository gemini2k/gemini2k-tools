<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_junitview_title">JUnit/xUnit 결과 뷰어</h1>
  <p class="sub" data-i18n="b_junitview_sub">테스트 결과 XML을 통과/실패/스킵으로 집계하고 실패를 보여 줍니다.</p>
  <div class="card" style="max-width:none;">
    <textarea class="in" id="in" spellcheck="false">&lt;testsuite name="suite" tests="4" failures="1" skipped="1" time="2.5"&gt;\n  &lt;testcase name="login_ok" classname="AuthTest" time="0.3"/&gt;\n  &lt;testcase name="login_fail" classname="AuthTest" time="0.2"&gt;&lt;failure message="expected 200 got 500"&gt;assert&lt;/failure&gt;&lt;/testcase&gt;\n  &lt;testcase name="logout" classname="AuthTest" time="0.1"/&gt;\n  &lt;testcase name="reset_pw" classname="AuthTest"&gt;&lt;skipped/&gt;&lt;/testcase&gt;\n&lt;/testsuite&gt;</textarea><div class="res" id="res" style="margin-top:.6rem"></div><div class="err" id="err"></div>
    <div class="note" data-i18n="b_junitview_note">JUnit/xUnit 표준 XML(testsuite/testcase)을 인식합니다. 파일은 업로드되지 않고 브라우저에서만 파싱됩니다.</div>
  </div>
</div>

<script>
var $=function(i){return document.getElementById(i);};function run(){$("err").textContent="";var xml=$("in").value.replace(/\\n/g,"\n");try{var doc=new DOMParser().parseFromString(xml,"application/xml");if(doc.querySelector("parsererror"))throw new Error(t('b_junitview_err_parse'));var cases=[].slice.call(doc.getElementsByTagName("testcase"));if(!cases.length){$("res").innerHTML=t('b_junitview_no_cases');return;}var pass=0,fail=0,skip=0,errc=0,time=0,fails=[];cases.forEach(function(tc){var tmp=parseFloat(tc.getAttribute("time")||0)||0;time+=tmp;if(tc.getElementsByTagName("failure").length){fail++;fails.push([tc.getAttribute("classname")||"",tc.getAttribute("name"),(tc.getElementsByTagName("failure")[0].getAttribute("message")||"").slice(0,80)]);}else if(tc.getElementsByTagName("error").length){errc++;fails.push([tc.getAttribute("classname")||"",tc.getAttribute("name"),"ERROR "+(tc.getElementsByTagName("error")[0].getAttribute("message")||"").slice(0,70)]);}else if(tc.getElementsByTagName("skipped").length){skip++;}else{pass++;}});var tot=cases.length,rate=tot?Math.round(pass/tot*100):0;var html="<div class=\"ak-rate\"><b>"+rate+"%</b> "+t('b_junitview_pass_label')+" <span>· "+t('b_junitview_total')+" "+tot+" · "+t('b_junitview_pass')+" "+pass+" · "+t('b_junitview_fail')+" "+fail+" · "+t('b_junitview_error')+" "+errc+" · "+t('b_junitview_skip')+" "+skip+" · "+time.toFixed(2)+"s</span></div><div class=\"ak-bar2\"><i style=\"width:"+rate+"%\"></i></div>";if(fails.length)html+="<table style=\"margin-top:.6rem\"><tr><td><b>"+t('b_junitview_col_class')+"</b></td><td><b>"+t('b_junitview_col_test')+"</b></td><td><b>"+t('b_junitview_col_msg')+"</b></td></tr>"+fails.map(function(f){return "<tr><td>"+f[0]+"</td><td style=\"color:#dc2626\">"+f[1]+"</td><td>"+f[2].replace(/</g,"&lt;")+"</td></tr>";}).join("")+"</table>";$("res").innerHTML=html;}catch(e){$("res").innerHTML="";$("err").textContent="⚠️ "+e.message;}}var _t;$("in").addEventListener("input",function(){clearTimeout(_t);_t=setTimeout(run,300);});window.onI18n=run;run();
</script>
