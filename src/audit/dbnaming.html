<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_dbnaming_title">DB 명명규칙 검사기</h1>
  <p class="sub" data-i18n="b_dbnaming_sub">테이블/컬럼명이 표준 명명규칙을 지키는지 점검합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm"><label><span data-i18n="b_dbnaming_max_len">최대 길이</span><input type="number" id="max" value="30" style="width:90px"></label>
  <label style="flex-direction:row;align-items:center;gap:.4rem"><input type="checkbox" id="upper"><span data-i18n="b_dbnaming_upper">대문자 허용</span></label></div>
  <textarea class="in" id="in" spellcheck="false">user_master
USER_LOG
2nd_table
order
customer_name
ord_dt
tbl_상품</textarea><div class="res" id="res" style="margin-top:.6rem"></div>
    <div class="note" data-i18n="b_dbnaming_note">기본 규칙: 영문 소문자·숫자·언더스코어만, 숫자로 시작 금지, 예약어 금지, 길이 제한. 규칙은 기관 표준에 맞게 참고하세요. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  var RES=['select','from','where','order','group','table','user','date','desc','asc','index','key','int','char','number'];
  function run(){var max=+$('max').value||30,up=$('upper').checked;
    var names=$('in').value.split(/\n/).map(function(s){return s.trim();}).filter(Boolean);
    var rows=names.map(function(n){var errs=[];
      var re=up?/^[A-Za-z0-9_]+$/:/^[a-z0-9_]+$/;
      if(!re.test(n))errs.push(up?t('b_dbnaming_err_chars_up'):t('b_dbnaming_err_chars_low'));
      if(/^[0-9]/.test(n))errs.push(t('b_dbnaming_err_digit_start'));
      if(n.length>max)errs.push(t('b_dbnaming_err_len_exceed').replace('{len}',n.length).replace('{max}',max));
      if(RES.indexOf(n.toLowerCase())>=0)errs.push(t('b_dbnaming_err_reserved'));
      if(/[가-힣]/.test(n))errs.push(t('b_dbnaming_err_korean'));
      return '<tr><td>'+(errs.length?'❌':'✅')+' '+n+'</td><td style="color:#dc2626">'+errs.join(', ')+'</td></tr>';});
    var ok=names.filter(function(n){var re=up?/^[A-Za-z0-9_]+$/:/^[a-z0-9_]+$/;return re.test(n)&&!/^[0-9]/.test(n)&&n.length<=max&&RES.indexOf(n.toLowerCase())<0&&!/[가-힣]/.test(n);}).length;
    $('res').innerHTML='<div class="ak-rate"><b>'+ok+'/'+names.length+'</b> '+t('b_dbnaming_pass')+'</div><table>'+rows.join('')+'</table>';}
  window.onI18n=run;
  ['in','max','upper'].forEach(function(i){$(i).addEventListener('input',run);$(i).addEventListener('change',run);});run();
</script>
</body>
