<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_ipplan_title">IP 주소계획·서브넷 분할</h1>
  <p class="sub" data-i18n="b_ipplan_sub">네트워크를 N개 서브넷으로 분할해 주소계획을 만듭니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm">
    <label><span data-i18n="b_ipplan_label_net">기준 네트워크</span><input type="text" id="net" value="192.168.0.0" style="width:140px"></label>
    <label>/<input type="number" id="pfx" value="24" min="0" max="30" style="width:70px"></label>
    <label><span data-i18n="b_ipplan_label_cnt">서브넷 수</span><select id="cnt"><option>2</option><option>4</option><option>8</option><option>16</option><option>32</option></select></label>
  </div><div class="err" id="err"></div><div class="res" id="res" style="overflow-x:auto"></div>
    <div class="note" data-i18n="b_ipplan_note">기준 CIDR을 2의 거듭제곱 개수로 균등 분할(FLSM)합니다. 모든 계산은 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  function toInt(ip){var p=ip.split('.');if(p.length!==4)return null;var n=0;for(var i=0;i<4;i++){var x=+p[i];if(isNaN(x)||x<0||x>255)return null;n=n*256+x;}return n>>>0;}
  function toIp(n){return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');}
  function run(){$('err').textContent='';var base=toInt($('net').value.trim()),pfx=+$('pfx').value,cnt=+$('cnt').value;
    if(base===null){$('err').textContent=t('b_ipplan_err_ip');$('res').innerHTML='';return;}
    var bits=Math.log2(cnt),newPfx=pfx+bits;if(newPfx>30){$('err').textContent=t('b_ipplan_err_too_many').replace('{pfx}',newPfx);$('res').innerHTML='';return;}
    var size=Math.pow(2,32-newPfx),mask=(0xFFFFFFFF<<(32-newPfx))>>>0,netBase=(base&((0xFFFFFFFF<<(32-pfx))>>>0))>>>0;
    var rows='';for(var i=0;i<cnt;i++){var nw=(netBase+i*size)>>>0,bc=(nw+size-1)>>>0;
      rows+='<tr><td>'+(i+1)+'</td><td><b>'+toIp(nw)+'/'+newPfx+'</b></td><td>'+toIp(nw+1)+' ~ '+toIp(bc-1)+'</td><td>'+toIp(bc)+'</td><td>'+(size>2?size-2:size)+'</td></tr>';}
    $('res').innerHTML='<div class="ak-rate"><b>/'+newPfx+'</b> <span>· '+t('b_ipplan_hosts_per_subnet').replace('{n}',(size>2?size-2:size))+' · '+t('b_ipplan_mask')+' '+toIp(mask)+'</span></div><table><tr><td>#</td><td>'+t('b_ipplan_col_network')+'</td><td>'+t('b_ipplan_col_range')+'</td><td>'+t('b_ipplan_col_broadcast')+'</td><td>'+t('b_ipplan_col_hosts')+'</td></tr>'+rows+'</table>';}
  window.onI18n=run;
  ['net','pfx','cnt'].forEach(function(i){$(i).addEventListener('input',run);$(i).addEventListener('change',run);});run();
</script>
