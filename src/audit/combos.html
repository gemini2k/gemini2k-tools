<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_combos_title">조합 테스트 케이스 생성</h1>
  <p class="sub" data-i18n="b_combos_sub">파라미터별 값을 입력하면 모든 조합(곱집합)을 표로 만듭니다.</p>
  <div class="card" style="max-width:none;">
    <textarea class="in" id="in" spellcheck="false" style="min-height:120px">브라우저: Chrome, Safari, Edge\nOS: Windows, macOS, Android\n네트워크: WiFi, LTE</textarea><div class="frm" style="margin-top:.5rem"><button class="btn" id="run" type="button" data-i18n="b_combos_btn_run">조합 생성</button><button class="btn btn-ghost" id="csv" type="button">⬇️ CSV</button><span id="cnt" style="align-self:center;color:var(--muted)"></span></div><div class="err" id="err"></div><div class="res" id="res" style="overflow-x:auto"></div>
    <div class="note" data-i18n-html="b_combos_note">한 줄에 <code>파라미터: 값1, 값2, 값3</code> 형식으로 입력합니다. 조합 수 = 각 값 개수의 곱이므로 폭증 시 페어와이즈를 사용하세요. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="audit-kit.js"></script><script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};var names=[],tests=[];function parse(){return $("in").value.replace(/\\n/g,"\n").split(/\r?\n/).map(function(l){var idx=l.indexOf(":");if(idx<0)return null;return {name:l.slice(0,idx).trim(),values:l.slice(idx+1).split(",").map(function(x){return x.trim();}).filter(Boolean)};}).filter(function(p){return p&&p.name&&p.values.length;});}function run(){$("err").textContent="";var ps=parse();if(!ps.length){$("err").textContent=t('b_combos_err_empty');return;}var total=ps.reduce(function(a,p){return a*p.values.length;},1);if(total>5000){$("err").textContent=t('b_combos_err_too_many').replace('{n}',total);$("res").innerHTML="";$("cnt").textContent="";return;}names=ps.map(function(p){return p.name;});tests=[[]];ps.forEach(function(p){var nt=[];tests.forEach(function(tmp){p.values.forEach(function(v){nt.push(tmp.concat([v]));});});tests=nt;});$("cnt").textContent=t('b_combos_cnt').replace('{n}',tests.length);$("res").innerHTML="<table><tr><td><b>#</b></td>"+names.map(function(n){return "<td><b>"+n+"</b></td>";}).join("")+"</tr>"+tests.slice(0,500).map(function(tmp,i){return "<tr><td>"+(i+1)+"</td>"+tmp.map(function(v){return "<td>"+v+"</td>";}).join("")+"</tr>";}).join("")+"</table>";}window.onI18n=function(){run();};$("run").addEventListener("click",run);$("csv").addEventListener("click",function(){if(!tests.length)run();AuditKit.csv("combos.csv",[["#"].concat(names)].concat(tests.map(function(tmp,i){return [i+1].concat(tmp);})));});run();
</script>
