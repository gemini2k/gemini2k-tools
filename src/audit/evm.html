<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_evm_title">획득가치(EVM) 계산기</h1>
  <p class="sub" data-i18n="b_evm_sub">계획가치·획득가치·실제원가로 일정·원가 성과지표를 산출합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm">
    <label><span data-i18n="b_evm_lbl_bac">BAC 총예산</span><input type="number" id="bac" value="100000000"></label>
    <label><span data-i18n="b_evm_lbl_pv">PV 계획가치</span><input type="number" id="pv" value="40000000"></label>
    <label><span data-i18n="b_evm_lbl_ev">EV 획득가치</span><input type="number" id="ev" value="35000000"></label>
    <label><span data-i18n="b_evm_lbl_ac">AC 실제원가</span><input type="number" id="ac" value="42000000"></label>
  </div><div class="res" id="res"></div>
    <div class="note" data-i18n="b_evm_note">SPI/CPI ≥ 1 이면 일정/원가 양호, &lt; 1 이면 지연/초과입니다. EAC는 현재 효율(CPI) 유지 가정의 최종 예상원가입니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};function f(n){return (Math.round(n)).toLocaleString({ko:'ko-KR',en:'en-US',zh:'zh-CN',ja:'ja-JP'}[typeof curLang==='function'?curLang():'ko']);}
  function run(){var bac=+$('bac').value,pv=+$('pv').value,ev=+$('ev').value,ac=+$('ac').value;
    var sv=ev-pv,cv=ev-ac,spi=pv?ev/pv:0,cpi=ac?ev/ac:0,eac=cpi?bac/cpi:0,etc=eac-ac,vac=bac-eac,pc=bac?ev/bac*100:0;
    function badge(v){return '<b style="color:'+(v>=1?'#16a34a':'#dc2626')+'">'+v.toFixed(2)+'</b>';}
    $('res').innerHTML='<table>'+
    '<tr><td>'+t('b_evm_row_pc')+'</td><td><b>'+pc.toFixed(1)+'%</b></td></tr>'+
    '<tr><td>'+t('b_evm_row_sv')+'</td><td><b style="color:'+(sv>=0?'#16a34a':'#dc2626')+'">'+f(sv)+'</b></td></tr>'+
    '<tr><td>'+t('b_evm_row_cv')+'</td><td><b style="color:'+(cv>=0?'#16a34a':'#dc2626')+'">'+f(cv)+'</b></td></tr>'+
    '<tr><td>'+t('b_evm_row_spi')+'</td><td>'+badge(spi)+'</td></tr>'+
    '<tr><td>'+t('b_evm_row_cpi')+'</td><td>'+badge(cpi)+'</td></tr>'+
    '<tr><td>'+t('b_evm_row_eac')+'</td><td><b>'+f(eac)+'</b></td></tr>'+
    '<tr><td>'+t('b_evm_row_etc')+'</td><td><b>'+f(etc)+'</b></td></tr>'+
    '<tr><td>'+t('b_evm_row_vac')+'</td><td><b style="color:'+(vac>=0?'#16a34a':'#dc2626')+'">'+f(vac)+'</b></td></tr>'+
    '</table>';}
  ['bac','pv','ev','ac'].forEach(function(i){$(i).addEventListener('input',run);});run();
  window.onI18n=run;
</script>
