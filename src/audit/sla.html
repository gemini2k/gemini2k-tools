<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_sla_title">가용성(SLA) 계산기</h1>
  <p class="sub" data-i18n="b_sla_sub">목표 가용성(9의 개수)에 따른 허용 다운타임을 계산합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm">
    <label><span data-i18n="b_sla_label_av">목표 가용성(%)</span><input type="number" id="av" value="99.9" step="0.001"></label>
  </div><div class="res" id="res"></div>
    <div class="note" data-i18n="b_sla_note">예: 99.9%(쓰리나인)는 연 8시간 45분, 99.99%(포나인)는 연 52분의 다운타임이 허용됩니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  function dur(min){
    var _loc={ko:'ko-KR',en:'en-US',zh:'zh-CN',ja:'ja-JP'}[window.curLang?curLang():'ko'];
    if(min<1)return Math.round(min*60)+t('b_sla_unit_sec');
    if(min<60)return min.toFixed(1)+t('b_sla_unit_min');
    if(min<1440)return (min/60).toFixed(1)+t('b_sla_unit_hour');
    return (min/1440).toFixed(2)+t('b_sla_unit_day');
  }
  function run(){var av=+$('av').value;if(isNaN(av)||av<0||av>100){$('res').innerHTML=t('b_sla_err_range');return;}
    var down=(100-av)/100;var yr=down*365*24*60,mo=down*30*24*60,wk=down*7*24*60,day=down*24*60;
    $('res').innerHTML='<div class="big">'+av+'% '+t('b_sla_avail_label')+'</div><table>'+
    '<tr><td>'+t('b_sla_row_yearly')+'</td><td><b>'+dur(yr)+'</b></td></tr>'+
    '<tr><td>'+t('b_sla_row_monthly')+'</td><td><b>'+dur(mo)+'</b></td></tr>'+
    '<tr><td>'+t('b_sla_row_weekly')+'</td><td><b>'+dur(wk)+'</b></td></tr>'+
    '<tr><td>'+t('b_sla_row_daily')+'</td><td><b>'+dur(day)+'</b></td></tr></table>';}
  $('av').addEventListener('input',run);run();
  window.onI18n=run;
</script>
