<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_secheaders_title">보안 HTTP 헤더 점검·생성</h1>
  <p class="sub" data-i18n="b_secheaders_sub">응답 헤더를 붙여넣어 보안 헤더 적용 여부를 점검합니다.</p>
  <div class="card" style="max-width:none;">
    <textarea class="in" id="in" spellcheck="false">HTTP/2 200
content-type: text/html
x-content-type-options: nosniff</textarea><div class="res" id="res" style="margin-top:.6rem"></div><h3 style="font-size:.9rem;margin:1rem 0 .3rem" data-i18n="b_secheaders_rec_heading">권장 헤더</h3><div class="out" id="rec"></div>
    <div class="note" data-i18n="b_secheaders_note">주요 보안 응답 헤더의 존재 여부를 점검합니다. 권장값은 환경에 맞게 조정하세요. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  var CHK=[
    ['Strict-Transport-Security',t('b_secheaders_chk_hsts'),'max-age=31536000; includeSubDomains'],
    ['Content-Security-Policy',t('b_secheaders_chk_csp'),"default-src 'self'"],
    ['X-Frame-Options',t('b_secheaders_chk_xfo'),'DENY'],
    ['X-Content-Type-Options',t('b_secheaders_chk_xcto'),'nosniff'],
    ['Referrer-Policy',t('b_secheaders_chk_rp'),'strict-origin-when-cross-origin'],
    ['Permissions-Policy',t('b_secheaders_chk_pp'),'geolocation=(), camera=()']
  ];
  function run(){var txt=$('in').value.toLowerCase();
    var rows=CHK.map(function(c){var ok=txt.indexOf(c[0].toLowerCase()+':')>=0||txt.indexOf(c[0].toLowerCase()+' :')>=0;
      return '<tr><td>'+(ok?'✅':'❌')+' '+c[0]+'</td><td>'+c[1]+'</td></tr>';}).join('');
    var n=CHK.filter(function(c){return txt.indexOf(c[0].toLowerCase())>=0;}).length;
    $('res').innerHTML='<div class="ak-rate"><b>'+n+'/'+CHK.length+'</b> '+t('b_secheaders_applied')+'</div><table>'+rows+'</table>';
    $('rec').textContent=CHK.map(function(c){return c[0]+': '+c[2];}).join('\n');}
  $('in').addEventListener('input',run);run();
  window.onI18n=function(){
    CHK[0][1]=t('b_secheaders_chk_hsts');
    CHK[1][1]=t('b_secheaders_chk_csp');
    CHK[2][1]=t('b_secheaders_chk_xfo');
    CHK[3][1]=t('b_secheaders_chk_xcto');
    CHK[4][1]=t('b_secheaders_chk_rp');
    CHK[5][1]=t('b_secheaders_chk_pp');
    run();
  };
</script>
