<script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"결함밀도·품질지표 계산기","description":"결함 수·규모(KLOC/FP)·테스트 결과로 결함밀도·통과율·결함제거효율(DRE)·MTBF 등 소프트웨어 품질지표를 계산합니다.","url":"https://gemini2k.co.kr/testmetrics.html","applicationCategory":"BusinessApplication","operatingSystem":"Web","inLanguage":"ko","isAccessibleForFree":true,"offers":{"@type":"Offer","price":"0","priceCurrency":"KRW"},"publisher":{"@type":"Organization","name":"빛의여행(gemini2k) 도구","url":"https://gemini2k.co.kr/"}}</script>

<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_testmetrics_title">결함밀도·품질지표 계산기</h1>
  <p class="sub" data-i18n="b_testmetrics_sub">결함밀도·통과율·결함제거효율(DRE)을 산출합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm">
    <label><span data-i18n="b_testmetrics_lbl_def">총 결함 수</span><input type="number" id="def" value="48"></label>
    <label><span data-i18n="b_testmetrics_lbl_kloc">규모(KLOC)</span><input type="number" id="kloc" value="12"></label>
    <label><span data-i18n="b_testmetrics_lbl_tc">테스트케이스</span><input type="number" id="tc" value="200"></label>
    <label><span data-i18n="b_testmetrics_lbl_pass">통과 수</span><input type="number" id="pass" value="185"></label>
  </div><div class="frm">
    <label><span data-i18n="b_testmetrics_lbl_pre">출시 전 결함</span><input type="number" id="pre" value="42"></label>
    <label><span data-i18n="b_testmetrics_lbl_post">출시 후 결함</span><input type="number" id="post" value="6"></label>
    <label><span data-i18n="b_testmetrics_lbl_uptime">총 가동시간(h)</span><input type="number" id="uptime" value="720"></label>
  </div><div class="res" id="res"></div>
    <div class="note" data-i18n="b_testmetrics_note">결함밀도 = 결함 ÷ KLOC. DRE = 출시 전 결함 ÷ (출시 전 + 출시 후 결함) × 100. 값이 높을수록 결함을 잘 걸러낸 것입니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  function run(){var def=+$('def').value||0,kloc=+$('kloc').value||1,tc=+$('tc').value||0,pass=+$('pass').value||0;
    var pre=+$('pre').value||0,post=+$('post').value||0,up=+$('uptime').value||0;
    var density=def/kloc,passRate=tc?pass/tc*100:0,dre=(pre+post)?pre/(pre+post)*100:0,mtbf=post?up/post:up;
    $('res').innerHTML='<table>'+
    '<tr><td>'+t('b_testmetrics_res_density')+'</td><td><b>'+density.toFixed(2)+' '+t('b_testmetrics_unit_defkloc')+'</b></td></tr>'+
    '<tr><td>'+t('b_testmetrics_res_passrate')+'</td><td><b>'+passRate.toFixed(1)+'%</b></td></tr>'+
    '<tr><td>'+t('b_testmetrics_res_dre')+'</td><td><b style="color:'+(dre>=85?'#16a34a':'#d97706')+'">'+dre.toFixed(1)+'%</b></td></tr>'+
    '<tr><td>'+t('b_testmetrics_res_mtbf')+'</td><td><b>'+mtbf.toFixed(1)+' '+t('b_testmetrics_unit_hour')+'</b></td></tr></table>';}
  window.onI18n=run;
  ['def','kloc','tc','pass','pre','post','uptime'].forEach(function(i){$(i).addEventListener('input',run);});run();
</script>
</body>
