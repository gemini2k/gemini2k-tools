<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_roi_title">정보화 ROI·TCO 계산기</h1>
  <p class="sub" data-i18n="b_roi_sub">투자 대비 효과(ROI)와 총소유비용(TCO), 투자 회수기간을 산출합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm">
    <label><span data-i18n="b_roi_lbl_inv">초기 투자비(원)</span><input type="number" id="inv" value="500000000"></label>
    <label><span data-i18n="b_roi_lbl_op">연간 운영비(원)</span><input type="number" id="op" value="50000000"></label>
    <label><span data-i18n="b_roi_lbl_ben">연간 효과(원)</span><input type="number" id="ben" value="200000000"></label>
    <label><span data-i18n="b_roi_lbl_yr">분석기간(년)</span><input type="number" id="yr" value="5"></label>
  </div><div class="res" id="res"></div>
    <div class="note" data-i18n="b_roi_note">ROI = (누적 순효과 ÷ 총비용) × 100. 회수기간은 연간 순효과로 초기 투자비를 회수하는 데 걸리는 기간입니다. 참고용 추정입니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};function f(n){var loc={ko:'ko-KR',en:'en-US',zh:'zh-CN',ja:'ja-JP'}[window.curLang?curLang():'ko'];return Math.round(n).toLocaleString(loc);}
  function run(){var inv=+$('inv').value||0,op=+$('op').value||0,ben=+$('ben').value||0,yr=+$('yr').value||1;
    var tco=inv+op*yr,totalBen=ben*yr,net=totalBen-tco,roi=tco?net/tco*100:0,annualNet=ben-op,payback=annualNet>0?inv/annualNet:Infinity;
    $('res').innerHTML='<div class="big" style="color:'+(roi>=0?'var(--accent)':'#dc2626')+'">ROI '+roi.toFixed(1)+'%</div><table>'+
    '<tr><td>'+t('b_roi_tco_label').replace('{yr}',yr)+'</td><td><b>'+f(tco)+' '+t('b_roi_unit_krw')+'</b></td></tr>'+
    '<tr><td>'+t('b_roi_cumben_label')+'</td><td><b>'+f(totalBen)+' '+t('b_roi_unit_krw')+'</b></td></tr>'+
    '<tr><td>'+t('b_roi_net_label')+'</td><td><b style="color:'+(net>=0?'#16a34a':'#dc2626')+'">'+f(net)+' '+t('b_roi_unit_krw')+'</b></td></tr>'+
    '<tr><td>'+t('b_roi_annualnet_label')+'</td><td><b>'+f(annualNet)+' '+t('b_roi_unit_krw')+'</b></td></tr>'+
    '<tr><td>'+t('b_roi_payback_label')+'</td><td><b>'+(isFinite(payback)?payback.toFixed(1)+' '+t('b_roi_unit_yr'):t('b_roi_no_payback'))+'</b></td></tr></table>';}
  window.onI18n=run;
  ['inv','op','ben','yr'].forEach(function(i){$(i).addEventListener('input',run);});run();
</script>
