<div class="toolwrap" style="max-width:1000px;">

<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  var RULES=[
    [/\.innerHTML\s*=|document\.write\s*\(/,'XSS',t('b_seccode_r_xss')],
    [/(SELECT|INSERT|UPDATE|DELETE)[^;]*['"]\s*\+|\+\s*['"][^;]*(WHERE|VALUES)/i,t('b_seccode_r_sqli_type'),t('b_seccode_r_sqli')],
    [/\beval\s*\(|new\s+Function\s*\(/,t('b_seccode_r_eval_type'),t('b_seccode_r_eval')],
    [/Math\.random\s*\(/,t('b_seccode_r_rand_type'),t('b_seccode_r_rand')],
    [/(password|passwd|pwd|secret|api[_-]?key|token)\s*[:=]\s*['"][^'"]{3,}/i,t('b_seccode_r_hc_type'),t('b_seccode_r_hc')],
    [/\bmd5\b|\bsha1\b/i,t('b_seccode_r_hash_type'),t('b_seccode_r_hash')],
    [/exec\s*\(|child_process|Runtime\.getRuntime|os\.system/,t('b_seccode_r_cmd_type'),t('b_seccode_r_cmd')],
    [/http:\/\//,t('b_seccode_r_http_type'),t('b_seccode_r_http')],
    [/console\.(log|debug)\s*\(/,t('b_seccode_r_debug_type'),t('b_seccode_r_debug')]
  ];
  function run(){$('err').textContent='';var lines=$('in').value.split(/\n/);var hits=[];
    lines.forEach(function(ln,i){RULES.forEach(function(r){if(r[0].test(ln))hits.push({line:i+1,type:r[1],msg:r[2],code:ln.trim().slice(0,80)});});});
    if(!hits.length){$('out').innerHTML='<span style="color:#16a34a">'+t('b_seccode_no_hits')+'</span>';return;}
    $('out').innerHTML='<b>'+hits.length+t('b_seccode_hits_suffix')+'</b>\n\n'+hits.map(function(h){return 'L'+h.line+' ['+h.type+'] '+h.msg+'\n   '+h.code;}).join('\n\n');}
  window.onI18n=function(){RULES[0][1]='XSS';RULES[0][2]=t('b_seccode_r_xss');RULES[1][1]=t('b_seccode_r_sqli_type');RULES[1][2]=t('b_seccode_r_sqli');RULES[2][1]=t('b_seccode_r_eval_type');RULES[2][2]=t('b_seccode_r_eval');RULES[3][1]=t('b_seccode_r_rand_type');RULES[3][2]=t('b_seccode_r_rand');RULES[4][1]=t('b_seccode_r_hc_type');RULES[4][2]=t('b_seccode_r_hc');RULES[5][1]=t('b_seccode_r_hash_type');RULES[5][2]=t('b_seccode_r_hash');RULES[6][1]=t('b_seccode_r_cmd_type');RULES[6][2]=t('b_seccode_r_cmd');RULES[7][1]=t('b_seccode_r_http_type');RULES[7][2]=t('b_seccode_r_http');RULES[8][1]=t('b_seccode_r_debug_type');RULES[8][2]=t('b_seccode_r_debug');run();};
  $('in').addEventListener('input',run);run();
</script>
