var $=function(i){return document.getElementById(i);};function nums(){return $("in").value.split(/[\s,]+/).map(parseFloat).filter(function(x){return !isNaN(x);});}function run(){$("err").textContent="";var a=nums();if(a.length<2){$("res").innerHTML="";$("hist").innerHTML="";$("err").textContent=t('b_latencystats_err_min2');return;}var T=+$("t").value||1;var sorted=a.slice().sort(function(x,y){return x-y;});var sat=0,tol=0;a.forEach(function(x){if(x<=T)sat++;else if(x<=4*T)tol++;});var apdex=(sat+tol/2)/a.length;var rate=apdex>=0.94?t('b_latencystats_rate_excellent'):apdex>=0.85?t('b_latencystats_rate_good'):apdex>=0.7?t('b_latencystats_rate_fair'):apdex>=0.5?t('b_latencystats_rate_poor'):t('b_latencystats_rate_bad');var rows=[[t('b_latencystats_row_count'),a.length],[t('b_latencystats_row_mean'),ss.mean(a).toFixed(1)+" ms"],[t('b_latencystats_row_median'),ss.quantileSorted(sorted,0.5).toFixed(1)+" ms"],[t('b_latencystats_row_minmax'),ss.min(a)+" / "+ss.max(a)+" ms"],[t('b_latencystats_row_stddev'),ss.standardDeviation(a).toFixed(1)+" ms"],["p90",ss.quantileSorted(sorted,0.9).toFixed(1)+" ms"],["p95",ss.quantileSorted(sorted,0.95).toFixed(1)+" ms"],["p99",ss.quantileSorted(sorted,0.99).toFixed(1)+" ms"]];$("res").innerHTML="<div class=\"big\">Apdex "+apdex.toFixed(2)+" <span style=\"font-size:.9rem;font-weight:700\">("+rate+")</span></div><table>"+rows.map(function(r){return "<tr><td>"+r[0]+"</td><td><b>"+r[1]+"</b></td></tr>";}).join("")+"<tr><td>"+t('b_latencystats_row_sat_tol')+"</td><td><b>"+sat+" / "+tol+" / "+(a.length-sat-tol)+"</b> (T="+T+", 4T="+4*T+")</td></tr></table>";var bins=Math.max(2,Math.min(30,+$("bins").value||8));var mn=ss.min(a),mx=ss.max(a),w=(mx-mn)/bins||1;var cnt=new Array(bins).fill(0);a.forEach(function(x){var k=Math.min(bins-1,Math.floor((x-mn)/w));cnt[k]++;});var maxc=Math.max.apply(null,cnt);var bars=cnt.map(function(c,i){var lo=Math.round(mn+i*w),hi=Math.round(mn+(i+1)*w);var pw=maxc?Math.round(c/maxc*100):0;return "<div style=\"display
