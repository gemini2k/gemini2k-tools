<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_apdex_title">Apdex 성능지수 계산기</h1>
  <p class="sub" data-i18n="b_apdex_sub">만족·허용·불만 건수로 Apdex 점수와 등급을 산출합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm"><label><span data-i18n="b_apdex_label_s">만족 건수 (≤T)</span><input type="number" id="s" value="850" min="0"></label><label><span data-i18n="b_apdex_label_t">허용 건수 (T~4T)</span><input type="number" id="t" value="120" min="0"></label><label><span data-i18n="b_apdex_label_f">불만 건수 (&gt;4T)</span><input type="number" id="f" value="30" min="0"></label></div><div class="res" id="res"></div>
    <div class="note" data-i18n="b_apdex_note">Apdex = (만족 + 허용÷2) ÷ 전체. 만족=임계 T 이하 응답, 허용=T~4T, 불만=4T 초과. 등급: 0.94↑ 우수 · 0.85↑ 양호 · 0.70↑ 보통 · 0.50↑ 미흡 · 그 미만 불량.</div>
  </div>
</div>

<script>
var $=function(i){return document.getElementById(i);};function run(){var s=+$("s").value||0,tmp=+$("t").value||0,f=+$("f").value||0,n=s+tmp+f;if(!n){$("res").innerHTML="<div class=\"big\">-</div>";return;}var ap=(s+tmp/2)/n;var grade=ap>=0.94?t('b_apdex_grade_excellent'):ap>=0.85?t('b_apdex_grade_good'):ap>=0.7?t('b_apdex_grade_fair'):ap>=0.5?t('b_apdex_grade_poor'):t('b_apdex_grade_unacceptable');var c=ap>=0.85?"var(--ok)":ap>=0.5?"#d97706":"#dc2626";$("res").innerHTML="<div class=\"big\" style=\"color:"+c+"\">"+ap.toFixed(3)+" <span style=\"font-size:.95rem;font-weight:700\">"+grade+"</span></div><table><tr><td>"+t('b_apdex_total')+"</td><td><b>"+n+"</b></td></tr><tr><td>"+t('b_apdex_ratio_s')+"</td><td><b>"+(s/n*100).toFixed(1)+"%</b></td></tr><tr><td>"+t('b_apdex_ratio_t')+"</td><td><b>"+(tmp/n*100).toFixed(1)+"%</b></td></tr><tr><td>"+t('b_apdex_ratio_f')+"</td><td><b>"+(f/n*100).toFixed(1)+"%</b></td></tr></table><div style=\"margin-top:.5rem;height:10px;background:var(--border);border-radius:5px;overflow:hidden\"><span style=\"display:block;height:100%;width:"+(ap*100).toFixed(1)+"%;background:"+c+"\"></span></div>";}["s","t","f"].forEach(function(i){$(i).addEventListener("input",run);});window.onI18n=run;run();
