<script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"DDL → 테이블정의서 변환","description":"CREATE TABLE DDL을 붙여넣으면 컬럼·자료형·NULL여부·키·기본값을 파싱해 테이블정의서로 정리합니다. node-sql-parser 자체 호스팅.","url":"https://gemini2k.co.kr/ddlparse.html","applicationCategory":"BusinessApplication","operatingSystem":"Web","inLanguage":"ko","isAccessibleForFree":true,"offers":{"@type":"Offer","price":"0","priceCurrency":"KRW"},"publisher":{"@type":"Organization","name":"빛의여행(gemini2k) 도구","url":"https://gemini2k.co.kr/"}}</script>

<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_ddlparse_title">DDL → 테이블정의서</h1>
  <p class="sub" data-i18n="b_ddlparse_sub">CREATE TABLE 문을 테이블정의서 표로 변환합니다.</p>
  <div class="card" style="max-width:none;">
    <textarea class="in" id="in" spellcheck="false">CREATE TABLE user_master (
  user_id    BIGINT NOT NULL AUTO_INCREMENT,
  login_id   VARCHAR(50) NOT NULL,
  user_name  VARCHAR(100) NOT NULL,
  email      VARCHAR(200),
  status     CHAR(1) DEFAULT 'Y',
  reg_dt     DATETIME NOT NULL,
  PRIMARY KEY (user_id)
);</textarea><div class="err" id="err"></div><div class="res" id="res" style="margin-top:.6rem;overflow-x:auto"></div>
    <div class="note" data-i18n-html="b_ddlparse_note">오픈소스 <b>node-sql-parser</b>(Apache-2.0, <a href="https://github.com/taozhi8833998/node-sql-parser" target="_blank" rel="noopener">node-sql-parser</a>)를 자체 호스팅합니다(MySQL 문법). 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/sqlparser-4/mysql.umd.js"></script><script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  function run(){$('err').textContent='';var sql=$('in').value.trim();if(!sql){$('res').innerHTML='';return;}
    try{var parser=new Parser();var ast=parser.astify(sql,{database:'mysql'});if(!Array.isArray(ast))ast=[ast];
      var html='';
      ast.forEach(function(st){if(st.type!=='create'||st.keyword!=='table')return;
        var tbl=(st.table&&st.table[0]&&st.table[0].table)||'(table)';
        var pk=[];(st.create_definitions||[]).forEach(function(d){if(d.constraint_type==='primary key'&&d.definition)d.definition.forEach(function(c){pk.push(c.column);});});
        html+='<h3 style="font-size:.95rem;color:var(--accent);margin:.8rem 0 .3rem">'+tbl+'</h3><table><tr><td>'+t('b_ddlparse_col_column')+'</td><td>'+t('b_ddlparse_col_datatype')+'</td><td>'+t('b_ddlparse_col_null')+'</td><td>'+t('b_ddlparse_col_key')+'</td><td>'+t('b_ddlparse_col_default')+'</td></tr>';
        (st.create_definitions||[]).forEach(function(d){if(d.resource!=='column')return;
          var col=d.column.column;var dt=d.definition.dataType+(d.definition.length?'('+d.definition.length+')':'');
          var nn=(d.nullable&&d.nullable.type==='not null')?'N':'Y';
          var key=pk.indexOf(col)>=0?'PK':'';var def=d.default_val&&d.default_val.value?(d.default_val.value.value!==undefined?d.default_val.value.value:''):'';
          html+='<tr><td><b>'+col+'</b></td><td>'+dt+'</td><td>'+nn+'</td><td>'+key+'</td><td>'+def+'</td></tr>';});
        html+='</table>';});
      $('res').innerHTML=html||'<span class="err">'+t('b_ddlparse_no_table')+'</span>';
    }catch(e){$('res').innerHTML='';$('err').textContent='⚠️ '+t('b_ddlparse_parse_error')+': '+e.message;}}
  $('in').addEventListener('input',run);run();
  window.onI18n=run;
</script>
</body>
