<script>
function fwpolicyRender(){
AuditKit.register({mount:'#app',key:'fwpolicy',cols:[
    {k:'no',label:t('b_fwpolicy_col_no'),w:'50px',type:'num'},{k:'src',label:t('b_fwpolicy_col_src'),w:'110px'},{k:'dst',label:t('b_fwpolicy_col_dst'),w:'110px'},
    {k:'port',label:t('b_fwpolicy_col_port'),w:'80px'},{k:'proto',label:t('b_fwpolicy_col_proto'),type:'select',opts:['TCP','UDP','ICMP','ANY']},
    {k:'action',label:t('b_fwpolicy_col_action'),type:'select',opts:[t('b_fwpolicy_allow'),t('b_fwpolicy_deny')]},{k:'desc',label:t('b_fwpolicy_col_desc'),w:'120px',type:'area'}],
    seed:[{no:'1',src:'192.168.1.0/24',dst:'10.0.0.10',port:'443',proto:'TCP',action:t('b_fwpolicy_allow'),desc:t('b_fwpolicy_seed_desc')}],
    summary:function(rows){var allow=rows.filter(function(r){return r.action===t('b_fwpolicy_allow');}).length;
      var risky=rows.filter(function(r){return r.action===t('b_fwpolicy_allow')&&/any/i.test(r.src)&&/any/i.test(r.dst)&&(/any/i.test(r.port)||!r.port);}).length;
      return '<div class="ak-rate"><b>'+rows.length+t('b_fwpolicy_count_unit')+'</b> <span>· '+t('b_fwpolicy_allow')+' '+allow+' · '+t('b_fwpolicy_deny')+' '+(rows.length-allow)+(risky?' · <span style="color:#dc2626">⚠️ '+t('b_fwpolicy_risky')+' '+risky+t('b_fwpolicy_count_unit')+'</span>':'')+'</span></div>';}});
}
window.onI18n = fwpolicyRender;
fwpolicyRender();
</script>
