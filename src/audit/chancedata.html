<div class="toolwrap" style="max-width:1000px;">

  <div class="card" style="max-width:none;">
    <div class="frm"><label><span data-i18n="b_chancedata_label_rows">행 수</span><input type="number" id="n" value="10" min="1" max="1000"></label><label><span data-i18n="b_chancedata_label_seed">시드(선택)</span><input type="text" id="seed" data-i18n-ph="b_chancedata_seed_ph" placeholder="비우면 랜덤"></label><button class="btn" id="gen" type="button" data-i18n="b_chancedata_btn_gen">생성</button><button class="btn btn-ghost" id="csv" type="button" data-i18n="b_chancedata_btn_csv">⬇️ CSV</button><button class="btn btn-ghost" id="json" type="button" data-i18n="b_chancedata_btn_json">📋 JSON</button></div><label style="font-weight:700;font-size:.85rem" data-i18n-html="b_chancedata_col_def_label">컬럼 정의 (한 줄에 <code>컬럼명=타입</code>)</label><textarea class="in" id="cols" spellcheck="false" style="min-height:120px">id=정수\nname=이름\nemail=이메일\nphone=전화\ncompany=회사\njoined=날짜\nactive=불리언</textarea><div style="font-size:.8rem;color:var(--muted);margin:.3rem 0" data-i18n="b_chancedata_types_hint">타입: 이름·이메일·전화·주소·도시·국가·회사·정수·금액·날짜·불리언·문장·단어·GUID·IP·나이</div><div class="res" id="res" style="overflow-x:auto"></div>

var $=function(i){return document.getElementById(i);};var rows=[],cols=[];function gen(){var C=$("seed").value?new Chance($("seed").value):new Chance();var M={"이름":function(){return C.name();},"이메일":function(){return C.email();},"전화":function(){return C.phone();},"주소":function(){return C.address();},"도시":function(){return C.city();},"국가":function(){return C.country({full:true});},"회사":function(){return C.company();},"정수":function(){return C.integer({min:1,max:1000});},"금액":function(){return C.integer({min:1000,max:1000000});},"날짜":function(){return C.date({string:true,year:C.integer({min:2020,max:2025})});},"불리언":function(){return C.bool();},"문장":function(){return C.sentence({words:6});},"단어":function(){return C.word();},"GUID":function(){return C.guid();},"IP":function(){return C.ip();},"나이":function(){return C.age();}};cols=$("cols").value.replace(/\\n/g,"\n").split(/\r?\n/).map(function(l){var p=l.split("=");return {name:(p[0]||"").trim(),type:(p[1]||p[0]||"").trim()};}).filter(function(c){return c.name;});var n=Math.max(1,Math.min(1000,+$("n").value||10));rows=[];for(var r=0;r<n;r++){var o={};cols.forEach(function(c){var f=M[c.type]||function(){return C.word();};o[c.name]=f();});rows.push(o);}$("res").innerHTML="<table><tr>"+cols.map(function(c){return "<td><b>"+c.name+"</b></td>";}).join("")+"</tr>"+rows.slice(0,100).map(function(o){return "<tr>"+cols.map(function(c){return "<td>"+String(o[c.name])+"</td>";}).join("")+"</tr>";}).join("")+"</table>";}$("gen").addEventListener("click",gen);$("csv").addEventListener("click",function(){if(!rows.length)gen();AuditKit.csv("testdata.csv",[cols.map(function(c){return c.name;})].concat(rows.map(function(o){return cols.map(function(c){return o[c.name];});})));});$("json").addEventListener("click",function(){if(!rows.length)gen();navigator.clipboard.writeText(JSON.stringify(rows,null,2)).then(function(){AuditKit.toast(t('b_chancedata_toast_json_copied'));});});gen();window.onI18n=function(){gen();};
</script>
