<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_retention_title">보유기간·파기일정 계산기</h1>
  <p class="sub" data-i18n="b_retention_sub">수집일과 보유기간으로 파기 예정일을 계산합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm">
    <label><span data-i18n="b_retention_label_start">수집일</span><input type="date" id="start"></label>
    <label><span data-i18n="b_retention_label_num">보유기간</span><input type="number" id="num" value="3"></label>
    <label><span data-i18n="b_retention_label_unit">단위</span><select id="unit"><option value="y" data-i18n="b_retention_unit_y">년</option><option value="m" data-i18n="b_retention_unit_m">개월</option><option value="d" data-i18n="b_retention_unit_d">일</option></select></label>
  </div><div class="res" id="res"></div>
    <div class="note" data-i18n="b_retention_note">법정 보유기간 예: 계약·청약철회 5년, 대금결제 5년, 소비자 불만·분쟁 3년, 표시·광고 6개월, 통신비밀보호법 접속기록 3개월(통신) 등. 실제 적용 법령을 확인하세요.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};function pad(n){return(n<10?'0':'')+n;}
  (function(){var n=new Date();$('start').value=n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate());})();
  function run(){var s=new Date($('start').value);if(isNaN(s)){$('res').innerHTML=t('b_retention_err_no_date');return;}
    var num=+$('num').value||0,u=$('unit').value,d=new Date(s);
    if(u==='y')d.setFullYear(d.getFullYear()+num);else if(u==='m')d.setMonth(d.getMonth()+num);else d.setDate(d.getDate()+num);
    var days=Math.ceil((d-new Date())/86400000);
    var daysLabel=days<0?t('b_retention_expired').replace('{n}',(-days)):'D-'+days;
    $('res').innerHTML='<div class="big">'+d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'</div><table><tr><td>'+t('b_retention_col_destdate')+'</td><td><b>'+d.toISOString().slice(0,10)+'</b></td></tr><tr><td>'+t('b_retention_col_remain')+'</td><td><b style="color:'+(days<0?'#dc2626':days<30?'#d97706':'#16a34a')+'">'+daysLabel+'</b></td></tr></table>';}
  ['start','num','unit'].forEach(function(i){$(i).addEventListener('input',run);$(i).addEventListener('change',run);});run();
  window.onI18n=run;
</script>
</body>
