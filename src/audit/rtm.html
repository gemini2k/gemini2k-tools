<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_rtm_h1">요구사항 추적표 (RTM)</h1>
  <p class="sub" data-i18n="b_rtm_sub">요구사항이 설계·구현·시험까지 빠짐없이 연결됐는지 추적합니다.</p>
  <div class="card" style="max-width:none;">
    <div id="app"></div>

<script src="audit-kit.js"></script><script src="tool-shell.js"></script>
<script>
(function(){
  function buildCols(){
    return [
      {k:'rid',label:t('b_rtm_col_rid'),w:'90px'},
      {k:'name',label:t('b_rtm_col_name'),w:'150px',type:'area'},
      {k:'type',label:t('b_rtm_col_type'),type:'select',opts:[t('b_rtm_opt_func'),t('b_rtm_opt_nonfunc'),t('b_rtm_opt_data'),t('b_rtm_opt_iface'),t('b_rtm_opt_sec')]},
      {k:'pri',label:t('b_rtm_col_pri'),type:'select',opts:[t('b_rtm_opt_high'),t('b_rtm_opt_mid'),t('b_rtm_opt_low')]},
      {k:'design',label:t('b_rtm_col_design'),w:'110px',type:'area'},
      {k:'impl',label:t('b_rtm_col_impl'),w:'110px',type:'area'},
      {k:'tc',label:t('b_rtm_col_tc'),w:'90px'},
      {k:'status',label:t('b_rtm_col_status'),type:'select',opts:[t('b_rtm_st_notstart'),t('b_rtm_st_inprog'),t('b_rtm_st_done'),t('b_rtm_st_hold')]}
    ];
  }
  function buildSummary(rows){
    var n=rows.length,done=rows.filter(function(r){return r.status===t('b_rtm_st_done');}).length,miss=rows.filter(function(r){return !r.tc;}).length;
    return '<div class="ak-rate"><b>'+(n?Math.round(done/n*100):0)+'%</b> '+t('b_rtm_sum_done')+' <span>('+done+'/'+n+') · '+t('b_rtm_sum_miss_pre')+miss+t('b_rtm_sum_miss_post')+'</span></div><div class="ak-bar2"><i style="width:'+(n?done/n*100:0)+'%"></i></div>';
  }
  var kit;
  function mountKit(){
    var app=document.getElementById('app');
    app.innerHTML='';
    kit=AuditKit.register({mount:'#app',key:'rtm',cols:buildCols(),
      seed:[{rid:'REQ-001',name:t('b_rtm_seed1_name'),type:t('b_rtm_opt_func'),pri:t('b_rtm_opt_high'),design:t('b_rtm_seed1_design'),impl:'LoginCtrl',tc:'TC-001',status:t('b_rtm_st_done')},{rid:'REQ-002',name:t('b_rtm_seed2_name'),type:t('b_rtm_opt_nonfunc'),pri:t('b_rtm_opt_mid'),design:t('b_rtm_seed2_design'),impl:'',tc:'',status:t('b_rtm_st_inprog')}],
      summary:buildSummary});
  }
  mountKit();
  window.onI18n=function(){ mountKit(); };
})();
</script>
