<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_decisiontable_title">결정표(Decision Table) 생성</h1>
  <p class="sub" data-i18n="b_decisiontable_sub">조건들의 모든 T/F 조합으로 규칙 표를 만듭니다.</p>
  <div class="card" style="max-width:none;">
    <textarea class="in" id="in" spellcheck="false" data-i18n-ph="b_decisiontable_placeholder">회원 등급이 VIP인가
쿠폰을 보유했는가
구매액이 10만원 이상인가</textarea><div class="frm" style="margin-top:.5rem"><button class="btn" id="run" type="button" data-i18n="b_decisiontable_btn_run">결정표 생성</button><button class="btn btn-ghost" id="csv" type="button" data-i18n="b_decisiontable_btn_csv">⬇️ CSV</button></div><div class="err" id="err"></div><div class="res" id="res" style="overflow-x:auto"></div>
    <div class="note" data-i18n="b_decisiontable_note">한 줄에 조건 하나씩 입력하면 2ⁿ개 규칙 열이 생성됩니다(조건 ≤ 8 권장). 각 규칙은 조건 조합 하나이며, 기대 액션을 채워 케이스로 쓰세요. CSV로 내보낼 수 있습니다.</div>
  </div>
</div>
<script src="audit-kit.js"></script><script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};var grid=[];function run(){$("err").textContent="";var conds=$("in").value.replace(/\\n/g,"\n").split(/\r?\n/).map(function(s){return s.trim();}).filter(Boolean);if(!conds.length){$("err").textContent=t("b_decisiontable_err_empty");return;}if(conds.length>8){$("err").textContent=t("b_decisiontable_err_toomany").replace("{n}",conds.length);}var n=conds.length,rules=Math.pow(2,n);grid=[];var head="<tr><td><b>"+t("b_decisiontable_cond_rule")+"</b></td>";for(var r=0;r<rules;r++)head+="<td><b>R"+(r+1)+"</b></td>";head+="</tr>";var body="";conds.forEach(function(c,ci){var row="<tr><td>"+c+"</td>";var rowArr=[c];for(var r=0;r<rules;r++){var tf=((r>>(n-1-ci))&1)?"T":"F";row+="<td style=\"text-align:center;color:"+(tf==="T"?"#16a34a":"#dc2626")+"\">"+tf+"</td>";rowArr.push(tf);}row+="</tr>";body+=row;grid.push(rowArr);});var arow="<tr><td><b>"+t("b_decisiontable_expected_action")+"</b></td>";var actArr=[t("b_decisiontable_expected_action")];for(var r=0;r<rules;r++){arow+="<td><input data-r=\""+r+"\" style=\"width:60px;padding:.2rem;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);color:var(--text)\"></td>";actArr.push("");}arow+="</tr>";grid.push(actArr);$("res").innerHTML="<div class=\"ak-rate\"><b>"+rules+t("b_decisiontable_rules_count")+"</b></div><table>"+head+body+arow+"</table>";$("res").querySelectorAll("input[data-r]").forEach(function(inp){inp.addEventListener("input",function(){grid[grid.length-1][+inp.dataset.r+1]=inp.value;});});}window.onI18n=run;$("run").addEventListener("click",run);$("csv").addEventListener("click",function(){if(!grid.length)run();AuditKit.csv("decision-table.csv",grid);});run();
</script>
