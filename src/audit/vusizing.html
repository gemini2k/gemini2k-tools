<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_vusizing_title">부하시험 VU 산정기</h1>
  <p class="sub" data-i18n="b_vusizing_sub">목표 처리량과 응답시간·Think time으로 필요한 가상사용자 수를 계산합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm"><label><span data-i18n="b_vusizing_lbl_tp">목표 처리량</span><input type="number" id="tp" value="50" step="any"></label><label><span data-i18n="b_vusizing_lbl_unit">단위</span><select id="unit"><option value="1" data-i18n="b_vusizing_unit_tps">초당 (TPS)</option><option value="0.0166667" data-i18n="b_vusizing_unit_rpm">분당</option><option value="0.000277778" data-i18n="b_vusizing_unit_rph">시간당</option></select></label><label><span data-i18n="b_vusizing_lbl_rt">평균 응답시간 (초)</span><input type="number" id="rt" value="0.3" step="any"></label><label><span data-i18n="b_vusizing_lbl_think">Think time (초)</span><input type="number" id="think" value="3" step="any"></label><label><span data-i18n="b_vusizing_lbl_peak">피크 계수</span><input type="number" id="peak" value="1.5" step="any"></label></div><div class="res" id="res"></div>
    <div class="note" data-i18n="b_vusizing_note">필요 VU ≈ 피크 처리량(TPS) × (응답시간 + Think time). 리틀의 법칙 기반이며, 실제값은 부하 패턴·시스템 상태에 따라 달라질 수 있으니 여유를 두세요.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};function run(){var tps=(+$("tp").value||0)*(+$("unit").value),rt=+$("rt").value||0,think=+$("think").value||0,peak=+$("peak").value||1;var tpsPeak=tps*peak,vu=tpsPeak*(rt+think);var loc={ko:'ko-KR',en:'en-US',zh:'zh-CN',ja:'ja-JP'}[typeof curLang==='function'?curLang():'ko'];$("res").innerHTML="<div class=\"big\">"+t('b_vusizing_result_prefix')+" "+Math.ceil(vu)+"</div><table><tr><td>"+t('b_vusizing_row_converted_tps')+"</td><td><b>"+tps.toFixed(2)+" TPS</b> ("+Math.round(tps*3600).toLocaleString(loc)+" "+t('b_vusizing_per_hour')+")</td></tr><tr><td>"+t('b_vusizing_row_peak_tps')+"</td><td><b>"+tpsPeak.toFixed(2)+" TPS</b> (\xd7"+peak+")</td></tr><tr><td>"+t('b_vusizing_row_vu_tps')+"</td><td><b>"+(rt+think?(1/(rt+think)).toFixed(3):"-")+" TPS</b></td></tr><tr><td>"+t('b_vusizing_row_rampup')+"</td><td><b>"+Math.max(1,Math.ceil(vu/10))+t('b_vusizing_min')+"</b> ("+t('b_vusizing_rampup_desc')+")</td></tr></table>";}window.onI18n=run;["tp","unit","rt","think","peak"].forEach(function(i){$(i).addEventListener("input",run);$(i).addEventListener("change",run);});run();
</script>
