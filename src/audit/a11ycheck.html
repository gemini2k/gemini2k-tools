<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_a11ycheck_title">웹 접근성 자동 점검</h1>
  <p class="sub" data-i18n="b_a11ycheck_sub">HTML의 접근성 위반을 axe 엔진으로 자동 진단합니다.</p>
  <div class="card" style="max-width:none;">
    <textarea class="in" id="in" spellcheck="false">&lt;img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="&gt;
&lt;button&gt;&lt;/button&gt;
&lt;input type="text"&gt;
&lt;a href="#"&gt;여기&lt;/a&gt;
&lt;p style="color:#bbb;background:#ccc"&gt;저대비 텍스트&lt;/p&gt;</textarea><div class="frm" style="margin-top:.5rem"><button class="btn" id="run" type="button" data-i18n="b_a11ycheck_btn_run">점검 실행</button></div><div class="err" id="err"></div><div class="res" id="res"></div><div id="sandbox" style="position:absolute;left:-99999px;top:0;width:820px;"></div>
    <div class="note" data-i18n-html="b_a11ycheck_note">오픈소스 <b>axe-core</b>(MPL-2.0, Deque, <a href="https://github.com/dequelabs/axe-core" target="_blank" rel="noopener">dequelabs/axe-core</a>)를 자체 호스팅합니다. 자동 점검은 일부 항목만 커버하므로 수동 점검(KWCAG)과 병행하세요. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/axe-4/axe.min.js"></script><script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  function run(){$('err').textContent='';$('res').innerHTML=t('b_a11ycheck_checking');
    var sb=$('sandbox');sb.innerHTML=$('in').value;
    try{ axe.run(sb,{resultTypes:['violations']},function(err,res){
      sb.innerHTML='';
      if(err){$('res').innerHTML='';$('err').textContent='⚠️ '+err.message;return;}
      var v=res.violations;if(!v.length){$('res').innerHTML='<span style="color:#16a34a">'+t('b_a11ycheck_no_violations')+'</span>';return;}
      var imp={critical:'#9333ea',serious:'#dc2626',moderate:'#d97706',minor:'#0891b2'};
      $('res').innerHTML='<div class="ak-rate"><b>'+v.length+t('b_a11ycheck_violations_count')+'</div>'+v.map(function(x){return '<div style="border-bottom:1px solid var(--border);padding:.5rem 0"><b style="color:'+(imp[x.impact]||'#666')+'">['+(x.impact||'')+']</b> '+x.help+' <span style="color:var(--muted)">('+x.nodes.length+t('b_a11ycheck_places')+')</span></div>';}).join('');
    }); }catch(e){$('res').innerHTML='';$('err').textContent='⚠️ '+e.message;}}
  $('run').addEventListener('click',run);setTimeout(run,400);
  window.onI18n=run;
</script>
</body>
