<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_fp_title">기능점수(FP) 간이 산정</h1>
  <p class="sub" data-i18n="b_fp_sub">데이터·트랜잭션 기능 개수로 미보정 기능점수(UFP)를 추정합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm">
    <label><span data-i18n="b_fp_lbl_ilf">내부논리파일(ILF)</span><input type="number" id="ilf" value="8"></label>
    <label><span data-i18n="b_fp_lbl_eif">외부연계파일(EIF)</span><input type="number" id="eif" value="3"></label>
    <label><span data-i18n="b_fp_lbl_ei">외부입력(EI)</span><input type="number" id="ei" value="20"></label>
    <label><span data-i18n="b_fp_lbl_eo">외부출력(EO)</span><input type="number" id="eo" value="12"></label>
    <label><span data-i18n="b_fp_lbl_eq">외부조회(EQ)</span><input type="number" id="eq" value="15"></label>
  </div><div class="res" id="res"></div>
    <div class="note" data-i18n="b_fp_note">간이법(평균복잡도) 가중치: 내부논리파일 7.5 · 외부연계파일 5.4 · 외부입력 4.0 · 외부출력 5.2 · 외부조회 3.9. 실제 대가산정은 보정계수가 필요합니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};var W={ilf:7.5,eif:5.4,ei:4.0,eo:5.2,eq:3.9};
  function run(){var tmp=0,rows='';
    [[' ilf',t('b_fp_row_ilf')],[' eif',t('b_fp_row_eif')],[' ei',t('b_fp_row_ei')],[' eo',t('b_fp_row_eo')],[' eq',t('b_fp_row_eq')]].forEach(function(x){var id=x[0].trim(),c=+$(id).value||0,fp=c*W[id];tmp+=fp;rows+='<tr><td>'+x[1]+' ('+c+'×'+W[id]+')</td><td><b>'+fp.toFixed(1)+'</b></td></tr>';});
    $('res').innerHTML='<div class="big">UFP '+tmp.toFixed(1)+' FP</div><table>'+rows+'</table>';}
  window.onI18n=run;
  ['ilf','eif','ei','eo','eq'].forEach(function(i){$(i).addEventListener('input',run);});run();
</script>
