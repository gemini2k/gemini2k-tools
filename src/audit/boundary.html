<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_boundary_title">경계값·동등분할 도우미</h1>
  <p class="sub" data-i18n="b_boundary_sub">입력 범위로 경계값(BVA)·동등분할(EP) 테스트 값을 만듭니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm"><label><span data-i18n="b_boundary_label_min">최소값</span><input type="number" id="min" value="1"></label><label><span data-i18n="b_boundary_label_max">최대값</span><input type="number" id="max" value="100"></label><label><span data-i18n="b_boundary_label_step">증분(단위)</span><input type="number" id="step" value="1"></label></div><div class="res" id="res"></div>
    <div class="note" data-i18n="b_boundary_note">경계값 분석은 경계 주변(min−1, min, min+1 …)에서 결함이 자주 발생한다는 점을, 동등분할은 같은 처리 그룹에서 대표값 하나만 테스트한다는 점을 활용합니다.</div>
  </div>
</div>

<script>
var $=function(i){return document.getElementById(i);};function run(){var mn=+$("min").value,mx=+$("max").value,s=+$("step").value||1;if(isNaN(mn)||isNaN(mx)||mn>mx){$("res").innerHTML=t('b_boundary_err_minmax');return;}var nominal=Math.round((mn+mx)/2);var bva=[[mn-s,t('b_boundary_bva_below_min'),"#dc2626"],[mn,t('b_boundary_bva_at_min'),"#16a34a"],[mn+s,t('b_boundary_bva_above_min'),"#16a34a"],[nominal,t('b_boundary_bva_nominal'),"#16a34a"],[mx-s,t('b_boundary_bva_below_max'),"#16a34a"],[mx,t('b_boundary_bva_at_max'),"#16a34a"],[mx+s,t('b_boundary_bva_above_max'),"#dc2626"]];var html="<div class=\"ak-rate\">"+t('b_boundary_section_bva')+"</div><table>"+bva.map(function(b){return "<tr><td><b>"+b[0]+"</b></td><td style=\"color:"+b[2]+"\">"+b[1]+"</td></tr>";}).join("")+"</table>";html+="<div class=\"ak-rate\" style=\"margin-top:.8rem\">"+t('b_boundary_section_ep')+"</div><table><tr><td>"+t('b_boundary_ep_invalid_low')+" (< "+mn+")</td><td><b>"+(mn-s)+"</b></td></tr><tr><td>"+t('b_boundary_ep_valid')+" ("+mn+" ~ "+mx+")</td><td><b>"+nominal+"</b></td></tr><tr><td>"+t('b_boundary_ep_invalid_high')+" (> "+mx+")</td><td><b>"+(mx+s)+"</b></td></tr></table>";$("res").innerHTML=html;}["min","max","step"].forEach(function(i){$(i).addEventListener("input",run);});run();window.onI18n=run;
