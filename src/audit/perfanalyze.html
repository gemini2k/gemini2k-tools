<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_perfanalyze_title">성능시험 결과 분석</h1>
  <p class="sub" data-i18n="b_perfanalyze_sub">응답시간 데이터로 백분위수·TPS 등 성능 지표를 분석합니다.</p>
  <div class="card" style="max-width:none;">
    <textarea class="in" id="in" spellcheck="false">120
135
98
210
156
142
880
175
130
145
160
2200
118</textarea><div class="res" id="res" style="margin-top:.6rem"></div>
    <div class="note" data-i18n="b_perfanalyze_note">한 줄에 응답시간(ms) 하나씩 붙여넣으세요. p95/p99는 SLA 판정에 중요합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  function pct(a,p){if(!a.length)return 0;var idx=Math.ceil(p/100*a.length)-1;return a[Math.max(0,Math.min(a.length-1,idx))];}
  function run(){var v=$('in').value.split(/[\s,]+/).map(Number).filter(function(x){return !isNaN(x);});
    if(!v.length){$('res').innerHTML=t('b_perfanalyze_no_data');return;}
    var s=v.slice().sort(function(a,b){return a-b;});var n=v.length,sum=v.reduce(function(a,b){return a+b;},0),avg=sum/n;
    var sd=Math.sqrt(v.reduce(function(a,b){return a+(b-avg)*(b-avg);},0)/n);
    var tps=avg>0?1000/avg:0;
    $('res').innerHTML='<div class="big">p95 '+pct(s,95)+' ms</div><table>'+
    '<tr><td>'+t('b_perfanalyze_sample_count')+'</td><td><b>'+n+'</b></td></tr>'+
    '<tr><td>'+t('b_perfanalyze_avg')+'</td><td><b>'+avg.toFixed(1)+' ms</b></td></tr>'+
    '<tr><td>'+t('b_perfanalyze_min_max')+'</td><td><b>'+s[0]+' / '+s[n-1]+' ms</b></td></tr>'+
    '<tr><td>'+t('b_perfanalyze_stddev')+'</td><td><b>'+sd.toFixed(1)+' ms</b></td></tr>'+
    '<tr><td>'+t('b_perfanalyze_p50')+'</td><td><b>'+pct(s,50)+' ms</b></td></tr>'+
    '<tr><td>'+t('b_perfanalyze_p90')+'</td><td><b>'+pct(s,90)+' ms</b></td></tr>'+
    '<tr><td>'+t('b_perfanalyze_p95')+'</td><td><b>'+pct(s,95)+' ms</b></td></tr>'+
    '<tr><td>'+t('b_perfanalyze_p99')+'</td><td><b>'+pct(s,99)+' ms</b></td></tr>'+
    '<tr><td>'+t('b_perfanalyze_tps')+'</td><td><b>'+tps.toFixed(1)+' TPS</b></td></tr></table>';}
  $('in').addEventListener('input',run);
  window.onI18n=run;
  run();
</script>
</body>
