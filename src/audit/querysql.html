<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_querysql_title">CSV/JSON SQL 쿼리 실행</h1>
  <p class="sub" data-i18n="b_querysql_sub">표 데이터에 SQL을 바로 실행해 집계·필터·정렬합니다. 테이블명은 t 또는 data 입니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm"><label><span data-i18n="b_querysql_fmt_label">입력 형식</span> <select id="fmt"><option value="csv">CSV</option><option value="json" data-i18n="b_querysql_fmt_json">JSON 배열</option></select></label></div><textarea class="in" id="data" spellcheck="false">name,age,city\n김철수,30,서울\n이영희,25,부산\n박민수,35,서울\n최지우,28,부산\n정해인,42,서울</textarea><div class="frm" style="margin-top:.5rem"><input type="text" id="q" value="SELECT city, COUNT(*) AS n, ROUND(AVG(age),1) AS avg_age FROM t GROUP BY city ORDER BY n DESC" style="flex:1;min-width:240px;font-family:ui-monospace,monospace"><button class="btn" id="run" type="button" data-i18n="b_querysql_run">실행</button></div><div class="err" id="err"></div><div class="res" id="res" style="overflow-x:auto"></div>
    <div class="note" data-i18n-html="b_querysql_note">오픈소스 <b>AlaSQL</b>(MIT, <a href="https://github.com/AlaSQL/alasql" target="_blank" rel="noopener">AlaSQL/alasql</a>)을 자체 호스팅합니다. 데이터는 전송되지 않고 브라우저에서만 처리됩니다.</div>
  </div>
</div>
<script src="/vendor/alasql-4/alasql.min.js"></script><script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};function parse(){var raw=$("data").value.replace(/\\n/g,"\n").trim();if($("fmt").value==="json")return JSON.parse(raw);var ls=raw.split(/\r?\n/).filter(Boolean);var h=ls[0].split(",").map(function(x){return x.trim();});return ls.slice(1).map(function(l){var c=l.split(",");var o={};h.forEach(function(k,i){var v=(c[i]||"").trim();o[k]=/^-?\d+(\.\d+)?$/.test(v)?+v:v;});return o;});}function run(){$("err").textContent="";try{var rows=parse();["t","data"].forEach(function(tn){alasql("DROP TABLE IF EXISTS "+tn);alasql("CREATE TABLE "+tn);alasql.tables[tn].data=rows;});var r=alasql($("q").value);if(!Array.isArray(r)){$("res").innerHTML="<div class=\"ak-rate\">"+t('b_querysql_done')+"</div>";return;}if(!r.length){$("res").innerHTML="("+t('b_querysql_zero_rows')+")";return;}var cols=Object.keys(r[0]);var html="<table><tr>"+cols.map(function(c){return "<td><b>"+c+"</b></td>";}).join("")+"</tr>"+r.slice(0,200).map(function(row){return "<tr>"+cols.map(function(c){return "<td>"+(row[c]==null?"":String(row[c]))+"</td>";}).join("")+"</tr>";}).join("")+"</table>";$("res").innerHTML="<div class=\"ak-rate\"><b>"+r.length+t('b_querysql_rows_unit')+"</b></div>"+html;}catch(e){$("res").innerHTML="";$("err").textContent="⚠️ "+e.message;}}$("run").addEventListener("click",run);["data","q","fmt"].forEach(function(i){$(i).addEventListener("change",run);});window.onI18n=run;run();
</script>
