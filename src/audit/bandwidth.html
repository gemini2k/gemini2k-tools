<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_bandwidth_title">대역폭·전송시간 계산기</h1>
  <p class="sub" data-i18n="b_bandwidth_sub">전송시간과 필요 회선 대역폭을 계산합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm">
    <label><span data-i18n="b_bandwidth_label_data">데이터량</span><input type="number" id="data" value="500"></label>
    <label><span data-i18n="b_bandwidth_label_unit">단위</span><select id="unit"><option value="1">MB</option><option value="1024">GB</option></select></label>
    <label><span data-i18n="b_bandwidth_label_speed">회선속도(Mbps)</span><input type="number" id="speed" value="100"></label>
    <label><span data-i18n="b_bandwidth_label_eff">효율(%)</span><input type="number" id="eff" value="80"></label>
  </div><div class="frm">
    <label><span data-i18n="b_bandwidth_label_users">동시 사용자</span><input type="number" id="users" value="200"></label>
    <label><span data-i18n="b_bandwidth_label_per">사용자당 대역(Kbps)</span><input type="number" id="per" value="256"></label>
  </div><div class="res" id="res"></div>
    <div class="note" data-i18n="b_bandwidth_note">전송시간 = 데이터량 ÷ (회선속도 × 효율). bit/byte 환산(×8)과 회선 효율을 반영합니다. 참고용 추정입니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  function dur(s){if(s<60)return s.toFixed(1)+t('b_bandwidth_sec');if(s<3600)return (s/60).toFixed(1)+t('b_bandwidth_min');return (s/3600).toFixed(2)+t('b_bandwidth_hour');}
  function run(){var mb=(+$('data').value||0)*(+$('unit').value),spd=+$('speed').value||1,eff=(+$('eff').value||100)/100;
    var sec=(mb*8)/(spd*eff);
    var u=+$('users').value||0,per=+$('per').value||0;var needMbps=u*per/1024;
    $('res').innerHTML='<div class="big">'+dur(sec)+'</div><table>'+
    '<tr><td>'+t('b_bandwidth_row_transfer').replace('{mb}',mb).replace('{speed}',spd)+'</td><td><b>'+dur(sec)+'</b></td></tr>'+
    '<tr><td>'+t('b_bandwidth_row_need').replace('{u}',u)+'</td><td><b>'+needMbps.toFixed(1)+' Mbps</b></td></tr>'+
    '<tr><td>'+t('b_bandwidth_row_recommend')+'</td><td><b>'+(needMbps*1.3).toFixed(1)+' Mbps</b></td></tr></table>';}
  window.onI18n=run;
  ['data','unit','speed','eff','users','per'].forEach(function(i){$(i).addEventListener('input',run);$(i).addEventListener('change',run);});run();
</script>
