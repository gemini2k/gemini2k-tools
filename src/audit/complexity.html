<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_complexity_title">코드 복잡도 분석</h1>
  <p class="sub" data-i18n="b_complexity_sub">JavaScript 함수별 순환복잡도를 계산합니다.</p>
  <div class="card" style="max-width:none;">
    <textarea class="in" id="in" spellcheck="false">function classify(n) {
  if (n < 0) return 'neg';
  else if (n === 0) return 'zero';
  for (var i = 0; i < n; i++) {
    if (i % 2 === 0 && i > 10) continue;
  }
  return n > 100 ? 'big' : 'small';
}</textarea><div class="err" id="err"></div><div class="res" id="res" style="margin-top:.6rem"></div>
    <div class="note" data-i18n-html="b_complexity_note">오픈소스 <b>acorn</b>(MIT) 파서로 AST를 분석합니다. 순환복잡도 10 이하 권장, 20 초과는 리팩터링 대상입니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/acorn-8/acorn.js"></script><script src="tool-shell.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
  function walk(node,fn){if(!node||typeof node.type!=='string')return;fn(node);for(var k in node){if(k==='type')continue;var v=node[k];if(Array.isArray(v))v.forEach(function(c){if(c&&c.type)walk(c,fn);});else if(v&&v.type)walk(v,fn);}}
  function cc(node){var c=1;walk(node,function(n){if(/IfStatement|ForStatement|ForInStatement|ForOfStatement|WhileStatement|DoWhileStatement|CatchClause|ConditionalExpression/.test(n.type))c++;else if(n.type==='SwitchCase'&&n.test)c++;else if(n.type==='LogicalExpression'&&(n.operator==='&&'||n.operator==='||'))c++;});return c;}
  function run(){$('err').textContent='';try{var ast=acorn.parse($('in').value,{ecmaVersion:'latest'});var fns=[];
    walk(ast,function(n){if(/FunctionDeclaration|FunctionExpression|ArrowFunctionExpression/.test(n.type)){var name=(n.id&&n.id.name)||t('b_complexity_anon');fns.push({name:name,cc:cc(n)});}});
    if(!fns.length){fns.push({name:t('b_complexity_whole'),cc:cc(ast)});}
    var rows=fns.map(function(f){var col=f.cc<=10?'#16a34a':f.cc<=20?'#d97706':'#dc2626';return '<tr><td><b>'+f.name+'</b></td><td><b style="color:'+col+'">'+f.cc+'</b> '+(f.cc<=10?t('b_complexity_good'):f.cc<=20?t('b_complexity_warn'):t('b_complexity_danger'))+'</td></tr>';}).join('');
    var max=Math.max.apply(null,fns.map(function(f){return f.cc;}));
    $('res').innerHTML='<div class="ak-rate"><b>'+t('b_complexity_max_prefix')+max+'</b> <span>· '+t('b_complexity_fn_count_prefix')+fns.length+t('b_complexity_fn_count_suffix')+'</span></div><table>'+rows+'</table>';
  }catch(e){$('res').innerHTML='';$('err').textContent='⚠️ '+t('b_complexity_parse_error')+e.message;}}
  $('in').addEventListener('input',run);run();
  window.onI18n=run;
</script>
