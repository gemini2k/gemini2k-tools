<body>
<div class="toolwrap" style="max-width:1000px;">
  <h1 data-i18n="b_spreadsheet_title">온라인 스프레드시트</h1>
  <p class="sub" data-i18n="b_spreadsheet_sub">엑셀처럼 셀을 편집하세요. 작업한 표는 CSV로 내보낼 수 있어요.</p>
  <div class="card" style="max-width:none;">
    <div class="actions"><button class="btn btn-ghost" id="csv" type="button" data-i18n="b_spreadsheet_btn_csv">⬇️ CSV 내보내기</button></div>
    <div id="sheet"></div>
    <div class="note" data-i18n-html="b_spreadsheet_note">오픈소스 <b>x-spreadsheet</b>(MIT, <a href="https://github.com/myliang/x-spreadsheet" target="_blank" rel="noopener">myliang/x-spreadsheet</a>)을 자체 호스팅합니다. 모든 데이터는 브라우저에서만 처리되며 저장되지 않습니다(새로고침 시 초기화).</div>
  </div>
</div>
<script src="/vendor/xspreadsheet-1/xspreadsheet.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var xs=x_spreadsheet('#sheet',{showToolbar:true,showGrid:true,view:{height:function(){return 460;},width:function(){return Math.min(960,document.querySelector('.card').clientWidth-32);}}});
  $('csv').addEventListener('click',function(){
    var data=xs.getData(); var sheet=Array.isArray(data)?data[0]:data; var rows=(sheet&&sheet.rows)||{};
    var maxC=0; Object.keys(rows).forEach(function(r){ if(rows[r]&&rows[r].cells){ Object.keys(rows[r].cells).forEach(function(c){ if(+c+1>maxC)maxC=+c+1; }); } });
    var out=[]; var maxR=0; Object.keys(rows).forEach(function(r){ if(/^\d+$/.test(r)&&+r+1>maxR)maxR=+r+1; });
    for(var r=0;r<maxR;r++){ var line=[]; var cells=(rows[r]&&rows[r].cells)||{};
      for(var c=0;c<maxC;c++){ var v=cells[c]?(cells[c].text||''):''; if(/[",\n]/.test(v))v='"'+v.replace(/"/g,'""')+'"'; line.push(v); } out.push(line.join(',')); }
    var blob=new Blob(['﻿'+out.join('\n')],{type:'text/csv'}); var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sheet.csv';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},120);
  });
</script>
