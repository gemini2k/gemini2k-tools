<div class="toolwrap" style="max-width:760px;">
  <h1 data-i18n="b_docxgen_title">마크다운 → 워드(.docx)</h1>
  <p class="sub" data-i18n-html="b_docxgen_sub">마크다운으로 쓴 글을 워드 문서로 바꿔 줍니다. <b># ## ###</b> 제목, <b>-</b> 목록, <b>**굵게**</b>·<b>*기울임*</b>을 지원합니다.</p>
  <div class="card">
    <textarea id="in" data-i18n-ph="b_docxgen_placeholder"># 업무 보고서

## 개요
이번 주 **주요 업무** 내용을 정리합니다.

## 진행 사항
- 기획안 검토 완료
- *디자인 시안* 2종 작성

## 다음 주 계획

- 피드백 반영</textarea>
    <div class="row"><span data-i18n="b_docxgen_label_fname">제목</span> <input type="text" id="fname" value="document" data-i18n-ph="b_docxgen_ph_fname"/>
      <button class="btn" id="gen" type="button" data-i18n="b_docxgen_btn_gen">📝 DOCX 만들기</button></div>
    <div class="note" data-i18n-html="b_docxgen_note">오픈소스 <b>docx</b>(MIT, <a href="https://github.com/dolanmiu/docx" target="_blank" rel="noopener">dolanmiu/docx</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>

<script src="/vendor/docx-8/index.umd.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function runsFrom(text){ // **bold** *italic*
    var parts=[], re=/(\*\*[^*]+\*\*|\*[^*]+\*)/g, last=0, m;
    while((m=re.exec(text))){ if(m.index>last)parts.push(new docx.TextRun(text.slice(last,m.index)));
      var tmp=m[0]; if(/^\*\*/.test(tmp))parts.push(new docx.TextRun({text:tmp.slice(2,-2),bold:true}));
      else parts.push(new docx.TextRun({text:tmp.slice(1,-1),italics:true})); last=re.lastIndex; }
    if(last<text.length)parts.push(new docx.TextRun(text.slice(last)));
    return parts.length?parts:[new docx.TextRun(text)]; }
  function build(md){ var paras=[];
    md.split(/\r?\n/).forEach(function(l){ var line=l.trim();
      if(/^###\s+/.test(line))paras.push(new docx.Paragraph({children:runsFrom(line.replace(/^###\s+/,'')),heading:docx.HeadingLevel.HEADING_3}));
      else if(/^##\s+/.test(line))paras.push(new docx.Paragraph({children:runsFrom(line.replace(/^##\s+/,'')),heading:docx.HeadingLevel.HEADING_2}));
      else if(/^#\s+/.test(line))paras.push(new docx.Paragraph({children:runsFrom(line.replace(/^#\s+/,'')),heading:docx.HeadingLevel.HEADING_1}));
      else if(/^[-*]\s+/.test(line))paras.push(new docx.Paragraph({children:runsFrom(line.replace(/^[-*]\s+/,'')),bullet:{level:0}}));
      else if(line==='')paras.push(new docx.Paragraph(''));
      else paras.push(new docx.Paragraph({children:runsFrom(line)})); });
    return new docx.Document({sections:[{children:paras}]}); }
  $('gen').addEventListener('click',function(){
    var doc=build($('in').value);
    docx.Packer.toBlob(doc).then(function(blob){
      var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=($('fname').value||'document')+'.docx';
      document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},150);
    });
  });
</script>
