<style>.drop{border:2px dashed var(--border);border-radius:12px;padding:1.6rem;text-align:center;cursor:pointer;color:var(--muted);}
.drop.drag{border-color:var(--accent);background:var(--accent-soft);}

<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_word2html_title">워드(.docx) → HTML·마크다운</h1>
  <p class="sub" data-i18n="b_word2html_sub">워드 문서를 서식이 살아 있는 HTML 또는 마크다운으로 변환합니다.</p>
  <div class="card">
    <div class="drop" id="drop" data-i18n="b_word2html_drop">📄 .docx 파일을 끌어다 놓거나 클릭해서 선택<input type="file" id="file" accept=".docx" hidden/></div>
    <div class="seg" id="seg"><button data-m="html" class="on" type="button">HTML</button><button data-m="md" type="button" data-i18n="b_word2html_btn_md">마크다운</button></div>
    <div class="actions"><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_word2html_btn_copy">📋 복사</button><button class="btn btn-ghost" id="dl" type="button" data-i18n="b_word2html_btn_save">⬇️ 저장</button></div>
    <div class="out" id="out" data-i18n="b_word2html_placeholder">변환된 코드가 여기에 표시됩니다.</div>
    <h3 style="margin:.9rem 0 .3rem;font-size:.95rem;" data-i18n="b_word2html_preview_label">미리보기</h3>
    <div class="prev" id="prev"></div>
    <div class="note" data-i18n-html="b_word2html_note">오픈소스 <b>mammoth.js</b>(BSD-2, <a href="https://github.com/mwilliamson/mammoth.js" target="_blank" rel="noopener">mwilliamson/mammoth.js</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어지며 파일은 업로드되지 않습니다.</div>
  </div>
</div>
<script src="/vendor/mammoth-1/mammoth.browser.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var mode='html', buf=null, htmlText='', mdText='';
  var drop=$('drop'), file=$('file');
  drop.addEventListener('click',function(){file.click();});
  drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('drag');});
  drop.addEventListener('dragleave',function(){drop.classList.remove('drag');});
  drop.addEventListener('drop',function(e){e.preventDefault();drop.classList.remove('drag');if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);});
  file.addEventListener('change',function(){if(file.files[0])load(file.files[0]);});
  function load(f){ if(!/\.docx$/i.test(f.name)){toast(t('b_word2html_err_docx'));return;}
    var r=new FileReader(); r.onload=function(){ buf=r.result; convert(); }; r.readAsArrayBuffer(f); drop.textContent='📄 '+f.name; }
  function convert(){ if(!buf)return;
    mammoth.convertToHtml({arrayBuffer:buf}).then(function(res){ htmlText=res.value; mdText=null; show(); });
    mammoth.convertToMarkdown({arrayBuffer:buf}).then(function(res){ mdText=res.value; if(mode==='md')show(); }); }
  function show(){ var tmp=mode==='html'?htmlText:(mdText||''); $('out').textContent=tmp||t('b_word2html_empty'); $('prev').innerHTML=htmlText; }
  $('seg').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;mode=b.dataset.m;Array.prototype.forEach.call($('seg').children,function(x){x.classList.toggle('on',x===b);});show();});
  $('copy').addEventListener('click',function(){var tmp=$('out').textContent;if(tmp)navigator.clipboard.writeText(tmp).then(function(){toast(t('b_word2html_copied'));});});
  $('dl').addEventListener('click',function(){var tmp=$('out').textContent;if(!tmp)return;var blob=new Blob([tmp],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='word.'+(mode==='html'?'html':'md');document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},120);});
  window.onI18n=function(){
    var outEl=$('out');
    if(outEl&&!buf)outEl.textContent=t('b_word2html_placeholder');
    else if(outEl&&buf)show();
    var dropEl=$('drop');
    if(dropEl&&!buf)dropEl.textContent=t('b_word2html_drop');
  };
</script>
</body>
