<body>
<div class="toolwrap" style="max-width:760px;">
  <h1 data-i18n="b_pptxgen_title">텍스트 → PPT 생성기</h1>
  <p class="sub" data-i18n-html="b_pptxgen_sub">개요를 적으면 파워포인트(.pptx) 초안을 만들어 줍니다. <b># 제목</b>은 새 슬라이드, <b>-</b> 로 시작하면 글머리 기호입니다.</p>
  <div class="card">
    <textarea id="in"># 분기 실적 보고
- 매출 12% 성장
- 신규 고객 340명
- 다음 분기 목표 공유

# 주요 성과
- 신제품 출시 완료
- 고객 만족도 4.6/5
- 비용 8% 절감

# 감사합니다
- 질문을 환영합니다</textarea>
    <div class="row"><span data-i18n="b_pptxgen_theme_label">테마 색</span>
      <select id="theme">
        <option value="2563EB" data-i18n="b_pptxgen_opt_blue">블루</option>
        <option value="059669" data-i18n="b_pptxgen_opt_green">그린</option>
        <option value="DC2626" data-i18n="b_pptxgen_opt_red">레드</option>
        <option value="7C3AED" data-i18n="b_pptxgen_opt_purple">퍼플</option>
        <option value="111827" data-i18n="b_pptxgen_opt_dark">다크</option>
      </select>
      <input type="text" id="fname" value="presentation" data-i18n-ph="b_pptxgen_fname_ph" placeholder="파일명"/>
      <button class="btn" id="gen" type="button" data-i18n="b_pptxgen_btn_gen">📊 PPTX 만들기</button>
      <span class="cnt" id="cnt"></span>
    </div>
    <div class="note" data-i18n-html="b_pptxgen_note">오픈소스 <b>PptxGenJS</b>(MIT, <a href="https://github.com/gitbrent/PptxGenJS" target="_blank" rel="noopener">gitbrent/PptxGenJS</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/pptxgen-3/pptxgen.bundle.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function parse(txt){ var slides=[],cur=null;
    txt.split(/\r?\n/).forEach(function(l){ var tmp=l.trim();
      if(/^#\s+/.test(tmp)){ cur={title:tmp.replace(/^#\s+/,''),bullets:[]}; slides.push(cur); }
      else if(cur&&/^[-*]\s+/.test(tmp)){ cur.bullets.push(tmp.replace(/^[-*]\s+/,'')); }
      else if(cur&&tmp){ cur.bullets.push(tmp); } });
    return slides; }
  function count(){ var n=parse($('in').value).length; $('cnt').textContent=n+t('b_pptxgen_slide_count'); }
  window.onI18n=count;
  $('in').addEventListener('input',count); count();
  $('gen').addEventListener('click',function(){
    var slides=parse($('in').value); if(!slides.length){alert(t('b_pptxgen_alert_no_slide'));return;}
    var color=$('theme').value; var p=new PptxGenJS(); p.layout='LAYOUT_WIDE';
    slides.forEach(function(s){ var sl=p.addSlide();
      sl.addShape(p.ShapeType.rect,{x:0,y:0,w:'100%',h:0.25,fill:{color:color}});
      sl.addText(s.title,{x:0.5,y:0.4,w:'90%',h:1,fontSize:32,bold:true,color:color});
      if(s.bullets.length)sl.addText(s.bullets.map(function(b){return {text:b,options:{bullet:true}};}),{x:0.7,y:1.6,w:'85%',h:4,fontSize:18,color:'333333',lineSpacingMultiple:1.3});
    });
    p.writeFile({fileName:($('fname').value||'presentation')+'.pptx'});
  });
</script>
