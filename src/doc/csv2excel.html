<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_csv2excel_title">CSV·JSON → 엑셀(XLSX) 변환기</h1>
  <p class="sub" data-i18n="b_csv2excel_sub">CSV나 JSON을 붙여넣으면 표로 미리보고 엑셀 파일(.xlsx)로 내려받습니다.</p>

  <div class="howto"><span class="ic">📖</span><div><b data-i18n="b_csv2excel_howto_title">사용 방법</b><ol>
    <li data-i18n="b_csv2excel_howto_step1">CSV(쉼표/탭 구분) 또는 JSON 배열을 붙여넣습니다</li>
    <li data-i18n="b_csv2excel_howto_step2">입력 형식과 시트 이름을 확인합니다</li>
    <li data-i18n="b_csv2excel_howto_step3">'엑셀 다운로드'를 누르면 .xlsx 파일이 저장됩니다</li>
  </ol></div></div>

  <div class="card">
    <label for="input" style="font-weight:700;font-size:.85rem;" data-i18n="b_csv2excel_label_input">데이터 입력</label>
    <textarea id="input">이름,부서,입사년도
홍길동,기획,2019
김영희,개발,2021
이철수,디자인,2020</textarea>
    <div class="opts">
      <label><span data-i18n="b_csv2excel_label_fmt">입력</span> <select id="fmt"><option value="auto" data-i18n="b_csv2excel_fmt_auto">자동 감지</option><option value="csv">CSV</option><option value="json">JSON</option></select></label>
      <label><span data-i18n="b_csv2excel_label_sheet">시트 이름</span> <input id="sheet" type="text" value="Sheet1" style="width:120px"/></label>
    </div>
    <div class="actions"><button class="btn" id="dl" type="button" data-i18n="b_csv2excel_btn_dl">⬇️ 엑셀 다운로드 (.xlsx)</button></div>
    <div class="tblwrap hide" id="tblwrap"></div>
    <div class="note" data-i18n="b_csv2excel_note">표는 미리보기용이며 실제 변환은 전체 데이터로 이루어집니다. JSON은 객체 배열(예: [{"이름":"홍길동",…}])이어야 합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>

<script src="/vendor/xlsx-0.18.5/xlsx.full.min.js"></script>
<script src="csvutil.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }
  function detect(tmp_t){ var s=tmp_t.trim(); return (s[0]==='['||s[0]==='{')?'json':'csv'; }
  function rows(){
    var tmp_t=$('input').value, fmt=$('fmt').value; if(fmt==='auto') fmt=detect(tmp_t);
    if(fmt==='json'){ var j=JSON.parse(tmp_t); if(!Array.isArray(j)) j=[j];
      var cols=[]; j.forEach(function(o){ Object.keys(o||{}).forEach(function(k){ if(cols.indexOf(k)<0)cols.push(k); }); });
      var arr=[cols]; j.forEach(function(o){ arr.push(cols.map(function(c){ var v=o?o[c]:''; return v==null?'':(typeof v==='object'?JSON.stringify(v):v); })); });
      return arr;
    }
    // CSV (csvutil 공용 파서) → 2차원 배열로 재구성
    if(window.CSV){ var p=window.CSV.parse(tmp_t); return [p.header].concat(p.rows); }
    return tmp_t.trim().split(/\r?\n/).map(function(l){return l.split(',');});
  }
  function preview(){
    try{ var r=rows(); if(!r.length){ $('tblwrap').classList.add('hide'); return; }
      var head=r[0], body=r.slice(1,51);
      var h='<table><thead><tr>'+head.map(function(c){return '<th>'+String(c).replace(/</g,'&lt;')+'</th>';}).join('')+'</tr></thead><tbody>';
      h+=body.map(function(row){ return '<tr>'+head.map(function(_,i){return '<td>'+String(row[i]==null?'':row[i]).replace(/</g,'&lt;')+'</td>';}).join('')+'</tr>'; }).join('');
      h+='</tbody></table>'; $('tblwrap').innerHTML=h; $('tblwrap').classList.remove('hide');
    }catch(e){ $('tblwrap').innerHTML='<div style="padding:.8rem;color:var(--muted)">'+t('b_csv2excel_err_fmt')+': '+String(e.message).replace(/</g,'&lt;')+'</div>'; $('tblwrap').classList.remove('hide'); }
  }
  function download(){
    try{ var r=rows(); if(!r.length){ toast(t('b_csv2excel_toast_empty')); return; }
      var ws=XLSX.utils.aoa_to_sheet(r); var wb=XLSX.utils.book_new();
      var nm=($('sheet').value||'Sheet1').slice(0,31).replace(/[\\\/\?\*\[\]:]/g,'_');
      XLSX.utils.book_append_sheet(wb,ws,nm);
      XLSX.writeFile(wb,'data.xlsx');
    }catch(e){ toast(t('b_csv2excel_toast_fail')); }
  }
  $('input').addEventListener('input',preview); $('fmt').addEventListener('change',preview);
  $('dl').addEventListener('click',download);
  preview();
</script>
