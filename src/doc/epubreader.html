<style>
  .drop{border:2px dashed var(--border);border-radius:14px;padding:1.6rem 1rem;text-align:center;color:var(--muted);cursor:pointer;}.drop:hover{border-color:var(--accent);color:var(--accent);}

  .note{margin-top:1.1rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}

<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_epubreader_title">EPUB 뷰어</h1>
  <p class="sub" data-i18n="b_epubreader_sub">EPUB 전자책 파일을 올리면 설치 없이 바로 읽을 수 있어요.</p>
  <div class="card" style="max-width:none;">
    <div class="drop" id="drop"><div style="font-size:1.8rem">📖</div><div><strong data-i18n="b_epubreader_drop_label">EPUB 파일을 끌어다 놓거나 클릭</strong></div><div style="font-size:.82rem;margin-top:.3rem;">.epub</div></div>
    <input type="file" id="file" accept=".epub,application/epub+zip" class="hide"/>
    <div class="reader hide" id="reader"><div id="viewer"></div></div>
    <div class="nav hide" id="nav"><button id="prev" type="button" data-i18n="b_epubreader_prev">← 이전</button><span id="title" style="font-size:.85rem;color:var(--muted)"></span><button id="next" type="button" data-i18n="b_epubreader_next">다음 →</button></div>
    <div class="note" data-i18n-html="b_epubreader_note">오픈소스 <b>epub.js</b>(BSD-2, <a href="https://github.com/futurepress/epub.js" target="_blank" rel="noopener">futurepress/epub.js</a>)와 JSZip을 자체 호스팅합니다. 책 파일은 서버로 전송되지 않고 브라우저에서만 열립니다. 좌우 화살표 키로도 넘길 수 있어요.</div>
  </div>
</div>
<script src="/vendor/jszip-3.10.1/jszip.min.js"></script>
<script src="/vendor/epubjs-0.3/epub.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var book=null, rendition=null;
  function load(f){ if(!f)return; var fr=new FileReader();
    fr.onload=function(e){ try{ if(rendition)rendition.destroy();
      book=ePub(e.target.result); $('reader').classList.remove('hide'); $('nav').classList.remove('hide');
      rendition=book.renderTo('viewer',{width:'100%',height:560,spread:'none'}); rendition.display();
      book.loaded.metadata.then(function(m){ $('title').textContent=(m.title||'')+(m.creator?' · '+m.creator:''); });
    }catch(err){ $('title').textContent=t('b_epubreader_open_error'); } };
    fr.readAsArrayBuffer(f);
  }
  window.onI18n=function(){ if($('title').textContent===t('b_epubreader_open_error')){ $('title').textContent=t('b_epubreader_open_error'); } };
  $('drop').addEventListener('click',function(){$('file').click();});
  $('file').addEventListener('change',function(e){if(e.target.files[0])load(e.target.files[0]);});
  ['dragover','dragenter'].forEach(function(ev){$('drop').addEventListener(ev,function(e){e.preventDefault();});});
  $('drop').addEventListener('drop',function(e){e.preventDefault();if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);});
  $('prev').addEventListener('click',function(){if(rendition)rendition.prev();});
  $('next').addEventListener('click',function(){if(rendition)rendition.next();});
  document.addEventListener('keydown',function(e){ if(!rendition)return; if(e.key==='ArrowLeft')rendition.prev(); else if(e.key==='ArrowRight')rendition.next(); });
</script>
</body>
