<body>
<div class="toolwrap" style="max-width:520px;">
  <h1>이름 궁합 테스트 <span style="font-size:.9rem;color:var(--muted)">(재미로 보기)</span></h1>
  <p class="sub">두 사람의 이름을 넣으면 추억의 ‘획수 더하기’ 방식으로 궁합 퍼센트를 알려 드려요.</p>

  <div class="card">
    <div class="row">
      <div class="fld"><label>이름 1</label><input id="n1" type="text" value="홍길동" maxlength="10"/></div>
      <div class="heart">💕</div>
      <div class="fld"><label>이름 2</label><input id="n2" type="text" value="성춘향" maxlength="10"/></div>
    </div>
    <button class="btn" id="go" type="button" style="width:100%;">궁합 보기</button>
    <div id="result" class="hide">
      <div class="res"><span class="pct" id="pct">0%</span></div>
      <div class="bar"><i id="fill"></i></div>
      <div class="comment" id="comment"></div>
      <div style="text-align:center;"><button class="btn btn-ghost" id="copy" type="button">📋 결과 복사</button></div>
    </div>
    <div class="note">한글 자모의 획수를 더해 나가는 옛날 ‘이름 궁합’ 방식으로 계산하는 <b>재미용 게임</b>입니다. 같은 이름은 항상 같은 결과가 나오며, 실제 관계와는 아무 관련이 없어요. 모든 계산은 브라우저에서만 이루어집니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }
  var CHO=[2,4,2,3,6,5,4,4,8,2,4,1,3,6,4,3,4,4,3];
  var JUNG=[2,3,3,4,2,3,3,4,2,4,5,3,3,2,4,5,3,3,1,2,1];
  var JONG=[0,2,4,4,2,5,5,3,5,7,9,9,7,9,9,8,4,4,6,2,4,1,3,4,3,4,4,3];
  function strokesOf(ch){ var code=ch.charCodeAt(0);
    if(code>=0xAC00 && code<=0xD7A3){ var s=code-0xAC00; var cho=Math.floor(s/588), jung=Math.floor((s%588)/28), jong=s%28; return CHO[cho]+JUNG[jung]+JONG[jong]; }
    if(/[0-9]/.test(ch)) return +ch||10;
    if(/[a-zA-Z]/.test(ch)) return (ch.toLowerCase().charCodeAt(0)-96); // a=1..z=26
    return 0;
  }
  function compute(a,b){
    a=a.replace(/\s/g,'').split(''); b=b.replace(/\s/g,'').split('');
    if(!a.length||!b.length) return null;
    var row=[]; var n=Math.max(a.length,b.length);
    for(var i=0;i<n;i++){ if(a[i]!==undefined) row.push(strokesOf(a[i])%10); if(b[i]!==undefined) row.push(strokesOf(b[i])%10); }
    if(row.length<2) row.push(0);
    while(row.length>2){ var nr=[]; for(var k=0;k<row.length-1;k++) nr.push((row[k]+row[k+1])%10); row=nr; }
    return row[0]*10+row[1];
  }
  function comment(p){ if(p>=90)return '천생연분! 💖'; if(p>=75)return '아주 잘 어울려요 😍'; if(p>=60)return '좋은 궁합이에요 😊'; if(p>=40)return '노력하면 충분해요 🙂'; if(p>=20)return '서로 알아가는 중 🤔'; return '음… 친구로 시작해 봐요 😅'; }
  function run(){
    var p=compute($('n1').value,$('n2').value);
    if(p===null){ toast('두 이름을 모두 입력하세요'); return; }
    $('result').classList.remove('hide');
    $('pct').textContent=p+'%'; $('fill').style.width='0';
    setTimeout(function(){ $('fill').style.width=p+'%'; },30);
    $('comment').textContent=comment(p);
    window._p=p;
  }
  $('go').addEventListener('click',run);
  ['n1','n2'].forEach(function(id){ $(id).addEventListener('keydown',function(e){ if(e.key==='Enter')run(); }); });
  $('copy').addEventListener('click',function(){ navigator.clipboard.writeText($('n1').value+' ❤ '+$('n2').value+' = '+window._p+'% (gemini2k.co.kr/namematch)').then(function(){toast('복사됐습니다');}); });
</script>
