<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var Z=[
    ['🐭','쥐','재치·기민·사교','부지런하고 눈치 빠르며 기회를 잘 포착합니다.','용·원숭이'],
    ['🐮','소','성실·인내·신뢰','묵묵히 끝까지 해내는 든든한 노력가입니다.','뱀·닭'],
    ['🐯','호랑이','용기·열정·리더십','대담하고 정의로우며 추진력이 강합니다.','말·개'],
    ['🐰','토끼','온화·섬세·예술','다정하고 센스 있으며 분위기를 부드럽게 합니다.','양·돼지'],
    ['🐲','용','카리스마·자신감·야망','당당하고 에너지가 넘치는 타고난 주인공입니다.','쥐·원숭이'],
    ['🐍','뱀','지혜·직관·신중','깊이 사고하고 통찰력이 뛰어납니다.','소·닭'],
    ['🐴','말','자유·활동·낙천','활발하고 솔직하며 모험을 즐깁니다.','호랑이·개'],
    ['🐑','양','온순·배려·창의','따뜻하고 예술적이며 평화를 추구합니다.','토끼·돼지'],
    ['🐵','원숭이','영리·재기·융통','재치 있고 호기심 많은 아이디어 뱅크입니다.','쥐·용'],
    ['🐔','닭','꼼꼼·계획·성실','부지런하고 책임감 강한 완벽주의자입니다.','소·뱀'],
    ['🐶','개','충직·정의·헌신','의리 있고 정 많은 든든한 친구입니다.','호랑이·말'],
    ['🐷','돼지','관대·낙천·복','너그럽고 정직하며 복을 부르는 타입입니다.','토끼·양']
  ];
  function render(i){ Array.prototype.forEach.call($('picks').children,function(b,j){b.classList.toggle('on',j===i);});
    var z=Z[i]; $('result').classList.remove('hide'); $('title').textContent=z[0]+' '+z[1]+'띠';
    $('tags').innerHTML=z[2].split('·').map(function(t){return '<span class="tag">#'+t+'</span>';}).join('');
    $('good').innerHTML='<b>성격</b><br>'+z[3]; $('match').innerHTML='<b>잘 맞는 띠</b> 💞 '+z[4];
  }
  $('picks').innerHTML=Z.map(function(z,i){return '<button data-i="'+i+'" title="'+z[1]+'띠">'+z[0]+'</button>';}).join('');
  $('picks').addEventListener('click',function(e){var b=e.target.closest('button');if(b)render(+b.dataset.i);});
  $('year').addEventListener('input',function(){ var y=parseInt($('year').value,10); if(y>=1900&&y<=2100){ var i=((y-4)%12+12)%12; $('yhint').textContent='→ '+Z[i][1]+'띠'; render(i); } else $('yhint').textContent=''; });
  render(0);
</script>
