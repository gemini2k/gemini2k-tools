<style>
  .picks{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:1rem;}
  .picks button{padding:1rem 0;border:1px solid var(--border);border-radius:14px;background:var(--surface);color:var(--text);font-family:inherit;font-size:1.4rem;font-weight:800;cursor:pointer;transition:.12s;}
  .picks button:hover{border-color:var(--accent);background:var(--accent-soft);}
  .picks button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .res h2{font-size:1.4rem;margin:.4rem 0;}
  .tags{display:flex;flex-wrap:wrap;gap:.4rem;margin:.6rem 0;}
  .tag{background:var(--accent-soft);color:var(--accent);border-radius:20px;padding:.25rem .7rem;font-size:.85rem;font-weight:700;}
  .sec{margin:.9rem 0;font-size:.96rem;line-height:1.7;}
  .sec b{color:var(--accent);}
  .match{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;margin-top:.6rem;}
  .mitem{background:var(--ground);border:1px solid var(--border);border-radius:10px;padding:.5rem .7rem;font-size:.9rem;}
  .note{margin-top:1.2rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}
  .hide{display:none;}
</style>

{
  "@context": "https://schema.org",

<body>
<div class="toolwrap" style="max-width:560px;">
  <h1 data-i18n="b_bloodtype_title">혈액형 성격 <span style="font-size:.9rem;color:var(--muted)" data-i18n="b_bloodtype_title_sub">(재미로 보기)</span></h1>
  <p class="sub" data-i18n="b_bloodtype_sub">혈액형을 고르면 흔히 말하는 성격 특징과 궁합을 보여 줍니다. 과학적 근거는 없는 재미용이에요!</p>

  <div class="card">
    <div class="picks" id="picks">
      <button data-t="A" type="button" data-i18n="b_bloodtype_btn_a">A형</button>
      <button data-t="B" type="button" data-i18n="b_bloodtype_btn_b">B형</button>
      <button data-t="O" type="button" data-i18n="b_bloodtype_btn_o">O형</button>
      <button data-t="AB" type="button" data-i18n="b_bloodtype_btn_ab">AB형</button>
    </div>
    <div id="result" class="res hide">
      <h2 id="rtitle"></h2>
      <div class="tags" id="rtags"></div>
      <div class="sec" id="rgood"></div>
      <div class="sec" id="rweak"></div>
      <div class="sec"><b data-i18n="b_bloodtype_match_label">혈액형 궁합</b><div class="match" id="rmatch"></div></div>
      <button class="btn btn-ghost" id="copy" type="button" style="margin-top:.8rem;" data-i18n="b_bloodtype_copy_btn">📋 결과 복사</button>
    </div>
    <div class="note" data-i18n-html="b_bloodtype_note">혈액형과 성격의 연관성은 <b>과학적으로 입증된 바가 없습니다</b>. 이 콘텐츠는 순수하게 <b>재미·오락용</b>이며, 사람을 혈액형으로 판단하지 말아 주세요. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }
  var DATA={
    A:{
      titleKey:'b_bloodtype_a_title',
      tagsKeys:['b_bloodtype_a_tag1','b_bloodtype_a_tag2','b_bloodtype_a_tag3','b_bloodtype_a_tag4'],
      goodKey:'b_bloodtype_a_good',
      weakKey:'b_bloodtype_a_weak',
      matchKeys:[['b_bloodtype_a_m1_type','b_bloodtype_a_m1_desc'],['b_bloodtype_a_m2_type','b_bloodtype_a_m2_desc'],['b_bloodtype_a_m3_type','b_bloodtype_a_m3_desc'],['b_bloodtype_a_m4_type','b_bloodtype_a_m4_desc']]
    },
    B:{
      titleKey:'b_bloodtype_b_title',
      tagsKeys:['b_bloodtype_b_tag1','b_bloodtype_b_tag2','b_bloodtype_b_tag3','b_bloodtype_b_tag4'],
      goodKey:'b_bloodtype_b_good',
      weakKey:'b_bloodtype_b_weak',
      matchKeys:[['b_bloodtype_b_m1_type','b_bloodtype_b_m1_desc'],['b_bloodtype_b_m2_type','b_bloodtype_b_m2_desc'],['b_bloodtype_b_m3_type','b_bloodtype_b_m3_desc'],['b_bloodtype_b_m4_type','b_bloodtype_b_m4_desc']]
    },
    O:{
      titleKey:'b_bloodtype_o_title',
      tagsKeys:['b_bloodtype_o_tag1','b_bloodtype_o_tag2','b_bloodtype_o_tag3','b_bloodtype_o_tag4'],
      goodKey:'b_bloodtype_o_good',
      weakKey:'b_bloodtype_o_weak',
      matchKeys:[['b_bloodtype_o_m1_type','b_bloodtype_o_m1_desc'],['b_bloodtype_o_m2_type','b_bloodtype_o_m2_desc'],['b_bloodtype_o_m3_type','b_bloodtype_o_m3_desc'],['b_bloodtype_o_m4_type','b_bloodtype_o_m4_desc']]
    },
    AB:{
      titleKey:'b_bloodtype_ab_title',
      tagsKeys:['b_bloodtype_ab_tag1','b_bloodtype_ab_tag2','b_bloodtype_ab_tag3','b_bloodtype_ab_tag4'],
      goodKey:'b_bloodtype_ab_good',
      weakKey:'b_bloodtype_ab_weak',
      matchKeys:[['b_bloodtype_ab_m1_type','b_bloodtype_ab_m1_desc'],['b_bloodtype_ab_m2_type','b_bloodtype_ab_m2_desc'],['b_bloodtype_ab_m3_type','b_bloodtype_ab_m3_desc'],['b_bloodtype_ab_m4_type','b_bloodtype_ab_m4_desc']]
    }
  };
  function show(typ){
    Array.prototype.forEach.call($('picks').children,function(b){ b.classList.toggle('on',b.dataset.t===typ); });
    var d=DATA[typ]; $('result').classList.remove('hide');
    $('rtitle').textContent=t(d.titleKey);
    $('rtags').innerHTML=d.tagsKeys.map(function(k){return '<span class="tag">#'+t(k)+'</span>';}).join('');
    $('rgood').innerHTML='<b>'+t('b_bloodtype_good_label')+'</b><br>'+t(d.goodKey);
    $('rweak').innerHTML='<b>'+t('b_bloodtype_weak_label')+'</b><br>'+t(d.weakKey);
    $('rmatch').innerHTML=d.matchKeys.map(function(m){return '<div class="mitem"><b>'+t(m[0])+'</b><br>'+t(m[1])+'</div>';}).join('');
    window._bt=typ; window._btitle=t(d.titleKey);
  }
  window.onI18n=function(){ if(window._bt) show(window._bt); };
  $('picks').addEventListener('click',function(e){ var b=e.target.closest('button'); if(b) show(b.dataset.t); });
  $('copy').addEventListener('click',function(){ navigator.clipboard.writeText((window._btitle||'')+' ('+t('b_bloodtype_copy_suffix')+')').then(function(){toast(t('b_bloodtype_toast_copied'));}); });
</script>
</body>
