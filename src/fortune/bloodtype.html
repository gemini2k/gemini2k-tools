<div class="toolwrap" style="max-width:560px;">

  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }
  var DATA={
    A:{title:'A형 — 섬세한 모범생',tags:['신중함','배려심','책임감','완벽주의'],
      good:'계획적이고 꼼꼼하며 주변을 잘 챙깁니다. 약속을 잘 지키고 맡은 일은 끝까지 해내는 성실파.',
      weak:'생각이 많아 결정이 늦거나 스트레스를 속으로 쌓아 두기도 해요. 가끔은 마음을 편히!',
      match:[['O형','💚 편안하게 챙겨주는 조합'],['AB형','💙 서로의 빈틈을 채움'],['A형','🤝 비슷해서 안정적'],['B형','✨ 다른 매력에 끌림']]},
    B:{title:'B형 — 자유로운 모험가',tags:['솔직함','열정','창의력','마이웨이'],
      good:'호기심 많고 즉흥적이며 에너지가 넘칩니다. 좋아하는 일엔 누구보다 깊이 몰입하는 타입.',
      weak:'관심사가 빨리 바뀌고 마이페이스라 오해받기도. 주변 배려를 조금 더하면 완벽!',
      match:[['AB형','💜 통하는 자유로움'],['O형','🧡 시원시원 잘 맞음'],['B형','😆 함께 즉흥 여행'],['A형','🌷 안정과 자유의 균형']]},
    O:{title:'O형 — 시원한 리더',tags:['사교성','추진력','의리','현실감각'],
      good:'활달하고 사람을 잘 이끌며 목표 지향적입니다. 정 많고 화끈해 주변에 사람이 모이는 타입.',
      weak:'승부욕이 강하고 가끔 욱하기도. 솔직함이 지나치지 않게 한 박자 쉬어가면 좋아요.',
      match:[['A형','💚 챙김받는 든든함'],['B형','🧡 죽이 잘 맞음'],['AB형','💙 신선한 자극'],['O형','🔥 화끈한 시너지']]},
    AB:{title:'AB형 — 신비로운 천재형',tags:['이성적','독창성','쿨함','다재다능'],
      good:'합리적이면서 감각적이고, 한 사람 안에 여러 매력이 있습니다. 아이디어와 분석력이 뛰어난 타입.',
      weak:'속을 잘 안 보여 차가워 보이거나 변덕스럽게 느껴질 수 있어요. 마음을 조금 더 표현해 보세요.',
      match:[['B형','💜 자유로운 교감'],['A형','💙 안정적 보완'],['O형','✨ 활력을 받음'],['AB형','🌀 묘하게 통함']]}
  };
  function show(t){
    Array.prototype.forEach.call($('picks').children,function(b){ b.classList.toggle('on',b.dataset.t===t); });
    var d=DATA[t]; $('result').classList.remove('hide');
    $('rtitle').textContent=d.title;
    $('rtags').innerHTML=d.tags.map(function(x){return '<span class="tag">#'+x+'</span>';}).join('');
    $('rgood').innerHTML='<b>이런 점이 좋아요</b><br>'+d.good;
    $('rweak').innerHTML='<b>이런 점은 주의</b><br>'+d.weak;
    $('rmatch').innerHTML=d.match.map(function(m){return '<div class="mitem"><b>'+m[0]+'</b><br>'+m[1]+'</div>';}).join('');
    window._t=t; window._title=d.title;
  }
  $('picks').addEventListener('click',function(e){ var b=e.target.closest('button'); if(b) show(b.dataset.t); });
  $('copy').addEventListener('click',function(){ navigator.clipboard.writeText((window._title||'')+' (재미로 보는 혈액형 성격 · gemini2k.co.kr/bloodtype)').then(function(){toast('복사됐습니다');}); });
</script>
