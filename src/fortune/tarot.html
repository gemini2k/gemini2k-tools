<body>
<div class="toolwrap" style="max-width:480px;">
  <h1><span data-i18n="b_tarot_title">타로 한 장 뽑기</span> <span style="font-size:.9rem;color:var(--muted)" data-i18n="b_tarot_title_fun">(재미)</span></h1>
  <p class="sub" data-i18n="b_tarot_sub">마음속으로 질문을 떠올리고 카드를 뽑아 보세요. 가볍게 즐기는 재미용 타로입니다.</p>
  <div class="card">
    <div class="card3" id="card"><div class="ic">🔮</div><div class="nm" data-i18n="b_tarot_placeholder">카드를 뽑아보세요</div></div>
    <div class="mean" id="mean"></div>
    <button class="btn" id="draw" type="button" style="width:100%;"><span data-i18n="b_tarot_btn_draw">🎴 카드 뽑기</span></button>
    <div class="note" data-i18n-html="b_tarot_note">타로는 <b>과학적 근거가 없는 오락용</b>입니다. 운세를 단정하지 않으며 재미로만 즐겨 주세요. 카드는 무작위로 정·역방향이 정해집니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var CARDS=[
    ['🃏','b_tarot_c0_name','b_tarot_c0_up','b_tarot_c0_dn'],
    ['🎩','b_tarot_c1_name','b_tarot_c1_up','b_tarot_c1_dn'],
    ['🌙','b_tarot_c2_name','b_tarot_c2_up','b_tarot_c2_dn'],
    ['👑','b_tarot_c3_name','b_tarot_c3_up','b_tarot_c3_dn'],
    ['🏛️','b_tarot_c4_name','b_tarot_c4_up','b_tarot_c4_dn'],
    ['📜','b_tarot_c5_name','b_tarot_c5_up','b_tarot_c5_dn'],
    ['💞','b_tarot_c6_name','b_tarot_c6_up','b_tarot_c6_dn'],
    ['🏇','b_tarot_c7_name','b_tarot_c7_up','b_tarot_c7_dn'],
    ['🦁','b_tarot_c8_name','b_tarot_c8_up','b_tarot_c8_dn'],
    ['🏮','b_tarot_c9_name','b_tarot_c9_up','b_tarot_c9_dn'],
    ['🎡','b_tarot_c10_name','b_tarot_c10_up','b_tarot_c10_dn'],
    ['⚖️','b_tarot_c11_name','b_tarot_c11_up','b_tarot_c11_dn'],
    ['🙃','b_tarot_c12_name','b_tarot_c12_up','b_tarot_c12_dn'],
    ['🦋','b_tarot_c13_name','b_tarot_c13_up','b_tarot_c13_dn'],
    ['🍷','b_tarot_c14_name','b_tarot_c14_up','b_tarot_c14_dn'],
    ['😈','b_tarot_c15_name','b_tarot_c15_up','b_tarot_c15_dn'],
    ['🗼','b_tarot_c16_name','b_tarot_c16_up','b_tarot_c16_dn'],
    ['⭐','b_tarot_c17_name','b_tarot_c17_up','b_tarot_c17_dn'],
    ['🌕','b_tarot_c18_name','b_tarot_c18_up','b_tarot_c18_dn'],
    ['☀️','b_tarot_c19_name','b_tarot_c19_up','b_tarot_c19_dn'],
    ['📯','b_tarot_c20_name','b_tarot_c20_up','b_tarot_c20_dn'],
    ['🌍','b_tarot_c21_name','b_tarot_c21_up','b_tarot_c21_dn']
  ];
  function draw(){ var tmp=CARDS[Math.floor(Math.random()*CARDS.length)]; var up=Math.random()<0.65;
    var dirLabel=up?t('b_tarot_upright'):t('b_tarot_reversed');
    var dirArrow=up?' ▲':' ▼';
    $('card').innerHTML='<div class="ic"'+(up?'':' style="transform:rotate(180deg)"')+'>'+tmp[0]+'</div><div class="nm">'+t(tmp[1])+'</div><div class="or">'+dirLabel+dirArrow+'</div>';
    $('mean').innerHTML='<b>'+dirLabel+':</b> '+t(up?tmp[2]:tmp[3]);
  }
  $('draw').addEventListener('click',draw);
  window.onI18n=function(){if($('mean').innerHTML)draw();};
</script>
