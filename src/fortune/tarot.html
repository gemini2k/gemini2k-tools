<div class="toolwrap" style="max-width:480px;">

  <p class="sub">마음속으로 질문을 떠올리고 카드를 뽑아 보세요. 가볍게 즐기는 재미용 타로입니다.</p>

  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var CARDS=[
    ['🃏','광대(The Fool)','새로운 시작·모험·순수','경솔·무모함을 조심'],
    ['🎩','마법사(The Magician)','의지·창조·재능 발휘','속임수·집중력 부족'],
    ['🌙','여사제(High Priestess)','직관·비밀·내면의 지혜','감춰진 의도·혼란'],
    ['👑','여황제(The Empress)','풍요·돌봄·창의','의존·과보호'],
    ['🏛️','황제(The Emperor)','안정·권위·리더십','독선·완고함'],
    ['📜','교황(The Hierophant)','전통·가르침·신뢰','형식주의·고정관념'],
    ['💞','연인(The Lovers)','사랑·선택·조화','갈등·우유부단'],
    ['🏇','전차(The Chariot)','추진력·승리·의지','통제 상실·조급함'],
    ['🦁','힘(Strength)','용기·인내·자제','자신감 부족·불안'],

    ['⚖️','정의(Justice)','균형·공정·책임','불공정·회피'],
    ['🙃','매달린 사람','관점 전환·기다림·헌신','희생·정체'],
    ['🦋','죽음(Death)','변화·끝과 시작·재생','집착·정체'],
    ['🍷','절제(Temperance)','조화·중용·치유','불균형·과함'],
    ['😈','악마(The Devil)','욕망·집착·유혹','속박에서 벗어남'],
    ['🗼','탑(The Tower)','급변·각성·해방','충격·붕괴 주의'],

    ['📯','심판(Judgement)','부활·결단·각성','후회·미루기'],
    ['🌍','세계(The World)','완성·성취·통합','미완·마무리 필요']

  function draw(){ var c=CARDS[Math.floor(Math.random()*CARDS.length)]; var up=Math.random()<0.65;
    $('card').innerHTML='<div class="ic"'+(up?'':' style="transform:rotate(180deg)"')+'>'+c[0]+'</div><div class="nm">'+c[1]+'</div><div class="or">'+(up?'정방향 ▲':'역방향 ▼')+'</div>';
    $('mean').innerHTML='<b>'+(up?'정방향':'역방향')+':</b> '+(up?c[2]:c[3]);
  }
  $('draw').addEventListener('click',draw);
</script>
