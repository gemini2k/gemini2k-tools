<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_geojsonprec_title">GeoJSON 좌표 정밀도 조정</h1>
  <p class="sub" data-i18n="b_geojsonprec_sub">좌표의 소수점 자릿수를 줄여 GeoJSON 용량을 가볍게 만듭니다. 웹 지도·전송에 최적화하세요.</p>

  <div class="howto"><span class="ic">📖</span><div><b data-i18n="b_geojsonprec_howto_title">사용 방법</b><ol>
    <li data-i18n="b_geojsonprec_howto_1">GeoJSON을 붙여 넣습니다</li>
    <li data-i18n="b_geojsonprec_howto_2">소수 자릿수를 정합니다(6자리면 약 10cm 정밀도)</li>
    <li data-i18n="b_geojsonprec_howto_3">'적용' 후 줄어든 용량을 확인하고 내려받습니다</li>
  </ol></div></div>

  <div class="card">
    <label for="input" style="font-weight:700;font-size:.85rem;" data-i18n="b_geojsonprec_input_label">GeoJSON 입력</label>
    <textarea id="input"></textarea>
    <div class="row"><label style="margin:0;font-weight:700;" data-i18n="b_geojsonprec_dec_label">소수 자릿수</label><input id="dec" type="range" min="0" max="10" value="6"/><span class="val" id="decVal">6<span data-i18n="b_geojsonprec_digits_unit">자리</span></span></div>
    <div class="actions"><button class="btn" id="run" type="button" data-i18n="b_geojsonprec_btn_run">적용</button><button class="btn btn-ghost" id="sample" type="button" data-i18n="b_geojsonprec_btn_sample">샘플</button><button class="btn btn-ghost" id="copy" type="button">📋 <span data-i18n="b_geojsonprec_btn_copy">복사</span></button><button class="btn btn-ghost" id="dl" type="button">⬇️ <span data-i18n="b_geojsonprec_btn_dl">내려받기</span></button></div>
    <div id="stat"></div>
    <div class="err" id="err"></div>
    <label style="font-weight:700;font-size:.85rem;" data-i18n="b_geojsonprec_output_label">결과</label>
    <textarea id="out" class="out" readonly></textarea>
    <div class="note" data-i18n="b_geojsonprec_note">좌표(숫자)만 반올림하고 속성·구조는 그대로 둡니다. 자릿수 가이드: 5자리≈1.1m, 6자리≈11cm, 7자리≈1cm(위경도 기준). 정밀 측량용은 자릿수를 충분히 유지하세요. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }
  function bytes(s){ return new Blob([s]).size; }
  function kb(n){ return n<1024?n+' B':(Math.round(n/102.4)/10)+' KB'; }
  var dp=6;
  function roundCoords(o){
    if(Array.isArray(o)){
      if(o.length>=2 && typeof o[0]==='number' && typeof o[1]==='number'){ return o.map(function(n){ return typeof n==='number'?+n.toFixed(dp):n; }); }
      return o.map(roundCoords);
    } else if(o && typeof o==='object'){ var r={}; for(var k in o) r[k]=k==='coordinates'?roundCoords(o[k]):roundCoords(o[k]); return r; }
    return o;
  }
  function renderStat(b0, b1){
    var pct=b0?Math.round((1-b1/b0)*100):0;
    $('stat').innerHTML='<span class="pill">'+t('b_geojsonprec_pill_orig')+kb(b0)+'</span><span class="pill">'+t('b_geojsonprec_pill_result')+kb(b1)+'</span><span class="pill">'+(pct>=0?'−'+pct+'%':'+'+(-pct)+'%')+'</span>';
  }
  function run(){
    $('err').textContent='';
    var src=$('input').value.trim(); if(!src){ $('err').textContent=t('b_geojsonprec_err_empty'); return; }
    var gj; try{ gj=JSON.parse(src); }catch(e){ $('err').textContent=t('b_geojsonprec_err_invalid'); return; }
    dp=+$('dec').value;
    var out=JSON.stringify(roundCoords(gj));
    $('out').value=out;
    var b0=bytes(src), b1=bytes(out);
    renderStat(b0, b1);
  }
  $('dec').addEventListener('input', function(){ $('decVal').innerHTML=this.value+'<span data-i18n="b_geojsonprec_digits_unit">'+t('b_geojsonprec_digits_unit')+'</span>'; });
  $('run').addEventListener('click', run);
  $('copy').addEventListener('click', function(){ if($('out').value) navigator.clipboard.writeText($('out').value).then(function(){toast(t('b_geojsonprec_toast_copied'));}); });
  $('dl').addEventListener('click', function(){ if(!$('out').value)return; var blob=new Blob([$('out').value],{type:'application/geo+json'}),u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='rounded.geojson';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(u);a.remove();},100); });
  $('sample').addEventListener('click', function(){ $('input').value='{"type":"Feature","properties":{"name":"길"},"geometry":{"type":"LineString","coordinates":[[126.97812345678,37.56651234567],[126.98123456789,37.56789123456]]}}'; run(); });
  window.onI18n = function(){
    var v=$('dec').value;
    $('decVal').innerHTML=v+'<span data-i18n="b_geojsonprec_digits_unit">'+t('b_geojsonprec_digits_unit')+'</span>';
    if($('stat').innerHTML) {
      var outVal=$('out').value, srcVal=$('input').value.trim();
      if(outVal && srcVal) renderStat(bytes(srcVal), bytes(outVal));
    }
  };
</script>
</body>
