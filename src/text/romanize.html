<body>
<div class="toolwrap" style="max-width:640px;">
  <h1 data-i18n="b_romanize_title">한글 로마자 변환기</h1>
  <p class="sub" data-i18n="b_romanize_sub">한글을 로마자(국어의 로마자 표기법 근사)로 바꿉니다. 이름·주소·간판 영문 표기에 참고하세요.</p>
  <div class="card">
    <textarea id="in">안녕하세요 빛의여행</textarea>
    <div class="opts"><label><input type="checkbox" id="cap"/> <span data-i18n="b_romanize_cap_label">단어 첫 글자 대문자</span></label></div>
    <div class="arrow">↓</div>
    <div class="out" id="out"></div>
    <div class="actions"><button class="btn btn-ghost" id="copy" type="button">📋 <span data-i18n="b_romanize_copy">복사</span></button></div>
    <div class="note" data-i18n="b_romanize_note">표준 로마자 표기법의 자모 대응과 기본 연음을 적용한 <b>근사 변환</b>입니다. 사람 이름·일부 음운변화(된소리·구개음화 등)는 규칙이 달라질 수 있어 참고용입니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var CHO=['g','kk','n','d','tt','r','m','b','pp','s','ss','','j','jj','ch','k','t','p','h'];
  var JUNG=['a','ae','ya','yae','eo','e','yeo','ye','o','wa','wae','oe','yo','u','wo','we','wi','yu','eu','ui','i'];
  var JONG=['', 'k','k','k','n','n','n','t','l','k','m','p','l','l','p','l','m','p','p','t','t','ng','t','t','k','t','p','h'];
  // 종성→다음초성 연음용 초성 발음(종성 인덱스 → 초성 발음)
  var JONG_LINK=['', 'g','kk','ks','n','nj','nh','d','r','lg','lm','lb','ls','lt','lp','lh','m','b','bs','s','ss','ng','j','ch','k','t','p','h'];
  function rr(s){
    // 1) 자모 분해 배열
    var arr=[]; for(var i=0;i<s.length;i++){ var c=s.charCodeAt(i);
      if(c>=0xAC00&&c<=0xD7A3){ var x=c-0xAC00; arr.push({cho:Math.floor(x/588),jung:Math.floor((x%588)/28),jong:x%28}); }
      else arr.push({ch:s[i]}); }
    var res='';
    for(var k=0;k<arr.length;k++){ var a=arr[k]; if(a.ch!=null){ res+=a.ch; continue; }
      var onset=CHO[a.cho];
      if(a.cho===11 && k>0 && arr[k-1] && arr[k-1]._carry){ onset=arr[k-1]._carry; }
      res+=onset+JUNG[a.jung];
      if(a.jong>0){ var nb=arr[k+1]; if(nb&&nb.ch==null&&nb.cho===11){ a._carry=JONG_LINK[a.jong]; }
        else { res+=JONG[a.jong]; } }
    }
    return res;
  }
  function run(){ var lines=$('in').value.split('\n').map(function(line){ return line.split(' ').map(function(w){ var r=rr(w); if($('cap').checked&&r)r=r.charAt(0).toUpperCase()+r.slice(1); return r; }).join(' '); }).join('\n');
    $('out').textContent=lines; }
  ['in','cap'].forEach(function(id){$(id).addEventListener('input',run);$(id).addEventListener('change',run);});
  $('copy').addEventListener('click',function(){if($('out').textContent)navigator.clipboard.writeText($('out').textContent).then(function(){toast(t('b_romanize_copied'));});});
  run();
</script>
