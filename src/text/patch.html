<style>.seg{display:inline-flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:.8rem;}.seg button{padding:.5rem .9rem;border:0;background:var(--surface);color:var(--text);font-family:inherit;font-weight:700;cursor:pointer;}.seg button.on{background:var(--accent);color:#fff;}
label.lbl{font-weight:700;font-size:.85rem;display:block;margin:.6rem 0 .3rem;}
textarea{width:100%;min-height:110px;padding:.6rem .7rem;border:1px solid var(--border);border-radius:10px;background:var(--input-bg);color:var(--text);font-family:ui-monospace,monospace;font-size:.85rem;resize:vertical;}
.actions{display:flex;gap:.6rem;flex-wrap:wrap;margin:.6rem 0;}
.out{width:100%;min-height:80px;border:1px solid var(--border);border-radius:10px;background:var(--ground);padding:.7rem;font-family:ui-monospace,monospace;font-size:.83rem;color:var(--text);white-space:pre-wrap;word-break:break-word;overflow:auto;}
.diffview ins{background:rgba(34,197,94,.22);text-decoration:none;}.diffview del{background:rgba(239,68,68,.22);}
.note{margin-top:1.1rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}</style>

<script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"텍스트 패치 생성·적용기","description":"두 글의 차이로 패치를 만들고 원본에 적용합니다(diff-match-patch).","url":"https://gemini2k.co.kr/patch.html","applicationCategory":"UtilitiesApplication","operatingSystem":"Web","inLanguage":"ko","isAccessibleForFree":true,"license":"https://www.apache.org/licenses/LICENSE-2.0","offers":{"@type":"Offer","price":"0","priceCurrency":"KRW"},"publisher":{"@type":"Organization","name":"빛의여행(gemini2k) 도구","url":"https://gemini2k.co.kr/"}}</script>

<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_patch_title">텍스트 패치 생성·적용기</h1>
  <p class="sub" data-i18n="b_patch_subtitle">두 글의 차이로 패치를 만들거나, 원본에 패치를 적용해 변경을 재현합니다.</p>
  <div class="card">
    <div class="seg" id="seg"><button data-m="make" class="on" type="button" data-i18n="b_patch_tab_make">패치 생성</button><button data-m="apply" type="button" data-i18n="b_patch_tab_apply">패치 적용</button></div>
    <div id="makebox">
      <label class="lbl" data-i18n="b_patch_label_original">원본</label><textarea id="a">빠른 갈색 여우가 게으른 개를 뛰어넘었다.</textarea>
      <label class="lbl" data-i18n="b_patch_label_modified">수정본</label><textarea id="b">빠른 갈색 여우가 아주 게으른 강아지를 뛰어넘는다.</textarea>
      <div class="actions"><button class="btn" id="genpatch" type="button" data-i18n="b_patch_btn_generate">패치 만들기</button><button class="btn btn-ghost" id="copyp" type="button" data-i18n="b_patch_btn_copy">📋 패치 복사</button></div>
      <label class="lbl" data-i18n="b_patch_label_preview">변경 미리보기</label><div class="out diffview" id="diff"></div>
      <label class="lbl" data-i18n="b_patch_label_patchtext">패치 텍스트</label><div class="out" id="patch"></div>
    </div>
    <div id="applybox" style="display:none;">
      <label class="lbl" data-i18n="b_patch_label_original">원본</label><textarea id="aa">빠른 갈색 여우가 게으른 개를 뛰어넘었다.</textarea>
      <label class="lbl" data-i18n="b_patch_label_patchtext">패치 텍스트</label><textarea id="pp" data-i18n-ph="b_patch_ph_paste" placeholder="@@ ... @@ 형식의 패치를 붙여넣으세요"></textarea>
      <div class="actions"><button class="btn" id="doapply" type="button" data-i18n="b_patch_btn_apply">적용하기</button></div>
      <label class="lbl" data-i18n="b_patch_label_result">결과</label><div class="out" id="applied"></div>
    </div>
    <div class="note" data-i18n-html="b_patch_note">오픈소스 <b>diff-match-patch</b>(Apache-2.0, Google, <a href="https://github.com/google/diff-match-patch" target="_blank" rel="noopener">google/diff-match-patch</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/dmp-1/diff_match_patch.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var dmp=new diff_match_patch();
  $('seg').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;var m=b.dataset.m;
    Array.prototype.forEach.call($('seg').children,function(x){x.classList.toggle('on',x===b);});
    $('makebox').style.display=m==='make'?'':'none'; $('applybox').style.display=m==='apply'?'':'none';});
  function make(){ var a=$('a').value,b=$('b').value; var d=dmp.diff_main(a,b); dmp.diff_cleanupSemantic(d);
    $('diff').innerHTML=dmp.diff_prettyHtml(d).replace(/&para;/g,'').replace(/style="[^"]*"/g,'');
    var patches=dmp.patch_make(a,d); var ptext=dmp.patch_toText(patches); $('patch').textContent=ptext; window._p=ptext; }
  $('genpatch').addEventListener('click',make); ['a','b'].forEach(function(id){$(id).addEventListener('input',make);});
  $('copyp').addEventListener('click',function(){if(window._p)navigator.clipboard.writeText(window._p).then(function(){toast(t('b_patch_toast_copied'));});});
  $('doapply').addEventListener('click',function(){ try{ var patches=dmp.patch_fromText($('pp').value); var res=dmp.patch_apply(patches,$('aa').value);
      var okAll=res[1].every(function(x){return x;}); $('applied').textContent=res[0]+(okAll?'':'\n\n'+t('b_patch_warn_partial')); }
    catch(e){ $('applied').textContent=t('b_patch_err_format')+e.message; } });
  make();
</script>
</body>
