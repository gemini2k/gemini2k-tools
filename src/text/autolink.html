<body>
<div class="toolwrap" style="max-width:780px;">
  <h1 data-i18n="b_autolink_title">텍스트 자동 링크 변환</h1>
  <p class="sub" data-i18n="b_autolink_sub">글 속의 URL·이메일·해시태그 등을 클릭 가능한 HTML 링크로 바꿔 줍니다.</p>
  <div class="card">
    <textarea id="in" data-i18n-ph="b_autolink_placeholder">자세한 내용은 https://gemini2k.co.kr 에서 확인하세요. 문의: hello@example.com
새 소식은 #공지 태그와 @운영자 계정을 확인! 전화 02-1234-5678</textarea>
    <div class="row">
      <label><input type="checkbox" id="url" checked> URL</label>
      <label><input type="checkbox" id="email" checked> <span data-i18n="b_autolink_opt_email">이메일</span></label>
      <label><input type="checkbox" id="phone" checked> <span data-i18n="b_autolink_opt_phone">전화번호</span></label>
      <label><input type="checkbox" id="hashtag" checked> <span data-i18n="b_autolink_opt_hashtag">해시태그</span></label>
      <label><input type="checkbox" id="mention" checked> <span data-i18n="b_autolink_opt_mention">멘션</span></label>
      <label><input type="checkbox" id="newtab" checked> <span data-i18n="b_autolink_opt_newtab">새 탭</span></label>
    </div>
    <div class="prev" id="prev"></div>
    <div class="out" id="out"></div>
    <button class="btn btn-ghost" id="copy" type="button" style="margin-top:.5rem;" data-i18n="b_autolink_btn_copy">📋 HTML 복사</button>
    <div class="note" data-i18n-html="b_autolink_note">오픈소스 <b>Autolinker</b>(MIT, <a href="https://github.com/gregjacobs/Autolinker.js" target="_blank" rel="noopener">gregjacobs/Autolinker.js</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/autolinker-4/autolinker.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function run(){ var html=Autolinker.link($('in').value,{urls:$('url').checked,email:$('email').checked,phone:$('phone').checked,
      hashtag:$('hashtag').checked?'twitter':false,mention:$('mention').checked?'twitter':false,
      newWindow:$('newtab').checked,stripPrefix:false});
    $('prev').innerHTML=html; $('out').textContent=html; window._o=html; }
  ['in','url','email','phone','hashtag','mention','newtab'].forEach(function(id){$(id).addEventListener('input',run);$(id).addEventListener('change',run);});
  $('copy').addEventListener('click',function(){if(window._o)navigator.clipboard.writeText(window._o).then(function(){toast(t('b_autolink_toast_copied'));});});
  run();
</script>
</body>
