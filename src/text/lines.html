<body>
<div class="toolwrap" style="max-width:780px;">
  <h1 data-i18n="b_lines_title">텍스트 줄 정리기</h1>
  <p class="sub" data-i18n="b_lines_sub">여러 줄로 된 목록·명단을 정렬하고, 중복·빈 줄을 없애고, 공백을 정리합니다. 버튼을 누를 때마다 결과에 적용됩니다.</p>

  <div class="howto"><span class="ic">📖</span><div><b data-i18n="b_lines_howto_title">사용 방법</b><ol>
    <li data-i18n="b_lines_howto_1">아래에 줄 단위 텍스트를 붙여넣습니다</li>
    <li data-i18n="b_lines_howto_2">원하는 작업 버튼을 누르면 즉시 적용되어 결과가 갱신됩니다 (이어서 여러 번 적용 가능)</li>
    <li data-i18n="b_lines_howto_3">'복사'로 결과를 가져갑니다. '되돌리기'로 직전 상태로 돌아갑니다</li>
  </ol></div></div>

  <div class="card">
    <label for="input" style="font-weight:700;font-size:.85rem;" data-i18n="b_lines_label_input">텍스트 입력</label>
    <textarea id="input">바나나
사과
바나나
  딸기

포도
사과
체리</textarea>
    <div class="opts">
      <label><input type="checkbox" id="ci"/> <span data-i18n="b_lines_ci">대소문자 무시</span></label>
    </div>
    <div class="ops">
      <button data-op="sortAsc" type="button" data-i18n="b_lines_op_sortAsc">⬆ 가나다 정렬</button>
      <button data-op="sortDesc" type="button" data-i18n="b_lines_op_sortDesc">⬇ 역순 정렬</button>
      <button data-op="sortLen" type="button" data-i18n="b_lines_op_sortLen">길이순</button>
      <button data-op="sortNum" type="button" data-i18n="b_lines_op_sortNum">숫자순</button>
      <button data-op="shuffle" type="button" data-i18n="b_lines_op_shuffle">무작위 섞기</button>
      <span class="sep"></span>
      <button data-op="dedup" type="button" data-i18n="b_lines_op_dedup">중복 제거</button>
      <button data-op="blank" type="button" data-i18n="b_lines_op_blank">빈 줄 제거</button>
      <button data-op="trim" type="button" data-i18n="b_lines_op_trim">앞뒤 공백 제거</button>
      <button data-op="reverse" type="button" data-i18n="b_lines_op_reverse">줄 뒤집기</button>
      <button data-op="number" type="button" data-i18n="b_lines_op_number">줄 번호</button>
    </div>
    <div class="actions">
      <button class="btn" id="copy" type="button" data-i18n="b_lines_btn_copy">📋 복사</button>
      <button class="btn btn-ghost" id="undo" type="button" data-i18n="b_lines_btn_undo">↶ 되돌리기</button>
      <button class="btn btn-ghost" id="resetIn" type="button" data-i18n="b_lines_btn_reset">입력으로 초기화</button>
    </div>
    <div class="meta" id="meta"></div>
    <div class="arrow" data-i18n="b_lines_arrow">↓ 결과</div>
    <textarea id="out" readonly></textarea>
    <div class="note" data-i18n="b_lines_note">정렬은 한국어·영문·숫자를 자연스럽게 비교합니다(숫자순은 줄 안의 첫 숫자를 기준). 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }
  var linesArr=[], histStack=[];
  function fromInput(){ linesArr=$('input').value.split(/\r?\n/); renderLines(); }
  function push(){ histStack.push(linesArr.slice()); if(histStack.length>50)histStack.shift(); }
  function ci(){ return $('ci').checked; }
  function keyFn(s){ return ci()?s.toLowerCase():s; }
  function firstNum(s){ var m=s.match(/-?\d+(\.\d+)?/); return m?parseFloat(m[0]):NaN; }
  var OPS={
    sortAsc:function(a){ return a.slice().sort(function(p,q){ return keyFn(p).localeCompare(keyFn(q),'ko',{numeric:true}); }); },
    sortDesc:function(a){ return a.slice().sort(function(p,q){ return keyFn(q).localeCompare(keyFn(p),'ko',{numeric:true}); }); },
    sortLen:function(a){ return a.slice().sort(function(p,q){ return p.length-q.length; }); },
    sortNum:function(a){ return a.slice().sort(function(p,q){ var x=firstNum(p),y=firstNum(q); if(isNaN(x))return 1; if(isNaN(y))return -1; return x-y; }); },
    shuffle:function(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=(Math.random()*(i+1))|0; var tmp=a[i];a[i]=a[j];a[j]=tmp; } return a; },
    dedup:function(a){ var seen={},out=[]; a.forEach(function(l){ var k=keyFn(l); if(!seen[k]){ seen[k]=1; out.push(l); } }); return out; },
    blank:function(a){ return a.filter(function(l){ return l.trim().length; }); },
    trim:function(a){ return a.map(function(l){ return l.trim(); }); },
    reverse:function(a){ return a.slice().reverse(); },
    number:function(a){ var w=String(a.length).length; return a.map(function(l,i){ return (String(i+1)).padStart(w,' ')+'. '+l; }); }
  };
  function apply(op){ if(!OPS[op]) return; push(); linesArr=OPS[op](linesArr); renderLines(); }
  function renderLines(){ $('out').value=linesArr.join('\n');
    var nonblank=linesArr.filter(function(l){return l.trim().length;}).length;
    $('meta').textContent=t('b_lines_meta_total')+linesArr.length+t('b_lines_meta_lines')+nonblank+t('b_lines_meta_nonempty')+linesArr.join('').length+t('b_lines_meta_chars'); }
  window.onI18n=renderLines;
  $('input').addEventListener('input',fromInput);
  document.querySelector('.ops').addEventListener('click',function(e){ var b=e.target.closest('button'); if(b) apply(b.dataset.op); });
  $('copy').addEventListener('click',function(){ if($('out').value) navigator.clipboard.writeText($('out').value).then(function(){toast(t('b_lines_toast_copied'));}); });
  $('undo').addEventListener('click',function(){ if(histStack.length){ linesArr=histStack.pop(); renderLines(); } else toast(t('b_lines_toast_no_undo')); });
  $('resetIn').addEventListener('click',fromInput);
  fromInput();
</script>
</body>
