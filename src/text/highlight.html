<body>
<div class="toolwrap" style="max-width:780px;">
  <h1 data-i18n="b_highlight_title">키워드 하이라이터</h1>
  <p class="sub" data-i18n="b_highlight_sub">긴 글에서 원하는 단어를 형광펜처럼 강조하고 몇 번 나오는지 세어 줍니다.</p>
  <div class="card">
    <textarea id="in" data-i18n-ph="b_highlight_input_ph">검색은 정보를 찾는 핵심 기능입니다. 좋은 검색은 빠르고 정확해야 하며, 사용자가 원하는 결과를 검색 결과 상단에서 바로 찾을 수 있어야 합니다. 검색 품질이 곧 서비스 품질입니다.</textarea>
    <div class="row"><input type="text" id="kw" value="검색" data-i18n-ph="b_highlight_kw_ph">
      <label style="font-size:.9rem;font-weight:600;"><input type="checkbox" id="case"> <span data-i18n="b_highlight_case">대소문자 구분</span></label>
      <label style="font-size:.9rem;font-weight:600;"><input type="checkbox" id="acc" checked> <span data-i18n="b_highlight_acc">부분 단어 포함</span></label></div>
    <div class="cnt" id="cnt"></div>
    <div class="out" id="out"></div>
    <div class="note" data-i18n-html="b_highlight_note">오픈소스 <b>mark.js</b>(MIT, <a href="https://github.com/julkue/mark.js" target="_blank" rel="noopener">julkue/mark.js</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/markjs-8/mark.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function esc(s){return String(s).replace(/[&<>]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]);});}
  function run(){ $('out').innerHTML=esc($('in').value); var marker=new Mark($('out'));
    var kws=$('kw').value.split(/\s+/).filter(Boolean); var total=0;
    marker.unmark({done:function(){ marker.mark(kws,{caseSensitive:$('case').checked,separateWordSearch:true,accuracy:$('acc').checked?'partially':'exactly',
      done:function(n){ $('cnt').textContent=t('b_highlight_cnt').replace('{n}',n); }}); }}); }
  window.onI18n=run;
  ['in','kw','case','acc'].forEach(function(id){$(id).addEventListener('input',run);$(id).addEventListener('change',run);});
  run();
</script>
