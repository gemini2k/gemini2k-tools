  function pushRecent(em){ var r=recent().filter(function(x){return x!==em;}); r.unshift(em); r=r.slice(0,24); try{ localStorage.setItem('emoji:recent',JSON.stringify(r)); }catch(e2){} }

    var q=$('q').value.trim().toLowerCase();
    if(q){ var out=''; CATS.forEach(function(c){ var hits=DATA[c].filter(function(it){ return it[0].indexOf(q)>=0 || it[1].toLowerCase().indexOf(q)>=0; });
