<body>
<div class="toolwrap" style="max-width:980px;">
  <h1 data-i18n="b_babel_title">Babel 트랜스파일러</h1>
  <p class="sub" data-i18n="b_babel_subtitle">최신 자바스크립트(ES6+)와 JSX를 구형 브라우저용 ES5로 변환합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="row"><label class="lbl" style="margin:0;"><span data-i18n="b_babel_jsx_label">JSX 변환</span> <input type="checkbox" id="jsx"/></label></div>
    <div class="grid2">
      <div><label class="lbl" data-i18n="b_babel_input_label">입력 (ES6+)</label><textarea id="in">const greet = (name = 'world') =&gt; `Hello, ${name}!`;
class Animal {
  constructor(n) { this.n = n; }
  speak() { return `${this.n} makes a sound`; }
}
const nums = [1, 2, 3].map(x =&gt; x ** 2);
const { a, ...rest } = { a: 1, b: 2, c: 3 };</textarea></div>
      <div><label class="lbl" data-i18n="b_babel_output_label">출력 (ES5)</label><div class="out" id="out"></div></div>
    </div>
    <div style="margin-top:.6rem;"><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_babel_copy_btn">📋 복사</button></div>
    <div class="note" data-i18n-html="b_babel_note">오픈소스 <b>Babel</b>(MIT, <a href="https://github.com/babel/babel" target="_blank" rel="noopener">babel/babel</a>)을 자체 호스팅합니다. preset-env(+JSX 선택 시 preset-react)로 변환합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/babel-7/babel.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function run(){ try{ var presets=['env']; if($('jsx').checked)presets.push('react');
      var res=Babel.transform($('in').value,{presets:presets}); $('out').textContent=res.code; window._o=res.code; }
    catch(e){ $('out').textContent='⚠️ '+e.message; window._o=''; } }
  var _t; $('in').addEventListener('input',function(){clearTimeout(_t);_t=setTimeout(run,300);}); $('jsx').addEventListener('change',run);
  $('copy').addEventListener('click',function(){if(window._o)navigator.clipboard.writeText(window._o).then(function(){toast(t('b_babel_copied'));});});
  run();
</script>
