<body>
<div class="toolwrap">
  <h1>HMAC 생성기</h1>
  <p class="sub">비밀 키로 메시지의 HMAC 값을 만듭니다. API 요청 서명, 웹훅 검증, 무결성 확인에 쓰세요.</p>

  <div class="card">
    <label for="msg">메시지</label>
    <textarea id="msg" placeholder="서명할 메시지를 입력하세요">hello</textarea>
    <label for="key">비밀 키 (Secret)</label>
    <input id="key" class="k" type="text" value="secret" autocomplete="off"/>
    <div class="row">
      <label style="margin:0;">해시 알고리즘</label>
      <select id="algo"><option>SHA-256</option><option>SHA-1</option><option>SHA-384</option><option>SHA-512</option></select>
      <button class="btn" id="run" type="button">HMAC 생성</button>
      <button class="btn btn-ghost" id="copy" type="button">📋 복사</button>
    </div>
    <label>결과 (HEX)</label>
    <div class="out" id="out"></div>
    <div class="note">표준 HMAC을 브라우저의 Web Crypto로 계산합니다. 키·메시지는 UTF-8로 처리하며 결과는 16진수입니다. 비밀 키와 메시지는 서버로 전송되지 않습니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  var enc=new TextEncoder();
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }
  function hex(buf){ var b=new Uint8Array(buf),s=''; for(var i=0;i<b.length;i++) s+=b[i].toString(16).padStart(2,'0'); return s; }
  function run(){
    var msg=$('msg').value, key=$('key').value, algo=$('algo').value;
    if(!key){ $('out').textContent='비밀 키를 입력하세요.'; return; }
    crypto.subtle.importKey('raw', enc.encode(key), {name:'HMAC', hash:algo}, false, ['sign'])
      .then(function(k){ return crypto.subtle.sign('HMAC', k, enc.encode(msg)); })
      .then(function(sig){ $('out').textContent=hex(sig); })
      .catch(function(e){ $('out').textContent='오류: '+e.message; });
  }
  $('run').addEventListener('click', run);
  ['msg','key','algo'].forEach(function(id){ $(id).addEventListener('input', run); });
  $('copy').addEventListener('click', function(){ var t=$('out').textContent; if(t&&!/^오류|비밀 키/.test(t)) navigator.clipboard.writeText(t).then(function(){toast('복사됐습니다');}); });
  run();
</script>
</body>
