<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_json5_title">JSON5 ↔ JSON 변환기</h1>
  <p class="sub" data-i18n="b_json5_sub">주석·홑따옴표·후행 쉼표가 들어간 JSON5를 표준 JSON으로 바꾸고 검증합니다.</p>
  <div class="card">
    <textarea id="in">{
  // 주석 가능
  name: 'gemini2k',
  tags: ['a', 'b',],   // 후행 쉼표
  hex: 0xFF,
}</textarea>
    <div class="actions"><button class="btn" id="toJson" type="button" data-i18n="b_json5_btn_tojson">→ 표준 JSON</button><button class="btn btn-ghost" id="min" type="button" data-i18n="b_json5_btn_minify">압축</button><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_json5_btn_copy">📋 복사</button></div>
    <div class="err" id="err"></div>
    <div class="arrow">↓</div>
    <div class="out" id="out"></div>
    <div class="note" data-i18n-html="b_json5_note">오픈소스 <b>JSON5</b>(MIT, <a href="https://github.com/json5/json5" target="_blank" rel="noopener">json5/json5</a>)를 자체 호스팅합니다. JSON5는 주석·홑따옴표·후행 쉼표·16진수 등을 허용하는 JSON 확장입니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/json5-2/json5.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function conv(min){ $('err').textContent=''; try{ var o=JSON5.parse($('in').value); $('out').textContent=JSON.stringify(o,null,min?0:2); $('err').innerHTML='<span class="ok">✓ '+t('b_json5_valid')+'</span>'; }
    catch(e){ $('out').textContent=''; $('err').textContent='⚠️ '+e.message; } }
  $('toJson').addEventListener('click',function(){conv(false);});
  $('min').addEventListener('click',function(){conv(true);});
  $('copy').addEventListener('click',function(){if($('out').textContent)navigator.clipboard.writeText($('out').textContent).then(function(){toast(t('b_json5_copied'));});});
  $('in').addEventListener('input',function(){conv(false);});
  window.onI18n=function(){conv(false);};
  conv(false);
</script>
