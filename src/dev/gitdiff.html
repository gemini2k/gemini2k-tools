<body>
<div class="toolwrap" style="max-width:920px;">
  <h1 data-i18n="b_gitdiff_title">Git Diff 뷰어</h1>
  <p class="sub" data-i18n-html="b_gitdiff_sub"><code>git diff</code> 결과(unified diff)를 붙여넣으면 GitHub처럼 보기 좋게 그려 줍니다.</p>
  <div class="card" style="max-width:none;">
    <textarea id="in">diff --git a/app.js b/app.js
index 1234567..89abcde 100644
--- a/app.js
+++ b/app.js
@@ -1,5 +1,6 @@
 function greet(name) {
-  return "Hi " + name;
+  // 인사말 개선
+  return `안녕하세요, ${name}님`;
 }

-console.log(greet("world"));
+console.log(greet("방문자"));</textarea>
    <div class="row"><span data-i18n="b_gitdiff_view_label">보기</span> <select id="format"><option value="line-by-line" data-i18n="b_gitdiff_opt_line">한 줄씩</option><option value="side-by-side" data-i18n="b_gitdiff_opt_side">좌우 분할</option></select></div>
    <div id="out"></div>
    <div class="note" data-i18n-html="b_gitdiff_note">오픈소스 <b>diff2html</b>(MIT, <a href="https://github.com/rtfpessoa/diff2html" target="_blank" rel="noopener">rtfpessoa/diff2html</a>)을 자체 호스팅합니다. <code>git diff</code> 또는 <code>diff -u</code> 형식의 텍스트를 넣으세요. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/diff2html-3/diff2html-ui.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function render(){ try{ var diff=$('in').value;
      if(!diff.trim()){ $('out').innerHTML='<div style="padding:1rem;color:#888;">'+t('b_gitdiff_msg_empty')+'</div>'; return; }
      var ui=new Diff2HtmlUI($('out'),diff,{drawFileList:false,matching:'lines',outputFormat:$('format').value});
      ui.draw(); ui.highlightCode();
      if(!$('out').querySelector('.d2h-file-wrapper'))$('out').innerHTML='<div style="padding:1rem;color:#888;">'+t('b_gitdiff_msg_nodiff')+'</div>'; }
    catch(e){ $('out').innerHTML='<div style="padding:1rem;color:#c00;">⚠️ '+e.message+'</div>'; } }
  window.onI18n=render;
  var _t; $('in').addEventListener('input',function(){clearTimeout(_t);_t=setTimeout(render,300);}); $('format').addEventListener('change',render);
  render();
</script>
