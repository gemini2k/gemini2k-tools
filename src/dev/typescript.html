<body>
<div class="toolwrap" style="max-width:980px;">
  <h1>TypeScript → JavaScript</h1>
  <p class="sub" data-i18n="b_typescript_sub">TypeScript 코드를 JavaScript로 컴파일해 결과를 보여 줍니다.</p>
  <div class="card" style="max-width:none;">
    <div class="row"><span data-i18n="b_typescript_target_label">타깃</span> <select id="target"><option>ESNext</option><option>ES2020</option><option selected>ES2017</option><option>ES2015</option><option>ES5</option></select>
      <span data-i18n="b_typescript_module_label">모듈</span> <select id="module"><option>ESNext</option><option selected>CommonJS</option><option>None</option></select></div>
    <div class="grid2">
      <div><label class="lbl" data-i18n="b_typescript_input_label">TypeScript</label><textarea id="in">interface User { name: string; age: number; }

function greet(user: User): string {
  return `Hello, ${user.name} (${user.age})`;
}

const users: User[] = [{ name: "Kim", age: 30 }];
const msg = users.map(u =&gt; greet(u));
console.log(msg);</textarea></div>
      <div><label class="lbl" data-i18n="b_typescript_output_label">JavaScript 출력</label><div class="out" id="out" data-i18n="b_typescript_compiling">컴파일 중…</div></div>
    </div>
    <div style="margin-top:.6rem;"><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_typescript_copy_btn">📋 복사</button></div>
    <div class="note" data-i18n-html="b_typescript_note">오픈소스 <b>TypeScript</b>(Apache-2.0, <a href="https://github.com/microsoft/TypeScript" target="_blank" rel="noopener">microsoft/TypeScript</a>)를 자체 호스팅합니다. 타입 검사 오류는 표시하지 않고 변환만 수행합니다(transpile). 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/typescript-5/typescript.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function run(){ try{
      var tmap={ESNext:ts.ScriptTarget.ESNext,ES2020:ts.ScriptTarget.ES2020,ES2017:ts.ScriptTarget.ES2017,ES2015:ts.ScriptTarget.ES2015,ES5:ts.ScriptTarget.ES5};
      var mmap={ESNext:ts.ModuleKind.ESNext,CommonJS:ts.ModuleKind.CommonJS,None:ts.ModuleKind.None};
      var res=ts.transpileModule($('in').value,{compilerOptions:{target:tmap[$('target').value],module:mmap[$('module').value]}});
      $('out').textContent=res.outputText; window._o=res.outputText;
    }catch(e){ $('out').textContent='⚠️ '+e.message; } }
  var _t; $('in').addEventListener('input',function(){clearTimeout(_t);_t=setTimeout(run,350);});
  ['target','module'].forEach(function(id){$(id).addEventListener('change',run);});
  $('copy').addEventListener('click',function(){if(window._o)navigator.clipboard.writeText(window._o).then(function(){toast(t('b_typescript_copied'));});});
  run();
</script>
