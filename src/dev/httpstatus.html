input[type=text]{flex:1;min-width:200px;padding:.7rem .8rem;border:1px solid var(--border);border-radius:11px;background:var(--input-bg);color:var(--text);font-size:1rem;}

<body>
<div class="toolwrap" style="max-width:720px;">
  <h1 data-i18n="b_httpstatus_title">HTTP 상태 코드 사전</h1>
  <p class="sub" data-i18n="b_httpstatus_sub">HTTP 상태 코드의 의미를 한국어 설명과 함께 검색합니다.</p>
  <div class="card">
    <div class="row"><input type="text" id="q" data-i18n-ph="b_httpstatus_search_ph" placeholder="코드나 이름으로 검색 (예: 404, redirect, 권한)">
      <select id="cat">
        <option value="" data-i18n="b_httpstatus_cat_all">전체</option>
        <option value="1" data-i18n="b_httpstatus_cat_1xx">1xx 정보</option>
        <option value="2" data-i18n="b_httpstatus_cat_2xx">2xx 성공</option>
        <option value="3" data-i18n="b_httpstatus_cat_3xx">3xx 리다이렉트</option>
        <option value="4" data-i18n="b_httpstatus_cat_4xx">4xx 클라이언트 오류</option>
        <option value="5" data-i18n="b_httpstatus_cat_5xx">5xx 서버 오류</option>
      </select></div>
    <div id="list"></div>
    <div class="note" data-i18n="b_httpstatus_note">클릭하면 코드가 복사됩니다. 자주 쓰이는 표준 상태 코드를 정리했습니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var DATA=[
    [100,'Continue',function(){return t('b_httpstatus_d_100');}],
    [101,'Switching Protocols',function(){return t('b_httpstatus_d_101');}],
    [103,'Early Hints',function(){return t('b_httpstatus_d_103');}],
    [200,'OK',function(){return t('b_httpstatus_d_200');}],
    [201,'Created',function(){return t('b_httpstatus_d_201');}],
    [202,'Accepted',function(){return t('b_httpstatus_d_202');}],
    [204,'No Content',function(){return t('b_httpstatus_d_204');}],
    [206,'Partial Content',function(){return t('b_httpstatus_d_206');}],
    [301,'Moved Permanently',function(){return t('b_httpstatus_d_301');}],
    [302,'Found',function(){return t('b_httpstatus_d_302');}],
    [304,'Not Modified',function(){return t('b_httpstatus_d_304');}],
    [307,'Temporary Redirect',function(){return t('b_httpstatus_d_307');}],
    [308,'Permanent Redirect',function(){return t('b_httpstatus_d_308');}],
    [400,'Bad Request',function(){return t('b_httpstatus_d_400');}],
    [401,'Unauthorized',function(){return t('b_httpstatus_d_401');}],
    [403,'Forbidden',function(){return t('b_httpstatus_d_403');}],
    [404,'Not Found',function(){return t('b_httpstatus_d_404');}],
    [405,'Method Not Allowed',function(){return t('b_httpstatus_d_405');}],
    [408,'Request Timeout',function(){return t('b_httpstatus_d_408');}],
    [409,'Conflict',function(){return t('b_httpstatus_d_409');}],
    [410,'Gone',function(){return t('b_httpstatus_d_410');}],
    [413,'Payload Too Large',function(){return t('b_httpstatus_d_413');}],
    [415,'Unsupported Media Type',function(){return t('b_httpstatus_d_415');}],
    [418,'I\'m a teapot',function(){return t('b_httpstatus_d_418');}],
    [422,'Unprocessable Entity',function(){return t('b_httpstatus_d_422');}],
    [429,'Too Many Requests',function(){return t('b_httpstatus_d_429');}],
    [500,'Internal Server Error',function(){return t('b_httpstatus_d_500');}],
    [501,'Not Implemented',function(){return t('b_httpstatus_d_501');}],
    [502,'Bad Gateway',function(){return t('b_httpstatus_d_502');}],
    [503,'Service Unavailable',function(){return t('b_httpstatus_d_503');}],
    [504,'Gateway Timeout',function(){return t('b_httpstatus_d_504');}],
    [505,'HTTP Version Not Supported',function(){return t('b_httpstatus_d_505');}]
  ];
  function render(){ var q=$('q').value.trim().toLowerCase(), cat=$('cat').value, host=$('list'); host.innerHTML='';
    var rows=DATA.filter(function(d){ if(cat&&String(d[0])[0]!==cat)return false;
      var desc=d[2]();
      if(!q)return true; return String(d[0]).indexOf(q)>=0||d[1].toLowerCase().indexOf(q)>=0||desc.toLowerCase().indexOf(q)>=0; });
    if(!rows.length){host.innerHTML='<div class="ds">'+t('b_httpstatus_no_result')+'</div>';return;}
    rows.forEach(function(d){ var div=document.createElement('div'); div.className='item';
      div.innerHTML='<span class="code c'+String(d[0])[0]+'">'+d[0]+'</span><div><div class="nm">'+d[1]+'</div><div class="ds">'+d[2]()+'</div></div>';
      div.addEventListener('click',function(){navigator.clipboard.writeText(String(d[0])).then(function(){toast(d[0]+' '+t('b_httpstatus_copied'));});});
      host.appendChild(div); }); }
  window.onI18n=render;
  ['q','cat'].forEach(function(id){$(id).addEventListener('input',render);$(id).addEventListener('change',render);});
  render();
</script>
</body>
