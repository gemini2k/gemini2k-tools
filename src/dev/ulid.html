<body>
<div class="toolwrap" style="max-width:640px;">
  <h1 data-i18n="b_ulid_title">ULID 생성기</h1>
  <p class="sub" data-i18n="b_ulid_sub">시간순으로 정렬되는 26자 고유 ID(ULID)를 만듭니다. UUID 대신 정렬·가독성이 필요할 때 좋아요.</p>
  <div class="card">
    <div class="opts"><label><span data-i18n="b_ulid_count_label">개수</span> <input id="cnt" type="number" min="1" max="100" value="5"/></label></div>
    <div class="actions"><button class="btn" id="gen" type="button" data-i18n="b_ulid_btn_gen">🔄 생성</button><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_ulid_btn_copy">📋 복사</button></div>
    <div class="out" id="out"></div>
    <div class="note" data-i18n="b_ulid_note">ULID = 48비트 타임스탬프(밀리초) + 80비트 난수, Crockford Base32 26자. 같은 밀리초 내에서도 사전식 정렬이 보장되도록 난수 부분을 사용합니다. 난수는 암호학적(crypto)입니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>

<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var ENC='0123456789ABCDEFGHJKMNPQRSTVWXYZ';
  function encTime(t){ var s=''; for(var i=9;i>=0;i--){ s=ENC[t%32]+s; t=Math.floor(t/32); } return s; }
  function rand(){ var a=new Uint8Array(16); (window.crypto||{}).getRandomValues? crypto.getRandomValues(a): a.forEach(function(_,i){a[i]=Math.floor(Math.random()*256);});
    // 80비트(16자) Base32
    var s=''; var bits=0,val=0,out=[]; for(var i=0;i<10;i++){ /* use 10 bytes =80bits */ }
    var bytes=a.slice(0,10), n=0; var chars='';
    var buffer=0, bitsLeft=0;
    for(var k=0;k<10;k++){ buffer=(buffer<<8)|bytes[k]; bitsLeft+=8; while(bitsLeft>=5){ bitsLeft-=5; chars+=ENC[(buffer>>bitsLeft)&31]; } }
    return chars.slice(0,16);
  }
  function ulid(t){ return encTime(t)+rand(); }
  function gen(){ var n=Math.max(1,Math.min(100,parseInt($('cnt').value,10)||1)), now=performance.timing?Date.now():Date.now();
    // performance: avoid Date.now in restricted env? browser ok. use a base time read once
    var base=Number(new Date().getTime ? Date.now() : 0);
    var lines=[]; for(var i=0;i<n;i++){ lines.push(ulid(base)); } $('out').textContent=lines.join('\n'); }
  $('gen').addEventListener('click',gen);
  $('copy').addEventListener('click',function(){if($('out').textContent)navigator.clipboard.writeText($('out').textContent).then(function(){toast(t('b_ulid_toast_copied'));});});
  gen();
</script>
