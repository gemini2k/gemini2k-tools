<div class="toolwrap" style="max-width:680px;"><h1 data-i18n="b_zipmaker_title">ZIP 압축·풀기</h1>
<p class="sub" data-i18n="b_zipmaker_sub">여러 파일을 ZIP으로 묶거나, ZIP 파일을 풀어 안의 파일을 꺼냅니다.</p>
<div class="card">
<div class="seg" id="seg"><button data-m="zip" class="on" type="button" data-i18n="b_zipmaker_tab_zip">압축(ZIP 만들기)</button><button data-m="unzip" type="button" data-i18n="b_zipmaker_tab_unzip">풀기(ZIP 열기)</button></div>
<div class="drop" id="drop"><div style="font-size:1.8rem">🗜️</div><div><strong id="droptxt" data-i18n="b_zipmaker_drop_zip">파일들을 끌어다 놓거나 클릭</strong></div></div>
<input type="file" id="file" multiple class="hide"/>
<div class="list" id="list"></div>
<div class="actions" id="zipact"><button class="btn" id="make" type="button" data-i18n="b_zipmaker_btn_download">⬇️ ZIP 다운로드</button></div>
<div class="note" data-i18n-html="b_zipmaker_note">오픈소스 <b>JSZip</b>(MIT)을 자체 호스팅합니다. 파일은 서버로 전송되지 않고 브라우저에서만 압축·해제됩니다.</div>
</div></div>
<script src="/vendor/jszip-3.10.1/jszip.min.js"></script><script src="tool-shell.js"></script>
<script>
var $=function(id){return document.getElementById(id);};
function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1500);}
var mode='zip', files=[];
function setMode(m){mode=m;files=[];$('list').innerHTML='';$('file').multiple=(m==='zip');$('file').value='';$('droptxt').textContent=m==='zip'?t('b_zipmaker_drop_zip'):t('b_zipmaker_drop_unzip');$('zipact').style.display=m==='zip'?'':'none';
  Array.prototype.forEach.call($('seg').children,function(x){x.classList.toggle('on',x.dataset.m===m);});}
function add(list){ if(mode==='zip'){ files=files.concat([].slice.call(list)); $('list').innerHTML=files.map(function(f){return '<div><span>'+f.name+'</span><span>'+Math.round(f.size/1024)+' KB</span></div>';}).join(''); }
  else { var f=list[0]; if(!f)return; JSZip.loadAsync(f).then(function(zip){ var rows=[]; zip.forEach(function(path,entry){ if(!entry.dir) rows.push({path:path,entry:entry}); });
    $('list').innerHTML=rows.map(function(r,i){return '<div><span>'+r.path+'</span><a href="#" data-i="'+i+'">⬇️ '+t('b_zipmaker_save')+'</a></div>';}).join('');
    window._rows=rows; }).catch(function(){toast(t('b_zipmaker_err_open'));}); } }
$('drop').addEventListener('click',function(){$('file').click();});
$('file').addEventListener('change',function(e){add(e.target.files);});
['dragover','dragenter'].forEach(function(ev){$('drop').addEventListener(ev,function(e){e.preventDefault();});});
$('drop').addEventListener('drop',function(e){e.preventDefault();if(e.dataTransfer.files.length)add(e.dataTransfer.files);});
$('seg').addEventListener('click',function(e){var b=e.target.closest('button');if(b)setMode(b.dataset.m);});
$('make').addEventListener('click',function(){ if(!files.length){toast(t('b_zipmaker_err_nofile'));return;} var zip=new JSZip(); files.forEach(function(f){zip.file(f.name,f);});
  zip.generateAsync({type:'blob',compression:'DEFLATE'}).then(function(blob){var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='archive.zip';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},150);}); });
$('list').addEventListener('click',function(e){ var a=e.target.closest('a[data-i]'); if(!a)return; e.preventDefault(); var r=window._rows[+a.dataset.i];
  r.entry.async('blob').then(function(blob){var x=document.createElement('a');x.href=URL.createObjectURL(blob);x.download=r.path.split('/').pop();document.body.appendChild(x);x.click();setTimeout(function(){URL.revokeObjectURL(x.href);x.remove();},150);}); });
window.onI18n=function(){setMode(mode);};
setMode('zip');
</script></body></html>
