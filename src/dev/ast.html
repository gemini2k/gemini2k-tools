<body>
<div class="toolwrap" style="max-width:980px;">
  <h1 data-i18n="b_ast_title">JavaScript AST 뷰어</h1>
  <p class="sub" data-i18n="b_ast_sub">자바스크립트 코드를 파싱해 추상 구문 트리(AST)를 보여 줍니다. 컴파일러·린터 학습에 좋아요.</p>
  <div class="card" style="max-width:none;">
    <div class="row">ECMA <select id="ecma"><option>latest</option><option>2020</option><option>2017</option><option>2015</option><option>5</option></select>
      <label style="font-weight:600;font-size:.9rem;"><input type="checkbox" id="loc"/> <span data-i18n="b_ast_loc_label">위치정보(start/end) 표시</span></label></div>
    <div class="grid2">
      <div><label class="lbl" data-i18n="b_ast_lbl_code">JavaScript 코드</label><textarea id="in">function fib(n) {
  return n < 2 ? n : fib(n - 1) + fib(n - 2);
}
const arr = [1, 2, 3].map(x =&gt; x * 2);</textarea></div>
      <div><label class="lbl" data-i18n="b_ast_lbl_ast">AST (JSON)</label><div class="out" id="out"></div></div>
    </div>
    <div class="err" id="err"></div>
    <div class="note" data-i18n-html="b_ast_note">오픈소스 <b>acorn</b>(MIT, <a href="https://github.com/acornjs/acorn" target="_blank" rel="noopener">acornjs/acorn</a>)을 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/acorn-8/acorn.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function run(){ $('err').textContent='';
    try{ var opts={ecmaVersion:$('ecma').value==='latest'?'latest':+$('ecma').value,sourceType:'module'};
      var ast=acorn.parse($('in').value,opts);
      var seen=new WeakSet();
      var json=JSON.stringify(ast,function(k,v){ if((k==='start'||k==='end')&&!$('loc').checked)return undefined;
        if(typeof v==='object'&&v){ if(seen.has(v))return '[circular]'; seen.add(v); } return v; },2);
      $('out').textContent=json; }
    catch(e){ $('err').textContent='⚠️ '+e.message; } }
  var _t; $('in').addEventListener('input',function(){clearTimeout(_t);_t=setTimeout(run,300);});
  ['ecma','loc'].forEach(function(id){$(id).addEventListener('change',run);});
  run();
</script>
</body>
