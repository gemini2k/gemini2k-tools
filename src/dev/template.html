label.lbl{font-weight:700;font-size:.85rem;display:block;margin-bottom:.3rem;}
textarea{width:100%;min-height:170px;padding:.6rem .7rem;border:1px solid var(--border);border-radius:10px;background:var(--input-bg);color:var(--text);font-family:ui-monospace,monospace;font-size:.84rem;resize:vertical;}
.out{width:100%;min-height:120px;border:1px solid var(--border);border-radius:10px;background:var(--ground);padding:.7rem;font-family:ui-monospace,monospace;font-size:.84rem;color:var(--text);white-space:pre-wrap;word-break:break-word;overflow:auto;margin-top:.6rem;}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"DeveloperApplication","name":"Handlebars 템플릿 렌더러","description":"Handlebars 템플릿과 JSON 데이터를 합쳐 결과를 생성합니다.","url":"https://gemini2k.co.kr/template.html","applicationCategory":"DeveloperApplication","operatingSystem":"Web","inLanguage":"ko","isAccessibleForFree":true,"license":"https://opensource.org/licenses/MIT","offers":{"@type":"Offer","price":"0","priceCurrency":"KRW"},"publisher":{"@type":"Organization","name":"빛의여행(gemini2k) 도구","url":"https://gemini2k.co.kr/"}}</script>

<body>
<div class="toolwrap" style="max-width:920px;">
  <h1 data-i18n="b_template_title">Handlebars 템플릿 렌더러</h1>
  <p class="sub" data-i18n="b_template_sub">템플릿과 JSON 데이터를 합쳐 결과를 만듭니다. 메일 머지·반복·조건 출력에 좋아요.</p>
  <div class="card" style="max-width:none;">
    <div class="grid2">
      <div><label class="lbl" data-i18n="b_template_lbl_tpl">템플릿 (Handlebars)</label><textarea id="tpl">안녕하세요 {{name}}님,

주문하신 상품 목록입니다:
{{#each items}}
- {{this.name}} x {{this.qty}}
{{/each}}

{{#if vip}}VIP 고객 혜택이 적용되었습니다.{{/if}}
감사합니다.</textarea></div>
      <div><label class="lbl" data-i18n="b_template_lbl_data">데이터 (JSON)</label><textarea id="data">{
  "name": "홍길동",
  "vip": true,
  "items": [
    { "name": "사과", "qty": 3 },
    { "name": "바나나", "qty": 5 }
  ]
}</textarea></div>
    </div>
    <div class="err" id="err"></div>
    <label class="lbl" style="margin-top:.6rem;" data-i18n="b_template_lbl_result">결과</label><div class="out" id="out"></div>
    <div class="actions"><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_template_btn_copy">📋 복사</button></div>
    <div class="note" data-i18n-html="b_template_note">오픈소스 <b>Handlebars</b>(MIT, <a href="https://github.com/handlebars-lang/handlebars.js" target="_blank" rel="noopener">handlebars-lang/handlebars.js</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/handlebars-4/handlebars.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function run(){ $('err').textContent='';
    var data; try{ data=JSON.parse($('data').value); }catch(e){ $('err').textContent='⚠️ '+t('b_template_err_json')+e.message; return; }
    try{ var tpl=Handlebars.compile($('tpl').value); $('out').textContent=tpl(data); window._o=$('out').textContent; }
    catch(e){ $('err').textContent='⚠️ '+t('b_template_err_tpl')+e.message; } }
  var _t; ['tpl','data'].forEach(function(id){$(id).addEventListener('input',function(){clearTimeout(_t);_t=setTimeout(run,300);});});
  $('copy').addEventListener('click',function(){if(window._o)navigator.clipboard.writeText(window._o).then(function(){toast(t('b_template_toast_copy'));});});
  run();
</script>
</body>
