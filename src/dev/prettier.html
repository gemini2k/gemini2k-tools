<div class="toolwrap" style="max-width:820px;">

  <div class="card">
    <div class="row"><span data-i18n="b_prettier_lang_label">언어</span> <select id="lang"><option value="babel">JavaScript</option><option value="css">CSS</option><option value="html">HTML</option><option value="json">JSON</option><option value="markdown">Markdown</option></select>

      <button class="btn" id="run" type="button" data-i18n="b_prettier_run">정렬</button><button class="btn btn-ghost" id="copy" type="button">📋 <span data-i18n="b_prettier_copy">복사</span></button></div>
    <textarea id="in">const x={a:1,b:2,c:[1,2,3]};function foo(a,b){return a+b}

<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function run(){ $('err').textContent='';
    prettier.format($('in').value,{parser:$('lang').value,plugins:prettierPlugins,tabWidth:+$('tab').value,semi:$('semi').checked,singleQuote:$('single').checked})
      .then(function(out){ $('in').value=out; }).catch(function(e){ $('err').textContent='⚠️ '+e.message; }); }
  $('run').addEventListener('click',run);
  $('copy').addEventListener('click',function(){navigator.clipboard.writeText($('in').value).then(function(){toast(t('b_prettier_copied'));});});
  run();
</script>
