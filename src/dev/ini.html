<body>
<div class="toolwrap" style="max-width:780px;">
  <h1 data-i18n="b_ini_title">INI ↔ JSON 변환기</h1>
  <p class="sub" data-i18n="b_ini_sub">INI 설정 파일과 JSON을 서로 변환합니다.</p>
  <div class="card">
    <div class="seg" id="seg"><button data-d="i2j" class="on" type="button" data-i18n="b_ini_btn_i2j">INI → JSON</button><button data-d="j2i" type="button" data-i18n="b_ini_btn_j2i">JSON → INI</button></div>
    <textarea id="in">; 예시 설정
[server]
host = localhost
port = 8080
debug = true

[db]
name = mydb</textarea>
    <div class="actions"><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_ini_btn_copy">📋 복사</button></div>
    <div class="err" id="err"></div>
    <div class="arrow">↓</div>
    <div class="out" id="out"></div>
    <div class="note" data-i18n-html="b_ini_note">섹션 <code>[name]</code>, <code>key = value</code>, 주석 <code>;</code>·<code>#</code>을 처리합니다. true/false/숫자는 자동 인식합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var dir='i2j';
  function val(v){ if(/^-?\d+(\.\d+)?$/.test(v))return +v; if(v==='true')return true; if(v==='false')return false; return v; }
  function i2j(s){ var o={},cur=o; s.split(/\r?\n/).forEach(function(line){ var tmp=line.trim(); if(!tmp||tmp[0]===';'||tmp[0]==='#')return;
    var m=tmp.match(/^\[(.+)\]$/); if(m){ cur=o[m[1]]={}; return; } var kv=tmp.match(/^([^=]+)=(.*)$/); if(kv) cur[kv[1].trim()]=val(kv[2].trim()); });
    return JSON.stringify(o,null,2); }
  function j2i(s){ var o=JSON.parse(s); var top='',sec=''; Object.keys(o).forEach(function(k){ var v=o[k];
    if(v&&typeof v==='object'&&!Array.isArray(v)){ sec+='\n['+k+']\n'; Object.keys(v).forEach(function(k2){ sec+=k2+' = '+v[k2]+'\n'; }); }
    else top+=k+' = '+(Array.isArray(v)?v.join(','):v)+'\n'; }); return (top+sec).trim(); }
  function getExampleIni(){ return t('b_ini_example_ini'); }
  function run(){ $('err').textContent=''; try{ $('out').textContent = dir==='i2j'? i2j($('in').value) : j2i($('in').value); }catch(e){ $('out').textContent=''; $('err').textContent='⚠️ '+e.message; } }
  $('seg').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;dir=b.dataset.d;Array.prototype.forEach.call($('seg').children,function(x){x.classList.toggle('on',x===b);});
    $('in').value = dir==='i2j'? t('b_ini_example_ini') :'{\n  "server": { "host": "localhost", "port": 8080, "debug": true },\n  "db": { "name": "mydb" }\n}';run();});
  $('in').addEventListener('input',run);
  $('copy').addEventListener('click',function(){if($('out').textContent)navigator.clipboard.writeText($('out').textContent).then(function(){toast(t('b_ini_toast_copied'));});});
  window.onI18n = function(){
    if(dir==='i2j') $('in').value = t('b_ini_example_ini');
    run();
  };
  run();
</script>
</body>
