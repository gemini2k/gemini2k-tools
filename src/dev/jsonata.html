<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_jsonata_title">JSONata 쿼리·변환기</h1>
  <p class="sub" data-i18n="b_jsonata_sub">JSONata 표현식으로 JSON을 질의·필터·집계·재구성합니다.</p>
  <div class="card">
    <label class="lbl" data-i18n="b_jsonata_lbl_data">JSON 데이터</label>
    <textarea id="data">{
  "orders": [
    { "item": "사과", "qty": 3, "price": 1000 },
    { "item": "바나나", "qty": 5, "price": 500 },
    { "item": "체리", "qty": 2, "price": 3000 }
  ]
}</textarea>
    <label class="lbl" data-i18n="b_jsonata_lbl_expr">JSONata 표현식</label>
    <input type="text" id="expr" value="$sum(orders.(qty * price))"/>
    <label class="lbl" data-i18n="b_jsonata_lbl_result">결과</label>
    <div class="err" id="err"></div>
    <div class="out" id="out"></div>
    <div class="note" data-i18n-html="b_jsonata_note">오픈소스 <b>JSONata</b>(MIT, <a href="https://github.com/jsonata-js/jsonata" target="_blank" rel="noopener">jsonata-js/jsonata</a>)를 자체 호스팅합니다. 예: <code>orders[qty&gt;2].item</code>, <code>orders{item: price}</code>. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/jsonata-2/jsonata.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function run(){ $('err').textContent='';
    var data; try{ data=JSON.parse($('data').value); }catch(e){ $('err').textContent='⚠️ '+t('b_jsonata_err_json')+e.message; $('out').textContent=''; return; }
    try{ var ex=jsonata($('expr').value); ex.evaluate(data).then(function(res){ $('out').textContent=res===undefined?t('b_jsonata_no_result'):JSON.stringify(res,null,2); })
        .catch(function(e){ $('err').textContent='⚠️ '+e.message; $('out').textContent=''; }); }
    catch(e){ $('err').textContent='⚠️ '+t('b_jsonata_err_expr')+e.message; $('out').textContent=''; } }
  window.onI18n=run;
  var _t; ['data','expr'].forEach(function(id){$(id).addEventListener('input',function(){clearTimeout(_t);_t=setTimeout(run,300);});});
  run();
</script>
</body>
