<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_ansi_title">ANSI 터미널 색상 → HTML</h1>
  <p class="sub" data-i18n="b_ansi_sub">터미널 로그의 색상 코드(ANSI)를 색이 입혀진 HTML로 바꿔 줍니다.</p>
  <div class="card">
    <textarea id="in" spellcheck="false"></textarea>
    <div class="actions"><button class="btn btn-ghost" id="sample" type="button" data-i18n="b_ansi_btn_sample">예시 다시 넣기</button><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_ansi_btn_copy">📋 HTML 복사</button></div>
    <div class="term" id="term"></div>
    <div class="out" id="out"></div>
    <div class="note" data-i18n-html="b_ansi_note">오픈소스 <b>ansi_up</b>(MIT, <a href="https://github.com/drudru/ansi_up" target="_blank" rel="noopener">drudru/ansi_up</a>)을 자체 호스팅합니다. 실제 ESC 문자가 포함된 로그를 붙여넣거나, <code>[</code>·<code>\x1b[</code>·<code>^[[</code> 표기를 사용해도 됩니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/ansiup-5/ansi_up.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var au=new AnsiUp();
  var E='\\'+'u001b';
  var sample=[E+'[32m✔ '+t('b_ansi_sample_ok')+E+'[0m',E+'[33m⚠ '+t('b_ansi_sample_warn')+E+'[0m',E+'[31m✘ '+t('b_ansi_sample_err')+E+'[0m',E+'[1;34m[INFO]'+E+'[0m '+t('b_ansi_sample_info')].join('\n');
  function toEsc(s){ var esc=String.fromCharCode(27);
    return s.split('\\u001b').join(esc).split('\\x1b').join(esc).split('\\033').join(esc).split('\\e').join(esc).split('^[').join(esc); }
  function run(){ var html=au.ansi_to_html(toEsc($('in').value)); $('term').innerHTML=html; $('out').textContent=html; window._o=html; }
  $('sample').addEventListener('click',function(){
    sample=[E+'[32m✔ '+t('b_ansi_sample_ok')+E+'[0m',E+'[33m⚠ '+t('b_ansi_sample_warn')+E+'[0m',E+'[31m✘ '+t('b_ansi_sample_err')+E+'[0m',E+'[1;34m[INFO]'+E+'[0m '+t('b_ansi_sample_info')].join('\n');
    $('in').value=sample;run();
  });
  $('in').addEventListener('input',run);
  $('copy').addEventListener('click',function(){if(window._o)navigator.clipboard.writeText(window._o).then(function(){toast(t('b_ansi_toast_copied'));});});
  window.onI18n=function(){
    sample=[E+'[32m✔ '+t('b_ansi_sample_ok')+E+'[0m',E+'[33m⚠ '+t('b_ansi_sample_warn')+E+'[0m',E+'[31m✘ '+t('b_ansi_sample_err')+E+'[0m',E+'[1;34m[INFO]'+E+'[0m '+t('b_ansi_sample_info')].join('\n');
    $('in').value=sample;run();
  };
  $('in').value=sample; run();
</script>
