<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_codehl_title">코드 신택스 하이라이터</h1>
  <p class="sub" data-i18n="b_codehl_sub">코드를 붙여넣으면 색을 입히고, 블로그·문서에 그대로 붙일 수 있는 HTML을 만들어 줍니다.</p>
  <div class="card">
    <textarea id="in">function greet(name){\n  // 인사\n  return `Hello, ${name}!`;\n}\nconsole.log(greet("gemini2k"));</textarea>
    <div class="opts">
      <label><span data-i18n="b_codehl_lang_label">언어</span> <select id="lang"><option value="" data-i18n="b_codehl_lang_auto">자동 감지</option><option>javascript</option><option>typescript</option><option>python</option><option>java</option><option>c</option><option>cpp</option><option>csharp</option><option>go</option><option>rust</option><option>php</option><option>ruby</option><option>kotlin</option><option>swift</option><option>sql</option><option>json</option><option>xml</option><option>css</option><option>bash</option><option>yaml</option></select></label>
      <label><span data-i18n="b_codehl_theme_label">테마</span> <select id="theme"><option value="github.min.css" data-i18n="b_codehl_theme_light">라이트</option><option value="github-dark.min.css" data-i18n="b_codehl_theme_dark">다크</option></select></label>
      <span class="lang" id="detected"></span>
    </div>
    <pre class="hl"><code id="out"></code></pre>
    <div class="actions"><button class="btn btn-ghost" id="copyhtml" type="button" data-i18n="b_codehl_copy_btn">📋 HTML 복사</button></div>
    <div class="note" data-i18n-html="b_codehl_note">오픈소스 <b>highlight.js</b>(BSD-3, <a href="https://github.com/highlightjs/highlight.js" target="_blank" rel="noopener">highlightjs/highlight.js</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/highlightjs-11/highlight.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function render(){ var code=$('in').value.replace(/\\n/g,'\n'); var lang=$('lang').value, res;
    try{ res = lang? hljs.highlight(code,{language:lang}) : hljs.highlightAuto(code); }catch(e){ res={value:code.replace(/</g,'&lt;'),language:''}; }
    $('out').innerHTML=res.value; $('out').className=''; $('detected').textContent= res.language? t('b_codehl_detected')+': '+res.language : '';
    window._html='<pre><code class="hljs">'+res.value+'</code></pre>';
  }
  window.onI18n=render;
  ['in','lang'].forEach(function(id){$(id).addEventListener('input',render);$(id).addEventListener('change',render);});
  $('theme').addEventListener('change',function(){ $('hlcss').href='/vendor/highlightjs-11/'+$('theme').value; });
  $('copyhtml').addEventListener('click',function(){if(window._html)navigator.clipboard.writeText(window._html).then(function(){toast(t('b_codehl_copied'));});});
  render();
</script>
</body>
