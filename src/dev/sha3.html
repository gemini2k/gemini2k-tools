  <div class="card">

    <table><tbody id="tb"></tbody></table>

<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var rows=[['SHA3-224',function(s){return sha3_224(s);}],['SHA3-256',function(s){return sha3_256(s);}],['SHA3-384',function(s){return sha3_384(s);}],['SHA3-512',function(s){return sha3_512(s);}],
    ['Keccak-256 (ETH)',function(s){return keccak256(s);}],['Keccak-512',function(s){return keccak512(s);}],['SHAKE128 (256bit)',function(s){return shake128(s,256);}],['SHAKE256 (512bit)',function(s){return shake256(s,512);}]];
  function run(){ var s=$('in').value, tb=$('tb'); tb.innerHTML='';
    rows.forEach(function(r){ var h; try{h=r[1](s);}catch(e){h='-';} var tr=document.createElement('tr');
      tr.innerHTML='<td>'+r[0]+'</td><td class="h">'+h+'</td>';
      tr.querySelector('.h').addEventListener('click',function(){navigator.clipboard.writeText(h).then(function(){toast(t('b_sha3_copied'));});});
      tb.appendChild(tr); }); }
  $('in').addEventListener('input',run); run();
</script>
