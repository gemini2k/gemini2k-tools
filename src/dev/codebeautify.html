<body>
<div class="toolwrap" style="max-width:820px;">
  <h1>코드 정리·포매터</h1>
  <p class="sub">HTML·CSS·JavaScript를 보기 좋게 정렬하거나 한 줄로 압축합니다.</p>
  <div class="card">
    <textarea id="in">.box{color:red;margin:0}function f(a){return a*2}</textarea>
    <div class="opts">
      <label>언어 <select id="lang"><option value="css">CSS</option><option value="js">JavaScript</option><option value="html">HTML</option></select></label>
      <label>들여쓰기 <select id="indent"><option value="2">2칸</option><option value="4">4칸</option><option value="tab">탭</option></select></label>
    </div>
    <div class="actions"><button class="btn" id="beautify" type="button">정렬(Beautify)</button><button class="btn btn-ghost" id="minify" type="button">압축(Minify)</button><button class="btn btn-ghost" id="copy" type="button">📋 복사</button></div>
    <div class="arrow">↓</div>
    <div class="out" id="out"></div>
    <div class="note">오픈소스 <b>js-beautify</b>(MIT, <a href="https://github.com/beautifier/js-beautify" target="_blank" rel="noopener">beautifier/js-beautify</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/jsbeautify-1.15/beautify.min.js"></script>
<script src="/vendor/jsbeautify-1.15/beautify-css.min.js"></script>
<script src="/vendor/jsbeautify-1.15/beautify-html.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function opts(){ var i=$('indent').value; return {indent_size: i==='tab'?1:parseInt(i,10), indent_with_tabs: i==='tab'}; }
  function fn(){ var l=$('lang').value; return l==='css'?css_beautify : l==='html'?html_beautify : js_beautify; }
  function beautify(){ try{ $('out').textContent=fn()($('in').value, opts()); }catch(e){ $('out').textContent='⚠️ '+e.message; } }
  function minify(){ var l=$('lang').value, s=$('in').value;
    try{ if(l==='css') $('out').textContent=s.replace(/\/\*[\s\S]*?\*\//g,'').replace(/\s*([{}:;,])\s*/g,'$1').replace(/;}/g,'}').trim();
      else if(l==='js') $('out').textContent=js_beautify(s,{indent_size:0,preserve_newlines:false}).replace(/\n\s*/g,' ').replace(/\s*([=+\-*/{}();,:])\s*/g,'$1');
      else $('out').textContent=s.replace(/>\s+</g,'><').replace(/<!--[\s\S]*?-->/g,'').replace(/\s{2,}/g,' ').trim();
    }catch(e){ $('out').textContent='⚠️ '+e.message; } }
  $('beautify').addEventListener('click',beautify);
  $('minify').addEventListener('click',minify);
  $('copy').addEventListener('click',function(){if($('out').textContent)navigator.clipboard.writeText($('out').textContent).then(function(){toast('복사됐습니다');});});
  beautify();
</script>
