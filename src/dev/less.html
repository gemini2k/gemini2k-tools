<style>.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}@media(max-width:680px){.grid2{grid-template-columns:1fr;}}
label.lbl{font-weight:700;font-size:.85rem;display:block;margin-bottom:.3rem;}
textarea{width:100%;min-height:260px;padding:.7rem;border:1px solid var(--border);border-radius:11px;background:var(--input-bg);font-family:ui-monospace,monospace;font-size:.83rem;color:var(--text);resize:vertical;}
.out{width:100%;min-height:260px;border:1px solid var(--border);border-radius:11px;background:var(--ground);padding:.7rem;font-family:ui-monospace,monospace;font-size:.83rem;color:var(--text);white-space:pre-wrap;word-break:break-word;overflow:auto;}
.row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin-bottom:.6rem;}.err{color:#e0563b;font-size:.85rem;min-height:1.1em;}

<body>
<div class="toolwrap" style="max-width:980px;">
  <h1 data-i18n="b_less_title">LESS → CSS 컴파일러</h1>
  <p class="sub" data-i18n="b_less_sub">변수·믹스인·중첩이 있는 LESS를 표준 CSS로 변환합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="row"><label class="lbl" style="margin:0;"><span data-i18n="b_less_minify">압축(minify)</span> <input type="checkbox" id="min"/></label></div>
    <div class="grid2">
      <div><label class="lbl" data-i18n="b_less_input_label">LESS 입력</label><textarea id="in">@brand: #2563eb;
@radius: 8px;
.button(@bg) {
  background: @bg;
  border-radius: @radius;
  padding: 8px 16px;
}
.btn-primary {
  .button(@brand);
  &:hover { background: darken(@brand, 10%); }
}</textarea></div>
      <div><label class="lbl" data-i18n="b_less_output_label">CSS 출력</label><div class="out" id="out"></div></div>
    </div>
    <div class="err" id="err"></div>
    <div style="margin-top:.6rem;"><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_less_copy_btn">📋 복사</button></div>
    <div class="note" data-i18n-html="b_less_note">오픈소스 <b>Less.js</b>(Apache-2.0, <a href="https://github.com/less/less.js" target="_blank" rel="noopener">less/less.js</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/less-4/less.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function run(){ $('err').textContent='';
    less.render($('in').value,{compress:$('min').checked}).then(function(o){ $('out').textContent=o.css; window._o=o.css; })
      .catch(function(e){ $('err').textContent='⚠️ '+(e.message||e); }); }
  var _t; $('in').addEventListener('input',function(){clearTimeout(_t);_t=setTimeout(run,350);}); $('min').addEventListener('change',run);
  $('copy').addEventListener('click',function(){if(window._o)navigator.clipboard.writeText(window._o).then(function(){toast(t('b_less_copied'));});});
  window.onI18n=function(){};
  run();
</script>
</body>
