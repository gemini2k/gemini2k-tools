<body>
<div class="toolwrap" style="max-width:780px;">
  <h1 data-i18n="b_boxshadow_title">CSS 박스 그림자 생성기</h1>
  <p class="sub" data-i18n-html="b_boxshadow_sub">슬라이더로 그림자를 조절하면 CSS <code>box-shadow</code> 코드가 만들어집니다.</p>
  <div class="card">
    <div class="grid">
      <div class="ctrl">
        <label><span data-i18n="b_boxshadow_label_x">가로 위치 (x):</span> <span id="xv">0</span>px</label><input type="range" id="x" min="-50" max="50" value="0">
        <label><span data-i18n="b_boxshadow_label_y">세로 위치 (y):</span> <span id="yv">10</span>px</label><input type="range" id="y" min="-50" max="50" value="10">
        <label><span data-i18n="b_boxshadow_label_blur">흐림 (blur):</span> <span id="bv">25</span>px</label><input type="range" id="blur" min="0" max="100" value="25">
        <label><span data-i18n="b_boxshadow_label_spread">번짐 (spread):</span> <span id="sv">0</span>px</label><input type="range" id="spread" min="-30" max="50" value="0">
        <label><span data-i18n="b_boxshadow_label_opacity">불투명도:</span> <span id="ov">25</span>%</label><input type="range" id="op" min="0" max="100" value="25">
        <label><span data-i18n="b_boxshadow_label_color">그림자 색</span> <input type="color" id="color" value="#1e3a8a" style="width:46px;height:30px;vertical-align:middle;border:1px solid var(--border);border-radius:6px;"></label>
        <label><span data-i18n="b_boxshadow_label_boxcolor">박스 색</span> <input type="color" id="boxc" value="#3b82f6" style="width:46px;height:30px;vertical-align:middle;border:1px solid var(--border);border-radius:6px;"></label>
        <label style="margin-top:.6rem;"><input type="checkbox" id="inset"> <span data-i18n="b_boxshadow_label_inset">내부 그림자(inset)</span></label>
      </div>
      <div><div class="stage"><div class="box" id="box"></div></div></div>
    </div>
    <div class="out" id="out"></div>
    <button class="btn btn-ghost" id="copy" type="button" style="margin-top:.5rem;" data-i18n="b_boxshadow_btn_copy">📋 복사</button>
    <div class="note" data-i18n="b_boxshadow_note">결과 코드를 복사해 CSS에 붙여넣으세요. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function hexA(hex,a){ var n=parseInt(hex.slice(1),16); return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')'; }
  function run(){ ['x','y','blur','spread','op'].forEach(function(id){var m={x:'xv',y:'yv',blur:'bv',spread:'sv',op:'ov'};$(m[id]).textContent=$(id).value;});
    var shadow=($('inset').checked?'inset ':'')+$('x').value+'px '+$('y').value+'px '+$('blur').value+'px '+$('spread').value+'px '+hexA($('color').value,(+$('op').value/100).toFixed(2));
    $('box').style.boxShadow=shadow; $('box').style.background=$('boxc').value;
    $('out').textContent='box-shadow: '+shadow+';'; window._o=$('out').textContent; }
  ['x','y','blur','spread','op','color','boxc','inset'].forEach(function(id){$(id).addEventListener('input',run);});
  $('copy').addEventListener('click',function(){if(window._o)navigator.clipboard.writeText(window._o).then(function(){toast(t('b_boxshadow_toast_copied'));});});
  run();
</script>
