  textarea{width:100%;min-height:80px;padding:.7rem .8rem;border:1px solid var(--border);border-radius:11px;background:var(--input-bg);font-family:ui-monospace,monospace;font-size:.95rem;color:var(--text);resize:vertical;margin-bottom:.8rem;}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:.7rem;}
  .seg button{padding:.5rem .9rem;border:0;background:var(--surface);color:var(--text);font-family:inherit;font-weight:700;cursor:pointer;font-size:.86rem;}
  .seg button.on{background:var(--accent);color:#fff;}
  .item{border:1px solid var(--border);border-radius:11px;padding:.6rem .9rem;background:var(--ground);cursor:pointer;margin-bottom:.5rem;}

  .note{margin-top:1.1rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}

<body>
<div class="toolwrap" style="max-width:720px;">
  <h1 data-i18n="b_unicodeconv_title">유니코드 변환·인스펙터</h1>
  <p class="sub" data-i18n="b_unicodeconv_sub">문자를 코드포인트·이스케이프·UTF-8 바이트로 보고, 반대로 이스케이프를 문자로 되돌립니다.</p>
  <div class="card">
    <div class="seg" id="seg"><button data-d="enc" class="on" type="button" data-i18n="b_unicodeconv_btn_enc">문자 → 코드</button><button data-d="dec" type="button" data-i18n="b_unicodeconv_btn_dec">이스케이프 → 문자</button></div>
    <textarea id="in">가A€😀</textarea>
    <div id="res"></div>
    <div class="note" data-i18n="b_unicodeconv_note">'이스케이프 → 문자'는 \uXXXX, \u{XXXXX}, U+XXXX, &amp;#xXXXX; 형태를 인식해 문자로 되돌립니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var dir='enc';
  function hex(n,w){ var s=n.toString(16).toUpperCase(); while(s.length<(w||4))s='0'+s; return s; }
  function utf8bytes(s){ var b=unescape(encodeURIComponent(s)); var out=[]; for(var i=0;i<b.length;i++)out.push(hex(b.charCodeAt(i),2)); return out.join(' '); }
  function enc(s){ var cps=[...s];
    return [
      [t('b_unicodeconv_label_codepoint'), cps.map(function(c){return 'U+'+hex(c.codePointAt(0));}).join(' ')],
      [t('b_unicodeconv_label_u_escape'), s.split('').map(function(c){return '\\u'+hex(c.charCodeAt(0));}).join('')],
      [t('b_unicodeconv_label_u_es6'), cps.map(function(c){return '\\u{'+c.codePointAt(0).toString(16).toUpperCase()+'}';}).join('')],
      [t('b_unicodeconv_label_html_entity'), cps.map(function(c){return '&#'+c.codePointAt(0)+';';}).join('')],
      [t('b_unicodeconv_label_utf8'), utf8bytes(s)],
      [t('b_unicodeconv_label_decimal'), cps.map(function(c){return c.codePointAt(0);}).join(' ')]
    ];
  }
  function dec(s){ var out=s
    .replace(/\\u\{([0-9a-fA-F]+)\}/g,function(_,h){return String.fromCodePoint(parseInt(h,16));})
    .replace(/\\u([0-9a-fA-F]{4})/g,function(_,h){return String.fromCharCode(parseInt(h,16));})
    .replace(/U\+([0-9a-fA-F]{2,6})/g,function(_,h){return String.fromCodePoint(parseInt(h,16));})
    .replace(/&#x([0-9a-fA-F]+);/g,function(_,h){return String.fromCodePoint(parseInt(h,16));})
    .replace(/&#(\d+);/g,function(_,d){return String.fromCodePoint(parseInt(d,10));});
    return [[t('b_unicodeconv_label_decoded'), out]];
  }
  function render(){ var s=$('in').value; var items = dir==='enc'? enc(s) : dec(s);
    $('res').innerHTML=items.map(function(it){ return '<div class="item" data-v="'+(''+it[1]).replace(/"/g,'&quot;')+'"><div class="l">'+it[0]+'</div><div class="v">'+(it[1]||'…').replace(/</g,'&lt;')+'</div></div>'; }).join(''); }
  $('seg').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;dir=b.dataset.d;Array.prototype.forEach.call($('seg').children,function(x){x.classList.toggle('on',x===b);});
    $('in').value = dir==='enc'?'가A€😀':'\\uAC00 \\u0041 U+1F600'; render();});
  $('in').addEventListener('input',render);
  $('res').addEventListener('click',function(e){var it=e.target.closest('.item');if(it){navigator.clipboard.writeText(it.dataset.v).then(function(){toast(t('b_unicodeconv_toast_copied'));});}});
  window.onI18n = render;
  render();
</script>
