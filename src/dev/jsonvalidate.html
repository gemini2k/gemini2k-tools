<script type="application/ld+json">{"@context":"https://schema.org","@type":"DeveloperApplication","name":"JSON 스키마 검증기","description":"JSON 데이터를 JSON Schema(draft-07)로 검증합니다(Ajv).","url":"https://gemini2k.co.kr/jsonvalidate.html","applicationCategory":"DeveloperApplication","operatingSystem":"Web","inLanguage":"ko","isAccessibleForFree":true,"license":"https://opensource.org/licenses/MIT","offers":{"@type":"Offer","price":"0","priceCurrency":"KRW"},"publisher":{"@type":"Organization","name":"빛의여행(gemini2k) 도구","url":"https://gemini2k.co.kr/"}}</script>

<body>
<div class="toolwrap" style="max-width:880px;">
  <h1 data-i18n="b_jsonvalidate_title">JSON 스키마 검증기</h1>
  <p class="sub" data-i18n="b_jsonvalidate_sub">JSON 데이터가 JSON Schema(draft-07) 규칙에 맞는지 확인하고, 어긋난 부분을 알려 줍니다.</p>
  <div class="card" style="max-width:none;">
    <div class="grid2">
      <div><label class="lbl" data-i18n="b_jsonvalidate_label_schema">JSON Schema</label><textarea id="schema">{
  "type": "object",
  "required": ["name", "age"],
  "properties": {
    "name": { "type": "string", "minLength": 1 },
    "age": { "type": "integer", "minimum": 0 },
    "email": { "type": "string", "format": "email" }
  }
}</textarea></div>
      <div><label class="lbl" data-i18n="b_jsonvalidate_label_data">검증할 데이터</label><textarea id="data">{
  "name": "홍길동",
  "age": -5,
  "email": "not-an-email"
}</textarea></div>
    </div>
    <div style="margin-top:.7rem;"><button class="btn" id="run" type="button" data-i18n="b_jsonvalidate_btn_run">검증하기</button></div>
    <div class="result" id="result" style="display:none;"></div>
    <div class="note" data-i18n-html="b_jsonvalidate_note">오픈소스 <b>Ajv</b>(MIT, <a href="https://github.com/ajv-validator/ajv" target="_blank" rel="noopener">ajv-validator/ajv</a>)를 자체 호스팅합니다. 이메일·날짜 등 format 검증과 draft-07 스키마를 지원합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/ajv-6/ajv.bundle.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var ajv=new Ajv({allErrors:true,format:'full'});
  function run(){ var r=$('result'); r.style.display='block';
    var schema,data;
    try{ schema=JSON.parse($('schema').value); }catch(e){ r.className='result no'; r.textContent='⚠️ '+t('b_jsonvalidate_err_schema')+e.message; return; }
    try{ data=JSON.parse($('data').value); }catch(e){ r.className='result no'; r.textContent='⚠️ '+t('b_jsonvalidate_err_data')+e.message; return; }
    var validate; try{ validate=ajv.compile(schema); }catch(e){ r.className='result no'; r.textContent='⚠️ '+t('b_jsonvalidate_err_schema_def')+e.message; return; }
    var ok=validate(data);
    if(ok){ r.className='result ok'; r.innerHTML='✅ <b>'+t('b_jsonvalidate_result_ok_title')+'</b> '+t('b_jsonvalidate_result_ok_msg'); }
    else{ r.className='result no';
      var items=(validate.errors||[]).map(function(e){ var p=e.dataPath||e.instancePath||'(root)'; return '<li>'+(p||'(root)')+' — '+e.message+'</li>'; });
      r.innerHTML='❌ <b>'+items.length+t('b_jsonvalidate_result_violations')+'</b><ul>'+items.join('')+'</ul>'; }
  }
  window.onI18n=run;
  $('run').addEventListener('click',run);
  ['schema','data'].forEach(function(id){$(id).addEventListener('input',run);});
  run();
</script>
</body>
