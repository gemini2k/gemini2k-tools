textarea{width:100%;min-height:120px;padding:.7rem .8rem;border:1px solid var(--border);border-radius:11px;background:var(--input-bg);font-family:inherit;font-size:.95rem;color:var(--text);resize:vertical;}

<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_diffwords_title">단어 단위 텍스트 비교</h1>
  <p class="sub" data-i18n-html="b_diffwords_sub">두 글을 비교해 <ins>추가</ins>·<del>삭제</del>된 부분을 한 줄에 색으로 보여 줍니다. 교정·버전 비교에 좋아요.</p>
  <div class="card">
    <div class="grid2"><div><label style="font-weight:700;font-size:.85rem;" data-i18n="b_diffwords_label_original">원본</label><textarea id="a" data-i18n-ph="b_diffwords_sample_a">빠른 갈색 여우가 게으른 개를 뛰어넘었다.</textarea></div>
      <div><label style="font-weight:700;font-size:.85rem;" data-i18n="b_diffwords_label_modified">수정본</label><textarea id="b" data-i18n-ph="b_diffwords_sample_b">빠른 갈색 여우가 아주 게으른 강아지를 뛰어넘는다.</textarea></div></div>
    <div class="opts"><label><span data-i18n="b_diffwords_label_unit">단위</span> <select id="mode"><option value="words" data-i18n="b_diffwords_opt_words">단어</option><option value="chars" data-i18n="b_diffwords_opt_chars">글자</option></select></label></div>
    <div class="out" id="out"></div>
    <div class="note" data-i18n-html="b_diffwords_note">오픈소스 <b>jsdiff</b>(BSD-3, <a href="https://github.com/kpdecker/jsdiff" target="_blank" rel="noopener">kpdecker/jsdiff</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/jsdiff-5/diff.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function esc(s){return String(s).replace(/[&<>]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]);});}
  function run(){ var fn=$('mode').value==='chars'?Diff.diffChars:Diff.diffWords; var parts=fn($('a').value,$('b').value);
    $('out').innerHTML=parts.map(function(p){ var tmp=esc(p.value); return p.added?'<ins>'+tmp+'</ins>':p.removed?'<del>'+tmp+'</del>':tmp; }).join(''); }
  ['a','b','mode'].forEach(function(id){$(id).addEventListener('input',run);$(id).addEventListener('change',run);});
  window.onI18n=run;
  run();
</script>
