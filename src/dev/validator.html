<body>
<div class="toolwrap" style="max-width:680px;">
  <h1 data-i18n="b_validator_title">문자열 유효성 검사기</h1>
  <p class="sub" data-i18n="b_validator_sub">입력한 값이 어떤 형식으로 유효한지 한 번에 확인합니다.</p>
  <div class="card">
    <input type="text" id="in" value="hello@example.com" data-i18n-ph="b_validator_placeholder" placeholder="값을 입력하세요"/>
    <table><thead><tr><th data-i18n="b_validator_th_format">형식</th><th data-i18n="b_validator_th_valid">유효 여부</th></tr></thead><tbody id="tb"></tbody></table>
    <div class="note" data-i18n-html="b_validator_note">오픈소스 <b>validator.js</b>(MIT, <a href="https://github.com/validatorjs/validator.js" target="_blank" rel="noopener">validatorjs/validator.js</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/validator-13/validator.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var V=window.validator;
  var checks=[
    [t('b_validator_fmt_email'),function(s){return V.isEmail(s);}],
    ['URL',function(s){return V.isURL(s);}],
    ['IPv4',function(s){return V.isIP(s,4);}],
    ['IPv6',function(s){return V.isIP(s,6);}],
    [t('b_validator_fmt_creditcard'),function(s){return V.isCreditCard(s);}],
    ['UUID',function(s){return V.isUUID(s);}],
    ['JSON',function(s){return V.isJSON(s);}],
    [t('b_validator_fmt_numeric'),function(s){return V.isNumeric(s);}],
    [t('b_validator_fmt_alphanumeric'),function(s){return V.isAlphanumeric(s);}],
    [t('b_validator_fmt_hexcolor'),function(s){return V.isHexColor(s);}],
    [t('b_validator_fmt_dateiso'),function(s){return V.isISO8601(s);}],
    ['JWT',function(s){return V.isJWT(s);}],
    ['Base64',function(s){return V.isBase64(s);}],
    [t('b_validator_fmt_mac'),function(s){return V.isMACAddress(s);}],
    [t('b_validator_fmt_mobile'),function(s){return V.isMobilePhone(s,'ko-KR');}],
    [t('b_validator_fmt_postal'),function(s){return V.isPostalCode(s,'KR');}]
  ];
  function run(){ var s=$('in').value, tb=$('tb'); tb.innerHTML='';
    checks.forEach(function(c){ var ok=false; try{ok=s&&c[1](s);}catch(e){}
      var tr=document.createElement('tr'); tr.innerHTML='<td>'+c[0]+'</td><td>'+(ok?'<span class="ok">✓ '+t('b_validator_valid')+'</span>':'<span class="no">—</span>')+'</td>'; tb.appendChild(tr); }); }
  $('in').addEventListener('input',run); run();
  window.onI18n=function(){
    checks=[
      [t('b_validator_fmt_email'),function(s){return V.isEmail(s);}],
      ['URL',function(s){return V.isURL(s);}],
      ['IPv4',function(s){return V.isIP(s,4);}],
      ['IPv6',function(s){return V.isIP(s,6);}],
      [t('b_validator_fmt_creditcard'),function(s){return V.isCreditCard(s);}],
      ['UUID',function(s){return V.isUUID(s);}],
      ['JSON',function(s){return V.isJSON(s);}],
      [t('b_validator_fmt_numeric'),function(s){return V.isNumeric(s);}],
      [t('b_validator_fmt_alphanumeric'),function(s){return V.isAlphanumeric(s);}],
      [t('b_validator_fmt_hexcolor'),function(s){return V.isHexColor(s);}],
      [t('b_validator_fmt_dateiso'),function(s){return V.isISO8601(s);}],
      ['JWT',function(s){return V.isJWT(s);}],
      ['Base64',function(s){return V.isBase64(s);}],
      [t('b_validator_fmt_mac'),function(s){return V.isMACAddress(s);}],
      [t('b_validator_fmt_mobile'),function(s){return V.isMobilePhone(s,'ko-KR');}],
      [t('b_validator_fmt_postal'),function(s){return V.isPostalCode(s,'KR');}]
    ];
    run();
  };
</script>
