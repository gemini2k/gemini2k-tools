<body>
<div class="toolwrap" style="max-width:820px;">
  <h1>JSON → TypeScript 인터페이스</h1>
  <p class="sub">JSON 예시를 붙여넣으면 TypeScript interface 타입을 자동으로 만들어 줍니다.</p>
  <div class="card">
    <textarea id="in">{"id":1,"name":"홍길동","tags":["a","b"],"profile":{"age":30,"vip":true},"score":null}</textarea>
    <div class="opts"><label>루트 이름 <input id="root" type="text" value="Root"/></label></div>
    <div class="actions"><button class="btn" id="run" type="button">변환</button><button class="btn btn-ghost" id="copy" type="button">📋 복사</button></div>
    <div class="err" id="err"></div>
    <div class="arrow">↓</div>
    <div class="out" id="out"></div>
    <div class="note">중첩 객체는 별도 interface로 분리하고, 배열은 요소 타입을 추론합니다. null·혼합 타입은 적절히 union/any로 처리합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1).replace(/[^A-Za-z0-9]/g,''); }
  var ifaces, order;
  function typeOf(v,name){
    if(v===null) return 'null';
    if(Array.isArray(v)){ if(!v.length) return 'any[]'; var ts={}; v.forEach(function(it){ ts[typeOf(it,name)]=1; }); var u=Object.keys(ts); return (u.length===1?u[0]:'('+u.join(' | ')+')')+'[]'; }
    if(typeof v==='object'){ var nm=cap(name)||'Obj'; if(!ifaces[nm]){ /*reserve*/ } buildIface(nm,v); return nm; }
    if(typeof v==='number') return 'number'; if(typeof v==='boolean') return 'boolean'; return 'string';
  }
  function buildIface(nm,obj){ var uniq=nm, n=1; // avoid clobber differing shapes
    var body='export interface '+nm+' {\n'+Object.keys(obj).map(function(k){
      var v=obj[k]; var opt=(v===null)?'?':''; var safe=/^[A-Za-z_$][\w$]*$/.test(k)?k:JSON.stringify(k);
      return '  '+safe+opt+': '+typeOf(v, k)+';';
    }).join('\n')+'\n}';
    ifaces[nm]=body; if(order.indexOf(nm)<0) order.push(nm);
  }
  function run(){ $('err').textContent=''; var t=$('in').value.trim(); if(!t){$('out').textContent='';return;}
    try{ var j=JSON.parse(t); ifaces={}; order=[]; var root=cap($('root').value||'Root')||'Root';
      if(Array.isArray(j)){ var et=typeOf(j[0]!=null?j[0]:{}, root+'Item'); $('out').textContent=(order.map(function(n){return ifaces[n];}).join('\n\n'))+'\n\nexport type '+root+' = '+et+'[];'; }
      else if(typeof j==='object'&&j){ buildIface(root,j); $('out').textContent=order.map(function(n){return ifaces[n];}).reverse().join('\n\n'); }
      else { $('out').textContent='export type '+root+' = '+typeOf(j,root)+';'; }
    }catch(e){ $('out').textContent=''; $('err').textContent='⚠️ JSON 오류: '+e.message; }
  }
  ['in','root'].forEach(function(id){$(id).addEventListener('input',run);});
  $('copy').addEventListener('click',function(){if($('out').textContent)navigator.clipboard.writeText($('out').textContent).then(function(){toast('복사됐습니다');});});
  run();
</script>
