<body>
<div class="toolwrap" style="max-width:640px;">
  <h1 data-i18n="b_subnet_title">서브넷 계산기 (CIDR)</h1>
  <p class="sub" data-i18n="b_subnet_sub">CIDR 표기로 네트워크 주소·브로드캐스트·마스크·사용 가능 호스트 범위를 계산합니다.</p>
  <div class="card">
    <div class="row"><input type="text" id="ip" value="192.168.10.0" data-i18n-ph="b_subnet_ph_ip" placeholder="IP 주소"/>
      <span style="font-size:1.3rem;">/</span>
      <select id="cidr"></select></div>
    <div class="err" id="err"></div>
    <table><tbody id="tb"></tbody></table>
    <div class="note" data-i18n="b_subnet_note">IPv4 기준입니다. /31·/32는 호스트 계산 규칙이 특수하여 별도 표기합니다. 모든 계산은 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  (function(){ var s=$('cidr'); for(var i=0;i<=32;i++){var o=document.createElement('option');o.value=i;o.textContent=i;if(i===24)o.selected=true;s.appendChild(o);} })();
  function toInt(ip){ var p=ip.split('.'); if(p.length!==4)return null; var n=0; for(var i=0;i<4;i++){var x=+p[i]; if(isNaN(x)||x<0||x>255||p[i]==='')return null; n=(n*256)+x;} return n>>>0; }
  function toIp(n){ return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.'); }
  function row(k,v){ return '<tr><td>'+k+'</td><td><b>'+v+'</b></td></tr>'; }
  function run(){ $('err').textContent=''; var ipN=toInt($('ip').value.trim()); if(ipN===null){ $('err').textContent='⚠️ '+t('b_subnet_err_ip'); $('tb').innerHTML=''; return; }
    var c=+$('cidr').value; var mask=c===0?0:(0xFFFFFFFF<<(32-c))>>>0;
    var network=(ipN&mask)>>>0, broadcast=(network|(~mask>>>0))>>>0;
    var total=Math.pow(2,32-c);
    var html='';
    html+=row(t('b_subnet_row_cidr'), toIp(network)+'/'+c);
    html+=row(t('b_subnet_row_mask'), toIp(mask));
    html+=row(t('b_subnet_row_wildcard'), toIp(~mask>>>0));
    html+=row(t('b_subnet_row_network'), toIp(network));
    html+=row(t('b_subnet_row_broadcast'), toIp(broadcast));
    if(c<=30){ html+=row(t('b_subnet_row_range'), toIp(network+1)+' ~ '+toIp(broadcast-1)); html+=row(t('b_subnet_row_hosts'), (total-2).toLocaleString()+t('b_subnet_unit_count')); }
    else if(c===31){ html+=row(t('b_subnet_row_range'), toIp(network)+' ~ '+toIp(broadcast)+' (P2P)'); html+=row(t('b_subnet_row_hosts'), t('b_subnet_hosts_p2p')); }
    else { html+=row(t('b_subnet_row_single'), toIp(network)+' '+t('b_subnet_single_label')); html+=row(t('b_subnet_row_hosts'),t('b_subnet_hosts_single')); }
    html+=row(t('b_subnet_row_total'), total.toLocaleString()+t('b_subnet_unit_count'));
    html+=row(t('b_subnet_row_class'), c>=24?t('b_subnet_class_c'):c>=16?t('b_subnet_class_b'):c>=8?t('b_subnet_class_a'):t('b_subnet_class_large'));
    $('tb').innerHTML=html;
  }
  window.onI18n = run;
  ['ip','cidr'].forEach(function(id){$(id).addEventListener('input',run);$(id).addEventListener('change',run);});
  run();
</script>
</body>
