<body>

<div class="toolwrap">
  <h1>텍스트 비교 (diff)</h1>
  <p class="sub">두 글을 줄 단위로 비교해 추가·삭제된 부분을 색으로 보여 줍니다. 문서 버전, 코드 변경 확인에.</p>

  <div class="card">
    <div class="io">
      <div class="fld"><label for="a">원본 (A)</label><textarea id="a" placeholder="원본 텍스트"></textarea></div>
      <div class="fld"><label for="b">비교 (B)</label><textarea id="b" placeholder="비교할 텍스트"></textarea></div>
    </div>
    <div class="opts">
      <label><input id="trim" type="checkbox" checked/> 줄 끝 공백 무시</label>
      <label><input id="ignorecase" type="checkbox"/> 대소문자 무시</label>
    </div>
    <div class="row"><button class="btn" id="run">비교하기</button></div>
    <div class="summary" id="summary" style="display:none;"></div>
    <div class="diff" id="diff" style="display:none;"></div>
    <div class="note">
      줄(line) 단위로 가장 긴 공통 부분(LCS)을 찾아 차이를 표시합니다. 초록(+)은 B에만 있는 줄, 빨강(−)은 A에만 있는 줄입니다. 모든 비교는 브라우저에서만 이루어지며 입력은 전송되지 않습니다.
    </div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function norm(line){ var s=line; if($('trim').checked) s=s.replace(/\s+$/,''); if($('ignorecase').checked) s=s.toLowerCase(); return s; }

  function diff(a, b){
    var na=a.map(norm), nb=b.map(norm), n=a.length, m=b.length;
    // LCS DP
    var dp=[]; for(var i=0;i<=n;i++){ dp.push(new Uint32Array(m+1)); }
    for(var i=n-1;i>=0;i--){ for(var j=m-1;j>=0;j--){
      dp[i][j] = (na[i]===nb[j]) ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j], dp[i][j+1]); } }
    var ops=[], i2=0, j2=0;
    while(i2<n && j2<m){
      if(na[i2]===nb[j2]){ ops.push(['eq',a[i2]]); i2++; j2++; }
      else if(dp[i2+1][j2] >= dp[i2][j2+1]){ ops.push(['del',a[i2]]); i2++; }
      else { ops.push(['add',b[j2]]); j2++; }
    }
    while(i2<n){ ops.push(['del',a[i2++]]); }
    while(j2<m){ ops.push(['add',b[j2++]]); }
    return ops;
  }

  function run(){
    var a=$('a').value.split('\n'), b=$('b').value.split('\n');
    if($('a').value==='' ) a=[]; if($('b').value==='') b=[];
    var ops=diff(a,b), add=0, del=0;
    var html=ops.map(function(o){ var t=o[0]; if(t==='add')add++; if(t==='del')del++;
      var g = t==='add'?'+':(t==='del'?'−':' ');
      return '<div class="dl '+t+'"><span class="gut">'+g+'</span><span>'+esc(o[1])+'</span></div>'; }).join('');
    $('diff').innerHTML = html || '<div class="dl eq"><span class="gut"> </span><span>(내용 없음)</span></div>';
    $('summary').innerHTML = '<span class="add">+'+add+' 추가</span> · <span class="del">−'+del+' 삭제</span> · 같은 줄 '+(ops.length-add-del)+'개';
    $('diff').style.display=''; $('summary').style.display='';
  }
  $('run').addEventListener('click', run);
  ['trim','ignorecase'].forEach(function(id){ $(id).addEventListener('change', function(){ if($('diff').style.display!=='none') run(); }); });
</script>
