<body>
<div class="toolwrap">
  <h1>표기(케이스) 변환기</h1>
  <p class="sub">문장이나 식별자를 입력하면 camelCase·snake_case·kebab-case 등 모든 표기로 한 번에 바꿔 줍니다. 변수명·DB 컬럼·URL 슬러그 만들 때 쓰세요.</p>

  <div class="card">
    <input id="src" class="src" type="text" value="빛의여행 gemini2k tool name" autocomplete="off" aria-label="입력"/>
    <div class="reslist" id="out"></div>
    <div class="note">단어는 공백·하이픈·밑줄, 그리고 대소문자 경계(camelCase)로 구분해 인식합니다. 한글 등 대소문자가 없는 문자는 그대로 이어 붙입니다. 모든 변환은 브라우저에서 이루어집니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }

  function tokens(s){
    // camelCase 경계 분리 + 구분자 분리
    s=s.replace(/([a-z0-9])([A-Z])/g,'$1 $2').replace(/([A-Z]+)([A-Z][a-z])/g,'$1 $2');
    return s.split(/[\s_\-./]+/).filter(Boolean);
  }
  function up(w){ return w.charAt(0).toUpperCase()+w.slice(1); }
  var FORMS=[
    ['camelCase', function(t){ return t.map(function(w,i){ return i===0? w.toLowerCase() : up(w.toLowerCase()); }).join(''); }],
    ['PascalCase', function(t){ return t.map(function(w){ return up(w.toLowerCase()); }).join(''); }],
    ['snake_case', function(t){ return t.map(function(w){return w.toLowerCase();}).join('_'); }],
    ['kebab-case', function(t){ return t.map(function(w){return w.toLowerCase();}).join('-'); }],
    ['CONSTANT_CASE', function(t){ return t.map(function(w){return w.toUpperCase();}).join('_'); }],
    ['Title Case', function(t){ return t.map(function(w){ return up(w.toLowerCase()); }).join(' '); }],
    ['Sentence case', function(t){ var j=t.map(function(w){return w.toLowerCase();}).join(' '); return j? up(j):''; }],
    ['lowercase', function(t){ return t.join(' ').toLowerCase(); }],
    ['UPPERCASE', function(t){ return t.join(' ').toUpperCase(); }],
    ['dot.case', function(t){ return t.map(function(w){return w.toLowerCase();}).join('.'); }],
    ['path/case', function(t){ return t.map(function(w){return w.toLowerCase();}).join('/'); }]
  ];
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]);}); }

  function render(){
    var t=tokens($('src').value);
    $('out').innerHTML = FORMS.map(function(f){ var v=f[1](t);
      return '<div class="rrow"><span class="k">'+f[0]+'</span><span class="v">'+(esc(v)||'—')+'</span><button class="cp" data-v="'+esc(v)+'">복사</button></div>';
    }).join('');
  }
  $('src').addEventListener('input', render);
  $('out').addEventListener('click', function(e){ var b=e.target.closest('.cp'); if(!b) return;
    navigator.clipboard.writeText(b.dataset.v).then(function(){ toast('복사됐습니다'); }); });
  render();
</script>
