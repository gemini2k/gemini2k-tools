<body>
<div class="toolwrap" style="max-width:880px;">
  <h1 data-i18n="b_jsonedit_title">JSON 트리 에디터</h1>
  <p class="sub" data-i18n="b_jsonedit_sub">JSON을 트리로 펼쳐 보고 항목을 직접 추가·수정·삭제하고 검색·검증합니다.</p>
  <div class="card" style="max-width:none;">
    <div class="actions"><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_jsonedit_btn_copy">📋 JSON 복사</button><button class="btn btn-ghost" id="dl" type="button" data-i18n="b_jsonedit_btn_dl">⬇️ .json 저장</button><button class="btn btn-ghost" id="sample" type="button" data-i18n="b_jsonedit_btn_sample">예시</button></div>
    <div id="ed"></div>
    <div class="note" data-i18n-html="b_jsonedit_note">오픈소스 <b>jsoneditor</b>(Apache-2.0, <a href="https://github.com/josdejong/jsoneditor" target="_blank" rel="noopener">josdejong/jsoneditor</a>)를 자체 호스팅합니다. 우측 상단 모드 메뉴로 트리/코드/텍스트를 전환할 수 있어요. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/jsoneditor-10/jsoneditor.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var SAMPLE={name:"gemini2k",tools:200,categories:["텍스트","개발자","게임"],config:{dark:true,langs:["ko","en","zh","ja"]},active:true};
  // jsoneditor v10 지원 로케일: en·zh-CN 만 우리 언어와 매칭(ko·ja 미포함 → en 폴백)
  var editor=new JSONEditor($('ed'),{ modes:['tree','code','text','form','view'], mode:'tree', language:({zh:'zh-CN'}[window.curLang?curLang():'']||'en') });
  editor.set(SAMPLE);
  $('copy').addEventListener('click',function(){ try{ navigator.clipboard.writeText(JSON.stringify(editor.get(),null,2)).then(function(){toast(t('b_jsonedit_toast_copied'));}); }catch(e){toast(t('b_jsonedit_toast_json_err')+e.message);} });
  $('dl').addEventListener('click',function(){ try{ var blob=new Blob([JSON.stringify(editor.get(),null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='data.json';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},120); }catch(e){toast(t('b_jsonedit_toast_json_err2'));} });
  $('sample').addEventListener('click',function(){ editor.set(SAMPLE); });
  window._editor=editor;
</script>
