<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_svgmin_title">SVG 최적화·압축기</h1>
  <p class="sub" data-i18n="b_svgmin_sub">SVG의 주석·메타데이터·불필요한 공백을 제거해 용량을 줄입니다.</p>
  <div class="card">
    <textarea id="in">&lt;?xml version="1.0" encoding="UTF-8"?&gt;
&lt;!-- 주석 --&gt;
&lt;svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"&gt;
  &lt;metadata&gt;made by editor&lt;/metadata&gt;
  &lt;circle cx="50" cy="50" r="40" fill="#5B5BF5" /&gt;
&lt;/svg&gt;</textarea>
    <div class="meta" id="meta"></div>
    <div class="actions"><button class="btn" id="opt" type="button" data-i18n="b_svgmin_btn_optimize">최적화</button><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_svgmin_btn_copy">📋 복사</button></div>
    <div class="out" id="out"></div>
    <div class="prev" id="prev"></div>
    <div class="note" data-i18n="b_svgmin_note">XML 선언·주석·&lt;metadata&gt;·&lt;title&gt;·&lt;desc&gt;·태그 사이 공백·소수점 자릿수를 정리합니다(안전한 범위). 복잡한 패스 최적화까지는 하지 않습니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function optimize(s){ return s
    .replace(/<\?xml[\s\S]*?\?>/g,'')
    .replace(/<!--[\s\S]*?-->/g,'')
    .replace(/<metadata[\s\S]*?<\/metadata>/g,'')
    .replace(/<title[\s\S]*?<\/title>/g,'').replace(/<desc[\s\S]*?<\/desc>/g,'')
    .replace(/>\s+</g,'><').replace(/\s{2,}/g,' ')
    .replace(/(\d+\.\d{3})\d+/g,'$1')
    .replace(/\s*\/>/g,'/>').trim(); }
  function run(){ var raw=$('in').value, out=optimize(raw);
    $('out').textContent=out; window._o=out; $('prev').innerHTML=out;
    var b1=new Blob([raw]).size, b2=new Blob([out]).size;
    $('meta').textContent=t('b_svgmin_original')+' '+b1+'B → '+t('b_svgmin_optimized')+' '+b2+'B ('+(b1?Math.round((1-b2/b1)*100):0)+'% '+t('b_svgmin_saved')+')'; }
  window.onI18n=run;
  $('opt').addEventListener('click',run); $('in').addEventListener('input',run);
  $('copy').addEventListener('click',function(){if(window._o)navigator.clipboard.writeText(window._o).then(function(){toast(t('b_svgmin_copied'));});});
  run();
</script>
</body>
