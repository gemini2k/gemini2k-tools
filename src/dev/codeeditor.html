<body>
<div class="toolwrap" style="max-width:880px;">
  <h1 data-i18n="b_codeeditor_title">온라인 코드 에디터</h1>
  <p class="sub" data-i18n="b_codeeditor_sub">문법 강조가 되는 코드 에디터입니다. JavaScript는 '실행'으로 결과를 바로 확인하세요.</p>
  <div class="card" style="max-width:none;">
    <div class="bar">
      <select id="lang"><option value="javascript">JavaScript</option><option value="html">HTML</option><option value="css">CSS</option><option value="json">JSON</option><option value="python">Python</option><option value="sql">SQL</option></select>
      <select id="theme"><option value="github" data-i18n="b_codeeditor_theme_light">라이트</option><option value="monokai" data-i18n="b_codeeditor_theme_dark">다크</option></select>
      <button class="btn" id="run" type="button" data-i18n="b_codeeditor_btn_run">▶ 실행(JS)</button>
      <button class="btn btn-ghost" id="dl" type="button" data-i18n="b_codeeditor_btn_save">⬇️ 저장</button>
    </div>
    <div id="editor">// JavaScript를 작성하고 ▶실행을 누르세요
for (let i = 1; i <= 5; i++) {
  console.log("줄 " + i + " : " + i*i);
}</div>
    <div class="out" id="out" data-i18n="b_codeeditor_out_placeholder">실행 결과가 여기에 표시됩니다.</div>
    <div class="note" data-i18n-html="b_codeeditor_note">오픈소스 <b>Ace Editor</b>(BSD, <a href="https://github.com/ajaxorg/ace" target="_blank" rel="noopener">ajaxorg/ace</a>)를 자체 호스팅합니다. JS 실행은 이 페이지 안에서 이루어지며, 코드는 서버로 전송되지 않습니다(신뢰할 수 있는 본인 코드만 실행하세요).</div>
  </div>
</div>
<script src="/vendor/ace-1.32/ace.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  ace.config.set('basePath','/vendor/ace-1.32/');
  var ed=ace.edit('editor'); ed.setTheme('ace/theme/github'); ed.session.setMode('ace/mode/javascript'); ed.setOptions({fontSize:'14px',showPrintMargin:false,useWorker:false});
  $('lang').addEventListener('change',function(){ ed.session.setMode('ace/mode/'+$('lang').value); $('run').style.display=$('lang').value==='javascript'?'':'none'; });
  $('theme').addEventListener('change',function(){ ed.setTheme('ace/theme/'+$('theme').value); });
  $('run').addEventListener('click',function(){ var logs=[]; var oc=console.log, oe=console.error;
    console.log=function(){logs.push([].slice.call(arguments).map(function(a){try{return typeof a==='object'?JSON.stringify(a):String(a);}catch(e){return String(a);}}).join(' '));};
    console.error=console.log;
    try{ var r=new Function(ed.getValue())(); if(r!==undefined)logs.push('→ '+r); }catch(e){ logs.push('⚠️ '+e.message); }
    console.log=oc; console.error=oe; $('out').textContent=logs.join('\n')||t('b_codeeditor_no_output'); });
  $('dl').addEventListener('click',function(){ var ext={javascript:'js',html:'html',css:'css',json:'json',python:'py',sql:'sql'}[$('lang').value];
    var blob=new Blob([ed.getValue()],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='code.'+ext;document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},120); });
</script>
