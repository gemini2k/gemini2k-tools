<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_jsmin_title">JavaScript 압축기 (minify)</h1>
  <p class="sub" data-i18n="b_jsmin_sub">자바스크립트 코드를 안전하게 압축해 용량을 줄입니다.</p>
  <div class="card">
    <textarea id="in">// 예시 코드
function add(first, second) {
  const result = first + second;
  return result;
}
const numbers = [1, 2, 3, 4, 5];
const total = numbers.reduce((sum, n) => add(sum, n), 0);
console.log(total);</textarea>
    <div class="row">
      <label><input type="checkbox" id="mangle" checked/> <span data-i18n="b_jsmin_mangle">변수명 단축(mangle)</span></label>
      <label><input type="checkbox" id="comments"/> <span data-i18n="b_jsmin_keep_comments">주석 유지</span></label>
      <button class="btn" id="run" type="button" data-i18n="b_jsmin_btn_run">압축</button>
      <button class="btn btn-ghost" id="copy" type="button">📋 <span data-i18n="b_jsmin_btn_copy">복사</span></button>
    </div>
    <div class="meta" id="meta"></div>
    <div class="out" id="out"></div>
    <div class="note" data-i18n-html="b_jsmin_note">오픈소스 <b>terser</b>(BSD-2, <a href="https://github.com/terser/terser" target="_blank" rel="noopener">terser/terser</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/terser-5/bundle.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function run(){ var src=$('in').value;
    Terser.minify(src,{mangle:$('mangle').checked,format:{comments:$('comments').checked}}).then(function(res){
      if(res.error){ $('out').textContent='⚠️ '+res.error.message; $('meta').textContent=''; window._o=''; return; }
      $('out').textContent=res.code; window._o=res.code;
      var b1=new Blob([src]).size, b2=new Blob([res.code]).size;
      $('meta').textContent=t('b_jsmin_original')+' '+b1+'B → '+t('b_jsmin_compressed')+' '+b2+'B ('+(b1?Math.round((1-b2/b1)*100):0)+'% '+t('b_jsmin_saved')+')';
    }).catch(function(e){ $('out').textContent='⚠️ '+e.message; }); }
  $('run').addEventListener('click',run); ['mangle','comments'].forEach(function(id){$(id).addEventListener('change',run);});
  $('copy').addEventListener('click',function(){if(window._o)navigator.clipboard.writeText(window._o).then(function(){toast(t('b_jsmin_copied'));});});
  window.onI18n=run;
  run();
</script>
</body>
