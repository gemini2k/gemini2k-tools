<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_mdtoc_title">마크다운 목차(TOC) 생성기</h1>
  <p class="sub" data-i18n="b_mdtoc_sub">마크다운의 제목(#)을 읽어 GitHub 호환 앵커가 달린 목차를 만들어 줍니다.</p>
  <div class="card">
    <textarea id="in"># 프로젝트 이름

## 소개
이 프로젝트는...

## 설치 방법
### 요구 사항
### 설치 단계

## 사용법
## 라이선스</textarea>
    <div class="opts">
      <label><span data-i18n="b_mdtoc_min_level">최소 레벨</span> <select id="min"><option value="1">H1</option><option value="2" selected>H2</option></select></label>
      <label><span data-i18n="b_mdtoc_max_level">최대 레벨</span> <select id="max"><option value="2">H2</option><option value="3" selected>H3</option><option value="4">H4</option><option value="6">H6</option></select></label>
    </div>
    <div class="actions"><button class="btn btn-ghost" id="copy" type="button">📋 <span data-i18n="b_mdtoc_btn_copy">복사</span></button></div>
    <div class="out" id="out"></div>
    <div class="note" data-i18n-html="b_mdtoc_note">코드 블록(```) 안의 <code>#</code>은 제외합니다. 앵커는 GitHub 규칙(소문자화, 공백→하이픈, 특수문자 제거, 한글 유지)을 따릅니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function slug(t){ return t.trim().toLowerCase().replace(/[^\w\sÀ-￿-]/g,'').replace(/\s+/g,'-'); }
  function run(){ var lines=$('in').value.split(/\r?\n/), mn=+$('min').value, mx=+$('max').value, toc=[], seen={}, code=false;
    lines.forEach(function(l){ if(/^```/.test(l.trim())){code=!code;return;} if(code)return;
      var m=l.match(/^(#{1,6})\s+(.+?)\s*#*$/); if(!m)return; var lv=m[1].length; if(lv<mn||lv>mx)return;
      var txt=m[2].replace(/\*\*|__|\*|`/g,''), s=slug(txt); if(seen[s]!==undefined){seen[s]++;s=s+'-'+seen[s];}else seen[s]=0;
      toc.push('  '.repeat(lv-mn)+'- ['+txt+'](#'+s+')'); });
    $('out').textContent=toc.join('\n')||(t('b_mdtoc_no_heading')); }
  window.onI18n=run;
  ['in','min','max'].forEach(function(id){$(id).addEventListener('input',run);$(id).addEventListener('change',run);});
  $('copy').addEventListener('click',function(){if($('out').textContent)navigator.clipboard.writeText($('out').textContent).then(function(){toast(t('b_mdtoc_copied'));});});
  run();
</script>
</body>
