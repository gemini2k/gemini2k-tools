  .rrow{display:flex;align-items:center;gap:.8rem;margin-bottom:.9rem;}
  .rrow label{width:5.5rem;flex-shrink:0;margin:0;font-weight:700;color:var(--text);font-size:.92rem;}

<body>
<div class="toolwrap">
  <h1 data-i18n="b_radix_title">진법 변환기</h1>
  <p class="sub" data-i18n="b_radix_sub">2·8·10·16진수를 서로 변환합니다. 아무 칸에나 입력하면 나머지가 즉시 바뀝니다.</p>

  <div class="card">
    <div class="rrow"><label for="b10" data-i18n="b_radix_label_dec">10진수</label><input id="b10" data-base="10" inputmode="numeric" value="255" autocomplete="off"/></div>
    <div class="rrow"><label for="b2" data-i18n="b_radix_label_bin">2진수</label><input id="b2" data-base="2" autocomplete="off"/></div>
    <div class="rrow"><label for="b8" data-i18n="b_radix_label_oct">8진수</label><input id="b8" data-base="8" autocomplete="off"/></div>
    <div class="rrow"><label for="b16" data-i18n="b_radix_label_hex">16진수</label><input id="b16" data-base="16" autocomplete="off" style="text-transform:uppercase;"/></div>
    <div class="custom">
      <label style="margin:0;font-weight:700;" data-i18n="b_radix_label_custom">임의 진법</label>
      <input id="cbase" type="number" min="2" max="36" value="36" data-i18n-ph="b_radix_aria_base" aria-label="진법(2~36)"/>
      <span style="color:var(--muted);" data-i18n="b_radix_base_suffix">진수 =</span>
      <input id="cval" type="text" readonly data-i18n-ph="b_radix_aria_result" aria-label="결과"/>
    </div>
    <div class="note" data-i18n="b_radix_note">정수만 변환하며 음수는 앞에 −를 붙입니다. 16진수는 0–9·A–F를, 임의 진법(2~36)은 0–9·A–Z를 사용합니다. 매우 큰 수는 자릿수 한계로 정밀도가 떨어질 수 있습니다. 모든 계산은 브라우저에서 이루어집니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  var ids=['b2','b8','b10','b16'];
  function update(fromId){
    var el=$(fromId), base=+el.dataset.base, s=el.value.trim();
    el.classList.remove('bad');
    if(s===''){ ids.forEach(function(id){ if(id!==fromId)$(id).value=''; }); $('cval').value=''; return; }
    var neg=/^-/.test(s); var body=s.replace(/^-/,'');
    var re = base===2?/^[01]+$/ : base===8?/^[0-7]+$/ : base===10?/^\d+$/ : /^[0-9a-fA-F]+$/;
    if(!re.test(body)){ el.classList.add('bad'); return; }
    var val=parseInt(body, base); if(!isFinite(val)){ el.classList.add('bad'); return; }
    if(neg) val=-val;
    ids.forEach(function(id){ if(id===fromId) return; var b=+$(id).dataset.base; $(id).value=(val<0?'-':'')+Math.abs(val).toString(b).toUpperCase(); });
    custom(val);
  }
  function custom(val){ var cb=Math.max(2,Math.min(36,parseInt($('cbase').value)||36)); $('cval').value=(val<0?'-':'')+Math.abs(val).toString(cb).toUpperCase(); }
  ids.forEach(function(id){ $(id).addEventListener('input', function(){ update(id); }); });
  $('cbase').addEventListener('input', function(){ var v=parseInt($('b10').value); if(isFinite(v)) custom(v); });
  update('b10');
</script>
</body>
