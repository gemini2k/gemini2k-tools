  .frow{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;}

<body>
<div class="toolwrap">
  <h1 data-i18n="b_bloodpressure_title">혈압 분류기</h1>
  <p class="sub" data-i18n="b_bloodpressure_sub">수축기(높은 값)·이완기(낮은 값) 혈압을 넣으면 대한고혈압학회 기준 단계를 알려 줍니다.</p>

  <div class="card">
    <div class="frow">
      <div class="fld"><label for="sys" data-i18n="b_bloodpressure_label_sys">수축기 (mmHg)</label><input id="sys" type="number" value="118" min="60" max="260"/></div>
      <div class="fld"><label for="dia" data-i18n="b_bloodpressure_label_dia">이완기 (mmHg)</label><input id="dia" type="number" value="76" min="40" max="160"/></div>
    </div>
    <div class="res"><span class="cat" id="cat" data-i18n="b_bloodpressure_lv0">정상</span><div class="bp" id="bp"></div></div>
    <div class="scale" id="scale"></div>
    <div class="note" data-i18n="b_bloodpressure_note">⚠️ 참고용입니다 — 진단이 아닙니다. 대한고혈압학회 기준: 정상 &lt;120/80, 주의혈압 120–129/&lt;80, 고혈압 전단계 130–139 또는 80–89, 1기 140–159 또는 90–99, 2기 ≥160 또는 ≥100. 수축기·이완기 중 더 높은 단계로 분류합니다. 혈압은 여러 번·안정 상태에서 측정해야 하며, 정확한 진단은 의료진과 상담하세요.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  function getLV(){
    return [
      [t('b_bloodpressure_lv0'),'c0'],
      [t('b_bloodpressure_lv1'),'c1'],
      [t('b_bloodpressure_lv2'),'c2'],
      [t('b_bloodpressure_lv3'),'c3'],
      [t('b_bloodpressure_lv4'),'c4']
    ];
  }
  function level(s,d){
    if(s>=160||d>=100) return 4;
    if(s>=140||d>=90) return 3;
    if((s>=130&&s<=139)||(d>=80&&d<=89)) return 2;
    if(s>=120&&s<=129&&d<80) return 1;
    if(s<120&&d<80) return 0;
    // 경계 외 조합은 더 높은 쪽 기준
    if(s>=130||d>=80) return 2; return 0;
  }
  function calc(){
    var s=parseInt($('sys').value), d=parseInt($('dia').value);
    if(!(s>0&&d>0)){ return; }
    var LV=getLV();
    var lv=level(s,d), info=LV[lv];
    var colors={c0:'#22c55e',c1:'#84cc16',c2:'#eab308',c3:'#f97316',c4:'#ef4444'};
    var cat=$('cat'); cat.textContent=info[0]; cat.style.background=colors[info[1]]+'22'; cat.style.color=colors[info[1]];
    $('bp').textContent=s+' / '+d+' mmHg';
    $('scale').innerHTML=LV.map(function(l,i){ var ranges=['<120 / <80','120–129 / <80','130–139 / 80–89','140–159 / 90–99','≥160 / ≥100'];
      return '<div class="lvl'+(i===lv?' on':'')+'"><span><span class="dot '+l[1]+'"></span>'+l[0]+(i===lv?' ◀':'')+'</span><span style="color:var(--muted)">'+ranges[i]+'</span></div>'; }).join('');
  }
  ['sys','dia'].forEach(function(id){ $(id).addEventListener('input',calc); });
  window.onI18n = calc;
  calc();
</script>
