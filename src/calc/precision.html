<body>
<div class="toolwrap" style="max-width:600px;">
  <h1 data-i18n="b_precision_h1">고정밀 소수 계산기</h1>
  <p class="sub" data-i18n="b_precision_sub">부동소수점 오차 없이 임의 자릿수로 정확하게 계산합니다. (예: 0.1 + 0.2 = 정확히 0.3)</p>
  <div class="card">
    <div class="calc">
      <input type="text" id="a" value="0.1"/>
      <select id="op"><option value="add">+</option><option value="sub">−</option><option value="mul">×</option><option value="div">÷</option><option value="pow">^</option></select>
      <input type="text" id="b" value="0.2"/>
    </div>
    <div class="row"><span data-i18n="b_precision_prec_label">정밀도(유효자릿수)</span> <input type="number" id="prec" value="40" min="1" max="1000"/></div>
    <div class="res"><div class="main" id="main"></div><div class="sub" id="sub"></div></div>
    <div class="note" data-i18n-html="b_precision_note">오픈소스 <b>decimal.js</b>(MIT, <a href="https://github.com/MikeMcl/decimal.js" target="_blank" rel="noopener">MikeMcl/decimal.js</a>)를 자체 호스팅합니다. 일반(부동소수) 결과와 비교해 보여 줍니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/decimal-10/decimal.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function run(){ try{
      Decimal.set({precision:Math.max(1,Math.min(1000,+$('prec').value||40))});
      var a=new Decimal($('a').value), b=new Decimal($('b').value), r, op=$('op').value;
      if(op==='add')r=a.plus(b); else if(op==='sub')r=a.minus(b); else if(op==='mul')r=a.times(b);
      else if(op==='div')r=a.dividedBy(b); else r=a.pow(b);
      $('main').textContent=r.toString();
      var fa=parseFloat($('a').value),fb=parseFloat($('b').value),fr;
      if(op==='add')fr=fa+fb;else if(op==='sub')fr=fa-fb;else if(op==='mul')fr=fa*fb;else if(op==='div')fr=fa/fb;else fr=Math.pow(fa,fb);
      $('sub').textContent=t('b_precision_float_label')+fr+(r.toString()!==String(fr)?t('b_precision_float_diff'):'');
    }catch(e){ $('main').textContent=t('b_precision_err_title'); $('sub').textContent=e.message; } }
  window.onI18n=run;
  ['a','b','op','prec'].forEach(function(id){$(id).addEventListener('input',run);$(id).addEventListener('change',run);});
  run();
</script>
</body>
