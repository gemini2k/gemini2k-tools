<body>
<div class="toolwrap" style="max-width:540px;">
  <h1 data-i18n="b_electricity_h1">전기요금 계산기</h1>
  <p class="sub" data-i18n="b_electricity_sub">한 달 사용량(kWh)을 넣으면 주택용 누진제 기준 예상 전기요금을 추정합니다(참고용).</p>
  <div class="card">
    <div class="fld"><label data-i18n="b_electricity_lbl_kwh">월 사용량 (kWh)</label><input id="kwh" type="number" inputmode="numeric" value="300"/></div>
    <div class="fld"><label data-i18n="b_electricity_lbl_type">공급 방식</label><select id="type"><option value="low" data-i18n="b_electricity_opt_low">주택용 저압</option><option value="high" data-i18n="b_electricity_opt_high">주택용 고압(아파트 등)</option></select></div>
    <div class="big"><div class="n" id="total">-</div><div class="u" data-i18n="b_electricity_total_label">예상 청구금액 (부가세·기금 포함)</div></div>
    <div class="lines">
      <div class="r"><span data-i18n="b_electricity_row_base">기본요금</span><span id="base">-</span></div>
      <div class="r"><span data-i18n="b_electricity_row_energy">전력량요금(누진)</span><span id="energy">-</span></div>
      <div class="r"><span data-i18n="b_electricity_row_climate">기후환경·연료비조정</span><span id="climate">-</span></div>
      <div class="r"><span data-i18n="b_electricity_row_vat">부가가치세(10%)</span><span id="vat">-</span></div>
      <div class="r"><span data-i18n="b_electricity_row_fund">전력산업기반기금(3.7%)</span><span id="fund">-</span></div>
    </div>
    <div class="note" data-i18n-html="b_electricity_note">2024년경 주택용 누진 3단계(저압: 1~200kWh, 201~400, 401~ / 단가 차등)를 근사 적용한 <b>추정치</b>입니다. 실제 청구액은 계절·복지할인·검침일·요금개정에 따라 다릅니다. 모든 계산은 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function won(n){
    var locale={ko:'ko-KR',en:'en-US',zh:'zh-CN',ja:'ja-JP'}[typeof curLang==='function'?curLang():'ko']||'ko-KR';
    var unit=t('b_electricity_unit');
    return Math.round(n).toLocaleString(locale)+unit;
  }
  // 근사 단가(원). 저압/고압
  var T={ low:{ base:[910,1600,7300], lim:[200,400], rate:[120,214.6,307.3] },
          high:{ base:[730,1260,6060], lim:[200,400], rate:[105,174,242.3] } };
  var CLIMATE=9, FUEL=5; // 원/kWh 근사(기후환경요금+연료비조정)
  function calc(){ var kwh=Math.max(0,+$('kwh').value||0), t_=$('type').value, c=T[t_];
    var base = kwh<=c.lim[0]?c.base[0] : kwh<=c.lim[1]?c.base[1] : c.base[2];
    var e=0, rem=kwh;
    var s1=Math.min(rem,c.lim[0]); e+=s1*c.rate[0]; rem-=s1;
    if(rem>0){ var s2=Math.min(rem,c.lim[1]-c.lim[0]); e+=s2*c.rate[1]; rem-=s2; }
    if(rem>0){ e+=rem*c.rate[2]; }
    var climate=kwh*(CLIMATE+FUEL);
    var pre=base+e+climate;
    var vat=pre*0.1, fund=pre*0.037;
    var total=Math.floor((pre+vat+fund)/10)*10;
    $('base').textContent=won(base); $('energy').textContent=won(e); $('climate').textContent=won(climate);
    $('vat').textContent=won(vat); $('fund').textContent=won(fund); $('total').textContent=won(total);
  }
  ['kwh','type'].forEach(function(id){$(id).addEventListener('input',calc);$(id).addEventListener('change',calc);});
  window.onI18n=calc;
  calc();
</script>
