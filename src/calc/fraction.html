<body>
<div class="toolwrap" style="max-width:560px;">
  <h1 data-i18n="b_fraction_h1">분수 계산기</h1>
  <p class="sub" data-i18n="b_fraction_sub">두 분수의 사칙연산 결과를 기약분수·대분수·소수로 보여 줍니다.</p>
  <div class="card">
    <div class="calc">
      <div class="fr"><input type="number" id="n1" value="1"/><div class="bar"></div><input type="number" id="d1" value="2"/></div>
      <div class="op"><select id="op"><option value="+">+</option><option value="-">−</option><option value="*">×</option><option value="/">÷</option></select></div>
      <div class="fr"><input type="number" id="n2" value="1"/><div class="bar"></div><input type="number" id="d2" value="3"/></div>
      <div class="op">=</div>
    </div>
    <div class="res"><div class="main" id="main"></div><div class="sub" id="sub"></div></div>
    <div class="note" data-i18n="b_fraction_note">분모는 0이 될 수 없습니다. 결과는 정수 분자/분모로 정확히 계산해 기약분수로 약분합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){var t=b;b=a%b;a=t;}return a||1;}
  function fracHTML(n,d){return '<span class="frac"><span>'+n+'</span><span class="b">'+d+'</span></span>';}
  function run(){
    var n1=+$('n1').value,d1=+$('d1').value,n2=+$('n2').value,d2=+$('d2').value,op=$('op').value;
    if(d1===0||d2===0){$('main').textContent=t('b_fraction_err_denom');$('sub').textContent='';return;}
    var n,d;
    if(op==='+'){n=n1*d2+n2*d1;d=d1*d2;}
    else if(op==='-'){n=n1*d2-n2*d1;d=d1*d2;}
    else if(op==='*'){n=n1*n2;d=d1*d2;}
    else{ if(n2===0){$('main').textContent=t('b_fraction_err_zero');$('sub').textContent='';return;} n=n1*d2;d=d1*n2;}
    if(d<0){n=-n;d=-d;}
    var g=gcd(n,d),sn=n/g,sd=d/g;
    var main = sd===1 ? (''+sn) : fracHTML(sn,sd);
    $('main').innerHTML=main;
    var parts=[];
    if(sd!==1){ var whole=Math.trunc(sn/sd), rem=Math.abs(sn%sd);
      if(whole!==0&&rem!==0)parts.push(t('b_fraction_mixed')+whole+' '+'<span class="frac"><span>'+rem+'</span><span class="b">'+sd+'</span></span>'); }
    parts.push(t('b_fraction_decimal')+(sn/sd).toFixed(6).replace(/0+$/,'').replace(/\.$/,''));
    parts.push(t('b_fraction_before')+fracHTML(n,d));
    $('sub').innerHTML=parts.join('<br>');
  }
  window.onI18n=run;
  ['n1','d1','n2','d2','op'].forEach(function(id){$(id).addEventListener('input',run);$(id).addEventListener('change',run);});
  run();
</script>
</body>
