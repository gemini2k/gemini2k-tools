<body>
<div class="toolwrap" style="max-width:540px;">
  <h1>출산 예정일 계산기</h1>
  <p class="sub">마지막 생리 시작일을 넣으면 출산 예정일과 현재 임신 주수를 알려 줍니다(참고용).</p>
  <div class="card">
    <div class="fld"><label>마지막 생리 시작일 (LMP)</label><input id="lmp" type="date"/></div>
    <div class="fld"><label>평균 생리주기 (일)</label><input id="cycle" type="number" value="28"/></div>
    <div class="big"><div class="n" id="due">-</div><div class="u">출산 예정일</div></div>
    <div class="grid">
      <div class="item"><div class="l">현재 임신 주수</div><div class="v" id="weeks">-</div></div>
      <div class="item"><div class="l">임신 분기</div><div class="v" id="tri">-</div></div>
      <div class="item"><div class="l">예정일까지</div><div class="v" id="left">-</div></div>
      <div class="item"><div class="l">진행률</div><div class="v" id="prog">-</div></div>
    </div>
    <div class="note">네겔레 법칙(LMP + 280일, 주기 28일 기준)으로 계산하며 주기에 따라 보정합니다. 실제 예정일은 초음파·의료진 판단과 다를 수 있으니 <b>참고용</b>입니다. 모든 계산은 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var DOW=['일','월','화','수','목','금','토'];
  function calc(){ var v=$('lmp').value; if(!v)return; var lmp=new Date(v); var cyc=+$('cycle').value||28;
    var due=new Date(lmp.getTime()+ (280+(cyc-28))*86400000);
    var today=new Date(); today.setHours(0,0,0,0);
    var days=Math.floor((today-lmp)/86400000); var w=Math.floor(days/7), d=days%7;
    $('due').textContent=due.getFullYear()+'년 '+(due.getMonth()+1)+'월 '+due.getDate()+'일 ('+DOW[due.getDay()]+')';
    if(days<0){ $('weeks').textContent='-'; $('tri').textContent='-'; }
    else { $('weeks').textContent=w+'주 '+d+'일'; $('tri').textContent=(w<13?'1분기':w<27?'2분기':'3분기'); }
    var left=Math.ceil((due-today)/86400000);
    $('left').textContent= left>0? 'D-'+left : (left===0?'오늘 🎉':'D+'+(-left));
    var prog=Math.max(0,Math.min(100,Math.round(days/280*100))); $('prog').textContent=prog+'%';
  }
  (function(){var t=new Date();t.setDate(t.getDate()-70);var p=function(n){return(n<10?'0':'')+n;};$('lmp').value=t.getFullYear()+'-'+p(t.getMonth()+1)+'-'+p(t.getDate());})();
  ['lmp','cycle'].forEach(function(id){$(id).addEventListener('input',calc);$(id).addEventListener('change',calc);});
  calc();
</script>
