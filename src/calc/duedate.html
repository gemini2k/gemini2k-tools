<body>
<div class="toolwrap" style="max-width:540px;">
  <h1 data-i18n="b_duedate_title">출산 예정일 계산기</h1>
  <p class="sub" data-i18n="b_duedate_sub">마지막 생리 시작일을 넣으면 출산 예정일과 현재 임신 주수를 알려 줍니다(참고용).</p>
  <div class="card">
    <div class="fld"><label data-i18n="b_duedate_lbl_lmp">마지막 생리 시작일 (LMP)</label><input id="lmp" type="date"/></div>
    <div class="fld"><label data-i18n="b_duedate_lbl_cycle">평균 생리주기 (일)</label><input id="cycle" type="number" value="28"/></div>
    <div class="big"><div class="n" id="due">-</div><div class="u" data-i18n="b_duedate_lbl_due">출산 예정일</div></div>
    <div class="grid">
      <div class="item"><div class="l" data-i18n="b_duedate_lbl_weeks">현재 임신 주수</div><div class="v" id="weeks">-</div></div>
      <div class="item"><div class="l" data-i18n="b_duedate_lbl_tri">임신 분기</div><div class="v" id="tri">-</div></div>
      <div class="item"><div class="l" data-i18n="b_duedate_lbl_left">예정일까지</div><div class="v" id="left">-</div></div>
      <div class="item"><div class="l" data-i18n="b_duedate_lbl_prog">진행률</div><div class="v" id="prog">-</div></div>
    </div>
    <div class="note" data-i18n-html="b_duedate_note">네겔레 법칙(LMP + 280일, 주기 28일 기준)으로 계산하며 주기에 따라 보정합니다. 실제 예정일은 초음파·의료진 판단과 다를 수 있으니 <b>참고용</b>입니다. 모든 계산은 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var DOW_MAP={
    ko:['일','월','화','수','목','금','토'],
    en:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
    zh:['日','一','二','三','四','五','六'],
    ja:['日','月','火','水','木','金','土']
  };
  var TRI_MAP={
    ko:['1분기','2분기','3분기'],
    en:['1st trimester','2nd trimester','3rd trimester'],
    zh:['第一孕期','第二孕期','第三孕期'],
    ja:['第1期','第2期','第3期']
  };
  function getLang(){return(typeof curLang==='function'?curLang():null)||'ko';}
  function formatDue(due){
    var lg=getLang();
    var dow=(DOW_MAP[lg]||DOW_MAP.ko)[due.getDay()];
    var y=due.getFullYear(),mo=due.getMonth()+1,d=due.getDate();
    if(lg==='en') return y+'-'+(mo<10?'0':'')+mo+'-'+(d<10?'0':'')+d+' ('+dow+')';
    if(lg==='zh') return y+'年'+mo+'月'+d+'日 ('+dow+')';
    if(lg==='ja') return y+'年'+mo+'月'+d+'日 ('+dow+')';
    return y+'년 '+mo+'월 '+d+'일 ('+dow+')';
  }
  function formatWeeks(w,d){
    var lg=getLang();
    if(lg==='en') return w+'w '+d+'d';
    if(lg==='zh') return w+'周'+d+'天';
    if(lg==='ja') return w+'週'+d+'日';
    return w+'주 '+d+'일';
  }
  function formatTri(w){
    var lg=getLang();
    var arr=TRI_MAP[lg]||TRI_MAP.ko;
    return w<13?arr[0]:w<27?arr[1]:arr[2];
  }
  function formatLeft(left){
    var lg=getLang();
    if(left>0) return 'D-'+left;
    if(left===0){
      if(lg==='en') return 'Today 🎉';
      if(lg==='zh') return '今天 🎉';
      if(lg==='ja') return '今日 🎉';
      return '오늘 🎉';
    }
    return 'D+'+(- left);
  }
  function calc(){ var v=$('lmp').value; if(!v)return; var lmp=new Date(v); var cyc=+$('cycle').value||28;
    var due=new Date(lmp.getTime()+ (280+(cyc-28))*86400000);
    var today=new Date(); today.setHours(0,0,0,0);
    var days=Math.floor((today-lmp)/86400000); var w=Math.floor(days/7), d=days%7;
    $('due').textContent=formatDue(due);
    if(days<0){ $('weeks').textContent='-'; $('tri').textContent='-'; }
    else { $('weeks').textContent=formatWeeks(w,d); $('tri').textContent=formatTri(w); }
    var left=Math.ceil((due-today)/86400000);
    $('left').textContent=formatLeft(left);
    var prog=Math.max(0,Math.min(100,Math.round(days/280*100))); $('prog').textContent=prog+'%';
  }
  (function(){var tmp=new Date();tmp.setDate(tmp.getDate()-70);var p=function(n){return(n<10?'0':'')+n;};$('lmp').value=tmp.getFullYear()+'-'+p(tmp.getMonth()+1)+'-'+p(tmp.getDate());})();
  ['lmp','cycle'].forEach(function(id){$(id).addEventListener('input',calc);$(id).addEventListener('change',calc);});
  calc();
  window.onI18n=calc;
</script>
