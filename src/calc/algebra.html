<body>
<div class="toolwrap" style="max-width:660px;">
  <h1 data-i18n="b_algebra_h1">대수·미적분 계산기</h1>
  <p class="sub" data-i18n="b_algebra_sub">수식을 전개·인수분해·간소화하고, 미분·적분·방정식 풀이까지 기호로 계산합니다.</p>
  <div class="card">
    <div class="row">
      <select id="op"><option value="simplify" data-i18n="b_algebra_op_simplify">간소화</option><option value="expand" data-i18n="b_algebra_op_expand">전개</option><option value="factor" data-i18n="b_algebra_op_factor">인수분해</option><option value="diff" data-i18n="b_algebra_op_diff">미분</option><option value="integrate" data-i18n="b_algebra_op_integrate">적분</option><option value="solve" data-i18n="b_algebra_op_solve">방정식 풀이(=0)</option></select>
      <input type="text" id="expr" value="(x+1)^2"/>
    </div>
    <div class="varrow"><span data-i18n="b_algebra_var_label">변수</span> <input type="text" id="var" value="x"/> <span data-i18n="b_algebra_var_hint">(미분·적분·풀이에 사용)</span></div>
    <div class="err" id="err"></div>
    <div class="res"><div class="main" id="main"></div></div>
    <div class="note" data-i18n-html="b_algebra_note">오픈소스 <b>nerdamer</b>(MIT, <a href="https://github.com/jiggzson/nerdamer" target="_blank" rel="noopener">jiggzson/nerdamer</a>)를 자체 호스팅합니다. 예: <code>x^2-1</code> 인수분해, <code>sin(x)</code> 미분, <code>x^2-4</code> 풀이. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/nerdamer-1/nerdamer.core.js"></script>
<script src="/vendor/nerdamer-1/Algebra.js"></script>
<script src="/vendor/nerdamer-1/Calculus.js"></script>
<script src="/vendor/nerdamer-1/Solve.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function run(){ $('err').textContent=''; var e=$('expr').value, v=$('var').value||'x', op=$('op').value, out='';
    try{
      if(op==='simplify')out=nerdamer('simplify('+e+')').toString();
      else if(op==='expand')out=nerdamer('expand('+e+')').toString();
      else if(op==='factor')out=nerdamer('factor('+e+')').toString();
      else if(op==='diff')out=nerdamer('diff('+e+','+v+')').toString();
      else if(op==='integrate')out=nerdamer('integrate('+e+','+v+')').toString()+' + C';
      else if(op==='solve'){ var sols=nerdamer.solve(e,v); out=v+' = '+sols.toString(); }
      $('main').textContent=out||(typeof t==='function'?t('b_algebra_no_result'):'(결과 없음)');
    }catch(err){ $('err').textContent='⚠️ '+(err.message||err); $('main').textContent='-'; } }
  ['op','expr','var'].forEach(function(id){$(id).addEventListener('input',run);$(id).addEventListener('change',run);});
  run();
</script>
</body>
