<style>.drop{border:2px dashed var(--border);border-radius:12px;padding:1.6rem;text-align:center;cursor:pointer;color:var(--muted);}.drop.drag{border-color:var(--accent);background:var(--accent-soft);}
.pages{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.7rem;margin:.9rem 0;}
.pg{border:1px solid var(--border);border-radius:10px;padding:.5rem;text-align:center;background:var(--surface);}
.pg .ph{height:84px;background:var(--ground);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--muted);transition:transform .2s;}
.pg .n{font-size:.8rem;margin:.3rem 0;color:var(--muted);}
.pg .ctl{display:flex;gap:.25rem;justify-content:center;flex-wrap:wrap;}
.pg button{border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:6px;padding:.2rem .4rem;cursor:pointer;font-size:.78rem;}
.pg.del{opacity:.4;}.pg.del .ph{text-decoration:line-through;}
.note{margin-top:1.1rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}</style>

<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_pdfedit_title">PDF 페이지 정리</h1>
  <p class="sub" data-i18n="b_pdfedit_sub">PDF 페이지를 회전하거나 삭제하고, 순서를 바꿔 새 PDF로 저장합니다.</p>
  <div class="card">
    <div class="drop" id="drop">📄 <span data-i18n="b_pdfedit_drop_hint">PDF 파일을 끌어다 놓거나 클릭해서 선택</span><input type="file" id="file" accept="application/pdf,.pdf" hidden/></div>
    <div class="pages" id="pages"></div>
    <div id="actions" style="display:none;"><button class="btn" id="save" type="button">💾 <span data-i18n="b_pdfedit_save_btn">새 PDF로 저장</span></button> <span id="status" style="color:var(--muted);font-size:.9rem;"></span></div>
    <div class="note" data-i18n-html="b_pdfedit_note">오픈소스 <b>pdf-lib</b>(MIT, <a href="https://github.com/Hopding/pdf-lib" target="_blank" rel="noopener">Hopding/pdf-lib</a>)를 자체 호스팅합니다. 미리보기는 페이지 번호로 표시되며, 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/pdflib-1/pdf-lib.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var bytes=null, items=[]; // {idx, rot, del}
  var drop=$('drop'), file=$('file');
  drop.addEventListener('click',function(){file.click();});
  drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('drag');});
  drop.addEventListener('dragleave',function(){drop.classList.remove('drag');});
  drop.addEventListener('drop',function(e){e.preventDefault();drop.classList.remove('drag');if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);});
  file.addEventListener('change',function(){if(file.files[0])load(file.files[0]);});
  async function load(f){ if(!/pdf$/i.test(f.name)){alert(t('b_pdfedit_alert_pdf_only'));return;}
    bytes=await f.arrayBuffer();
    var doc=await PDFLib.PDFDocument.load(bytes,{ignoreEncryption:true});
    var n=doc.getPageCount(); items=[]; for(var i=0;i<n;i++)items.push({idx:i,rot:0,del:false});
    drop.textContent='📄 '+f.name+' ('+n+t('b_pdfedit_page_count_suffix')+')'; render(); $('actions').style.display='block'; }
  function render(){ var c=$('pages'); c.innerHTML='';
    items.forEach(function(it,pos){ var d=document.createElement('div'); d.className='pg'+(it.del?' del':'');
      d.innerHTML='<div class="ph" style="transform:rotate('+it.rot+'deg)">'+(it.idx+1)+'</div><div class="n">'+t('b_pdfedit_page_nth').replace('{n}',pos+1)+'</div>'+
        '<div class="ctl"><button data-a="left">⟲</button><button data-a="right">⟳</button><button data-a="up">←</button><button data-a="down">→</button><button data-a="del">'+(it.del?t('b_pdfedit_restore'):'🗑')+'</button></div>';
      d.querySelectorAll('button').forEach(function(b){ b.addEventListener('click',function(){act(pos,b.dataset.a);}); });
      c.appendChild(d); }); }
  window.onI18n=function(){if(bytes)render();};
  function act(pos,a){ var it=items[pos];
    if(a==='left')it.rot=(it.rot+270)%360;
    else if(a==='right')it.rot=(it.rot+90)%360;
    else if(a==='del')it.del=!it.del;
    else if(a==='up'&&pos>0){items.splice(pos-1,0,items.splice(pos,1)[0]);}
    else if(a==='down'&&pos<items.length-1){items.splice(pos+1,0,items.splice(pos,1)[0]);}
    render(); }
  $('save').addEventListener('click',async function(){
    if(!bytes)return; $('status').textContent=t('b_pdfedit_status_saving');
    var src=await PDFLib.PDFDocument.load(bytes,{ignoreEncryption:true});
    var out=await PDFLib.PDFDocument.create();
    var keep=items.filter(function(it){return !it.del;});
    if(!keep.length){$('status').textContent=t('b_pdfedit_status_no_pages');return;}
    var copied=await out.copyPages(src,keep.map(function(it){return it.idx;}));
    copied.forEach(function(p,i){ var rot=keep[i].rot; if(rot)p.setRotation(PDFLib.degrees((p.getRotation().angle+rot)%360)); out.addPage(p); });
    var data=await out.save();
    var blob=new Blob([data],{type:'application/pdf'}); var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download='edited.pdf';document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},150); $('status').textContent=t('b_pdfedit_status_done'); });
</script>
</body>
