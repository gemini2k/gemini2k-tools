.row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin:.6rem 0;}select,button.mini{padding:.5rem;border:1px solid var(--border);border-radius:9px;background:var(--input-bg);color:var(--text);font-family:inherit;}

<body>
<div class="toolwrap" style="max-width:760px;">
  <h1 data-i18n="b_sheetmusic_title">악보 그리기</h1>
  <p class="sub" data-i18n-html="b_sheetmusic_sub">음표를 적으면 오선보로 그려 줍니다. 예: <code>C4 D4 E4 F4 | G4 A4 B4 C5</code></p>
  <div class="card">
    <textarea id="in">C4 D4 E4 F4 | G4 A4 B4 C5</textarea>
    <div class="row"><span data-i18n="b_sheetmusic_time_label">박자표</span> <select id="time"><option>4/4</option><option>3/4</option><option>2/4</option><option>6/8</option></select>
      <span data-i18n="b_sheetmusic_dur_label">음표길이</span> <select id="dur"><option value="q" data-i18n="b_sheetmusic_dur_q">4분음표</option><option value="8" data-i18n="b_sheetmusic_dur_8">8분음표</option><option value="h" data-i18n="b_sheetmusic_dur_h">2분음표</option><option value="w" data-i18n="b_sheetmusic_dur_w">온음표</option></select>
      <button class="mini" id="png" type="button" data-i18n="b_sheetmusic_btn_png">⬇️ PNG 저장</button></div>
    <div class="err" id="err"></div>
    <div id="score"></div>
    <div class="note" data-i18n-html="b_sheetmusic_note">오픈소스 <b>VexFlow</b>(MIT, <a href="https://github.com/0xfe/vexflow" target="_blank" rel="noopener">0xfe/vexflow</a>)를 자체 호스팅합니다. 음이름은 <code>C D E F G A B</code>, 반음은 <code>C#4</code>, 옥타브는 숫자(4=가운데 도), 마디 구분은 <code>|</code>. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/vexflow-3/vexflow-min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var VF=Vex.Flow;
  function render(){ $('err').textContent=''; var host=$('score'); host.innerHTML='';
    try{
      var bars=$('in').value.split('|').map(function(s){return s.trim();}).filter(Boolean);
      var dur=$('dur').value, time=$('time').value;
      var W=Math.max(420,bars.length*220+40);
      var renderer=new VF.Renderer(host,VF.Renderer.Backends.SVG); renderer.resize(W,160); var ctx=renderer.getContext();
      var x=10;
      bars.forEach(function(bar,bi){ var notesStr=bar.split(/\s+/).filter(Boolean);
        var width=bi===0?220:200;
        var stave=new VF.Stave(x,20,width); if(bi===0){stave.addClef('treble').addTimeSignature(time);} stave.setContext(ctx).draw();
        var notes=notesStr.map(function(n){ var m=n.match(/^([A-Ga-g])(#|b)?(\d)$/); if(!m)throw new Error(t('b_sheetmusic_err_note')+n);
          var key=m[1].toLowerCase()+(m[2]||'')+'/'+m[3];
          var sn=new VF.StaveNote({clef:'treble',keys:[key],duration:dur}); if(m[2]==='#')sn.addAccidental(0,new VF.Accidental('#')); if(m[2]==='b')sn.addAccidental(0,new VF.Accidental('b')); return sn; });
        VF.Formatter.FormatAndDraw(ctx,stave,notes); x+=width; });
    }catch(e){ $('err').textContent='⚠️ '+(e.message||e); } }
  var _t; ['in','time','dur'].forEach(function(id){$(id).addEventListener('input',function(){clearTimeout(_t);_t=setTimeout(render,300);});$(id).addEventListener('change',render);});
  $('png').addEventListener('click',function(){ var svg=$('score').querySelector('svg'); if(!svg)return;
    var s=new XMLSerializer().serializeToString(svg); var img=new Image();
    img.onload=function(){var c=document.createElement('canvas');c.width=img.width*2;c.height=img.height*2;var cx=c.getContext('2d');cx.fillStyle='#fff';cx.fillRect(0,0,c.width,c.height);cx.scale(2,2);cx.drawImage(img,0,0);var a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='score.png';document.body.appendChild(a);a.click();a.remove();};
    img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(s))); });
  render();
</script>
</body>
