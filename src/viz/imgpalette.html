<style>
  .drop{border:2px dashed var(--border);border-radius:14px;padding:2rem 1rem;text-align:center;color:var(--muted);cursor:pointer;transition:.15s;}
  .drop:hover,.drop.over{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .drop .big{font-size:2rem;margin-bottom:.4rem;}
  .preview{margin-top:1rem;text-align:center;} .preview img{max-width:100%;max-height:240px;border:1px solid var(--border);border-radius:10px;}
  .pal{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1.1rem;}
  .sw{flex:1;min-width:90px;border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;}
  .sw .c{height:64px;} .sw .t{padding:.4rem;text-align:center;font-family:ui-monospace,monospace;font-size:.78rem;color:var(--text);background:var(--surface);}
  .note{margin-top:1.2rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}

<body>
<div class="toolwrap" style="max-width:720px;">
  <h1 data-i18n="b_imgpalette_title">이미지 색상 추출기</h1>
  <p class="sub" data-i18n="b_imgpalette_sub">이미지를 올리면 대표 색 팔레트를 뽑아 줍니다. 색을 클릭하면 HEX가 복사됩니다.</p>

  <div class="howto"><span class="ic">📖</span><div><b data-i18n="b_imgpalette_howto_title">사용 방법</b><ol>
    <li data-i18n="b_imgpalette_howto_1">이미지를 끌어다 놓거나 클릭해 올립니다</li>
    <li data-i18n="b_imgpalette_howto_2">주요 색 8개가 자동 추출됩니다</li>
    <li data-i18n="b_imgpalette_howto_3">색을 클릭하면 HEX 코드가 복사됩니다</li>
  </ol></div></div>

  <div class="card">
    <div class="drop" id="drop"><div class="big">🎨</div><div><strong data-i18n="b_imgpalette_drop_label">이미지를 끌어다 놓거나 클릭</strong></div><div style="font-size:.82rem;margin-top:.3rem;" data-i18n="b_imgpalette_drop_formats">JPG · PNG · WebP</div></div>
    <input type="file" id="file" accept="image/*" class="hide"/>
    <div class="preview hide" id="pv"><img id="img" data-i18n-ph="b_imgpalette_img_alt" alt="미리보기"/></div>
    <div class="pal" id="pal"></div>
    <div class="note" data-i18n="b_imgpalette_note">이미지를 축소해 픽셀 색을 모은 뒤 비슷한 색끼리 묶어 빈도가 높은 대표 색을 추출합니다. 모든 처리는 브라우저에서만 이루어지며 이미지는 서버로 전송되지 않습니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }
  function hex(r,g,b){ return '#'+[r,g,b].map(function(v){return v.toString(16).padStart(2,'0');}).join('').toUpperCase(); }
  function extract(img){
    var W=80, H=Math.max(1,Math.round(80*img.naturalHeight/img.naturalWidth))||80;
    var cv=document.createElement('canvas'); cv.width=W; cv.height=H; var x=cv.getContext('2d');
    x.drawImage(img,0,0,W,H); var data;
    try{ data=x.getImageData(0,0,W,H).data; }catch(e){ $('pal').innerHTML='<p style="color:var(--muted);font-size:.85rem">'+t('b_imgpalette_err_cors')+'</p>'; return; }
    var buckets={};
    for(var i=0;i<data.length;i+=4){ var a=data[i+3]; if(a<125) continue;
      var r=data[i],g=data[i+1],b=data[i+2];
      var key=(r>>4)+'-'+(g>>4)+'-'+(b>>4);
      if(!buckets[key]) buckets[key]={r:0,g:0,b:0,n:0}; var bk=buckets[key]; bk.r+=r;bk.g+=g;bk.b+=b;bk.n++;
    }
    var arr=Object.keys(buckets).map(function(k){ var bk=buckets[k]; return {r:Math.round(bk.r/bk.n),g:Math.round(bk.g/bk.n),b:Math.round(bk.b/bk.n),n:bk.n}; });
    arr.sort(function(a,b){return b.n-a.n;});
    var top=arr.slice(0,8);
    $('pal').innerHTML=top.map(function(c){ var h=hex(c.r,c.g,c.b);
      return '<div class="sw" data-c="'+h+'"><div class="c" style="background:'+h+'"></div><div class="t">'+h+'</div></div>'; }).join('');
  }
  function readFile(f){ if(!f||!/^image\//.test(f.type)) return; var url=URL.createObjectURL(f); var img=$('img');
    img.onload=function(){ $('pv').classList.remove('hide'); extract(img); }; img.src=url; }
  $('drop').addEventListener('click',function(){ $('file').click(); });
  $('file').addEventListener('change',function(e){ if(e.target.files[0]) readFile(e.target.files[0]); });
  ['dragover','dragenter'].forEach(function(ev){ $('drop').addEventListener(ev,function(e){e.preventDefault();$('drop').classList.add('over');}); });
  ['dragleave','drop'].forEach(function(ev){ $('drop').addEventListener(ev,function(e){e.preventDefault();$('drop').classList.remove('over');}); });
  $('drop').addEventListener('drop',function(e){ if(e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]); });
  $('pal').addEventListener('click',function(e){ var s=e.target.closest('.sw'); if(s){ navigator.clipboard.writeText(s.dataset.c).then(function(){toast(s.dataset.c+' '+t('b_imgpalette_copied'));}); } });
</script>
