<body>
<div class="toolwrap" style="max-width:760px;">
  <h1>OG·썸네일 이미지 생성기</h1>
  <p class="sub">제목과 부제를 넣으면 SNS 공유용 OG 이미지(1200×630)와 블로그 썸네일을 만들어 줍니다.</p>

  <div class="card">
    <div class="fld"><label>제목</label><input id="title" type="text" value="필요한 도구, 바로 여기"/></div>
    <div class="fld"><label>부제 (선택)</label><input id="sub" type="text" value="설치 없이 브라우저에서 쓰는 무료 도구"/></div>
    <div class="fld"><label>사이트/배지 (선택)</label><input id="site" type="text" value="gemini2k.co.kr"/></div>
    <div class="row">
      <label>배경<select id="bg"><option value="grad">그라데이션</option><option value="solid">단색</option></select></label>
      <label>색 1<input id="c1" type="color" value="#5B5BF5"/></label>
      <label>색 2<input id="c2" type="color" value="#15C39A"/></label>
      <label>글자색<select id="fg"><option value="#ffffff">흰색</option><option value="#16181f">검정</option></select></label>
    </div>
    <div class="chartwrap"><canvas id="cv" width="1200" height="630"></canvas></div>
    <div style="margin-top:.9rem;"><button class="btn" id="dl" type="button">⬇️ PNG 내려받기 (1200×630)</button></div>
    <div class="note">표준 OG 비율(1.91:1, 1200×630)로 만듭니다. 카카오톡·페이스북·트위터 공유 카드와 블로그 썸네일에 적합합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var cv=$('cv'), x=cv.getContext('2d'), W=1200, H=630;
  function wrap(text, font, maxW){ x.font=font; var words=text.split(' '), lines=[], cur='';
    for(var i=0;i<words.length;i++){ var t=cur?cur+' '+words[i]:words[i]; if(x.measureText(t).width>maxW && cur){ lines.push(cur); cur=words[i]; } else cur=t; }
    if(cur)lines.push(cur); return lines; }
  function draw(){
    var c1=$('c1').value, c2=$('c2').value, fg=$('fg').value;
    if($('bg').value==='grad'){ var g=x.createLinearGradient(0,0,W,H); g.addColorStop(0,c1); g.addColorStop(1,c2); x.fillStyle=g; }
    else x.fillStyle=c1;
    x.fillRect(0,0,W,H);
    // 상단 바
    x.fillStyle='rgba(255,255,255,.25)'; x.fillRect(0,0,W,10);
    var pad=90, maxW=W-pad*2, y=0;
    // 사이트 배지
    var site=$('site').value.trim();
    if(site){ x.font='bold 30px Pretendard,system-ui,sans-serif'; x.textAlign='left'; x.fillStyle=fg; x.globalAlpha=0.85; x.fillText(site, pad, 110); x.globalAlpha=1; }
    // 제목(자동 줄바꿈)
    var titleFont='800 76px Pretendard,system-ui,sans-serif';
    var tlines=wrap($('title').value||'', titleFont, maxW).slice(0,3);
    var subLines = $('sub').value.trim()? wrap($('sub').value, '400 38px Pretendard,system-ui,sans-serif', maxW).slice(0,2):[];
    var blockH=tlines.length*88 + (subLines.length?subLines.length*52+24:0);
    var startY=(H-blockH)/2 + 70;
    x.textAlign='left'; x.fillStyle=fg; x.font=titleFont;
    tlines.forEach(function(l,i){ x.fillText(l, pad, startY+i*88); });
    if(subLines.length){ x.font='400 38px Pretendard,system-ui,sans-serif'; x.globalAlpha=0.9;
      subLines.forEach(function(l,i){ x.fillText(l, pad, startY+tlines.length*88+24+i*52); }); x.globalAlpha=1; }
  }
  ['title','sub','site','bg','c1','c2','fg'].forEach(function(id){ $(id).addEventListener('input',draw); $(id).addEventListener('change',draw); });
  $('dl').addEventListener('click',function(){ var a=document.createElement('a'); a.href=cv.toDataURL('image/png'); a.download='og-image.png'; document.body.appendChild(a); a.click(); setTimeout(function(){a.remove();},100); });
  // 폰트 로드 후 재그리기(웹폰트)
  draw(); if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(draw); }
</script>
</body>
