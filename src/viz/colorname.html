<body>
<div class="toolwrap" style="max-width:560px;">
  <h1 data-i18n="b_colorname_title">색 이름 변환기</h1>
  <p class="sub" data-i18n="b_colorname_sub">색을 고르면 가장 가까운 CSS 색상 이름을, 색 이름을 입력하면 HEX를 알려 줍니다. 줄을 클릭하면 복사돼요.</p>
  <div class="card">
    <div class="row"><input id="pick" type="color" value="#4da3ff"/><input id="txt" type="text" value="#4DA3FF" data-i18n-ph="b_colorname_ph"/></div>
    <div class="sw" id="sw"></div>
    <div id="res"></div>
    <div class="note" data-i18n="b_colorname_note">CSS 표준 색상 이름(약 140개) 중 가장 가까운 이름을 RGB 거리로 찾습니다. 정확히 일치하지 않으면 '가장 가까운' 이름입니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var NAMES={black:'000000',white:'FFFFFF',red:'FF0000',lime:'00FF00',blue:'0000FF',yellow:'FFFF00',cyan:'00FFFF',magenta:'FF00FF',silver:'C0C0C0',gray:'808080',maroon:'800000',olive:'808000',green:'008000',purple:'800080',teal:'008080',navy:'000080',orange:'FFA500',gold:'FFD700',pink:'FFC0CB',hotpink:'FF69B4',deeppink:'FF1493',tomato:'FF6347',coral:'FF7F50',salmon:'FA8072',crimson:'DC143C',firebrick:'B22222',darkred:'8B0000',indianred:'CD5C5C',orangered:'FF4500',darkorange:'FF8C00',khaki:'F0E68C',lightyellow:'FFFFE0',ivory:'FFFFF0',beige:'F5F5DC',wheat:'F5DEB3',tan:'D2B48C',chocolate:'D2691E',sienna:'A0522D',brown:'A52A2A',saddlebrown:'8B4513',lightgreen:'90EE90',limegreen:'32CD32',forestgreen:'228B22',darkgreen:'006400',seagreen:'2E8B57',mediumseagreen:'3CB371',springgreen:'00FF7F',yellowgreen:'9ACD32',olivedrab:'6B8E23',darkolivegreen:'556B2F',aqua:'00FFFF',turquoise:'40E0D0',mediumturquoise:'48D1CC',darkturquoise:'00CED1',lightseagreen:'20B2AA',cadetblue:'5F9EA0',steelblue:'4682B4',skyblue:'87CEEB',lightskyblue:'87CEFA',deepskyblue:'00BFFF',dodgerblue:'1E90FF',cornflowerblue:'6495ED',royalblue:'4169E1',mediumblue:'0000CD',darkblue:'00008B',midnightblue:'191970',slateblue:'6A5ACD',indigo:'4B0082',darkviolet:'9400D3',blueviolet:'8A2BE2',mediumpurple:'9370DB',violet:'EE82EE',orchid:'DA70D6',plum:'DDA0DD',thistle:'D8BFD8',lavender:'E6E6FA',mediumvioletred:'C71585',lightpink:'FFB6C1',mistyrose:'FFE4E1',peachpuff:'FFDAB9',moccasin:'FFE4B5',navajowhite:'FFDEAD',lightgray:'D3D3D3',gainsboro:'DCDCDC',whitesmoke:'F5F5F5',dimgray:'696969',darkgray:'A9A9A9',slategray:'708090',lightslategray:'778899',darkslategray:'2F4F4F',aliceblue:'F0F8FF',azure:'F0FFFF',mintcream:'F5FFFA',honeydew:'F0FFF0',lightcyan:'E0FFFF',powderblue:'B0E0E6',lightblue:'ADD8E6',paleturquoise:'AFEEEE',aquamarine:'7FFFD4',chartreuse:'7FFF00',greenyellow:'ADFF2F',darkkhaki:'BDB76B',goldenrod:'DAA520',darkgoldenrod:'B8860B',peru:'CD853F',rosybrown:'BC8F8F',darksalmon:'E9967A',lightcoral:'F08080',lightsalmon:'FFA07A',sandybrown:'F4A460',burlywood:'DEB887',cornsilk:'FFF8DC',lemonchiffon:'FFFACD',papayawhip:'FFEFD5',bisque:'FFE4C4',blanchedalmond:'FFEBCD',antiquewhite:'FAEBD7',linen:'FAF0E6',oldlace:'FDF5E6',seashell:'FFF5EE',lavenderblush:'FFF0F5',snow:'FFFAFA',ghostwhite:'F8F8FF',floralwhite:'FFFAF0'};
  function toRgb(h){ h=h.replace('#',''); if(h.length===3)h=h.split('').map(function(c){return c+c;}).join(''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
  function nearest(rgb){ var best=null,bd=1e9; for(var k in NAMES){ var c=toRgb(NAMES[k]); var d=Math.pow(c[0]-rgb[0],2)+Math.pow(c[1]-rgb[1],2)+Math.pow(c[2]-rgb[2],2); if(d<bd){bd=d;best=k;} } return {name:best,dist:Math.sqrt(bd)}; }
  function update(hex){ if(!/^#?[0-9a-fA-F]{3}([0-9a-fA-F]{3})?$/.test(hex.replace('#',''))){ /*maybe name*/ if(NAMES[hex.toLowerCase()])hex='#'+NAMES[hex.toLowerCase()]; else return; }
    if(hex[0]!=='#')hex='#'+hex; var rgb=toRgb(hex); var n=nearest(rgb); var nhex='#'+NAMES[n.name];
    $('sw').style.background=hex; $('pick').value=hex.length===7?hex:'#'+toRgb(hex).map(function(x){return ('0'+x.toString(16)).slice(-2);}).join('');
    var items=[
      [t('b_colorname_label_nearest'), n.name+(n.dist<2?' '+t('b_colorname_exact'):' '+t('b_colorname_approx')), '#'+NAMES[n.name]],
      [t('b_colorname_label_hex'), nhex.toUpperCase(), nhex],
      [t('b_colorname_label_rgb'), 'rgb('+rgb.join(', ')+')', hex],
      [t('b_colorname_label_hexval'), hex.toUpperCase(), hex]
    ];
    $('res').innerHTML=items.map(function(it){ return '<div class="item" data-v="'+it[1].replace(/"/g,'&quot;')+'"><span class="dot" style="background:'+it[2]+'"></span><span><span class="l">'+it[0]+'</span><br><span class="v">'+it[1]+'</span></span></div>'; }).join('');
  }
  window.onI18n=function(){update($('pick').value);};
  $('pick').addEventListener('input',function(){ $('txt').value=$('pick').value.toUpperCase(); update($('pick').value); });
  $('txt').addEventListener('input',function(){ update($('txt').value.trim()); });
  $('res').addEventListener('click',function(e){var it=e.target.closest('.item');if(it){navigator.clipboard.writeText(it.dataset.v).then(function(){toast(t('b_colorname_copied'));});}});
  update('#4DA3FF');
</script>
