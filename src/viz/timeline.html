<body>
<div class="toolwrap" style="max-width:920px;">
  <h1 data-i18n="b_timeline_title">타임라인 시각화</h1>
  <p class="sub" data-i18n="b_timeline_sub">사건·일정을 시간 축에 올려 보여 줍니다. 마우스로 끌고 확대할 수 있어요.</p>
  <div class="card" style="max-width:none;">
    <textarea id="in">창업, 2020-03-01
시드 투자, 2021-06-15
제품 출시, 2022-01-10, 2022-03-10
시리즈 A, 2023-05-01
해외 진출, 2024-02-01, 2024-08-01
IPO 준비, 2025-09-01</textarea>
    <div class="row"><button class="btn" id="render" type="button" data-i18n="b_timeline_btn_render">그리기</button><span style="font-size:.85rem;color:var(--muted);" data-i18n="b_timeline_format_hint">형식: 내용, 시작일[, 종료일]</span></div>
    <div class="err" id="err"></div>
    <div id="tl"></div>
    <div class="note" data-i18n-html="b_timeline_note">오픈소스 <b>vis-timeline</b>(MIT/Apache-2.0, <a href="https://github.com/visjs/vis-timeline" target="_blank" rel="noopener">visjs/vis-timeline</a>)을 자체 호스팅합니다. 종료일이 있으면 막대(기간), 없으면 점(시점)으로 표시합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/vistimeline-7/vis-timeline-graph2d.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var tl=null;
  function render(){ $('err').textContent='';
    try{ var items=$('in').value.split(/\r?\n/).map(function(l,i){ var p=l.split(',').map(function(x){return x.trim();}); if(p.length<2||!p[0])return null;
        var o={id:i,content:p[0],start:p[1]}; if(p[2])o.end=p[2]; return o; }).filter(Boolean);
      if(!items.length){$('err').textContent=t('b_timeline_err_empty');return;}
      if(tl)tl.destroy(); tl=new vis.Timeline($('tl'),new vis.DataSet(items),{height:'320px',locale:'en',stack:true});
    }catch(e){ $('err').textContent='⚠️ '+(e.message||e); } }
  $('render').addEventListener('click',render);
  var _t; $('in').addEventListener('input',function(){clearTimeout(_t);_t=setTimeout(render,500);});
  window.onI18n=render;
  render();
</script>
