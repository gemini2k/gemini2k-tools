<body>
<div class="toolwrap" style="max-width:920px;">
  <h1 data-i18n="b_gantt_title">간트 차트 생성기</h1>
  <p class="sub" data-i18n="b_gantt_sub">작업·시작일·종료일·진행률을 적으면 프로젝트 일정표를 그려 줍니다.</p>
  <div class="card" style="max-width:none;">
    <textarea id="in">기획, 2026-07-01, 2026-07-05, 100
디자인, 2026-07-04, 2026-07-12, 60
개발, 2026-07-10, 2026-07-25, 30
테스트, 2026-07-22, 2026-07-30, 0
배포, 2026-07-30, 2026-08-02, 0</textarea>
    <div class="row"><span data-i18n="b_gantt_view_label">보기</span> <select id="mode"><option value="Day" data-i18n="b_gantt_view_day">일</option><option value="Week" selected data-i18n="b_gantt_view_week">주</option><option value="Month" data-i18n="b_gantt_view_month">월</option></select>
      <button class="btn" id="render" type="button" data-i18n="b_gantt_btn_render">그리기</button></div>
    <div class="err" id="err"></div>
    <div class="gwrap"><svg id="gantt"></svg></div>
    <div class="note" data-i18n-html="b_gantt_note">오픈소스 <b>Frappe Gantt</b>(MIT, <a href="https://github.com/frappe/gantt" target="_blank" rel="noopener">frappe/gantt</a>)를 자체 호스팅합니다. 한 줄에 <code>작업명, 시작일, 종료일, 진행률(%)</code> 형식으로 입력합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/gantt-0/frappe-gantt.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var gantt=null;
  function render(){ $('err').textContent='';
    try{ var tasks=$('in').value.split(/\r?\n/).map(function(l,i){ var p=l.split(',').map(function(x){return x.trim();}); if(p.length<3||!p[0])return null;
        return {id:'t'+i,name:p[0],start:p[1],end:p[2],progress:+(p[3]||0)}; }).filter(Boolean);
      if(!tasks.length){$('err').textContent=t('b_gantt_err_empty');return;}
      $('gantt').innerHTML=''; gantt=new Gantt('#gantt',tasks,{view_mode:$('mode').value,language:'en'});
    }catch(e){ $('err').textContent='⚠️ '+(e.message||e)+' '+t('b_gantt_err_date_hint'); } }
  $('render').addEventListener('click',render); $('mode').addEventListener('change',render);
  var _t; $('in').addEventListener('input',function(){clearTimeout(_t);_t=setTimeout(render,500);});
  window.onI18n=render;
  render();
</script>
