<body>
<div class="toolwrap" style="max-width:720px;">
  <h1 data-i18n="b_lottie_title">Lottie 애니메이션 뷰어</h1>
  <p class="sub" data-i18n="b_lottie_sub">Lottie 애니메이션(.json)을 불러와 재생하며 미리봅니다.</p>
  <div class="card">
    <div class="drop" id="drop" data-i18n="b_lottie_drop_hint">✨ Lottie JSON 파일을 끌어다 놓거나 클릭해서 선택<input type="file" id="file" accept=".json,application/json" hidden/></div>
    <div id="anim"></div>
    <div class="row">
      <button class="mini" id="play" type="button" data-i18n="b_lottie_btn_pause">⏸ 일시정지</button>
      <button class="mini" id="restart" type="button" data-i18n="b_lottie_btn_restart">↺ 처음부터</button>
      <span data-i18n="b_lottie_label_speed">속도</span> <input type="range" id="speed" min="0.25" max="2" step="0.25" value="1"/><span id="sv">1x</span>
      <label><input type="checkbox" id="loop" checked/> <span data-i18n="b_lottie_label_loop">반복</span></label>
    </div>
    <div class="note" data-i18n-html="b_lottie_note">오픈소스 <b>lottie-web</b>(MIT, <a href="https://github.com/airbnb/lottie-web" target="_blank" rel="noopener">airbnb/lottie-web</a>)을 자체 호스팅합니다. 처음에는 샘플 애니메이션이 표시됩니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/lottie-5/lottie.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var anim=null, playing=true;
  function loadData(data){ if(anim)anim.destroy(); $('anim').innerHTML='';
    anim=lottie.loadAnimation({container:$('anim'),renderer:'svg',loop:$('loop').checked,autoplay:true,animationData:data});
    anim.setSpeed(+$('speed').value); playing=true; $('play').textContent=t('b_lottie_btn_pause'); }
  window.onI18n=function(){ if(playing){ $('play').textContent=t('b_lottie_btn_pause'); }else{ $('play').textContent=t('b_lottie_btn_play'); } };
  var drop=$('drop'), file=$('file');
  drop.addEventListener('click',function(){file.click();});
  drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('drag');});
  drop.addEventListener('dragleave',function(){drop.classList.remove('drag');});
  drop.addEventListener('drop',function(e){e.preventDefault();drop.classList.remove('drag');if(e.dataTransfer.files[0])read(e.dataTransfer.files[0]);});
  file.addEventListener('change',function(){if(file.files[0])read(file.files[0]);});
  function read(f){ var r=new FileReader(); r.onload=function(){ try{ loadData(JSON.parse(r.result)); drop.textContent='✨ '+f.name; }catch(e){ alert(t('b_lottie_err_invalid')); } }; r.readAsText(f); }
  $('play').addEventListener('click',function(){ if(!anim)return; if(playing){anim.pause();$('play').textContent=t('b_lottie_btn_play');}else{anim.play();$('play').textContent=t('b_lottie_btn_pause');} playing=!playing; });
  $('restart').addEventListener('click',function(){ if(anim){anim.goToAndPlay(0);playing=true;$('play').textContent=t('b_lottie_btn_pause');} });
  $('speed').addEventListener('input',function(){ $('sv').textContent=$('speed').value+'x'; if(anim)anim.setSpeed(+$('speed').value); });
  $('loop').addEventListener('change',function(){ if(anim){anim.loop=$('loop').checked;} });
  // sample animation: a pulsing circle
  var sample={v:"5.7.4",fr:30,ip:0,op:60,w:300,h:300,nm:"sample",ddd:0,assets:[],layers:[{ddd:0,ind:1,ty:4,nm:"c",sr:1,ks:{o:{a:0,k:100},r:{a:0,k:0},p:{a:0,k:[150,150,0]},a:{a:0,k:[0,0,0]},s:{a:1,k:[{i:{x:[.5,.5,.5],y:[1,1,1]},o:{x:[.5,.5,.5],y:[0,0,0]},t:0,s:[40,40,100]},{i:{x:[.5,.5,.5],y:[1,1,1]},o:{x:[.5,.5,.5],y:[0,0,0]},t:30,s:[120,120,100]},{t:60,s:[40,40,100]}]}},ao:0,shapes:[{ty:"el",p:{a:0,k:[0,0]},s:{a:0,k:[100,100]},nm:"e"},{ty:"fl",c:{a:0,k:[0.15,0.39,0.92,1]},o:{a:0,k:100},nm:"f"}],ip:0,op:60,st:0,bm:0}]};
  loadData(sample);
</script>
