<body>
<div class="toolwrap" style="max-width:860px;">
  <h1 data-i18n="b_uml_title">UML 다이어그램 생성기</h1>
  <p class="sub" data-i18n="b_uml_sub">간단한 텍스트로 클래스·관계 다이어그램을 그립니다.</p>
  <div class="card" style="max-width:none;">
    <textarea id="in">[회원|+이름;+이메일|+로그인();+로그아웃()]
[주문|+번호;+금액|+결제()]
[상품|+이름;+가격]
[회원]1-*[주문]
[주문]*-*[상품]
[관리자]->[회원]</textarea>
    <div class="row"><button class="mini" id="render" type="button" data-i18n="b_uml_btn_render">그리기</button><button class="mini" id="svg" type="button" data-i18n="b_uml_btn_svg">⬇️ SVG</button><button class="mini" id="png" type="button" data-i18n="b_uml_btn_png">⬇️ PNG</button></div>
    <div class="err" id="err"></div>
    <div class="prev" id="prev"></div>
    <div class="note" data-i18n-html="b_uml_note">오픈소스 <b>nomnoml</b>(MIT, <a href="https://github.com/skanaar/nomnoml" target="_blank" rel="noopener">skanaar/nomnoml</a>)을 자체 호스팅합니다. <code>[클래스|속성|메서드]</code>, 관계는 <code>-&gt;</code> <code>1-*</code> <code>--</code> 등으로 표현합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/nomnoml-1/graphre.js"></script>
<script src="/vendor/nomnoml-1/nomnoml.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function render(){ $('err').textContent='';
    try{ var svg=nomnoml.renderSvg($('in').value); $('prev').innerHTML=svg; window._svg=$('prev').querySelector('svg'); }
    catch(e){ $('err').textContent='⚠️ '+(e.message||e); } }
  var _t; $('in').addEventListener('input',function(){clearTimeout(_t);_t=setTimeout(render,400);});
  $('render').addEventListener('click',render);
  $('svg').addEventListener('click',function(){ if(!window._svg)return; var s=new XMLSerializer().serializeToString(window._svg);
    var blob=new Blob([s],{type:'image/svg+xml'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='uml.svg';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},120); });
  $('png').addEventListener('click',function(){ if(!window._svg)return; var s=new XMLSerializer().serializeToString(window._svg); var img=new Image();
    img.onload=function(){var c=document.createElement('canvas');c.width=img.width*2;c.height=img.height*2;var cx=c.getContext('2d');cx.fillStyle='#fff';cx.fillRect(0,0,c.width,c.height);cx.scale(2,2);cx.drawImage(img,0,0);var a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='uml.png';document.body.appendChild(a);a.click();a.remove();};
    img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(s))); });
  render();
</script>
