<body>
<div class="toolwrap" style="max-width:880px;">
  <h1 data-i18n="b_network_title">네트워크 그래프 시각화</h1>
  <p class="sub" data-i18n="b_network_sub">관계(연결) 목록을 적으면 관계도를 그려 줍니다. 드래그·줌이 되고 PNG로 저장할 수 있어요.</p>
  <div class="card" style="max-width:none;">
    <div class="row"><span data-i18n="b_network_layout_label">배치</span> <select id="layout"><option value="cose" data-i18n="b_network_layout_cose">자동(힘기반)</option><option value="circle" data-i18n="b_network_layout_circle">원형</option><option value="grid" data-i18n="b_network_layout_grid">격자</option><option value="concentric" data-i18n="b_network_layout_concentric">동심원</option><option value="breadthfirst" data-i18n="b_network_layout_tree">트리</option></select>
      <button class="mini" id="fit" type="button" data-i18n="b_network_btn_fit">화면 맞춤</button><button class="mini" id="dl" type="button" data-i18n="b_network_btn_png">⬇️ PNG 저장</button></div>
    <textarea id="data">철수 - 영희
철수 - 민수
영희 - 지영
민수 - 지영
지영 - 수빈
수빈 - 철수</textarea>
    <div id="cy"></div>
    <div class="note" data-i18n-html="b_network_note">오픈소스 <b>Cytoscape.js</b>(MIT, <a href="https://github.com/cytoscape/cytoscape.js" target="_blank" rel="noopener">cytoscape/cytoscape.js</a>)를 자체 호스팅합니다. <code>A - B</code> 형식으로 연결을 한 줄에 하나씩 입력합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/cytoscape-3/cytoscape.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var cy=null;
  function build(){ var nodes={}, edges=[];
    $('data').value.split(/\r?\n/).forEach(function(l){ var m=l.split(/\s*-\s*/); if(m.length<2)return; var a=m[0].trim(),b=m[1].trim(); if(!a||!b)return;
      nodes[a]=1;nodes[b]=1; edges.push({data:{source:a,target:b}}); });
    var els=Object.keys(nodes).map(function(n){return {data:{id:n}};}).concat(edges);
    var acc=(getComputedStyle(document.documentElement).getPropertyValue('--accent')||'#2563eb').trim();
    if(cy)cy.destroy();
    cy=cytoscape({container:$('cy'),elements:els,
      style:[{selector:'node',style:{'label':'data(id)','background-color':acc,'color':'#fff','text-valign':'center','text-halign':'center','font-size':'12px','width':'34px','height':'34px','text-outline-color':acc,'text-outline-width':2}},
             {selector:'edge',style:{'width':2,'line-color':'#94a3b8','curve-style':'bezier','target-arrow-shape':'none'}}],
      layout:{name:$('layout').value,animate:false}});
  }
  ['data','layout'].forEach(function(id){$(id).addEventListener('input',build);$(id).addEventListener('change',build);});
  $('fit').addEventListener('click',function(){if(cy)cy.fit();});
  $('dl').addEventListener('click',function(){if(!cy)return;var png=cy.png({full:true,scale:2,bg:'#fff'});var a=document.createElement('a');a.href=png;a.download='network.png';document.body.appendChild(a);a.click();a.remove();});
  build();
</script>
</body>
