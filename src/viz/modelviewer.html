<body>
<div class="toolwrap" style="max-width:760px;">
  <h1 data-i18n="b_modelviewer_title">3D 모델 뷰어</h1>
  <p class="sub" data-i18n="b_modelviewer_sub">GLB·GLTF 3D 모델을 불러와 마우스로 돌리고 확대하며 살펴봅니다.</p>
  <div class="card">
    <div class="drop" id="drop" data-i18n="b_modelviewer_drop">📦 .glb / .gltf 파일을 끌어다 놓거나 클릭해서 선택<input type="file" id="file" accept=".glb,.gltf,model/gltf-binary" hidden/></div>
    <model-viewer id="mv" camera-controls auto-rotate shadow-intensity="1" exposure="1" ar></model-viewer>
    <div class="row">
      <label><input type="checkbox" id="rotate" checked/> <span data-i18n="b_modelviewer_auto_rotate">자동 회전</span></label>
      <label><input type="checkbox" id="wire"/> <span data-i18n="b_modelviewer_wireframe">와이어프레임 배경</span></label>
    </div>
    <div class="note" data-i18n-html="b_modelviewer_note">오픈소스 <b>&lt;model-viewer&gt;</b>(Apache-2.0, Google, <a href="https://github.com/google/model-viewer" target="_blank" rel="noopener">google/model-viewer</a>)를 자체 호스팅합니다. 모델 파일은 업로드되지 않고 브라우저에서만 렌더링됩니다.</div>
  </div>
</div>
<script type="module" src="/vendor/modelviewer-3/model-viewer.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var mv=$('mv'), drop=$('drop'), file=$('file');
  drop.addEventListener('click',function(){file.click();});
  drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('drag');});
  drop.addEventListener('dragleave',function(){drop.classList.remove('drag');});
  drop.addEventListener('drop',function(e){e.preventDefault();drop.classList.remove('drag');if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);});
  file.addEventListener('change',function(){if(file.files[0])load(file.files[0]);});
  function load(f){ if(!/\.(glb|gltf)$/i.test(f.name)){alert(t('b_modelviewer_err_format'));return;} mv.src=URL.createObjectURL(f); drop.textContent='📦 '+f.name; }
  $('rotate').addEventListener('change',function(){ if($('rotate').checked)mv.setAttribute('auto-rotate','');else mv.removeAttribute('auto-rotate'); });
  $('wire').addEventListener('change',function(){ mv.style.background=$('wire').checked?'repeating-linear-gradient(45deg,#0f1226,#0f1226 10px,#161a32 10px,#161a32 20px)':'#0f1226'; });
</script>
