<body>
<div class="toolwrap" style="max-width:880px;">
  <h1 data-i18n="b_graphviz_title">Graphviz DOT 다이어그램</h1>
  <p class="sub" data-i18n="b_graphviz_sub">DOT 언어로 순서도·구조도·트리를 그립니다. 텍스트만 적으면 자동으로 배치됩니다.</p>
  <div class="card" style="max-width:none;">
    <textarea id="in">digraph G {
  rankdir=LR;
  node [shape=box, style=rounded];
  시작 -> 입력검증;
  입력검증 -> 처리 [label="유효"];
  입력검증 -> 오류 [label="무효"];
  처리 -> 저장 -> 종료;
  오류 -> 종료;
}</textarea>
    <div class="row"><button class="mini" id="render" type="button" data-i18n="b_graphviz_btn_render">그리기</button><button class="mini" id="svg" type="button" data-i18n="b_graphviz_btn_svg">⬇️ SVG</button><button class="mini" id="png" type="button" data-i18n="b_graphviz_btn_png">⬇️ PNG</button></div>
    <div class="err" id="err"></div>
    <div class="prev" id="prev" data-i18n="b_graphviz_rendering">렌더링 중…</div>
    <div class="note" data-i18n-html="b_graphviz_note">오픈소스 <b>Viz.js</b>(Graphviz, MIT, <a href="https://github.com/mdaines/viz-js" target="_blank" rel="noopener">mdaines/viz-js</a>)를 자체 호스팅합니다. WebAssembly로 브라우저에서 직접 렌더링하며 데이터는 전송되지 않습니다.</div>
  </div>
</div>
<script src="/vendor/vizjs-3/viz-standalone.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var vizInstance=null;
  function render(){ if(!vizInstance){return;} $('err').textContent='';
    try{ var svg=vizInstance.renderSVGElement($('in').value); $('prev').innerHTML=''; $('prev').appendChild(svg); window._svg=svg; }
    catch(e){ $('err').textContent='⚠️ '+(e.message||e); } }
  Viz.instance().then(function(v){ vizInstance=v; render(); }).catch(function(e){ $('prev').textContent=t('b_graphviz_engine_fail'); });
  $('render').addEventListener('click',render);
  var _t; $('in').addEventListener('input',function(){clearTimeout(_t);_t=setTimeout(render,400);});
  $('svg').addEventListener('click',function(){ if(!window._svg)return; var s=new XMLSerializer().serializeToString(window._svg);
    var blob=new Blob([s],{type:'image/svg+xml'}); var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='graph.svg';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},120); });
  $('png').addEventListener('click',function(){ if(!window._svg)return; var s=new XMLSerializer().serializeToString(window._svg);
    var img=new Image(); var url='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(s)));
    img.onload=function(){ var c=document.createElement('canvas'); c.width=img.width*2;c.height=img.height*2; var ctx=c.getContext('2d'); ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height); ctx.scale(2,2); ctx.drawImage(img,0,0);
      var a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='graph.png';document.body.appendChild(a);a.click();a.remove(); }; img.src=url; });
</script>
