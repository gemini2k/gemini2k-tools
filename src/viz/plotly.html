<body>
<div class="toolwrap" style="max-width:900px;">
  <h1 data-i18n="b_plotly_title">3D·과학 차트 생성기</h1>
  <p class="sub" data-i18n="b_plotly_sub">3D 산점도·표면·등고선·히트맵·박스플롯 등 과학·통계용 차트를 만듭니다.</p>
  <div class="card" style="max-width:none;">
    <div class="row"><span data-i18n="b_plotly_type_label">종류</span> <select id="type">
      <option value="surface" data-i18n="b_plotly_opt_surface">3D 표면(Surface)</option><option value="scatter3d" data-i18n="b_plotly_opt_scatter3d">3D 산점도</option>
      <option value="heatmap" data-i18n="b_plotly_opt_heatmap">히트맵</option><option value="contour" data-i18n="b_plotly_opt_contour">등고선</option><option value="box" data-i18n="b_plotly_opt_box">박스플롯</option></select>
      <button class="btn btn-ghost" id="png" type="button" data-i18n="b_plotly_btn_png">⬇️ PNG 저장</button></div>
    <div class="hint" id="hint"></div>
    <textarea id="data"></textarea>
    <div class="err" id="err"></div>
    <div id="chart"></div>
    <div class="note" data-i18n-html="b_plotly_note">오픈소스 <b>Plotly.js</b>(MIT, <a href="https://github.com/plotly/plotly.js" target="_blank" rel="noopener">plotly/plotly.js</a>)를 자체 호스팅합니다. 차트를 마우스로 돌리고 확대할 수 있습니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/plotly-2/plotly.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var demos={
    surface:'1,2,3,4,5\n2,4,6,8,10\n3,6,9,12,15\n4,8,5,9,3\n5,3,8,2,7',
    scatter3d:'1,2,3\n2,3,5\n3,1,4\n4,5,2\n5,4,6\n6,2,3',
    heatmap:'1,20,30,50,1\n20,1,60,80,30\n30,60,1,5,20\n50,80,5,1,90',
    contour:'10,10,10,10,10\n10,20,30,20,10\n10,30,50,30,10\n10,20,30,20,10\n10,10,10,10,10',
    box:'A: 12,15,11,14,18,9,13\nB: 22,19,25,21,28,24\nC: 8,12,7,10,9,11,6'
  };
  var hintKeys={surface:'b_plotly_hint_surface',scatter3d:'b_plotly_hint_scatter3d',heatmap:'b_plotly_hint_heatmap',contour:'b_plotly_hint_contour',box:'b_plotly_hint_box'};
  function matrix(){ return $('data').value.split(/\r?\n/).map(function(l){return l.split(',').map(Number).filter(function(n){return !isNaN(n);});}).filter(function(r){return r.length;}); }
  function render(){ $('err').textContent=''; var tmp=$('type').value; var acc=(getComputedStyle(document.documentElement).getPropertyValue('--accent')||'#2563eb').trim();
    try{ var data,layout={margin:{l:40,r:10,t:20,b:40},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',font:{color:getComputedStyle(document.body).color}};
      if(tmp==='surface'){ data=[{z:matrix(),type:'surface',colorscale:'Viridis'}]; }
      else if(tmp==='scatter3d'){ var m=matrix(); data=[{x:m.map(function(r){return r[0];}),y:m.map(function(r){return r[1];}),z:m.map(function(r){return r[2];}),mode:'markers',type:'scatter3d',marker:{size:5,color:m.map(function(r){return r[2];}),colorscale:'Viridis'}}]; }
      else if(tmp==='heatmap'){ data=[{z:matrix(),type:'heatmap',colorscale:'YlOrRd'}]; }
      else if(tmp==='contour'){ data=[{z:matrix(),type:'contour',colorscale:'Viridis'}]; }
      else if(tmp==='box'){ data=$('data').value.split(/\r?\n/).map(function(l){ var m=l.split(':'); if(m.length<2)return null; return {y:m[1].split(',').map(Number).filter(function(n){return !isNaN(n);}),type:'box',name:m[0].trim()}; }).filter(Boolean); }
      Plotly.newPlot('chart',data,layout,{responsive:true,displaylogo:false});
    }catch(e){ $('err').textContent='⚠️ '+(e.message||e); } }
  $('type').addEventListener('change',function(){ $('data').value=demos[$('type').value]; $('hint').textContent=t(hintKeys[$('type').value]); render(); });
  var _t; $('data').addEventListener('input',function(){clearTimeout(_t);_t=setTimeout(render,500);});
  $('png').addEventListener('click',function(){ Plotly.downloadImage('chart',{format:'png',width:1000,height:560,filename:'chart'}); });
  window.onI18n=function(){ $('hint').textContent=t(hintKeys[$('type').value]); };
  $('data').value=demos.surface; $('hint').textContent=t(hintKeys.surface); render();
</script>
</body>
