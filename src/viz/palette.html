<body>
<div class="toolwrap" style="max-width:760px;">
  <h1>색 팔레트 생성기</h1>
  <p class="sub">기준 색 하나로 보색·유사·삼각 배색과 명도·채도 변형 팔레트를 만듭니다. 색을 클릭하면 HEX가 복사됩니다.</p>

  <div class="card">
    <div class="pickrow"><input id="picker" type="color" value="#5B5BF5"/><input id="hex" type="text" value="#5B5BF5"/><span style="color:var(--muted);font-size:.85rem;">기준 색</span></div>
    <div id="out"></div>
    <div class="note">HSL 색상환을 기준으로 배색을 계산합니다. 보색(180°), 유사색(±30°), 삼각(120°), 사각(90°) 배색과, 같은 색의 명도(Shade)·옅은 톤(Tint)을 제공합니다. 색을 클릭하면 HEX 코드가 복사됩니다. 모든 처리는 브라우저에서 이루어집니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }
  function hex2rgb(h){ h=h.replace('#',''); if(h.length===3)h=h.split('').map(function(c){return c+c;}).join(''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
  function rgb2hex(r,g,b){ return '#'+[r,g,b].map(function(v){ v=Math.max(0,Math.min(255,Math.round(v))); return v.toString(16).padStart(2,'0'); }).join('').toUpperCase(); }
  function rgb2hsl(r,g,b){ r/=255;g/=255;b/=255; var mx=Math.max(r,g,b),mn=Math.min(r,g,b),h,s,l=(mx+mn)/2;
    if(mx===mn){h=s=0;} else { var d=mx-mn; s=l>0.5?d/(2-mx-mn):d/(mx+mn);
      h=mx===r?(g-b)/d+(g<b?6:0):mx===g?(b-r)/d+2:(r-g)/d+4; h/=6; } return [h*360,s*100,l*100]; }
  function hsl2hex(h,s,l){ h=(h%360+360)%360; s=Math.max(0,Math.min(100,s))/100; l=Math.max(0,Math.min(100,l))/100;
    var c=(1-Math.abs(2*l-1))*s, xx=c*(1-Math.abs((h/60)%2-1)), m=l-c/2, r,g,b;
    if(h<60){r=c;g=xx;b=0;}else if(h<120){r=xx;g=c;b=0;}else if(h<180){r=0;g=c;b=xx;}else if(h<240){r=0;g=xx;b=c;}else if(h<300){r=xx;g=0;b=c;}else{r=c;g=0;b=xx;}
    return rgb2hex((r+m)*255,(g+m)*255,(b+m)*255); }
  function swHtml(c){ return '<div class="sw" data-c="'+c+'" style="background:'+c+'"><span>'+c+'</span></div>'; }
  function scheme(title, cols){ return '<div class="scheme"><h3>'+title+'</h3><div class="swatches">'+cols.map(swHtml).join('')+'</div></div>'; }

  function build(){
    var base=$('hex').value; if(!/^#?[0-9a-fA-F]{6}$/.test(base.replace('#',''))) return;
    if(base[0]!=='#') base='#'+base;
    $('picker').value=base;
    var rgb=hex2rgb(base), hsl=rgb2hsl(rgb[0],rgb[1],rgb[2]), h=hsl[0],s=hsl[1],l=hsl[2];
    var html='';
    html+=scheme('보색 (Complementary)', [base, hsl2hex(h+180,s,l)]);
    html+=scheme('유사색 (Analogous)', [hsl2hex(h-30,s,l), base, hsl2hex(h+30,s,l)]);
    html+=scheme('삼각 배색 (Triadic)', [base, hsl2hex(h+120,s,l), hsl2hex(h+240,s,l)]);
    html+=scheme('사각 배색 (Tetradic)', [base, hsl2hex(h+90,s,l), hsl2hex(h+180,s,l), hsl2hex(h+270,s,l)]);
    html+=scheme('명도 (Shades)', [20,35,50,65,80].map(function(L){return hsl2hex(h,s,L);}));
    html+=scheme('단색조 (Mono)', [hsl2hex(h,s*0.3,90),hsl2hex(h,s*0.6,75),base,hsl2hex(h,Math.min(100,s*1.1),40),hsl2hex(h,Math.min(100,s*1.2),25)]);
    $('out').innerHTML=html;
  }
  $('picker').addEventListener('input', function(){ $('hex').value=this.value.toUpperCase(); build(); });
  $('hex').addEventListener('input', build);
  $('out').addEventListener('click', function(e){ var s=e.target.closest('.sw'); if(s){ navigator.clipboard.writeText(s.dataset.c).then(function(){ toast(s.dataset.c+' 복사됨'); }); } });
  build();
</script>
