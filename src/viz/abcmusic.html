<body>
<div class="toolwrap" style="max-width:760px;">
  <h1>ABC 악보 에디터</h1>
  <p class="sub">ABC 표기법으로 멜로디를 적으면 악보로 그려주고 연주해 줍니다.</p>
  <div class="card">
    <textarea id="in">X:1
T:반짝반짝 작은별
M:4/4
L:1/4
K:C
C C G G | A A G2 | F F E E | D D C2 |</textarea>
    <div class="actions"><button class="btn" id="play" type="button">▶ 연주</button><button class="btn btn-ghost" id="svg" type="button">⬇️ SVG 저장</button></div>
    <div class="score" id="score"></div>
    <div class="note">오픈소스 <b>abcjs</b>(MIT, <a href="https://github.com/paulrosen/abcjs" target="_blank" rel="noopener">paulrosen/abcjs</a>)를 자체 호스팅합니다. ABC 표기법: C D E F G A B(음), 소문자는 한 옥타브 위, 숫자는 길이, |는 마디. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/abcjs-6/abcjs-basic-min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1500);}
  var visual=null, synth=null;
  function render(){ try{ var r=ABCJS.renderAbc('score',$('in').value,{responsive:'resize',add_classes:true}); visual=r&&r[0]; }catch(e){ $('score').textContent='악보 오류: '+e.message; } }
  $('in').addEventListener('input',function(){clearTimeout(window._t);window._t=setTimeout(render,300);});
  $('play').addEventListener('click',function(){ if(!ABCJS.synth||!ABCJS.synth.supportsAudio()){toast('이 브라우저는 오디오 연주를 지원하지 않아요');return;}
    try{ if(!synth)synth=new ABCJS.synth.CreateSynth(); render();
      synth.init({visualObj:visual}).then(function(){ return synth.prime(); }).then(function(){ synth.start(); toast('연주 시작'); }).catch(function(e){toast('연주 실패');});
    }catch(e){toast('연주 실패: '+e.message);} });
  $('svg').addEventListener('click',function(){ var svg=$('score').querySelector('svg'); if(!svg){toast('먼저 악보를 그리세요');return;}
    var data=new XMLSerializer().serializeToString(svg); var blob=new Blob([data],{type:'image/svg+xml'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='score.svg'; document.body.appendChild(a); a.click(); setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},120); });
  render();
</script>
