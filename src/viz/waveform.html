<body>
<div class="toolwrap" style="max-width:760px;">
  <h1>오디오 파형 플레이어</h1>
  <p class="sub">오디오 파일을 올리면 파형을 그려 보여주고, 파형을 클릭하면 그 위치부터 재생합니다.</p>
  <div class="card">
    <div class="drop" id="drop"><div style="font-size:1.8rem">🎵</div><div><strong>오디오 파일을 끌어다 놓거나 클릭</strong></div><div style="font-size:.82rem;margin-top:.3rem;">MP3 · WAV · OGG · M4A</div></div>
    <input type="file" id="file" accept="audio/*" class="hide"/>
    <div id="wave"></div>
    <div class="actions hide" id="ctrl"><button class="btn" id="play" type="button">▶ 재생</button><label>확대 <input id="zoom" type="range" min="0" max="200" value="0"/></label><span class="t" id="time">0:00</span></div>
    <div class="note">오픈소스 <b>wavesurfer.js</b>(BSD-3, <a href="https://github.com/katspaugh/wavesurfer.js" target="_blank" rel="noopener">katspaugh/wavesurfer.js</a>)를 자체 호스팅합니다. 오디오는 서버로 전송되지 않고 브라우저에서만 디코딩·표시됩니다.</div>
  </div>
</div>
<script src="/vendor/wavesurfer-6/wavesurfer.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var ws=null;
  function fmt(s){ s=Math.floor(s||0); return Math.floor(s/60)+':'+('0'+(s%60)).slice(-2); }
  function load(f){ if(!f||!/^audio\//.test(f.type))return; if(ws)ws.destroy();
    ws=WaveSurfer.create({container:'#wave',waveColor:'#9fb4ff',progressColor:'#5B5BF5',height:120,responsive:true,cursorColor:'#15C39A'});
    ws.loadBlob(f); $('ctrl').classList.remove('hide');
    ws.on('audioprocess',function(){$('time').textContent=fmt(ws.getCurrentTime())+' / '+fmt(ws.getDuration());});
    ws.on('ready',function(){$('time').textContent='0:00 / '+fmt(ws.getDuration());});
    ws.on('finish',function(){$('play').textContent='▶ 재생';});
  }
  $('drop').addEventListener('click',function(){$('file').click();});
  $('file').addEventListener('change',function(e){if(e.target.files[0])load(e.target.files[0]);});
  ['dragover','dragenter'].forEach(function(ev){$('drop').addEventListener(ev,function(e){e.preventDefault();});});
  $('drop').addEventListener('drop',function(e){e.preventDefault();if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);});
  $('play').addEventListener('click',function(){ if(!ws)return; ws.playPause(); $('play').textContent=ws.isPlaying()?'⏸ 일시정지':'▶ 재생'; });
  $('zoom').addEventListener('input',function(){ if(ws)try{ws.zoom(+$('zoom').value);}catch(e){} });
</script>
