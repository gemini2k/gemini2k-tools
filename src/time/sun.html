<body>
<div class="toolwrap" style="max-width:620px;">
  <h1 data-i18n="b_sun_title">일출·일몰·달 위상 계산기</h1>
  <p class="sub" data-i18n="b_sun_sub">위치와 날짜를 넣으면 해·달의 시각과 위상을 알려 줍니다.</p>
  <div class="card">
    <div class="row">
      <input type="date" id="date">
      <span data-i18n="b_sun_lat">위도</span> <input type="number" id="lat" value="37.5665" step="0.0001">
      <span data-i18n="b_sun_lng">경도</span> <input type="number" id="lng" value="126.9780" step="0.0001">
      <button class="btn btn-ghost" id="loc" type="button">📍 <span data-i18n="b_sun_myloc">내 위치</span></button>
    </div>
    <div class="moon" id="moon"></div>
    <table><tbody id="tb"></tbody></table>
    <div class="note" data-i18n-html="b_sun_note">오픈소스 <b>SunCalc</b>(BSD-2, <a href="https://github.com/mourner/suncalc" target="_blank" rel="noopener">mourner/suncalc</a>)를 자체 호스팅합니다. 기본 위치는 서울입니다. 시각은 기기의 시간대 기준입니다. 모든 계산은 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/suncalc-1/suncalc.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function pad(n){return(n<10?'0':'')+n;}
  function hm(d){ return d&&!isNaN(d)?pad(d.getHours())+':'+pad(d.getMinutes()):'—'; }
  (function(){ var n=new Date(); $('date').value=n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate()); })();
  var phases=[[0.03,'🌑 '+t('b_sun_moon_new')],[0.22,'🌒 '+t('b_sun_moon_waxing_crescent')],[0.28,'🌓 '+t('b_sun_moon_first_quarter')],[0.47,'🌔 '+t('b_sun_moon_waxing_gibbous')],[0.53,'🌕 '+t('b_sun_moon_full')],[0.72,'🌖 '+t('b_sun_moon_waning_gibbous')],[0.78,'🌗 '+t('b_sun_moon_last_quarter')],[0.97,'🌘 '+t('b_sun_moon_waning_crescent')],[1.01,'🌑 '+t('b_sun_moon_new')]];
  function moonName(p){ for(var i=0;i<phases.length;i++)if(p<=phases[i][0])return phases[i][1]; return '🌑 '+t('b_sun_moon_new'); }
  function run(){ var d=new Date($('date').value+'T12:00'); if(isNaN(d))return; var lat=+$('lat').value,lng=+$('lng').value;
    var tmp=SunCalc.getTimes(d,lat,lng); var mi=SunCalc.getMoonIllumination(d);
    var nm=moonName(mi.phase);
    $('moon').textContent=nm.split(' ')[0];
    $('tb').innerHTML=
      '<tr><td>'+t('b_sun_row_dawn')+'</td><td><b>'+hm(tmp.dawn)+'</b></td></tr>'+
      '<tr><td>'+t('b_sun_row_sunrise')+'</td><td><b>'+hm(tmp.sunrise)+'</b></td></tr>'+
      '<tr><td>'+t('b_sun_row_noon')+'</td><td><b>'+hm(tmp.solarNoon)+'</b></td></tr>'+
      '<tr><td>'+t('b_sun_row_sunset')+'</td><td><b>'+hm(tmp.sunset)+'</b></td></tr>'+
      '<tr><td>'+t('b_sun_row_dusk')+'</td><td><b>'+hm(tmp.dusk)+'</b></td></tr>'+
      '<tr><td>'+t('b_sun_row_golden')+'</td><td><b>'+hm(tmp.goldenHour)+'</b></td></tr>'+
      '<tr><td>'+t('b_sun_row_moon_phase')+'</td><td><b>'+nm.split(' ').slice(1).join(' ')+'</b></td></tr>'+
      '<tr><td>'+t('b_sun_row_moon_illum')+'</td><td><b>'+Math.round(mi.fraction*100)+'%</b></td></tr>';
  }
  window.onI18n = function(){
    phases=[[0.03,'🌑 '+t('b_sun_moon_new')],[0.22,'🌒 '+t('b_sun_moon_waxing_crescent')],[0.28,'🌓 '+t('b_sun_moon_first_quarter')],[0.47,'🌔 '+t('b_sun_moon_waxing_gibbous')],[0.53,'🌕 '+t('b_sun_moon_full')],[0.72,'🌖 '+t('b_sun_moon_waning_gibbous')],[0.78,'🌗 '+t('b_sun_moon_last_quarter')],[0.97,'🌘 '+t('b_sun_moon_waning_crescent')],[1.01,'🌑 '+t('b_sun_moon_new')]];
    run();
  };
  $('loc').addEventListener('click',function(){ if(navigator.geolocation)navigator.geolocation.getCurrentPosition(function(p){$('lat').value=p.coords.latitude.toFixed(4);$('lng').value=p.coords.longitude.toFixed(4);run();},function(){alert(t('b_sun_err_loc'));}); });
  ['date','lat','lng'].forEach(function(id){$(id).addEventListener('input',run);$(id).addEventListener('change',run);});
  run();
</script>
</body>
