<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_heic_title">HEIC → JPG·PNG 변환기</h1>
  <p class="sub" data-i18n="b_heic_sub">아이폰에서 찍은 HEIC 사진을 JPG나 PNG로 바꿔 줍니다. 여러 장도 한 번에.</p>
  <div class="card">
    <div class="drop" id="drop"><span data-i18n="b_heic_drop">📷 HEIC 파일을 끌어다 놓거나 클릭해서 선택 (여러 장 가능)</span><input type="file" id="file" accept=".heic,.heif,image/heic,image/heif" multiple hidden/></div>
    <div class="row"><span data-i18n="b_heic_fmt_label">형식</span> <select id="fmt"><option value="image/jpeg">JPG</option><option value="image/png">PNG</option></select>
      <span data-i18n="b_heic_quality_label">품질</span> <input type="range" id="q" min="0.5" max="1" step="0.05" value="0.9"/><span id="qv">90%</span></div>
    <div class="status" id="status"></div>
    <div class="grid" id="grid"></div>
    <div class="note" data-i18n-html="b_heic_note">오픈소스 <b>heic2any</b>(MIT, <a href="https://github.com/alexcorvi/heic2any" target="_blank" rel="noopener">alexcorvi/heic2any</a> · 내부 libheif는 LGPL/MIT)를 자체 호스팅합니다. 모든 변환은 브라우저에서만 이루어지며 사진은 업로드되지 않습니다.</div>
  </div>
</div>
<script src="/vendor/heic2any-0/heic2any.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var drop=$('drop'), file=$('file');
  $('q').addEventListener('input',function(){$('qv').textContent=Math.round($('q').value*100)+'%';});
  drop.addEventListener('click',function(){file.click();});
  drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('drag');});
  drop.addEventListener('dragleave',function(){drop.classList.remove('drag');});
  drop.addEventListener('drop',function(e){e.preventDefault();drop.classList.remove('drag');run(e.dataTransfer.files);});
  file.addEventListener('change',function(){run(file.files);});
  function run(files){ if(!files||!files.length)return; var arr=Array.prototype.slice.call(files);
    $('grid').innerHTML=''; var fmt=$('fmt').value, q=+$('q').value, ext=fmt==='image/png'?'png':'jpg', done=0;
    $('status').textContent=t('b_heic_converting').replace('{n}',arr.length);
    arr.forEach(function(f){ heic2any({blob:f,toType:fmt,quality:q}).then(function(out){
        var blob=Array.isArray(out)?out[0]:out; var url=URL.createObjectURL(blob);
        var fname=f.name.replace(/\.(heic|heif)$/i,'')+'.'+ext;
        var c=document.createElement('div');c.className='cell';
        c.innerHTML='<img src="'+url+'"/><br><a href="'+url+'" download="'+fname+'">⬇️ '+fname+'</a>';
        $('grid').appendChild(c); done++; $('status').textContent=t('b_heic_done').replace('{done}',done).replace('{total}',arr.length);
      }).catch(function(err){ done++; var c=document.createElement('div');c.className='cell';c.textContent='⚠️ '+f.name+' '+t('b_heic_fail'); $('grid').appendChild(c); $('status').textContent=t('b_heic_complete').replace('{done}',done).replace('{total}',arr.length); }); }); }
</script>
</body>
