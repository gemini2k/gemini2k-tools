<style>
  .drop{border:2px dashed var(--border);border-radius:14px;padding:1.6rem 1rem;text-align:center;color:var(--muted);cursor:pointer;}.drop:hover{border-color:var(--accent);color:var(--accent);}
  .thumbs{display:flex;flex-wrap:wrap;gap:.5rem;margin:.8rem 0;}.thumb{position:relative;width:72px;height:72px;border:1px solid var(--border);border-radius:8px;overflow:hidden;}.thumb img{width:100%;height:100%;object-fit:cover;}.thumb .ord{position:absolute;bottom:2px;left:2px;background:rgba(0,0,0,.6);color:#fff;font-size:.7rem;padding:0 .3rem;border-radius:4px;}.thumb button{position:absolute;top:2px;right:2px;width:18px;height:18px;border:0;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;cursor:pointer;font-size:.75rem;line-height:1;}
  .opts{display:flex;gap:1rem;align-items:center;margin:.6rem 0;font-size:.9rem;flex-wrap:wrap;}.opts label{display:inline-flex;gap:.4rem;align-items:center;font-weight:600;}.opts input{width:90px;}

<body>
<div class="toolwrap" style="max-width:720px;">
  <h1 data-i18n="b_gifmaker_title">GIF 만들기 (움짤)</h1>
  <p class="sub" data-i18n="b_gifmaker_sub">이미지 여러 장을 순서대로 합쳐 움직이는 GIF를 만듭니다.</p>
  <div class="card">
    <div class="drop" id="drop"><div style="font-size:1.8rem">🎬</div><div><strong data-i18n="b_gifmaker_drop_main">이미지 여러 장을 끌어다 놓거나 클릭</strong></div><div style="font-size:.82rem;margin-top:.3rem;" data-i18n="b_gifmaker_drop_hint">2장 이상</div></div>
    <input type="file" id="file" accept="image/*" multiple class="hide"/>
    <div class="thumbs" id="thumbs"></div>
    <div class="opts hide" id="opts"><label><span data-i18n="b_gifmaker_label_delay">프레임 간격(ms)</span> <input id="delay" type="number" min="50" max="2000" value="400"/></label><label><span data-i18n="b_gifmaker_label_width">가로(px)</span> <input id="w" type="number" min="60" max="800" value="320"/></label></div>
    <div class="actions hide" id="actions"><button class="btn" id="make" type="button" data-i18n="b_gifmaker_btn_make">🎬 GIF 만들기</button></div>
    <div class="prog" id="prog"></div>
    <div class="result hide" id="result"><img id="out" alt="GIF 결과"/><div style="margin-top:.5rem;"><a class="btn btn-ghost" id="dl" download="animation.gif" data-i18n="b_gifmaker_btn_dl">⬇️ GIF 저장</a></div></div>
    <div class="note" data-i18n-html="b_gifmaker_note">오픈소스 <b>gif.js</b>(MIT, <a href="https://github.com/jnordberg/gif.js" target="_blank" rel="noopener">jnordberg/gif.js</a>)를 자체 호스팅(웹워커 포함)합니다. 이미지는 가운데 맞춤으로 배치됩니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/gifjs-0.2/gif.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1500);}
  var imgs=[];
  function add(list){ var arr=[].slice.call(list).filter(function(f){return /^image\//.test(f.type);}); var left=arr.length; if(!left)return;
    arr.forEach(function(f){ var u=URL.createObjectURL(f); var im=new Image(); im.onload=function(){URL.revokeObjectURL(u);imgs.push(im);if(--left===0)render();}; im.onerror=function(){if(--left===0)render();}; im.src=u; }); }
  function render(){ $('thumbs').innerHTML=imgs.map(function(im,i){return '<div class="thumb"><img src="'+im.src+'"/><span class="ord">'+(i+1)+'</span><button data-i="'+i+'">✕</button></div>';}).join('');
    var has=imgs.length>=2; $('opts').classList.toggle('hide',!has); $('actions').classList.toggle('hide',!has); }
  $('drop').addEventListener('click',function(){$('file').click();});
  $('file').addEventListener('change',function(e){add(e.target.files);e.target.value='';});
  ['dragover','dragenter'].forEach(function(ev){$('drop').addEventListener(ev,function(e){e.preventDefault();});});
  $('drop').addEventListener('drop',function(e){e.preventDefault();if(e.dataTransfer.files.length)add(e.dataTransfer.files);});
  $('thumbs').addEventListener('click',function(e){var b=e.target.closest('button');if(b){imgs.splice(+b.dataset.i,1);render();}});
  $('make').addEventListener('click',function(){ if(imgs.length<2){toast(t('b_gifmaker_toast_min'));return;}
    var w=Math.max(60,Math.min(800,+$('w').value||320)); var ratios=imgs.map(function(im){return im.height/im.width;}); var h=Math.round(w*Math.max.apply(null,ratios));
    $('prog').textContent=t('b_gifmaker_prog_preparing'); $('result').classList.add('hide');
    var gif=new GIF({workers:2, quality:10, width:w, height:h, workerScript:'/vendor/gifjs-0.2/gif.worker.js', background:'#fff'});
    imgs.forEach(function(im){ var c=document.createElement('canvas');c.width=w;c.height=h;var x=c.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,w,h);
      var s=Math.min(w/im.width,h/im.height),iw=im.width*s,ih=im.height*s; x.drawImage(im,(w-iw)/2,(h-ih)/2,iw,ih); gif.addFrame(c,{delay:+$('delay').value||400}); });
    gif.on('progress',function(p){ $('prog').textContent=t('b_gifmaker_prog_rendering')+Math.round(p*100)+'%'; });
    gif.on('finished',function(blob){ var url=URL.createObjectURL(blob); $('out').src=url; $('dl').href=url; $('result').classList.remove('hide'); $('prog').textContent=t('b_gifmaker_prog_done_pre')+Math.round(blob.size/1024)+t('b_gifmaker_prog_done_post'); });
    gif.render();
  });
</script>
</body>
