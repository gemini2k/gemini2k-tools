<style>#reader{width:100%;max-width:420px;margin:.5rem auto;border-radius:12px;overflow:hidden;}
.row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;justify-content:center;margin:.7rem 0;}
.result{border:1px solid var(--border);border-radius:11px;background:var(--ground);padding:.9rem;word-break:break-all;min-height:2em;font-family:ui-monospace,monospace;font-size:.9rem;}
.result a{color:var(--accent);}
.note{margin-top:1.1rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5930096672475061" crossorigin="anonymous"></script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"QR 카메라 스캐너","description":"카메라로 QR코드를 실시간 스캔합니다(html5-qrcode).","url":"https://gemini2k.co.kr/qrscan.html","applicationCategory":"UtilitiesApplication","operatingSystem":"Web","inLanguage":"ko","isAccessibleForFree":true,"license":"https://www.apache.org/licenses/LICENSE-2.0","offers":{"@type":"Offer","price":"0","priceCurrency":"KRW"},"publisher":{"@type":"Organization","name":"빛의여행(gemini2k) 도구","url":"https://gemini2k.co.kr/"}}</script>
</head>
<body>
<div class="toolwrap" style="max-width:560px;">
  <h1 data-i18n="b_qrscan_title">QR 카메라 스캐너</h1>
  <p class="sub" data-i18n="b_qrscan_sub">카메라로 QR코드를 비추면 내용을 바로 읽어 줍니다. 사진 파일로도 읽을 수 있어요.</p>
  <div class="card">
    <div class="row">
      <button class="btn" id="start" type="button" data-i18n="b_qrscan_btn_start">📷 카메라 스캔 시작</button>
      <button class="btn btn-ghost" id="stop" type="button" style="display:none;" data-i18n="b_qrscan_btn_stop">■ 중지</button>
      <button class="btn btn-ghost" id="filebtn" type="button" data-i18n="b_qrscan_btn_file">🖼️ 사진에서 읽기</button>
      <input type="file" id="file" accept="image/*" hidden/>
    </div>
    <div id="reader"></div>
    <div class="result" id="result" data-i18n="b_qrscan_placeholder">스캔 결과가 여기에 표시됩니다.</div>
    <div class="note" data-i18n-html="b_qrscan_note">오픈소스 <b>html5-qrcode</b>(Apache-2.0, <a href="https://github.com/mebjas/html5-qrcode" target="_blank" rel="noopener">mebjas/html5-qrcode</a>)를 자체 호스팅합니다. 카메라 사용에는 권한 허용이 필요하며, 영상은 서버로 전송되지 않습니다.</div>
  </div>
</div>
<script src="/vendor/html5qr-2/html5-qrcode.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var qr=new Html5Qrcode('reader'), running=false;
  function show(text){ var safe=text.replace(/[&<>]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]);});
    var html=/^https?:\/\//i.test(text)?'<a href="'+safe+'" target="_blank" rel="noopener">'+safe+'</a>':safe;
    $('result').innerHTML=html+' &nbsp;<button class="btn btn-ghost" id="cp" type="button" style="padding:.2rem .5rem;font-size:.8rem;">'+t('b_qrscan_copy')+'</button>';
    var cp=$('cp'); if(cp)cp.addEventListener('click',function(){navigator.clipboard.writeText(text).then(function(){toast(t('b_qrscan_copied'));});}); }
  $('start').addEventListener('click',function(){
    qr.start({facingMode:'environment'},{fps:10,qrbox:240},function(txt){ show(txt); toast(t('b_qrscan_recognized')); },function(){})
      .then(function(){ running=true; $('start').style.display='none'; $('stop').style.display=''; })
      .catch(function(e){ $('result').textContent='⚠️ '+t('b_qrscan_cam_error')+': '+(e.message||e); }); });
  $('stop').addEventListener('click',function(){ if(running)qr.stop().then(function(){running=false;$('start').style.display='';$('stop').style.display='none';}); });
  $('filebtn').addEventListener('click',function(){$('file').click();});
  $('file').addEventListener('change',function(){ if(!$('file').files[0])return;
    qr.scanFile($('file').files[0],true).then(show).catch(function(e){ $('result').textContent='⚠️ '+t('b_qrscan_not_found'); }); });
  window.onI18n=function(){
    $('start').textContent=t('b_qrscan_btn_start');
    $('stop').textContent=t('b_qrscan_btn_stop');
    $('filebtn').textContent=t('b_qrscan_btn_file');
    var res=$('result');
    if(res&&res.dataset.i18n==='b_qrscan_placeholder')res.textContent=t('b_qrscan_placeholder');
  };
</script>
</body>
</html>
