<body>
<div class="toolwrap" style="max-width:720px;">
  <h1 data-i18n="b_pixelate_title">이미지 픽셀화·도트화</h1>
  <p class="sub" data-i18n="b_pixelate_sub">사진을 픽셀아트 느낌으로 바꿉니다. 픽셀 크기를 키울수록 더 큰 도트가 됩니다.</p>
  <div class="card">
    <div class="drop" id="drop"><div style="font-size:1.8rem">🟦</div><div><strong data-i18n="b_pixelate_drop">이미지를 끌어다 놓거나 클릭</strong></div></div>
    <input type="file" id="file" accept="image/*" class="hide"/>
    <div class="opts hide" id="opts"><label><span data-i18n="b_pixelate_px_label">픽셀 크기</span> <input id="px" type="range" min="2" max="40" value="10"/><span id="pv">10</span></label><label><span data-i18n="b_pixelate_lv_label">색 단계</span> <input id="lv" type="range" min="2" max="32" value="32"/><span id="lvv">32</span></label><button class="btn" id="dl" type="button" data-i18n="b_pixelate_save">⬇️ PNG 저장</button></div>
    <div class="cvwrap hide" id="cvwrap"><canvas id="cv"></canvas></div>
    <div class="note" data-i18n="b_pixelate_note">픽셀 크기만큼 블록 평균색으로 묶고, 색 단계로 색을 양자화합니다. 모든 처리는 브라우저에서만 이루어지며 이미지는 서버로 전송되지 않습니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var cv=$('cv'),x=cv.getContext('2d'),img=null;
  function read(f){ if(!f||!/^image\//.test(f.type))return; var u=URL.createObjectURL(f),im=new Image(); im.onload=function(){img=im;URL.revokeObjectURL(u);$('opts').classList.remove('hide');$('cvwrap').classList.remove('hide');render();}; im.src=u; }
  function render(){ if(!img)return; var px=+$('px').value,lv=+$('lv').value; $('pv').textContent=px;$('lvv').textContent=lv;
    var W=img.naturalWidth,H=img.naturalHeight; cv.width=W; cv.height=H;
    var sw=Math.max(1,Math.round(W/px)), sh=Math.max(1,Math.round(H/px));
    var tmp=document.createElement('canvas');tmp.width=sw;tmp.height=sh;var tx=tmp.getContext('2d');tx.drawImage(img,0,0,sw,sh);
    var d;try{d=tx.getImageData(0,0,sw,sh);}catch(e){return;} var data=d.data, step=255/(lv-1);
    for(var i=0;i<data.length;i+=4){ data[i]=Math.round(data[i]/step)*step; data[i+1]=Math.round(data[i+1]/step)*step; data[i+2]=Math.round(data[i+2]/step)*step; }
    tx.putImageData(d,0,0);
    x.imageSmoothingEnabled=false; x.clearRect(0,0,W,H); x.drawImage(tmp,0,0,sw,sh,0,0,W,H);
  }
  $('drop').addEventListener('click',function(){$('file').click();});
  $('file').addEventListener('change',function(e){if(e.target.files[0])read(e.target.files[0]);});
  ['dragover','dragenter'].forEach(function(ev){$('drop').addEventListener(ev,function(e){e.preventDefault();});});
  $('drop').addEventListener('drop',function(e){e.preventDefault();if(e.dataTransfer.files[0])read(e.dataTransfer.files[0]);});
  ['px','lv'].forEach(function(id){$(id).addEventListener('input',render);});
  $('dl').addEventListener('click',function(){if(!img)return;cv.toBlob(function(b){var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='pixel.png';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},120);});});
</script>
