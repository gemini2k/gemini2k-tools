<style>
  .drop{border:2px dashed var(--border);border-radius:14px;padding:1.8rem 1rem;text-align:center;color:var(--muted);cursor:pointer;transition:.15s;}
  .drop:hover,.drop.over{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .drop .big{font-size:1.8rem;margin-bottom:.3rem;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem 1rem;margin:.9rem 0;}
  .grid label{display:flex;flex-direction:column;gap:.25rem;font-size:.78rem;font-weight:700;color:var(--muted);}
  .grid select{padding:.5rem .6rem;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text);font-family:inherit;}
  .grid input[type=color]{width:46px;height:36px;padding:0;border:1px solid var(--border);border-radius:8px;background:none;}
  .swatches{display:flex;flex-wrap:wrap;gap:.4rem;grid-column:1/3;}
  .sw{width:34px;height:34px;border-radius:8px;border:2px solid transparent;cursor:pointer;}
  .sw.on{border-color:var(--text);}
  .cvwrap{margin-top:1rem;border:1px solid var(--border);border-radius:12px;overflow:auto;background:var(--surface);text-align:center;max-height:520px;}
  canvas{max-width:100%;height:auto;display:inline-block;}
  .note{margin-top:1.1rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}
  .hide{display:none;}
</style>

  "@context": "https://schema.org",

<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_imgframe_title">스크린샷 꾸미기</h1>
  <p class="sub" data-i18n="b_imgframe_sub">밋밋한 스크린샷에 배경 여백·둥근 모서리·그림자를 더해 발표나 SNS에 어울리는 이미지로 만듭니다.</p>

  <div class="howto"><span class="ic">📖</span><div><b data-i18n="b_imgframe_howto_title">사용 방법</b><ol>
    <li data-i18n="b_imgframe_howto_step1">스크린샷을 끌어다 놓거나 클릭해 올립니다</li>
    <li data-i18n="b_imgframe_howto_step2">배경·여백·모서리·그림자를 조절합니다</li>
    <li data-i18n="b_imgframe_howto_step3">'PNG 다운로드'로 저장합니다</li>
  </ol></div></div>

  <div class="card">
    <div class="drop" id="drop"><div class="big">🎀</div><div><strong data-i18n="b_imgframe_drop_label">스크린샷을 끌어다 놓거나 클릭</strong></div><div style="font-size:.82rem;margin-top:.3rem;" data-i18n="b_imgframe_drop_hint">JPG · PNG · WebP</div></div>
    <input type="file" id="file" accept="image/*" class="hide"/>
    <div class="opts hide" id="opts">
      <div class="grid">
        <div class="swatches" id="swatches"></div>
        <label><span data-i18n="b_imgframe_label_pad">여백</span> <span id="padv" style="color:var(--accent)">8%</span><input id="pad" type="range" min="0" max="25" value="8"/></label>
        <label><span data-i18n="b_imgframe_label_rad">모서리 둥글기</span> <span id="radv" style="color:var(--accent)">2%</span><input id="rad" type="range" min="0" max="12" value="2"/></label>
        <label><span data-i18n="b_imgframe_label_sh">그림자</span> <span id="shv" style="color:var(--accent)">30</span><input id="sh" type="range" min="0" max="80" value="30"/></label>
        <label><span data-i18n="b_imgframe_label_bgtype">배경 종류</span> <select id="bgtype"><option value="grad" data-i18n="b_imgframe_opt_grad">그라데이션</option><option value="solid" data-i18n="b_imgframe_opt_solid">단색</option></select></label>
      </div>
      <button class="btn" id="dl" type="button" data-i18n="b_imgframe_btn_dl">⬇️ PNG 다운로드</button>
    </div>
    <div class="cvwrap hide" id="cvwrap"><canvas id="cv"></canvas></div>
    <div class="note" data-i18n="b_imgframe_note">여백은 원본 너비 기준 비율로 적용됩니다. 그림자와 둥근 모서리로 입체감을 줍니다. 모든 처리는 브라우저에서만 이루어지며 이미지는 서버로 전송되지 않습니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var cv=$('cv'), x=cv.getContext('2d'), img=null;
  var PRESETS=[['#5B5BF5','#15C39A'],['#FF6B6B','#FFD93D'],['#667EEA','#764BA2'],['#11998E','#38EF7D'],['#FC5C7D','#6A82FB'],['#232526','#414345'],['#FFFFFF','#E2E8F0'],['#0F172A','#334155']];
  var sel=0;
  function renderSw(){ $('swatches').innerHTML=PRESETS.map(function(p,i){ return '<div class="sw'+(i===sel?' on':'')+'" data-i="'+i+'" style="background:linear-gradient(135deg,'+p[0]+','+p[1]+')"></div>'; }).join(''); }
  function readFile(f){ if(!f||!/^image\//.test(f.type)) return; var url=URL.createObjectURL(f); var im=new Image();
    im.onload=function(){ img=im; URL.revokeObjectURL(url); $('opts').classList.remove('hide'); $('cvwrap').classList.remove('hide'); draw(); }; im.src=url; }
  function rr(c,X,Y,W,H,r){ r=Math.min(r,W/2,H/2); c.beginPath(); c.moveTo(X+r,Y); c.arcTo(X+W,Y,X+W,Y+H,r); c.arcTo(X+W,Y+H,X,Y+H,r); c.arcTo(X,Y+H,X,Y,r); c.arcTo(X,Y,X+W,Y,r); c.closePath(); }
  function draw(){ if(!img) return; var iw=img.naturalWidth, ih=img.naturalHeight;
    var pad=Math.round(iw*(+$('pad').value)/100);
    var W=iw+pad*2, H=ih+pad*2; cv.width=W; cv.height=H;
    var p=PRESETS[sel];
    if($('bgtype').value==='grad'){ var g=x.createLinearGradient(0,0,W,H); g.addColorStop(0,p[0]); g.addColorStop(1,p[1]); x.fillStyle=g; } else x.fillStyle=p[0];
    x.fillRect(0,0,W,H);
    var rad=Math.round(iw*(+$('rad').value)/100), sh=+$('sh').value;
    x.save();
    if(sh>0){ x.shadowColor='rgba(0,0,0,'+(sh/100*0.6+0.1)+')'; x.shadowBlur=sh*1.5; x.shadowOffsetY=sh*0.4; }
    rr(x,pad,pad,iw,ih,rad); x.fillStyle='#fff'; x.fill();
    x.restore();
    x.save(); rr(x,pad,pad,iw,ih,rad); x.clip(); x.drawImage(img,pad,pad,iw,ih); x.restore();
  }
  $('drop').addEventListener('click',function(){ $('file').click(); });
  $('file').addEventListener('change',function(e){ if(e.target.files[0]) readFile(e.target.files[0]); });
  ['dragover','dragenter'].forEach(function(ev){ $('drop').addEventListener(ev,function(e){e.preventDefault();$('drop').classList.add('over');}); });
  ['dragleave','drop'].forEach(function(ev){ $('drop').addEventListener(ev,function(e){e.preventDefault();$('drop').classList.remove('over');}); });
  $('drop').addEventListener('drop',function(e){ if(e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]); });
  $('swatches').addEventListener('click',function(e){ var s=e.target.closest('.sw'); if(s){ sel=+s.dataset.i; renderSw(); draw(); } });
  ['pad','rad','sh','bgtype'].forEach(function(id){ $(id).addEventListener('input',function(){
    $('padv').textContent=$('pad').value+'%'; $('radv').textContent=$('rad').value+'%'; $('shv').textContent=$('sh').value; draw(); }); });
  $('dl').addEventListener('click',function(){ if(!img) return; cv.toBlob(function(b){ var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='framed.png'; document.body.appendChild(a); a.click(); setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},120); }); });
  renderSw();
</script>
</body>
