<style>
  .drop{border:2px dashed var(--border);border-radius:14px;padding:1.8rem 1rem;text-align:center;color:var(--muted);cursor:pointer;transition:.15s;}
  .drop:hover,.drop.over{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .drop .big{font-size:1.8rem;margin-bottom:.3rem;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem 1rem;margin:.9rem 0;}
  .grid label{display:flex;flex-direction:column;gap:.25rem;font-size:.78rem;font-weight:700;color:var(--muted);}
  .grid input[type=text],.grid select{padding:.5rem .6rem;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text);font-family:inherit;}
  .grid input[type=range]{width:100%;}
  .grid input[type=color]{width:46px;height:36px;padding:0;border:1px solid var(--border);border-radius:8px;background:none;}
  .cvwrap{margin-top:1rem;border:1px solid var(--border);border-radius:12px;overflow:auto;background:var(--surface);text-align:center;}
  canvas{max-width:100%;height:auto;display:inline-block;}
  .note{margin-top:1.1rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}
  .hide{display:none;}

<body>
<div class="toolwrap" style="max-width:820px;">
  <h1>이미지 워터마크 생성기</h1>
  <p class="sub">사진에 텍스트 워터마크를 넣어 무단 도용을 막습니다. 한 곳 또는 전체 반복으로 넣을 수 있어요.</p>

  <div class="howto"><span class="ic">📖</span><div><b>사용 방법</b><ol>
    <li>이미지를 끌어다 놓거나 클릭해 올립니다</li>
    <li>워터마크 문구·크기·색·투명도·위치를 조절합니다</li>
    <li>‘PNG 다운로드’로 저장합니다</li>
  </ol></div></div>

  <div class="card">
    <div class="drop" id="drop"><div class="big">💧</div><div><strong>이미지를 끌어다 놓거나 클릭</strong></div><div style="font-size:.82rem;margin-top:.3rem;">JPG · PNG · WebP</div></div>
    <input type="file" id="file" accept="image/*" class="hide"/>
    <div class="opts hide" id="opts">
      <div class="grid">
        <label style="grid-column:1/3;">문구<input id="txt" type="text" value="© gemini2k"/></label>
        <label>위치<select id="pos"><option value="tile">전체 반복(대각선)</option><option value="br">오른쪽 아래</option><option value="bl">왼쪽 아래</option><option value="center">가운데</option><option value="tr">오른쪽 위</option><option value="tl">왼쪽 위</option></select></label>
        <label>글자색<input id="color" type="color" value="#ffffff"/></label>
        <label>크기 <span id="szv" style="color:var(--accent)">5%</span><input id="size" type="range" min="2" max="20" value="5"/></label>
        <label>투명도 <span id="opv" style="color:var(--accent)">35%</span><input id="opacity" type="range" min="5" max="100" value="35"/></label>
        <label>회전 <span id="rotv" style="color:var(--accent)">-30°</span><input id="rot" type="range" min="-90" max="90" value="-30"/></label>
        <label style="justify-content:flex-end;"><span style="display:inline-flex;gap:.4rem;align-items:center;"><input id="shadow" type="checkbox" checked/> 외곽선(가독성)</span></label>
      </div>
      <button class="btn" id="dl" type="button">⬇️ PNG 다운로드</button>
    </div>
    <div class="cvwrap hide" id="cvwrap"><canvas id="cv"></canvas></div>
    <div class="note">원본 해상도 그대로 워터마크를 새겨 저장합니다. ‘전체 반복’은 도용 시 제거가 어려워 보호에 효과적입니다. 모든 처리는 브라우저에서만 이루어지며 이미지는 서버로 전송되지 않습니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var cv=$('cv'), x=cv.getContext('2d'), img=null;
  function readFile(f){ if(!f||!/^image\//.test(f.type)) return; var url=URL.createObjectURL(f); var im=new Image();
    im.onload=function(){ img=im; URL.revokeObjectURL(url); $('opts').classList.remove('hide'); $('cvwrap').classList.remove('hide'); draw(); }; im.src=url; }
  function draw(){ if(!img) return;
    cv.width=img.naturalWidth; cv.height=img.naturalHeight; x.clearRect(0,0,cv.width,cv.height); x.drawImage(img,0,0);
    var txt=$('txt').value||''; if(!txt) return;
    var fs=Math.max(8, Math.round(cv.width*(+$('size').value)/100));
    x.font='700 '+fs+'px Pretendard,system-ui,sans-serif';
    x.fillStyle=$('color').value; x.globalAlpha=(+$('opacity').value)/100;
    x.textAlign='center'; x.textBaseline='middle';
    var rot=(+$('rot').value)*Math.PI/180, pos=$('pos').value, shadow=$('shadow').checked;
    function stamp(cx,cy){ x.save(); x.translate(cx,cy); x.rotate(rot);
      if(shadow){ x.lineWidth=Math.max(1,fs/12); x.strokeStyle='rgba(0,0,0,.5)'; x.strokeText(txt,0,0); }
      x.fillText(txt,0,0); x.restore(); }
    if(pos==='tile'){ var tw=x.measureText(txt).width, gx=Math.max(tw*1.6, fs*6), gy=fs*4;
      for(var yy=-gy; yy<cv.height+gy; yy+=gy){ var off=((yy/gy)%2)*gx/2;
        for(var xx=-gx+off; xx<cv.width+gx; xx+=gx){ stamp(xx,yy); } } }
    else { var m=fs*1.2, w=cv.width, h=cv.height, cx=w/2, cy=h/2; var tw2=x.measureText(txt).width/2;
      if(pos==='br'){cx=w-tw2-m;cy=h-m;} else if(pos==='bl'){cx=tw2+m;cy=h-m;}
      else if(pos==='tr'){cx=w-tw2-m;cy=m;} else if(pos==='tl'){cx=tw2+m;cy=m;}
      stamp(cx,cy); }
    x.globalAlpha=1;
  }
  $('drop').addEventListener('click',function(){ $('file').click(); });
  $('file').addEventListener('change',function(e){ if(e.target.files[0]) readFile(e.target.files[0]); });
  ['dragover','dragenter'].forEach(function(ev){ $('drop').addEventListener(ev,function(e){e.preventDefault();$('drop').classList.add('over');}); });
  ['dragleave','drop'].forEach(function(ev){ $('drop').addEventListener(ev,function(e){e.preventDefault();$('drop').classList.remove('over');}); });
  $('drop').addEventListener('drop',function(e){ if(e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]); });
  ['txt','pos','color','size','opacity','rot','shadow'].forEach(function(id){ $(id).addEventListener('input',function(){
    $('szv').textContent=$('size').value+'%'; $('opv').textContent=$('opacity').value+'%'; $('rotv').textContent=$('rot').value+'°'; draw(); }); });
  $('dl').addEventListener('click',function(){ if(!img) return; cv.toBlob(function(b){ var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='watermark.png'; document.body.appendChild(a); a.click(); setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},120); }); });
</script>
</body>
