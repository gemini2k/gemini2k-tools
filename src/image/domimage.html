<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_domimage_title">HTML → 이미지(PNG) 캡처</h1>
  <p class="sub" data-i18n="b_domimage_sub">HTML·CSS로 만든 요소를 그대로 PNG 이미지로 저장합니다. 카드·배지·인용구 이미지화에 좋아요.</p>
  <div class="card">
    <textarea id="in">&lt;div style="padding:28px 32px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border-radius:18px;font-family:sans-serif;max-width:360px;"&gt;
  &lt;div style="font-size:13px;opacity:.85;"&gt;오늘의 한마디&lt;/div&gt;
  &lt;div style="font-size:22px;font-weight:800;margin-top:8px;line-height:1.4;"&gt;작은 습관이 큰 변화를 만든다.&lt;/div&gt;
&lt;/div&gt;</textarea>
    <div class="actions"><button class="btn" id="render" type="button" data-i18n="b_domimage_btn_preview">미리보기</button><button class="btn" id="png" type="button" data-i18n="b_domimage_btn_save">⬇️ PNG 저장</button><label style="font-size:.85rem;align-self:center;"><span data-i18n="b_domimage_scale">배율</span> <select id="scale"><option>1</option><option selected>2</option><option>3</option></select></label></div>
    <div class="stagewrap"><div id="stage"></div></div>
    <div class="note" data-i18n-html="b_domimage_note">오픈소스 <b>dom-to-image-more</b>(MIT, <a href="https://github.com/1904labs/dom-to-image-more" target="_blank" rel="noopener">1904labs/dom-to-image-more</a>)를 자체 호스팅합니다. 외부 이미지·폰트는 보안상 포함되지 않을 수 있습니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>

<script src="/vendor/domtoimage-3/dom-to-image-more.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function render(){ $('stage').innerHTML=$('in').value; }
  $('render').addEventListener('click',render);
  var _t; $('in').addEventListener('input',function(){clearTimeout(_t);_t=setTimeout(render,400);});
  $('png').addEventListener('click',function(){ render(); var node=$('stage').firstElementChild||$('stage'); var scale=+$('scale').value;
    domtoimage.toPng(node,{quality:1,scale:scale,width:node.offsetWidth*scale,height:node.offsetHeight*scale,style:{transform:'scale('+scale+')',transformOrigin:'top left'}}).then(function(url){
      var a=document.createElement('a');a.href=url;a.download='capture.png';document.body.appendChild(a);a.click();a.remove(); }).catch(function(e){ alert(t('b_domimage_err_capture')+e.message); }); });
  render();
</script>
