  .drop{border:2px dashed var(--border);border-radius:14px;padding:1.6rem 1rem;text-align:center;color:var(--muted);cursor:pointer;}.drop:hover{border-color:var(--accent);color:var(--accent);}

<body>
<div class="toolwrap" style="max-width:820px;">
  <h1>이미지 ASCII 아트</h1>
  <p class="sub">사진을 글자로 그린 ASCII 아트로 바꿔 줍니다.</p>
  <div class="card">
    <div class="drop" id="drop"><div style="font-size:1.8rem">🖼️→🔤</div><div><strong>이미지를 끌어다 놓거나 클릭</strong></div></div>
    <input type="file" id="file" accept="image/*" class="hide"/>
    <div class="opts hide" id="opts"><label>너비 <input id="w" type="range" min="40" max="160" value="100"/><span id="wv">100</span></label><label><input type="checkbox" id="inv"/> 반전</label><button class="btn btn-ghost" id="copy" type="button">📋 복사</button></div>
    <div class="out hide" id="outwrap"><pre id="out"></pre></div>
    <div class="note">밝기를 글자 농도로 변환합니다. 너비가 클수록 정교하지만 무거워집니다. 어두운 배경이면 ‘반전’을 켜 보세요. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var RAMP=" .:-=+*#%@", img=null;
  function read(f){ if(!f||!/^image\//.test(f.type))return; var u=URL.createObjectURL(f),im=new Image(); im.onload=function(){img=im;URL.revokeObjectURL(u);$('opts').classList.remove('hide');$('outwrap').classList.remove('hide');render();}; im.src=u; }
  function render(){ if(!img)return; var W=+$('w').value; $('wv').textContent=W; var ratio=img.naturalHeight/img.naturalWidth; var H=Math.max(1,Math.round(W*ratio*0.5));
    var cv=document.createElement('canvas'); cv.width=W; cv.height=H; var x=cv.getContext('2d'); x.drawImage(img,0,0,W,H); var d;
    try{ d=x.getImageData(0,0,W,H).data; }catch(e){ $('out').textContent='이 이미지는 보안 정책으로 변환할 수 없습니다.'; return; }
    var inv=$('inv').checked, out=''; for(var y=0;y<H;y++){ for(var xx=0;xx<W;xx++){ var i=(y*W+xx)*4; var l=(d[i]*0.3+d[i+1]*0.59+d[i+2]*0.11)/255; if(inv)l=1-l; out+=RAMP[Math.min(RAMP.length-1,Math.floor(l*(RAMP.length-1)))]; } out+='\n'; }
    $('out').textContent=out; window._ascii=out;
  }
  $('drop').addEventListener('click',function(){$('file').click();});
  $('file').addEventListener('change',function(e){if(e.target.files[0])read(e.target.files[0]);});
  ['dragover','dragenter'].forEach(function(ev){$('drop').addEventListener(ev,function(e){e.preventDefault();});});
  $('drop').addEventListener('drop',function(e){e.preventDefault();if(e.dataTransfer.files[0])read(e.dataTransfer.files[0]);});
  ['w','inv'].forEach(function(id){$(id).addEventListener('input',render);});
  $('copy').addEventListener('click',function(){if(window._ascii)navigator.clipboard.writeText(window._ascii).then(function(){toast('복사됐습니다');});});
</script>
</body>
