  .gbar{display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin-bottom:.8rem;flex-wrap:wrap;}
  .scores{display:flex;gap:.6rem;}
  .sbox{background:var(--ground);border:1px solid var(--border);border-radius:10px;padding:.35rem .8rem;text-align:center;min-width:72px;}
  .sbox .l{font-size:.64rem;font-weight:700;color:var(--muted);text-transform:uppercase;}
  .sbox .v{font-size:1.2rem;font-weight:800;color:var(--text);}
  .stage{position:relative;width:100%;max-width:400px;margin:0 auto;}
  canvas{width:100%;height:auto;display:block;border-radius:12px;background:#0f1226;touch-action:none;}
  .overlay{position:absolute;inset:0;display:grid;place-items:center;text-align:center;color:#fff;background:rgba(8,10,24,.55);border-radius:12px;cursor:pointer;}
  .overlay.hide{display:none;} .overlay .big{font-size:1.3rem;font-weight:800;margin-bottom:.3rem;} .overlay .sm{font-size:.9rem;opacity:.85;}
  .dpad{display:grid;grid-template-columns:repeat(3,52px);grid-template-rows:repeat(2,52px);gap:.4rem;justify-content:center;margin:1.1rem auto 0;}
  .dpad button{border:1px solid var(--border);background:var(--surface);border-radius:12px;font-size:1.2rem;color:var(--text);cursor:pointer;}
  .d-up{grid-column:2;grid-row:1;} .d-left{grid-column:1;grid-row:2;} .d-down{grid-column:2;grid-row:2;} .d-right{grid-column:3;grid-row:2;}
  .note{margin-top:1.2rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}

<body>
<div class="toolwrap" style="max-width:460px;">
  <h1 data-i18n="b_snake_title">스네이크</h1>
  <p class="sub" data-i18n="b_snake_sub">뱀을 움직여 먹이를 먹고 점점 길게 키우세요. 벽이나 몸에 부딪히면 끝!</p>

  <div class="howto"><span class="ic">📖</span><div><b data-i18n="b_snake_howto_title">조작법</b><ol>
    <li data-i18n="b_snake_howto_1">PC: 방향키(↑↓←→) · 모바일: 스와이프 또는 아래 방향 버튼</li>
    <li data-i18n="b_snake_howto_2">화면을 클릭·터치하면 시작합니다</li>
    <li data-i18n="b_snake_howto_3">먹이(🔴)를 먹으면 길어지고 점수가 오릅니다</li>
  </ol></div></div>

  <div class="card">
    <div class="gbar">
      <button class="btn" id="restart" type="button" data-i18n="b_snake_restart">다시 시작</button>
      <div class="scores">
        <div class="sbox"><div class="l" data-i18n="b_snake_score_label">점수</div><div class="v" id="score">0</div></div>
        <div class="sbox"><div class="l" data-i18n="b_snake_best_label">최고</div><div class="v" id="best">0</div></div>
      </div>
    </div>
    <div class="stage">
      <canvas id="cv" width="400" height="400" aria-label="스네이크"></canvas>
      <div class="overlay" id="ov"><div><div class="big" id="ov-big" data-i18n="b_snake_title">스네이크</div><div class="sm" id="ov-sm" data-i18n="b_snake_click_to_start">클릭하면 시작합니다</div></div></div>
    </div>
    <div class="dpad">
      <button class="d-up" data-d="u" aria-label="위">▲</button>
      <button class="d-left" data-d="l" aria-label="왼쪽">◀</button>
      <button class="d-down" data-d="d" aria-label="아래">▼</button>
      <button class="d-right" data-d="r" aria-label="오른쪽">▶</button>
    </div>
    <div class="note" data-i18n="b_snake_note">모든 진행은 브라우저에서만 이루어지며 최고 점수만 이 기기에 저장됩니다.</div>
  </div>
</div>

<script src="game-core.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  var cv=$('cv'), x=cv.getContext('2d'), N=20, CS=20, W=400;
  var snake, dir, ndir, food, score, best=+(localStorage.getItem('snake:best')||0), state='ready', tick=null;
  var gc=GameCore.init({onPause:function(){ if(tick){clearInterval(tick);tick=null;} }, onResume:function(){ if(state==='play'&&!tick) tick=setInterval(step,110); }});
  $('best').textContent=best;

  function reset(){ snake=[{x:8,y:10},{x:7,y:10},{x:6,y:10}]; dir=ndir={x:1,y:0}; score=0; $('score').textContent=0; placeFood(); state='ready'; $('ov').classList.remove('hide'); $('ov-big').textContent=t('b_snake_title'); $('ov-sm').textContent=t('b_snake_click_to_start'); draw(); }
  function placeFood(){ do{ food={x:Math.floor(Math.random()*N),y:Math.floor(Math.random()*N)}; }while(snake.some(function(s){return s.x===food.x&&s.y===food.y;})); }
  function start(){ if(state==='play') return; if(state==='over') reset(); state='play'; $('ov').classList.add('hide'); if(tick) clearInterval(tick); tick=setInterval(step, 110); }

  function step(){
    dir=ndir; var h={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
    if(h.x<0||h.y<0||h.x>=N||h.y>=N || snake.some(function(s){return s.x===h.x&&s.y===h.y;})){
      state='over'; clearInterval(tick); if(score>best){best=score;localStorage.setItem('snake:best',best);$('best').textContent=best;}
      $('ov-big').textContent=t('b_snake_game_over'); $('ov-sm').textContent=t('b_snake_score_label')+' '+score+' · '+t('b_snake_click_to_retry'); $('ov').classList.remove('hide'); return;
    }
    snake.unshift(h);
    if(h.x===food.x&&h.y===food.y){ score+=10; $('score').textContent=score; placeFood(); } else snake.pop();
    draw();
  }
  function cell(cx,cy,col){ x.fillStyle=col; var px=cx*CS,py=cy*CS; x.beginPath(); x.roundRect?x.roundRect(px+1,py+1,CS-2,CS-2,5):x.rect(px+1,py+1,CS-2,CS-2); x.fill(); }
  function draw(){
    x.fillStyle='#0f1226'; x.fillRect(0,0,W,W);
    // 먹이
    x.fillStyle='#f87171'; x.beginPath(); x.arc(food.x*CS+CS/2, food.y*CS+CS/2, CS/2-2, 0, 7); x.fill();
    // 뱀
    for(var i=snake.length-1;i>=0;i--){ var tmp=1-i/(snake.length+4); cell(snake[i].x,snake[i].y, i===0?'#34d399':'rgba(56,189,248,'+(0.45+0.55*tmp)+')'); }
  }
  function setDir(d){ var m={u:{x:0,y:-1},d:{x:0,y:1},l:{x:-1,y:0},r:{x:1,y:0}}[d]; if(!m) return; if(m.x===-dir.x&&m.y===-dir.y) return; ndir=m; if(state==='ready') start(); }
  document.addEventListener('keydown', function(e){ var d={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r'}[e.key]; if(d){ e.preventDefault(); setDir(d); } });
  document.querySelector('.dpad').addEventListener('click', function(e){ var b=e.target.closest('button'); if(b) setDir(b.dataset.d); });
  $('ov').addEventListener('click', start);
  cv.addEventListener('click', function(){ if(state!=='play') start(); });
  $('restart').addEventListener('click', function(){ reset(); });
  var sx,sy;
  cv.addEventListener('touchstart',function(e){var tmp=e.touches[0];sx=tmp.clientX;sy=tmp.clientY;},{passive:true});
  cv.addEventListener('touchend',function(e){ if(sx==null)return; var tmp=e.changedTouches[0],dx=tmp.clientX-sx,dy=tmp.clientY-sy; if(Math.max(Math.abs(dx),Math.abs(dy))<20){ if(state!=='play')start(); sx=null; return; } setDir(Math.abs(dx)>Math.abs(dy)?(dx>0?'r':'l'):(dy>0?'d':'u')); sx=null; },{passive:true});
  window.onI18n = function(){ if(state==='ready'){ $('ov-big').textContent=t('b_snake_title'); $('ov-sm').textContent=t('b_snake_click_to_start'); } else if(state==='over'){ $('ov-big').textContent=t('b_snake_game_over'); $('ov-sm').textContent=t('b_snake_score_label')+' '+score+' · '+t('b_snake_click_to_retry'); } };
  reset();
</script>
