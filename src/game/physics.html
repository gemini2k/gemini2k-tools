<body>
<div class="toolwrap" style="max-width:720px;">
  <h1 data-i18n="b_physics_title">2D 물리 놀이터</h1>
  <p class="sub" data-i18n="b_physics_sub">도형을 떨어뜨리고 마우스(터치)로 끌어 던져 보세요. 중력과 충돌이 실제처럼 작동합니다.</p>
  <div class="card">
    <div class="row">
      <button class="mini" id="box" type="button" data-i18n="b_physics_btn_box">⬛ 상자</button>
      <button class="mini" id="ball" type="button" data-i18n="b_physics_btn_ball">⚫ 공</button>
      <button class="mini" id="rain" type="button" data-i18n="b_physics_btn_rain">🌧️ 도형 비</button>
      <button class="mini" id="reset" type="button" data-i18n="b_physics_btn_reset">🗑️ 초기화</button>
      <button class="mini" id="gravity" type="button" data-i18n="b_physics_btn_gravity">🙃 중력 반전</button>
    </div>
    <div id="stage"></div>
    <div class="note" data-i18n-html="b_physics_note">오픈소스 <b>Matter.js</b>(MIT, <a href="https://github.com/liabru/matter-js" target="_blank" rel="noopener">liabru/matter-js</a>)를 자체 호스팅합니다. 모든 계산은 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/matter-0/matter.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var M=Matter, W=Math.min(680,document.querySelector('.card').clientWidth-32)||640, H=440;
  var engine=M.Engine.create(), world=engine.world;
  var render=M.Render.create({element:$('stage'),engine:engine,options:{width:W,height:H,wireframes:false,background:'#0f1226'}});
  var acc=(getComputedStyle(document.documentElement).getPropertyValue('--accent')||'#2563eb').trim();
  var colors=[acc,'#f59e0b','#ef4444','#10b981','#a855f7','#06b6d4'];
  function wall(x,y,w,h){return M.Bodies.rectangle(x,y,w,h,{isStatic:true,render:{fillStyle:'#1e2440'}});}
  M.Composite.add(world,[wall(W/2,H+20,W+100,40),wall(-20,H/2,40,H*2),wall(W+20,H/2,40,H*2)]);
  function rc(){return colors[Math.floor(Math.random()*colors.length)];}
  function addBox(x){ M.Composite.add(world,M.Bodies.rectangle(x||W/2,30,30+Math.random()*30,30+Math.random()*30,{restitution:.4,render:{fillStyle:rc()}})); }
  function addBall(x){ M.Composite.add(world,M.Bodies.circle(x||W/2,30,16+Math.random()*16,{restitution:.7,render:{fillStyle:rc()}})); }
  var mouse=M.Mouse.create(render.canvas), mc=M.MouseConstraint.create(engine,{mouse:mouse,constraint:{stiffness:.2,render:{visible:false}}});
  M.Composite.add(world,mc); render.mouse=mouse;
  M.Render.run(render); var runner=M.Runner.create(); M.Runner.run(runner,engine);
  $('box').onclick=function(){addBox();}; $('ball').onclick=function(){addBall();};
  $('rain').onclick=function(){ for(var i=0;i<12;i++){ (function(d){ setTimeout(function(){ Math.random()<.5?addBox(40+Math.random()*(W-80)):addBall(40+Math.random()*(W-80)); },d*70); })(i); } };
  $('reset').onclick=function(){ M.Composite.allBodies(world).forEach(function(b){ if(!b.isStatic)M.Composite.remove(world,b); }); };
  var gdir=1; $('gravity').onclick=function(){ gdir*=-1; engine.gravity.y=gdir; };
  for(var i=0;i<6;i++)setTimeout(function(){addBox(40+Math.random()*(W-80));},i*100);
</script>
