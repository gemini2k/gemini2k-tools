  .bar select{padding:.5rem;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text);font-family:inherit;}

<body>
<div class="toolwrap" style="max-width:480px;">
  <h1 data-i18n="b_puzzle15_title">15퍼즐</h1>
  <p class="sub" data-i18n="b_puzzle15_sub">타일을 빈칸 쪽으로 밀어 1부터 순서대로 맞추세요. 빈칸과 붙은 타일만 움직입니다.</p>
  <div class="card">
    <div class="bar"><select id="size"><option value="3" data-i18n="b_puzzle15_opt3">3×3 (8퍼즐)</option><option value="4" selected data-i18n="b_puzzle15_opt4">4×4 (15퍼즐)</option><option value="5" data-i18n="b_puzzle15_opt5">5×5</option></select>
      <div class="stat"><span class="sbox" id="moves" data-i18n="b_puzzle15_moves_zero">이동 0</span><span class="sbox" id="time">0s</span></div>
      <button class="btn btn-ghost" id="shuffle" type="button" data-i18n="b_puzzle15_shuffle">섞기</button></div>
    <div class="win" id="win"></div>
    <div class="board" id="board"></div>
    <div class="note" data-i18n="b_puzzle15_note">방향키로도 빈칸을 이동할 수 있습니다. 풀 수 있는 배치만 생성됩니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var N=4, tiles=[], blank=0, moves=0, t0=0, timer=null, started=false;
  function idx(r,c){return r*N+c;}
  function render(){ var bd=$('board'); bd.style.gridTemplateColumns='repeat('+N+',1fr)';
    bd.innerHTML=tiles.map(function(v,i){ return v===0?'<div class="tile blank"></div>':'<div class="tile" data-i="'+i+'">'+v+'</div>'; }).join(''); }
  function solvedArr(){ var a=[]; for(var i=1;i<N*N;i++)a.push(i); a.push(0); return a; }
  function isSolved(){ var s=solvedArr(); for(var i=0;i<tiles.length;i++)if(tiles[i]!==s[i])return false; return true; }
  function renderMoves(){ $('moves').textContent=t('b_puzzle15_moves_prefix')+moves; }
  function shuffle(){ tiles=solvedArr(); blank=tiles.indexOf(0);
    for(var k=0;k<N*N*40;k++){ var nb=neighbors(blank); var tmp=nb[Math.floor(Math.random()*nb.length)]; tiles[blank]=tiles[tmp]; tiles[tmp]=0; blank=tmp; }
    moves=0; started=false; clearInterval(timer); $('moves').textContent=t('b_puzzle15_moves_zero'); $('time').textContent='0s'; $('win').textContent=''; if(isSolved())shuffle(); render(); }
  function neighbors(i){ var r=Math.floor(i/N),c=i%N,out=[]; if(r>0)out.push(idx(r-1,c)); if(r<N-1)out.push(idx(r+1,c)); if(c>0)out.push(idx(r,c-1)); if(c<N-1)out.push(idx(r,c+1)); return out; }
  function move(i){ if(neighbors(blank).indexOf(i)<0)return; tiles[blank]=tiles[i]; tiles[i]=0; blank=i; moves++; renderMoves();
    if(!started){ started=true; t0=Date.now(); timer=setInterval(function(){$('time').textContent=Math.floor((Date.now()-t0)/1000)+'s';},1000); }
    render(); if(isSolved()){ clearInterval(timer); $('win').textContent='🎉 '+t('b_puzzle15_win').replace('{n}',moves); } }
  $('board').addEventListener('click',function(e){var tmp=e.target.closest('.tile');if(tmp&&tmp.dataset.i)move(+tmp.dataset.i);});
  document.addEventListener('keydown',function(e){ var r=Math.floor(blank/N),c=blank%N,tmp=-1;
    if(e.key==='ArrowUp'&&r<N-1)tmp=idx(r+1,c); else if(e.key==='ArrowDown'&&r>0)tmp=idx(r-1,c); else if(e.key==='ArrowLeft'&&c<N-1)tmp=idx(r,c+1); else if(e.key==='ArrowRight'&&c>0)tmp=idx(r,c-1);
    if(tmp>=0){e.preventDefault();move(tmp);} });
  $('shuffle').addEventListener('click',shuffle);
  $('size').addEventListener('change',function(){N=parseInt($('size').value,10);shuffle();});
  window.onI18n=function(){
    if(started){renderMoves();}else{$('moves').textContent=t('b_puzzle15_moves_zero');}
  };
  shuffle();
</script>
</body>
