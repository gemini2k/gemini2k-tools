<style>.gbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;flex-wrap:wrap;gap:.6rem;}
.status{font-weight:800;font-size:1.05rem;}
.board{display:grid;grid-template-columns:repeat(8,1fr);max-width:440px;margin:0 auto;border:3px solid #5b4636;border-radius:6px;overflow:hidden;aspect-ratio:1;}
.sq{display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;user-select:none;position:relative;line-height:1;}
.sq.l{background:#f0d9b5;}.sq.d{background:#b58863;}
.sq.sel{box-shadow:inset 0 0 0 4px #15C39A;}.sq.mv::after{content:'';position:absolute;width:28%;height:28%;border-radius:50%;background:rgba(21,195,154,.6);}

<body>
<div class="toolwrap" style="max-width:520px;">
  <h1><span data-i18n="b_chess_title">체스</span> <span style="font-size:.9rem;color:var(--muted)" data-i18n="b_chess_subtitle">(2인용)</span></h1>
  <p class="sub" data-i18n="b_chess_desc">한 기기로 둘이 두는 체스입니다. 기물을 클릭하면 둘 수 있는 칸이 표시됩니다.</p>
  <div class="card">
    <div class="gbar"><span class="status" id="status" data-i18n="b_chess_turn_white">백 차례</span><span><button class="btn btn-ghost" id="undo" type="button" data-i18n="b_chess_undo">무르기</button> <button class="btn btn-ghost" id="reset" type="button" data-i18n="b_chess_new_game">새 게임</button></span></div>
    <div class="board" id="board"></div>
    <div class="note" data-i18n-html="b_chess_note">오픈소스 <b>chess.js</b>(BSD-2, <a href="https://github.com/jhlywa/chess.js" target="_blank" rel="noopener">jhlywa/chess.js</a>)로 합법 수·체크·체크메이트·스테일메이트를 판정합니다. 폰 승급은 퀸으로 자동 처리됩니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/chessjs-1/chess.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var game=new Chess(), sel=null, FILES='abcdefgh';
  var GLYPH={wp:'♙',wn:'♘',wb:'♗',wr:'♖',wq:'♕',wk:'♔',bp:'♟',bn:'♞',bb:'♝',br:'♜',bq:'♛',bk:'♚'};
  function render(){ var bd=$('board'); bd.innerHTML='';
    for(var r=8;r>=1;r--){ for(var f=0;f<8;f++){ var sqName=FILES[f]+r; var p=game.get(sqName);
      var div=document.createElement('div'); div.className='sq '+(((f+r)%2)?'l':'d'); div.dataset.sq=sqName;
      if(p)div.textContent=GLYPH[p.color+p.type];
      if(sel===sqName)div.classList.add('sel');
      if(sel){ var ms=game.moves({square:sel,verbose:true}); if(ms.some(function(m){return m.to===sqName;}))div.classList.add('mv'); }
      bd.appendChild(div); } }
    updateStatus();
  }
  function updateStatus(){ var tmp=game.turn()==='w'?t('b_chess_white'):t('b_chess_black'); var s;
    if(game.in_checkmate())s=t('b_chess_checkmate')+' '+(game.turn()==='w'?t('b_chess_black'):t('b_chess_white'))+' '+t('b_chess_wins');
    else if(game.in_stalemate())s=t('b_chess_stalemate');
    else if(game.in_draw())s=t('b_chess_draw');
    else s=tmp+' '+t('b_chess_turn_suffix')+(game.in_check()?' · '+t('b_chess_check'):'');
    $('status').textContent=s;
  }
  function click(sq){ if(game.game_over())return; var p=game.get(sq);
    if(sel){ var mv=game.move({from:sel,to:sq,promotion:'q'}); if(mv){ sel=null; render(); return; }
      if(p&&p.color===game.turn()){ sel=sq; render(); return; } sel=null; render(); return; }
    if(p&&p.color===game.turn()){ sel=sq; render(); }
  }
  $('board').addEventListener('click',function(e){var d=e.target.closest('.sq');if(d)click(d.dataset.sq);});
  $('undo').addEventListener('click',function(){game.undo();sel=null;render();});
  $('reset').addEventListener('click',function(){game.reset();sel=null;render();});
  window.onI18n=function(){render();};
  render();
  window._dbg={turn:function(){return game.turn();},fen:function(){return game.fen();}};
</script>
</body>
