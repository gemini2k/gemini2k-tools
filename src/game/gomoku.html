<body>
<div class="toolwrap" style="max-width:480px;">
  <h1 data-i18n="b_gomoku_title">오목</h1>
  <p class="sub" data-i18n="b_gomoku_sub">가로·세로·대각선으로 같은 돌 5개를 먼저 이으면 승리! 친구와 2인으로, 또는 컴퓨터와 대결하세요.</p>

  <div class="howto"><span class="ic">📖</span><div><b data-i18n="b_gomoku_howto_title">조작법</b><ol>
    <li data-i18n="b_gomoku_howto_1">'2인 대전' 또는 'vs 컴퓨터'와 난이도를 고릅니다</li>
    <li data-i18n="b_gomoku_howto_2">교차점을 클릭(터치)해 돌을 놓습니다 (사람이 검은 돌 ●로 먼저)</li>
    <li data-i18n="b_gomoku_howto_3">한 줄로 5개를 만들면 승리합니다</li>
  </ol></div></div>

  <div class="card">
    <div class="opts">
      <select id="mode">
        <option value="ai" data-i18n="b_gomoku_mode_ai">vs 컴퓨터</option>
        <option value="2p" data-i18n="b_gomoku_mode_2p">2인 대전</option>
      </select>
      <select id="diff">
        <option value="easy" data-i18n="b_gomoku_diff_easy">쉬움</option>
        <option value="normal" selected data-i18n="b_gomoku_diff_normal">보통</option>
        <option value="hard" data-i18n="b_gomoku_diff_hard">어려움</option>
      </select>
      <button id="reset" type="button" data-i18n="b_gomoku_btn_restart">다시 시작</button>
    </div>
    <div class="turn" id="turn"></div>
    <canvas id="cv" width="372" height="372" aria-label="오목판"></canvas>
    <div class="msg" id="msg"></div>
    <div class="note" data-i18n="b_gomoku_note">컴퓨터는 외부 서버 없이 브라우저에서 계산하는 규칙 기반 AI(공격·수비 위협 점수 평가)입니다. 데이터는 전송되지 않습니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  var cv=$('cv'), x=cv.getContext('2d'), N=15, M=18, CS=24;
  var g, cur, over, last, raf;

  function inb(r,c){ return r>=0&&r<N&&c>=0&&c<N; }
  function reset(){ g=[]; for(var r=0;r<N;r++){ g.push([]); for(var c=0;c<N;c++) g[r].push(0); } cur=1; over=false; last=null; $('msg').textContent=''; draw(); turn(); }
  function turn(){ if(over){ $('turn').textContent=''; return; } var ai=$('mode').value==='ai';
    $('turn').textContent = ai ? (cur===1?t('b_gomoku_turn_my'):t('b_gomoku_turn_ai')) : (t('b_gomoku_turn_prefix')+(cur===1?t('b_gomoku_turn_black'):t('b_gomoku_turn_white'))); }

  function draw(){
    x.fillStyle='#e3b873'; x.fillRect(0,0,372,372);
    x.strokeStyle='rgba(60,40,20,.7)'; x.lineWidth=1;
    for(var i=0;i<N;i++){ var p=M+i*CS; x.beginPath(); x.moveTo(M,p); x.lineTo(M+(N-1)*CS,p); x.stroke(); x.beginPath(); x.moveTo(p,M); x.lineTo(p,M+(N-1)*CS); x.stroke(); }
    // 화점
    [[3,3],[3,11],[11,3],[11,11],[7,7]].forEach(function(s){ x.fillStyle='rgba(60,40,20,.8)'; x.beginPath(); x.arc(M+s[1]*CS,M+s[0]*CS,3,0,7); x.fill(); });
    for(var r=0;r<N;r++)for(var c=0;c<N;c++){ if(g[r][c]) stone(r,c,g[r][c]); }
    if(last){ x.strokeStyle=g[last[0]][last[1]]===1?'#f87171':'#f87171'; x.lineWidth=2; x.beginPath(); x.arc(M+last[1]*CS,M+last[0]*CS,CS*0.42,0,7); x.stroke(); }
  }
  function stone(r,c,p){ var cx=M+c*CS, cy=M+r*CS, rad=CS*0.42;
    var gr=x.createRadialGradient(cx-3,cy-3,1,cx,cy,rad); if(p===1){ gr.addColorStop(0,'#555'); gr.addColorStop(1,'#000'); } else { gr.addColorStop(0,'#fff'); gr.addColorStop(1,'#cbd5e1'); }
    x.fillStyle=gr; x.beginPath(); x.arc(cx,cy,rad,0,7); x.fill(); }

  function winAt(r,c,p){ var dirs=[[1,0],[0,1],[1,1],[1,-1]];
    for(var d=0;d<4;d++){ var dr=dirs[d][0],dc=dirs[d][1],cnt=1,rr=r+dr,cc=c+dc;
      while(inb(rr,cc)&&g[rr][cc]===p){cnt++;rr+=dr;cc+=dc;} rr=r-dr;cc=c-dc;
      while(inb(rr,cc)&&g[rr][cc]===p){cnt++;rr-=dr;cc-=dc;} if(cnt>=5) return true; } return false; }

  function place(r,c){
    if(over||g[r][c]) return; g[r][c]=cur; last=[r,c]; draw();
    if(winAt(r,c,cur)){ over=true; var ai=$('mode').value==='ai'; $('msg').textContent = ai?(cur===1?t('b_gomoku_win_player'):t('b_gomoku_win_ai')):(cur===1?t('b_gomoku_win_black'):t('b_gomoku_win_white')); turn(); return; }
    if(g.every(function(row){return row.every(function(v){return v;});})){ over=true; $('msg').textContent=t('b_gomoku_draw'); return; }
    cur=cur===1?2:1; turn();
    if($('mode').value==='ai' && cur===2 && !over) setTimeout(aiMove, 250);
  }

  // 위협 점수
  function val(cnt,open){ if(cnt>=5) return 1000000; if(cnt===4) return open===2?200000:(open===1?12000:0); if(cnt===3) return open===2?6000:(open===1?900:0); if(cnt===2) return open===2?550:(open===1?120:0); if(cnt===1) return open===2?40:8; return 0; }
  function score(r,c,p){ var dirs=[[1,0],[0,1],[1,1],[1,-1]], tot=0;
    for(var d=0;d<4;d++){ var dr=dirs[d][0],dc=dirs[d][1],cnt=1,open=0,rr=r+dr,cc=c+dc;
      while(inb(rr,cc)&&g[rr][cc]===p){cnt++;rr+=dr;cc+=dc;} if(inb(rr,cc)&&g[rr][cc]===0)open++;
      rr=r-dr;cc=c-dc; while(inb(rr,cc)&&g[rr][cc]===p){cnt++;rr-=dr;cc-=dc;} if(inb(rr,cc)&&g[rr][cc]===0)open++;
      tot+=val(cnt,open); } return tot; }
  function candidates(){ var tmp_set={}, list=[]; var any=false;
    for(var r=0;r<N;r++)for(var c=0;c<N;c++){ if(!g[r][c]) continue; any=true;
      for(var dr=-2;dr<=2;dr++)for(var dc=-2;dc<=2;dc++){ var nr=r+dr,nc=c+dc; if(inb(nr,nc)&&!g[nr][nc]){ var k=nr+','+nc; if(!tmp_set[k]){tmp_set[k]=1;list.push({r:nr,c:nc});} } } }
    if(!any) return [{r:7,c:7}]; return list; }
  function aiMove(){
    if(over) return; var cands=candidates(), bestS=-1, best=[];
    cands.forEach(function(m){ var atk=score(m.r,m.c,2), def=score(m.r,m.c,1); var s=atk + def*0.95;
      if(s>bestS){ bestS=s; best=[m]; } else if(s===bestS) best.push(m); });
    var diff=$('diff').value, pick;
    var rc=function(a){ return a[Math.floor(Math.random()*a.length)]; };
    if(diff==='easy') pick = Math.random()<0.55 ? rc(cands) : rc(best);
    else if(diff==='normal') pick = Math.random()<0.2 ? rc(cands) : rc(best);
    else pick = rc(best);
    if(!pick) pick=rc(cands);
    place(pick.r,pick.c);
  }

  function click(clientX,clientY){
    if(over) return; if($('mode').value==='ai' && cur!==1) return;
    var rect=cv.getBoundingClientRect(); var sx=372/rect.width;
    var c=Math.round(((clientX-rect.left)*sx - M)/CS), r=Math.round(((clientY-rect.top)*sx - M)/CS);
    if(inb(r,c)) place(r,c);
  }
  cv.addEventListener('click', function(e){ click(e.clientX,e.clientY); });
  $('reset').addEventListener('click', reset);
  $('mode').addEventListener('change', function(){ $('diff').classList.toggle('hide',$('mode').value!=='ai'); reset(); });
  $('diff').addEventListener('change', reset);
  window.onI18n = function(){ turn(); };
  reset();
</script>
</body>
