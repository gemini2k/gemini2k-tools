<div class="toolwrap" style="max-width:560px;">
  <h1>3D 큐브 런너</h1>
  <p class="sub">좌우 차선을 옮겨 다가오는 장애물을 피하세요. 갈수록 빨라집니다!</p>

  <div class="howto"><span class="ic">📖</span><div><b>조작법</b><ol>
    <li>아래 ◀ ▶ 버튼, 방향키(←→), 또는 화면을 좌우로 스와이프/탭해 차선을 옮깁니다</li>
    <li>장애물에 부딪히지 않고 최대한 멀리 가세요</li>
    <li><b>Space/P</b> 또는 ⏸ 버튼으로 일시정지할 수 있어요</li>
  </ol></div></div>

  <div class="card">
    <div class="gbar">
      <div class="scores">
        <div class="sbox"><div class="l">점수</div><div class="v" id="score">0</div></div>
        <div class="sbox"><div class="l">최고</div><div class="v" id="best">0</div></div>
      </div>
    </div>
    <div class="g3d-wrap">
      <div class="g3d-stage" id="stage"></div>
      <div class="g3d-over" id="gover"><div><div class="big" id="goverBig">3D 큐브 런너</div><div class="sm" id="goverSm">탭하거나 버튼을 눌러 시작</div><button class="btn" id="goverBtn" type="button">시작</button></div></div>
    </div>
    <div class="dpad"><button id="left" type="button" aria-label="왼쪽">◀</button><button id="right" type="button" aria-label="오른쪽">▶</button></div>
    <div class="note">Three.js 3D 그래픽을 사용합니다. 3D 미지원 환경에서는 안내 메시지가 표시됩니다. 진행은 브라우저에서만, 최고 기록만 이 기기에 저장됩니다.</div>
  </div>

<script src="game-core.js"></script>
<script src="three-core.js"></script>
<script src="tool-shell.js"></script>
<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var T=Three3D.setup($('stage'),{bg:0x0b1020, fov:60, ratio:1.0});
  if(!T){ $('left').style.display='none'; $('right').style.display='none'; $('gover').style.display='none'; return; }
  var THREE=T.THREE, scene=T.scene, camera=T.camera;
  scene.add(new THREE.AmbientLight(0x8aa0c0,0.8));
  var dir=new THREE.DirectionalLight(0xffffff,0.65); dir.position.set(3,10,6); scene.add(dir);
  scene.fog=new THREE.Fog(0x0b1020, 18, 46);
  camera.position.set(0,5,11); camera.lookAt(0,0.6,0);

  var LANES=[-2.2,0,2.2];
  // 바닥
  var ground=new THREE.Mesh(new THREE.PlaneGeometry(9,120), new THREE.MeshLambertMaterial({color:0x182747}));
  ground.rotation.x=-Math.PI/2; ground.position.z=-40; scene.add(ground);
  // 차선 구분선(긴 막대)
  [-1.1,1.1].forEach(function(x){ var ln=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.02,120), new THREE.MeshBasicMaterial({color:0x33507f})); ln.position.set(x,0.02,-40); scene.add(ln); });
  // 속도감용 스트라이프(재활용)
  var stripes=[]; for(var i=0;i<12;i++){ var s=new THREE.Mesh(new THREE.BoxGeometry(7,0.02,0.5), new THREE.MeshBasicMaterial({color:0x24385f})); s.position.set(0,0.015,-i*8); scene.add(s); stripes.push(s); }
  // 플레이어
  var player=new THREE.Mesh(new THREE.BoxGeometry(1.1,1.1,1.1), new THREE.MeshLambertMaterial({color:0x38bdf8}));
  player.position.set(0,0.55,5); scene.add(player);
  var COLORS=[0xf87171,0xfbbf24,0x34d399,0xa78bfa];
  var obstacles=[], lane=1, score=0, speed=14, spawnT=0, over=true;
  var best=+(localStorage.getItem('runner3d:best')||0); $('best').textContent=best;

  function spawn(){
    var l=Math.floor(Math.random()*3);
    var m=new THREE.Mesh(new THREE.BoxGeometry(1.3,1.3,1.3), new THREE.MeshLambertMaterial({color:COLORS[Math.floor(Math.random()*4)]}));
    m.position.set(LANES[l],0.65,-45); m.userData={lane:l,scored:false}; scene.add(m); obstacles.push(m);
  }
  function clearObs(){ obstacles.forEach(function(o){ scene.remove(o); o.geometry.dispose(); o.material.dispose(); }); obstacles=[]; }
  function start(){ clearObs(); over=false; lane=1; score=0; speed=14; spawnT=0; player.position.x=0; $('score').textContent='0'; $('gover').style.display='none'; }
  function gameOver(){ over=true; if(score>best){ best=score; localStorage.setItem('runner3d:best',best); $('best').textContent=best; }
    $('goverBig').textContent='💥 충돌!'; $('goverSm').textContent='점수 '+score+' · 다시 도전!'; $('goverBtn').textContent='다시 시작'; $('gover').style.display=''; }
  function move(d){ if(over){ start(); return; } lane=Math.max(0,Math.min(2,lane+d)); }

  T.start(function(dt){
    // 스트라이프 이동(항상)
    for(var i=0;i<stripes.length;i++){ stripes[i].position.z += speed*dt; if(stripes[i].position.z>11) stripes[i].position.z -= 96; }
    player.position.x += (LANES[lane]-player.position.x)*Math.min(1,dt*14);
    if(over) return;
    score += dt*10; $('score').textContent=Math.floor(score);
    speed += dt*0.6;
    spawnT += dt; if(spawnT > Math.max(0.5, 1.1 - score*0.002)){ spawnT=0; spawn(); }
    for(var j=obstacles.length-1;j>=0;j--){ var o=obstacles[j]; o.position.z += speed*dt;
      if(!o.userData.scored && o.position.z>player.position.z+1){ o.userData.scored=true; }
      if(Math.abs(o.position.z-player.position.z)<1.05 && o.userData.lane===lane){ gameOver(); break; }
      if(o.position.z>12){ scene.remove(o); o.geometry.dispose(); o.material.dispose(); obstacles.splice(j,1); }
    }
  });

  $('left').addEventListener('click',function(){ move(-1); });
  $('right').addEventListener('click',function(){ move(1); });
  document.addEventListener('keydown',function(e){ if(e.key==='ArrowLeft'){e.preventDefault();move(-1);} if(e.key==='ArrowRight'){e.preventDefault();move(1);} });
  $('goverBtn').addEventListener('click',function(e){ e.stopPropagation(); start(); });
  $('gover').addEventListener('click', start);
  var sx=null;
  T.dom.addEventListener('pointerdown',function(e){ sx=e.clientX; });
  T.dom.addEventListener('pointerup',function(e){ if(sx==null) return; var dx=e.clientX-sx;
    if(over){ start(); sx=null; return; }
    if(Math.abs(dx)>24) move(dx>0?1:-1);
    else { var r=T.dom.getBoundingClientRect(); move((e.clientX-r.left)/r.width<0.5?-1:1); } sx=null; });
})();
</script>
