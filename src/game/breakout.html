<body>
<div class="toolwrap" style="max-width:540px;">
  <h1 data-i18n="b_breakout_title">벽돌깨기</h1>
  <p class="sub" data-i18n="b_breakout_sub">막대를 움직여 공을 튕기고, 위쪽 벽돌을 모두 깨세요.</p>

  <div class="howto"><span class="ic">📖</span><div><b data-i18n="b_breakout_howto_title">조작법</b><ol>
    <li data-i18n="b_breakout_howto1">마우스를 좌우로 움직이거나(모바일은 손가락으로 화면을 좌우로) 막대를 조종합니다</li>
    <li data-i18n="b_breakout_howto2">화면을 클릭·터치하면 게임이 시작됩니다</li>
    <li data-i18n="b_breakout_howto3">공을 놓치면 생명이 줄고, 벽돌을 다 깨면 승리합니다</li>
  </ol></div></div>

  <div class="card">
    <div class="gbar">
      <button class="btn" id="restart" type="button" data-i18n="b_breakout_restart">다시 시작</button>
      <div class="scores">
        <div class="sbox"><div class="l" data-i18n="b_breakout_score_label">점수</div><div class="v" id="score">0</div></div>
        <div class="sbox"><div class="l" data-i18n="b_breakout_lives_label">생명</div><div class="v" id="lives">3</div></div>
      </div>
    </div>
    <div class="stage">
      <canvas id="cv" width="480" height="600" data-i18n-ph="b_breakout_title" aria-label="벽돌깨기"></canvas>
      <div class="overlay" id="ov"><div><div class="big" id="ovBig">벽돌깨기</div><div class="sm" id="ovSm">클릭하면 시작합니다</div></div></div>
    </div>
    <div class="note" data-i18n="b_breakout_note">모든 처리는 브라우저에서만 이루어지며 데이터는 전송되지 않습니다.</div>
  </div>
</div>

<script src="game-core.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  var cv=$('cv'), x=cv.getContext('2d'), W=480, H=600;
  var gc=GameCore.init({});
  var COLS=8, ROWS=5, BW=W/COLS, BH=26, TOP=56;
  var paddle, ball, bricks, score, lives, state; // ready|play|over|win
  var BCOL=['#f87171','#fb923c','#fbbf24','#34d399','#38bdf8'];

  function reset(full){
    paddle={w:84,h:14,x:W/2-42,y:H-34};
    ball={x:W/2,y:H-50,r:8,vx:0,vy:0,sp:5};
    if(full){ score=0; lives=3; bricks=[];
      for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++) bricks.push({c:c,r:r,alive:true});
    }
    state='ready'; $('score').textContent=score; $('lives').textContent=lives;
    showOverlay(t('b_breakout_title'),t('b_breakout_click_start'));
  }
  function launch(){ if(state!=='ready') return; var ang=(-60+Math.random()*120)*Math.PI/180; ball.vx=ball.sp*Math.sin(ang); ball.vy=-ball.sp*Math.cos(ang); state='play'; hideOverlay(); }
  function showOverlay(bv,sv){ $('ovBig').textContent=bv; $('ovSm').textContent=sv; $('ov').classList.remove('hide'); }
  function hideOverlay(){ $('ov').classList.add('hide'); }

  function step(){
    if(state==='play' && !gc.isPaused()){
      ball.x+=ball.vx; ball.y+=ball.vy;
      if(ball.x<ball.r){ ball.x=ball.r; ball.vx*=-1; } if(ball.x>W-ball.r){ ball.x=W-ball.r; ball.vx*=-1; }
      if(ball.y<ball.r){ ball.y=ball.r; ball.vy*=-1; }
      // 패들
      if(ball.y+ball.r>=paddle.y && ball.y+ball.r<=paddle.y+paddle.h+10 && ball.x>=paddle.x && ball.x<=paddle.x+paddle.w && ball.vy>0){
        var hit=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2); var ang=hit*Math.PI/3;
        ball.vx=ball.sp*Math.sin(ang); ball.vy=-ball.sp*Math.abs(Math.cos(ang));
      }
      // 벽돌
      for(var i=0;i<bricks.length;i++){ var tmp=bricks[i]; if(!tmp.alive) continue;
        var bx=tmp.c*BW+3, by=TOP+tmp.r*BH+3, bw=BW-6, bh=BH-6;
        if(ball.x>bx-ball.r && ball.x<bx+bw+ball.r && ball.y>by-ball.r && ball.y<by+bh+ball.r){
          tmp.alive=false; score+=10; $('score').textContent=score; ball.vy*=-1;
          if(bricks.every(function(z){return !z.alive;})){ state='win'; showOverlay(t('b_breakout_clear'),t('b_breakout_click_restart')); }
          break;
        }
      }
      // 바닥
      if(ball.y-ball.r>H){ lives--; $('lives').textContent=lives;
        if(lives<=0){ state='over'; showOverlay(t('b_breakout_gameover'),t('b_breakout_click_restart')); }
        else { ball.x=W/2; ball.y=H-50; ball.vx=0; ball.vy=0; state='ready'; showOverlay(t('b_breakout_lives_remain').replace('{n}',lives),t('b_breakout_click_continue')); }
      }
    }
    draw(); requestAnimationFrame(step);
  }
  function draw(){
    x.clearRect(0,0,W,H); x.fillStyle='#0f1226'; x.fillRect(0,0,W,H);
    // 벽돌
    for(var i=0;i<bricks.length;i++){ var tmp=bricks[i]; if(!tmp.alive) continue;
      var bx=tmp.c*BW+3, by=TOP+tmp.r*BH+3, bw=BW-6, bh=BH-6;
      var g=x.createLinearGradient(bx,by,bx,by+bh); g.addColorStop(0,BCOL[tmp.r]); g.addColorStop(1,shade(BCOL[tmp.r]));
      x.fillStyle=g; roundRect(bx,by,bw,bh,5); x.fill();
    }
    // 패들
    var pg=x.createLinearGradient(paddle.x,0,paddle.x+paddle.w,0); pg.addColorStop(0,'#a78bfa'); pg.addColorStop(1,'#38bdf8');
    x.fillStyle=pg; roundRect(paddle.x,paddle.y,paddle.w,paddle.h,7); x.fill();
    // 공(글로우)
    x.save(); x.shadowColor='#fff'; x.shadowBlur=14; x.fillStyle='#fff'; x.beginPath(); x.arc(ball.x,ball.y,ball.r,0,7); x.fill(); x.restore();
  }
  function roundRect(rx,ry,rw,rh,rad){ x.beginPath(); x.moveTo(rx+rad,ry); x.arcTo(rx+rw,ry,rx+rw,ry+rh,rad); x.arcTo(rx+rw,ry+rh,rx,ry+rh,rad); x.arcTo(rx,ry+rh,rx,ry,rad); x.arcTo(rx,ry,rx+rw,ry,rad); x.closePath(); }
  function shade(h){ var n=parseInt(h.slice(1),16); var r=Math.max(0,(n>>16)-40),g=Math.max(0,((n>>8)&255)-40),tmp=Math.max(0,(n&255)-40); return 'rgb('+r+','+g+','+tmp+')'; }

  function movePaddle(clientX){ var rect=cv.getBoundingClientRect(); var px=(clientX-rect.left)/rect.width*W; paddle.x=Math.max(0,Math.min(W-paddle.w, px-paddle.w/2)); if(state==='ready'){ ball.x=paddle.x+paddle.w/2; } }
  cv.addEventListener('mousemove', function(e){ movePaddle(e.clientX); });
  cv.addEventListener('touchmove', function(e){ e.preventDefault(); movePaddle(e.touches[0].clientX); }, {passive:false});
  function tap(){ if(state==='play') return; if(state==='over'||state==='win') reset(true); else launch(); }
  cv.addEventListener('click', tap);
  $('ov').addEventListener('click', tap);
  cv.addEventListener('touchstart', function(e){ e.preventDefault(); tap(); }, {passive:false});
  $('restart').addEventListener('click', function(){ reset(true); });
  window.onI18n = function(){ if(state==='ready'||state==='over'||state==='win'){ var bv=$('ovBig').textContent; var sv=$('ovSm').textContent;
    if(state==='ready' && score===0 && lives===3){ showOverlay(t('b_breakout_title'),t('b_breakout_click_start')); }
    else if(state==='win'){ showOverlay(t('b_breakout_clear'),t('b_breakout_click_restart')); }
    else if(state==='over'){ showOverlay(t('b_breakout_gameover'),t('b_breakout_click_restart')); }
    else { showOverlay(t('b_breakout_lives_remain').replace('{n}',lives),t('b_breakout_click_continue')); }
  }};
  reset(true); requestAnimationFrame(step);
</script>
</body>
