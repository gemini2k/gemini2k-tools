<style>
  .gbar{display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap;}
  .scores{display:flex;gap:.6rem;}
  .sbox{background:var(--ground);border:1px solid var(--border);border-radius:10px;padding:.35rem .8rem;text-align:center;min-width:64px;}
  .sbox .l{font-size:.64rem;font-weight:700;color:var(--muted);text-transform:uppercase;} .sbox .v{font-size:1.2rem;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;}
  .holes{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;max-width:420px;margin:0 auto;}
  .hole{aspect-ratio:1/1;border-radius:50%;background:radial-gradient(ellipse at 50% 35%, #6b4a2b, #3f2a17);
    position:relative;overflow:hidden;cursor:pointer;box-shadow:inset 0 -8px 14px rgba(0,0,0,.4);}
  .mole{position:absolute;left:0;right:0;bottom:-100%;height:100%;display:grid;place-items:center;font-size:2.6rem;
    transition:bottom .12s ease;}
  .hole.up .mole{bottom:0;}
  .hole.bonk .mole{transform:scale(.7) rotate(-12deg);}
  .msg{text-align:center;margin-top:1rem;font-weight:800;font-size:1.1rem;min-height:1.4em;color:var(--accent);}
  .note{margin-top:1.2rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}
</style>

<body>
<div class="toolwrap" style="max-width:480px;">
  <h1 data-i18n="b_whack_title">두더지 잡기</h1>
  <p class="sub" data-i18n="b_whack_sub">30초 동안 튀어나오는 두더지를 빠르게 잡으세요!</p>

  <div class="howto"><span class="ic">📖</span><div><b data-i18n="b_whack_howto_title">조작법</b><ol>
    <li data-i18n="b_whack_howto_1">'시작'을 누르면 두더지가 무작위로 튀어나옵니다</li>
    <li data-i18n="b_whack_howto_2">두더지를 클릭(터치)하면 점수가 오릅니다</li>
    <li data-i18n="b_whack_howto_3">30초 안에 최대한 많이 잡으세요</li>
  </ol></div></div>

  <div class="card">
    <div class="gbar">
      <button class="btn" id="start" type="button" data-i18n="b_whack_btn_start">시작</button>
      <div class="scores">
        <div class="sbox"><div class="l" data-i18n="b_whack_label_score">점수</div><div class="v" id="score">0</div></div>
        <div class="sbox"><div class="l" data-i18n="b_whack_label_time">남은 시간</div><div class="v" id="time">30</div></div>
        <div class="sbox"><div class="l" data-i18n="b_whack_label_best">최고</div><div class="v" id="best">0</div></div>
      </div>
    </div>
    <div class="holes" id="holes"></div>
    <div class="msg" id="msg"></div>
    <div class="note" data-i18n="b_whack_note">모든 진행은 브라우저에서만 이루어지며 최고 점수만 이 기기에 저장됩니다.</div>
  </div>
</div>

<script src="game-core.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  var holes=$('holes'), score, time, best=+(localStorage.getItem('whack:best')||0), playing=false, spawnT=null, tickT=null, hideTimers=[];
  function tickFn(){ time--; $('time').textContent=time; if(time<=0) end(); }
  var gc=GameCore.init({onPause:function(){ if(tickT){clearInterval(tickT);tickT=null;} if(spawnT){clearTimeout(spawnT);spawnT=null;} }, onResume:function(){ if(playing){ tickT=setInterval(tickFn,1000); spawn(); } }});
  $('best').textContent=best;
  var MOLES=['🦫','🐹','🐰','🦔'];
  for(var i=0;i<9;i++){ var h=document.createElement('div'); h.className='hole'; h.dataset.i=i; h.innerHTML='<div class="mole">🦫</div>'; holes.appendChild(h); }
  var cells=[].slice.call(holes.children);

  function clearAll(){ cells.forEach(function(c){ c.classList.remove('up','bonk'); }); hideTimers.forEach(clearTimeout); hideTimers=[]; }
  function start(){
    if(playing) return; playing=true; score=0; time=30; $('score').textContent=0; $('time').textContent=30; $('msg').textContent=''; clearAll();
    tickT=setInterval(tickFn,1000);
    spawn();
  }
  function spawn(){
    if(!playing) return;
    var free=cells.filter(function(c){return !c.classList.contains('up');});
    if(free.length){ var c=free[Math.floor(Math.random()*free.length)];
      c.querySelector('.mole').textContent=MOLES[Math.floor(Math.random()*MOLES.length)];
      c.classList.add('up','live');
      var tmp=setTimeout(function(){ c.classList.remove('up','live'); }, 700+Math.random()*600);
      hideTimers.push(tmp);
    }
    spawnT=setTimeout(spawn, 500+Math.random()*450);
  }
  function end(){ playing=false; clearInterval(tickT); clearTimeout(spawnT); clearAll();
    if(score>best){ best=score; localStorage.setItem('whack:best',best); $('best').textContent=best; }
    $('msg').textContent=t('b_whack_msg_end').replace('{score}',score); }

  holes.addEventListener('click', function(e){ var c=e.target.closest('.hole'); if(!c||!playing||gc.isPaused()) return;
    if(c.classList.contains('up')){ score++; $('score').textContent=score; c.classList.add('bonk'); var cc=c;
      setTimeout(function(){ cc.classList.remove('up','bonk','live'); },90); }
  });
  $('start').addEventListener('click', start);
</script>
</body>
