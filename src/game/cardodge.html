<body>
<div class="toolwrap" style="max-width:420px;">
  <h1>자동차 회피</h1>
  <p class="sub">좌우로 차선을 옮겨 마주 오는 차를 피하세요. 갈수록 빨라집니다!</p>

  <div class="howto"><span class="ic">📖</span><div><b>조작법</b><ol>
    <li>아래 ◀ ▶ 버튼 또는 방향키(←→)로 차를 옮깁니다</li>
    <li>모바일은 화면 좌/우를 탭하거나 좌우로 스와이프합니다</li>
    <li>화면을 클릭·터치하면 시작합니다</li>
  </ol></div></div>

  <div class="card">
    <div class="gbar">
      <button class="btn" id="restart" type="button">다시 시작</button>
      <div class="scores">
        <div class="sbox"><div class="l">점수</div><div class="v" id="score">0</div></div>
        <div class="sbox"><div class="l">최고</div><div class="v" id="best">0</div></div>
      </div>
    </div>
    <div class="stage">
      <canvas id="cv" width="360" height="540" aria-label="자동차 회피"></canvas>
      <div class="overlay" id="ov"><div><div class="big">자동차 회피</div><div class="sm">클릭하면 시작합니다</div></div></div>
    </div>
    <div class="dpad">
      <button id="left" aria-label="왼쪽">◀</button>
      <button id="right" aria-label="오른쪽">▶</button>
    </div>
    <div class="note">모든 진행은 브라우저에서만 이루어지며 최고 점수만 이 기기에 저장됩니다.</div>
  </div>
</div>

<script src="game-core.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  var cv=$('cv'), x=cv.getContext('2d'), W=360, H=540, LANES=3, LW=W/LANES, CARW=46, CARH=78;
  var gc=GameCore.init({});
  var lane, cars, score, best=+(localStorage.getItem('cardodge:best')||0), state='ready', last=0, spawnT=0, speed, dash=0, raf=null;
  $('best').textContent=best;
  function laneX(l){ return l*LW + LW/2; }
  function reset(){ lane=1; cars=[]; score=0; speed=0.22; spawnT=0; dash=0; $('score').textContent=0; state='ready'; showOv('자동차 회피','클릭하면 시작합니다'); draw(); }
  function showOv(b,s){ $('ov').querySelector('.big').textContent=b; $('ov').querySelector('.sm').textContent=s; $('ov').classList.remove('hide'); }
  function start(){ if(state==='play') return; if(state==='over') reset(); state='play'; $('ov').classList.add('hide'); last=performance.now(); if(!raf) raf=requestAnimationFrame(loop); }
  function move(d){ if(state!=='play'){ start(); return; } lane=Math.max(0,Math.min(LANES-1,lane+d)); }

  function loop(t){ var dt=Math.min(40,t-last); last=t;
    if(state==='play' && !gc.isPaused()){
      dash=(dash+speed*dt)%40; score+=dt*0.02; $('score').textContent=Math.floor(score);
      speed+=dt*0.00002;
      spawnT+=dt; if(spawnT> Math.max(620, 1100-score*1.2)){ spawnT=0; var l=Math.floor(Math.random()*LANES); cars.push({l:l,y:-CARH,col:['#f87171','#fbbf24','#34d399','#a78bfa'][Math.floor(Math.random()*4)]}); }
      cars.forEach(function(c){ c.y+=speed*dt; });
      cars=cars.filter(function(c){return c.y<H+CARH;});
      // 충돌
      var py=H-CARH-14;
      for(var i=0;i<cars.length;i++){ var c=cars[i]; if(c.l===lane && c.y+CARH>py && c.y<py+CARH){ state='over';
        if(Math.floor(score)>best){ best=Math.floor(score); localStorage.setItem('cardodge:best',best); $('best').textContent=best; }
        showOv('💥 충돌!','점수 '+Math.floor(score)+' · 클릭하면 다시'); break; } }
    }
    draw(); raf=requestAnimationFrame(loop);
  }
  function carShape(cx,cy,col){ x.fillStyle=col; rr(cx-CARW/2,cy,CARW,CARH,9);
    x.fillStyle='rgba(0,0,0,.35)'; rr(cx-CARW/2+7,cy+10,CARW-14,20,5); rr(cx-CARW/2+7,cy+CARH-30,CARW-14,18,5); }
  function rr(px,py,w,h,rad){ x.beginPath(); x.roundRect?x.roundRect(px,py,w,h,rad):x.rect(px,py,w,h); x.fill(); }
  function draw(){
    x.fillStyle='#26303a'; x.fillRect(0,0,W,H);
    // 차선 점선
    x.strokeStyle='rgba(255,255,255,.5)'; x.lineWidth=4; x.setLineDash([22,18]); x.lineDashOffset=-dash;
    for(var l=1;l<LANES;l++){ x.beginPath(); x.moveTo(l*LW,0); x.lineTo(l*LW,H); x.stroke(); } x.setLineDash([]);
    // 상대 차
    cars.forEach(function(c){ carShape(laneX(c.l), c.y, c.col); });
    // 내 차
    carShape(laneX(lane), H-CARH-14, '#38bdf8');
  }
  $('left').addEventListener('click', function(){ move(-1); });
  $('right').addEventListener('click', function(){ move(1); });
  document.addEventListener('keydown', function(e){ if(e.key==='ArrowLeft'){e.preventDefault();move(-1);} if(e.key==='ArrowRight'){e.preventDefault();move(1);} });
  function tap(){ if(state!=='play') start(); }
  $('ov').addEventListener('click', tap);
  cv.addEventListener('click', function(e){ if(state!=='play'){ start(); return; } var rect=cv.getBoundingClientRect(); move((e.clientX-rect.left)/rect.width<0.5?-1:1); });
  var sx;
  cv.addEventListener('touchstart',function(e){ sx=e.touches[0].clientX; },{passive:true});
  cv.addEventListener('touchend',function(e){ if(sx==null)return; var dx=e.changedTouches[0].clientX-sx; if(state!=='play'){ start(); sx=null; return; } if(Math.abs(dx)>20) move(dx>0?1:-1); else { var rect=cv.getBoundingClientRect(); move((e.changedTouches[0].clientX-rect.left)/rect.width<0.5?-1:1); } sx=null; },{passive:true});
  $('restart').addEventListener('click', function(){ reset(); });
  reset(); raf=requestAnimationFrame(loop);
</script>
