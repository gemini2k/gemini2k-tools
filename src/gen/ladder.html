<div class="toolwrap">

커피</textarea>

      사다리는 만들 때마다 무작위로 새로 그려집니다. 위쪽 이름을 클릭하면 경로가 그려지고, '전체 결과 보기'로 모두 한 번에 확인할 수 있습니다. 모든 추첨은 브라우저에서만 이루어집니다.

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  var SVGNS = 'http://www.w3.org/2000/svg';
  var names=[], prizes=[], rungs=[], C=0, L=12;
  var W=600, H=420, padX=40, topY=46, botY=H-46;

  function parse(v){ return v.split(/[\n,]/).map(function(s){return s.trim();}).filter(Boolean); }
  function colX(i){ return padX + (W-2*padX) * (C===1?0.5:i/(C-1)); }
  function levelY(l){ return topY + (botY-topY) * (l+1)/(L+1); }

  function build(){
    names = parse($('names').value); prizes = parse($('prizes').value);
    C = Math.max(names.length, prizes.length, 2);
    while(names.length < C) names.push('');
    while(prizes.length < C) prizes.push('');
    L = Math.max(8, C*3);
    // 무작위 가로줄 (같은 레벨에서 인접 충돌 방지)
    rungs = [];
    for(var l=0;l<L;l++){
      var row = new Array(C-1).fill(false);
      for(var j=0;j<C-1;j++){
        if(j>0 && row[j-1]) continue;             // 인접 충돌 방지
        if(Math.random() < 0.45) row[j] = true;
      }
      rungs.push(row);
    }
    draw(); $('resbox').style.display='none';
  }

  function traceCol(s){
    var col=s, pts=[[colX(col), topY]];
    for(var l=0;l<L;l++){
      var y=levelY(l); pts.push([colX(col), y]);
      if(col<C-1 && rungs[l][col]){ col++; pts.push([colX(col), y]); }
      else if(col>0 && rungs[l][col-1]){ col--; pts.push([colX(col), y]); }
    }
    pts.push([colX(col), botY]);
    return { end:col, pts:pts };
  }

  function el(nm, attrs){ var e=document.createElementNS(SVGNS,nm); for(var k in attrs) e.setAttribute(k, attrs[k]); return e; }
  function draw(highlight){
    var svg=$('svg'); svg.setAttribute('viewBox','0 0 '+W+' '+H); svg.innerHTML='';
    // 세로줄
    for(var i=0;i<C;i++){ svg.appendChild(el('line',{x1:colX(i),y1:topY,x2:colX(i),y2:botY,stroke:'#d4d9e4','stroke-width':2})); }
    // 가로줄
    for(var l=0;l<L;l++){ for(var j=0;j<C-1;j++){ if(rungs[l][j]){ var y=levelY(l);
      svg.appendChild(el('line',{x1:colX(j),y1:y,x2:colX(j+1),y2:y,stroke:'#d4d9e4','stroke-width':2})); } } }
    // 강조 경로
    if(highlight!=null){ var tmp=traceCol(highlight);
      var d='M'+tmp.pts.map(function(p){return p[0]+' '+p[1];}).join(' L');
      svg.appendChild(el('path',{d:d,fill:'none',stroke:'#1aa3e0','stroke-width':4,'stroke-linejoin':'round','stroke-linecap':'round',opacity:0.95}));
    }
    // 위 이름 (클릭)
    for(var i2=0;i2<C;i2++){ (function(i){
      var g=el('g',{class:'lname'});
      g.appendChild(el('rect',{x:colX(i)-30,y:topY-34,width:60,height:26,rx:8,fill:(highlight===i?'#1aa3e0':'#eef2f8')}));
      var tx=el('text',{x:colX(i),y:topY-16,'text-anchor':'middle','font-size':13,'font-weight':700,fill:(highlight===i?'#fff':'#2b2f3a')}); tx.textContent=names[i]||('#'+(i+1));
      g.appendChild(tx); g.addEventListener('click', function(){ pick(i); }); svg.appendChild(g);
    })(i2); }
    // 아래 결과
    for(var i3=0;i3<C;i3++){ var endHi = (highlight!=null && traceCol(highlight).end===i3);
      svg.appendChild(el('rect',{x:colX(i3)-34,y:botY+8,width:68,height:26,rx:8,fill:(endHi?'#1f7a55':'#f3f5f9')}));
      var t2=el('text',{x:colX(i3),y:botY+26,'text-anchor':'middle','font-size':12.5,'font-weight':700,fill:(endHi?'#fff':'#2b2f3a')}); t2.textContent=prizes[i3]||('?'); svg.appendChild(t2);
    }
  }
  function pick(i){ draw(i); var tmp=traceCol(i); toast((names[i]||('#'+(i+1)))+' → '+(prizes[tmp.end]||'?')); }
  function reveal(){
    var html=''; for(var i=0;i<C;i++){ var tmp=traceCol(i); html+='<div class="resrow"><span class="a">'+(names[i]||('#'+(i+1)))+'</span><span class="b">'+(prizes[tmp.end]||'?')+'</span></div>'; }
    $('resbox').innerHTML=html; $('resbox').style.display='';
  }
  function toast(m){ var el=$('toast'); el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1800); }
  $('build').addEventListener('click', build);
  $('reveal').addEventListener('click', reveal);
  build();
</script>
</body>
