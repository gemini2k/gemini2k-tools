<body>

<div class="toolwrap">
  <h1 data-i18n="tool.pw.t">비밀번호 생성기</h1>
  <p class="sub" data-i18n="pw.sub">안전한 무작위 비밀번호를 원하는 조건으로 만들어 드립니다.</p>

  <div class="card">
    <div class="result" style="margin-bottom:1rem;">
      <span class="val" id="out">···</span>
      <button class="btn btn-ghost" id="copy" style="padding:.5rem .8rem;" data-i18n="pw.copy">복사</button>
    </div>
    <div id="bar" style="height:8px;border-radius:999px;background:#EEF0F4;overflow:hidden;">
      <div id="barfill" style="height:100%;width:0;border-radius:999px;transition:width .2s,background .2s;"></div>
    </div>
    <p class="hint" id="strength" style="margin-top:.5rem;"></p>

    <label for="len" style="margin-top:1.2rem;"><span data-i18n="pw.len">길이</span>: <b id="lenval" style="color:var(--text);">16</b></label>
    <input type="range" id="len" min="6" max="40" value="16"/>

    <div class="checks">
      <label class="chk"><input type="checkbox" id="lower" checked/> <span data-i18n="pw.lower">소문자 (a–z)</span></label>
      <label class="chk"><input type="checkbox" id="upper" checked/> <span data-i18n="pw.upper">대문자 (A–Z)</span></label>
      <label class="chk"><input type="checkbox" id="digit" checked/> <span data-i18n="pw.digit">숫자 (0–9)</span></label>
      <label class="chk"><input type="checkbox" id="symbol" checked/> <span data-i18n="pw.symbol">특수문자 (!@#…)</span></label>
      <label class="chk"><input type="checkbox" id="noamb"/> <span data-i18n="pw.noamb">헷갈리는 문자 제외 (Il1O0)</span></label>
    </div>

    <div class="row" style="margin-top:1.3rem;">
      <button class="btn" id="gen" data-i18n="pw.gen">🔄 새로 생성</button>
    </div>
    <p class="hint" data-i18n="pw.hint">암호학적 난수(crypto)로 브라우저에서 생성하며, 어디에도 전송·저장되지 않습니다.</p>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  function T(k){ return window.t ? window.t(k) : k; }
  var SETS = {
    lower: 'abcdefghijklmnopqrstuvwxyz',
    upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    digit: '0123456789',
    symbol: '!@#$%^&*()-_=+[]{};:,.?'
  };
  var AMB = /[Il1O0]/g;
  var out = document.getElementById('out'), len = document.getElementById('len'),
      lenval = document.getElementById('lenval'), strength = document.getElementById('strength'),
      barfill = document.getElementById('barfill');
  var state = { bits: 0, empty: false };
  function toast(m){ var el=document.getElementById('toast'); el.textContent=m; el.classList.add('show');
    clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1600); }
  function rand(max){ // 0..max-1, 편향 없는 암호학적 난수
    var arr = new Uint32Array(1), limit = Math.floor(0xFFFFFFFF / max) * max, x;
    do { crypto.getRandomValues(arr); x = arr[0]; } while (x >= limit);
    return x % max;
  }
  function pick(str){ return str[rand(str.length)]; }
  function selectedSets(){
    var keys = ['lower','upper','digit','symbol'].filter(function(k){ return document.getElementById(k).checked; });
    var noamb = document.getElementById('noamb').checked;
    return keys.map(function(k){ var s = SETS[k]; return noamb ? s.replace(AMB,'') : s; }).filter(function(s){ return s.length; });
  }
  function labelKey(b){ return b<40?'pw.s.weak':b<60?'pw.s.fair':b<80?'pw.s.strong':'pw.s.vstrong'; }
  function colorPct(b){ return b<40?['#E5484D',30]:b<60?['#E8853A',55]:b<80?['#0EA46A',80]:['#0EA46A',100]; }
  function renderStrength(){
    if(state.empty){ barfill.style.width='0'; strength.textContent=''; return; }
    var cp = colorPct(state.bits);
    barfill.style.width = cp[1] + '%'; barfill.style.background = cp[0];
    strength.textContent = T('pw.strength').replace('{label}', T(labelKey(state.bits))).replace('{bits}', Math.round(state.bits));
  }
  function generate(){
    var n = parseInt(len.value,10);
    var sets = selectedSets();
    if(!sets.length){ state.empty = true; out.textContent = T('pw.noset'); renderStrength(); return; }
    var pool = sets.join('');
    var chars = [];
    sets.forEach(function(s){ if(chars.length < n) chars.push(pick(s)); });   // 각 종류 최소 1개
    while(chars.length < n) chars.push(pick(pool));
    for(var i=chars.length-1;i>0;i--){ var j=rand(i+1); var tmp=chars[i]; chars[i]=chars[j]; chars[j]=tmp; } // 셔플
    out.textContent = chars.join('');
    state.empty = false; state.bits = n * Math.log2(pool.length);
    renderStrength();
  }
  len.addEventListener('input', function(){ lenval.textContent = len.value; generate(); });
  ['lower','upper','digit','symbol','noamb'].forEach(function(id){
    document.getElementById(id).addEventListener('change', generate);
  });
  document.getElementById('gen').addEventListener('click', generate);
  document.getElementById('copy').addEventListener('click', function(){
    if(state.empty || !out.textContent){ toast(T('pw.nocopy')); return; }
    navigator.clipboard.writeText(out.textContent).then(function(){toast(T('toast.copied'));})
      .catch(function(){ toast(T('toast.copied')); });
  });
  window.onI18n = function(){ if(state.empty) out.textContent = T('pw.noset'); renderStrength(); };
  generate();
</script>
