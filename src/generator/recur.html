select,input{padding:.55rem .65rem;border:1px solid var(--border);border-radius:10px;background:var(--input-bg);color:var(--text);font-family:inherit;}

<body>
<div class="toolwrap" style="max-width:600px;">
  <h1 data-i18n="b_recur_title">반복 일정 규칙(RRULE) 생성기</h1>
  <p class="sub" data-i18n="b_recur_sub">반복 규칙을 만들고 다음 실행일을 미리 봅니다. 캘린더(iCalendar)에 그대로 넣을 수 있어요.</p>
  <div class="card">
    <div class="field"><label data-i18n="b_recur_lbl_start">시작일시</label><input type="datetime-local" id="start"/></div>
    <div class="field"><label data-i18n="b_recur_lbl_freq">반복 주기</label><div class="inline">
      <select id="freq">
        <option value="DAILY" data-i18n="b_recur_freq_daily">매일</option>
        <option value="WEEKLY" selected data-i18n="b_recur_freq_weekly">매주</option>
        <option value="MONTHLY" data-i18n="b_recur_freq_monthly">매월</option>
        <option value="YEARLY" data-i18n="b_recur_freq_yearly">매년</option>
      </select>
      <span data-i18n="b_recur_lbl_interval">간격</span><input type="number" id="interval" value="1" min="1" style="width:70px;"><span id="iunit" data-i18n="b_recur_unit_weekly">주마다</span>
    </div></div>
    <div class="field" id="wdbox"><label data-i18n="b_recur_lbl_wd">요일 (매주)</label><div class="wd" id="wd"></div></div>
    <div class="field"><label data-i18n="b_recur_lbl_end">종료</label><div class="inline">
      <select id="endtype">
        <option value="count" data-i18n="b_recur_end_count">횟수</option>
        <option value="until" data-i18n="b_recur_end_until">날짜까지</option>
        <option value="never" data-i18n="b_recur_end_never">없음</option>
      </select>
      <input type="number" id="count" value="10" min="1" style="width:80px;">
      <input type="date" id="until" style="display:none;">
    </div></div>
    <div class="field"><label>RRULE</label><div class="out" id="rrule"></div><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_recur_btn_copy">📋 복사</button></div>
    <div class="field"><label data-i18n="b_recur_lbl_list">다음 일정 (최대 10개)</label><div class="list" id="list"></div></div>
    <div class="note" data-i18n-html="b_recur_note">오픈소스 <b>rrule.js</b>(BSD-3, <a href="https://github.com/jkbrzt/rrule" target="_blank" rel="noopener">jkbrzt/rrule</a>)를 자체 호스팅합니다. RFC 5545 기준. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/rrule-2/rrule.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var RRule=rrule.RRule;
  var dayKeys=[['MO','b_recur_day_mo'],['TU','b_recur_day_tu'],['WE','b_recur_day_we'],['TH','b_recur_day_th'],['FR','b_recur_day_fr'],['SA','b_recur_day_sa'],['SU','b_recur_day_su']];
  function renderWd(){
    var wd=$('wd'); wd.innerHTML='';
    dayKeys.forEach(function(d,i){
      var l=document.createElement('label');
      var cb=document.createElement('input'); cb.type='checkbox'; cb.value=d[0]; if(i<5)cb.checked=true;
      var sp=document.createElement('span'); sp.setAttribute('data-i18n',d[1]); sp.textContent=t(d[1]);
      l.appendChild(cb); l.appendChild(sp); wd.appendChild(l);
    });
  }
  function pad(n){return(n<10?'0':'')+n;}
  (function(){ var n=new Date(); n.setMinutes(0,0,0); $('start').value=n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate())+'T09:00';
    var u=new Date(n.getTime()+1000*60*60*24*60); $('until').value=u.getFullYear()+'-'+pad(u.getMonth()+1)+'-'+pad(u.getDate()); })();
  var unitMap={DAILY:'b_recur_unit_daily',WEEKLY:'b_recur_unit_weekly',MONTHLY:'b_recur_unit_monthly',YEARLY:'b_recur_unit_yearly'};
  function build(){
    var freq=$('freq').value; $('iunit').textContent=t(unitMap[freq]);
    $('wdbox').style.display=freq==='WEEKLY'?'':'none';
    var opts={freq:RRule[freq],interval:Math.max(1,+$('interval').value||1),dtstart:new Date($('start').value||Date.now())};
    if(freq==='WEEKLY'){ var sel=[]; Array.prototype.forEach.call($('wd').querySelectorAll('input:checked'),function(c){sel.push(RRule[c.value]);}); if(sel.length)opts.byweekday=sel; }
    var et=$('endtype').value; $('count').style.display=et==='count'?'':'none'; $('until').style.display=et==='until'?'':'none';
    if(et==='count')opts.count=Math.max(1,+$('count').value||10); else if(et==='until')opts.until=new Date($('until').value);
    var rule=new RRule(opts);
    $('rrule').textContent=rule.toString(); window._r=rule.toString();
    var all=et==='never'?rule.all(function(d,i){return i<10;}):rule.all();
    var items=all.slice(0,10).map(function(d){ return '• '+d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes()); });
    $('list').innerHTML=items.join('<br>')||t('b_recur_none');
  }
  renderWd();
  ['start','freq','interval','endtype','count','until'].forEach(function(id){$(id).addEventListener('input',build);$(id).addEventListener('change',build);});
  $('wd').addEventListener('change',build);
  $('copy').addEventListener('click',function(){if(window._r)navigator.clipboard.writeText(window._r).then(function(){toast(t('b_recur_toast_copied'));});});
  window.onI18n=function(){renderWd();build();};
  build();
</script>
</body>
</html>
