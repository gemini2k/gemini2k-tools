<body>
<div class="toolwrap" style="max-width:560px;">
  <h1>주사위·랜덤 숫자</h1>
  <p class="sub">주사위를 굴리거나 원하는 범위에서 무작위 숫자를 뽑습니다. 보드게임·추첨·제비뽑기에 쓰세요.</p>
  <div class="card">
    <div class="row">
      <label>주사위 개수 <input id="cnt" type="number" min="1" max="10" value="2"/></label>
      <label>면 수 <input id="faces" type="number" min="2" max="100" value="6"/></label>
    </div>
    <div class="dice" id="dice"></div>
    <div class="big" id="sum"></div>
    <button class="btn" id="roll" type="button" style="width:100%;">🎲 굴리기</button>
  </div>
  <div class="card" style="margin-top:1rem;">
    <div class="row">
      <label>최소 <input id="min" type="number" value="1"/></label>
      <label>최대 <input id="max" type="number" value="100"/></label>
      <label>개수 <input id="n" type="number" min="1" max="100" value="1"/></label>
      <label><input type="checkbox" id="uniq"/> 중복 없이</label>
    </div>
    <button class="btn btn-ghost" id="pick" type="button" style="width:100%;">🔀 무작위 숫자 뽑기</button>
    <div class="big" id="rand" style="font-size:1.6rem;"></div>
    <div class="note">암호학적 난수(crypto)로 공정하게 추첨합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function rnd(n){ if(window.crypto&&crypto.getRandomValues){ var a=new Uint32Array(1); crypto.getRandomValues(a); return a[0]%n; } return Math.floor(Math.random()*n); }
  var PIPS=['','⚀','⚁','⚂','⚃','⚄','⚅'];
  function roll(){ var cnt=Math.max(1,Math.min(10,parseInt($('cnt').value,10)||1)), f=Math.max(2,Math.min(100,parseInt($('faces').value,10)||6));
    var vals=[],sum=0; for(var i=0;i<cnt;i++){ var v=rnd(f)+1; vals.push(v); sum+=v; }
    $('dice').innerHTML=vals.map(function(v){ return '<div class="die">'+(f===6?PIPS[v]:v)+'</div>'; }).join('');
    $('sum').textContent='합계 '+sum;
  }
  function pick(){ var mn=parseInt($('min').value,10)||0, mx=parseInt($('max').value,10)||0; if(mx<mn){var t=mn;mn=mx;mx=t;}
    var n=Math.max(1,Math.min(100,parseInt($('n').value,10)||1)), range=mx-mn+1, uniq=$('uniq').checked;
    if(uniq && n>range){ $('rand').textContent='범위보다 많이 뽑을 수 없어요'; return; }
    var out=[],used={}; while(out.length<n){ var v=mn+rnd(range); if(uniq){ if(used[v])continue; used[v]=1; } out.push(v); }
    $('rand').textContent=out.join(', ');
  }
  $('roll').addEventListener('click',roll);
  $('pick').addEventListener('click',pick);
  roll();
</script>
</body>
