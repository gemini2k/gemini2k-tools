<body>
<div class="toolwrap" style="max-width:560px;">
  <h1 data-i18n="b_wifiqr_title">WiFi QR코드 생성기</h1>
  <p class="sub" data-i18n="b_wifiqr_sub">와이파이 이름과 비밀번호로 QR을 만들면, 스캔만으로 자동 연결됩니다. 매장·가정에 붙여두세요.</p>
  <div class="card">
    <div class="fld"><label data-i18n="b_wifiqr_label_ssid">WiFi 이름 (SSID)</label><input id="ssid" type="text" value="MyWiFi"/></div>
    <div class="fld"><label data-i18n="b_wifiqr_label_pw">비밀번호</label><input id="pw" type="text" value="password123"/></div>
    <div class="fld"><label data-i18n="b_wifiqr_label_enc">보안 방식</label><select id="enc"><option value="WPA" data-i18n="b_wifiqr_opt_wpa">WPA/WPA2</option><option value="WEP" data-i18n="b_wifiqr_opt_wep">WEP</option><option value="nopass" data-i18n="b_wifiqr_opt_nopass">없음(개방)</option></select></div>
    <label style="font-size:.85rem;font-weight:600;display:inline-flex;gap:.4rem;align-items:center;"><input type="checkbox" id="hidden"/> <span data-i18n="b_wifiqr_hidden">숨겨진 네트워크</span></label>
    <div class="qrwrap"><div id="qr"></div></div>
    <div class="actions"><button class="btn" id="png" type="button" data-i18n="b_wifiqr_btn_png">⬇️ PNG 다운로드</button></div>
    <div class="note" data-i18n="b_wifiqr_note">QR에는 WiFi 접속 정보가 담깁니다(표준 WIFI: 형식). 비밀번호가 포함되니 신뢰할 수 있는 곳에만 공유하세요. 오픈소스 qr-code-styling(MIT) 자체 호스팅, 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/qrstyling-1.6/qr-code-styling.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function esc(s){ return String(s).replace(/([\\;,:"])/g,'\\$1'); }
  var qr=null;
  function build(){ var enc=$('enc').value, ssid=esc($('ssid').value), pw=esc($('pw').value), hid=$('hidden').checked?'true':'false';
    var data = enc==='nopass' ? 'WIFI:T:nopass;S:'+ssid+';;' : 'WIFI:T:'+enc+';S:'+ssid+';P:'+pw+';H:'+hid+';;';
    var opt={width:260,height:260,data:data,margin:8,dotsOptions:{color:'#111',type:'rounded'},backgroundOptions:{color:'#fff'}};
    if(!qr){ qr=new QRCodeStyling(opt); $('qr').innerHTML=''; qr.append($('qr')); } else qr.update(opt);
  }
  ['ssid','pw','enc','hidden'].forEach(function(id){$(id).addEventListener('input',build);$(id).addEventListener('change',build);});
  $('png').addEventListener('click',function(){ if(qr)qr.download({name:'wifi-qr',extension:'png'}); });
  build();
</script>
</body>
