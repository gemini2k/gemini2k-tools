<script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"디자인 QR코드 생성기","description":"로고·색·모양을 넣은 디자인 QR코드를 생성합니다(qr-code-styling).","url":"https://gemini2k.co.kr/qrstyle.html","applicationCategory":"UtilitiesApplication","operatingSystem":"Web","inLanguage":"ko","isAccessibleForFree":true,"license":"https://opensource.org/licenses/MIT","offers":{"@type":"Offer","price":"0","priceCurrency":"KRW"},"publisher":{"@type":"Organization","name":"빛의여행(gemini2k) 도구","url":"https://gemini2k.co.kr/"}}</script>

<body>
<div class="toolwrap" style="max-width:680px;">
  <h1>디자인 QR코드 생성기</h1>
  <p class="sub">색·점 모양·가운데 로고를 넣어 개성 있는 QR코드를 만들고 PNG로 저장합니다.</p>
  <div class="card">
    <div class="grid">
      <label style="grid-column:1/3;">내용(URL·텍스트)<input id="data" type="text" value="https://gemini2k.co.kr"/></label>
      <label>점 색<input id="fg" type="color" value="#5B5BF5"/></label>
      <label>배경색<input id="bg" type="color" value="#ffffff"/></label>
      <label>점 모양<select id="dots"><option value="rounded">둥근</option><option value="dots">도트</option><option value="square">사각</option><option value="classy">클래시</option><option value="extra-rounded">아주둥근</option></select></label>
      <label>모서리 모양<select id="corner"><option value="extra-rounded">둥근</option><option value="dot">도트</option><option value="square">사각</option></select></label>
      <label style="grid-column:1/3;">가운데 로고(선택)<input id="logo" type="file" accept="image/*"/></label>
    </div>
    <div class="qrwrap"><div id="qr"></div></div>
    <div class="actions"><button class="btn" id="png" type="button">⬇️ PNG 다운로드</button><button class="btn btn-ghost" id="svg" type="button">⬇️ SVG</button></div>
    <div class="note">오픈소스 <b>qr-code-styling</b>(MIT, <a href="https://github.com/kozakdenys/qr-code-styling" target="_blank" rel="noopener">kozakdenys/qr-code-styling</a>)을 자체 호스팅합니다. 로고가 너무 크면 인식률이 떨어질 수 있어요. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/qrstyling-1.6/qr-code-styling.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var logoData=null, qr=null;
  function build(){ var opt={ width:280,height:280,data:$('data').value||' ',margin:8,
    dotsOptions:{color:$('fg').value,type:$('dots').value}, backgroundOptions:{color:$('bg').value},
    cornersSquareOptions:{type:$('corner').value,color:$('fg').value} };
    if(logoData){ opt.image=logoData; opt.imageOptions={crossOrigin:'anonymous',margin:4,imageSize:0.32}; }
    if(!qr){ qr=new QRCodeStyling(opt); $('qr').innerHTML=''; qr.append($('qr')); } else qr.update(opt);
  }
  ['data','fg','bg','dots','corner'].forEach(function(id){$(id).addEventListener('input',build);$(id).addEventListener('change',build);});
  $('logo').addEventListener('change',function(e){ var f=e.target.files[0]; if(!f){logoData=null;build();return;} var r=new FileReader(); r.onload=function(){logoData=r.result;build();}; r.readAsDataURL(f); });
  $('png').addEventListener('click',function(){ if(qr)qr.download({name:'qr',extension:'png'}); });
  $('svg').addEventListener('click',function(){ if(qr)qr.download({name:'qr',extension:'svg'}); });
  build();
</script>
</body>
