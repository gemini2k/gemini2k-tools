<body>
<div class="toolwrap" style="max-width:600px;">
  <h1>연락처(vCard) QR코드</h1>
  <p class="sub">연락처 정보를 넣으면 QR을 만들어 줍니다. 스캔하면 휴대폰 주소록에 바로 저장돼요. 명함에 딱!</p>
  <div class="card">
    <div class="grid">
      <label>이름<input id="name" type="text" value="홍길동"/></label>
      <label>회사<input id="org" type="text" value="빛의여행"/></label>
      <label>직함<input id="title" type="text" value="대표"/></label>
      <label>전화<input id="tel" type="text" value="010-1234-5678"/></label>
      <label>이메일<input id="email" type="text" value="hong@example.com"/></label>
      <label>웹사이트<input id="url" type="text" value="https://gemini2k.co.kr"/></label>
    </div>
    <div class="qrwrap"><div id="qr"></div></div>
    <div class="actions"><button class="btn" id="png" type="button">⬇️ PNG 다운로드</button></div>
    <div class="note">표준 vCard 3.0 형식으로 만듭니다. 대부분의 스마트폰 기본 카메라로 스캔하면 ‘연락처 추가’가 떠요. 오픈소스 qr-code-styling(MIT) 자체 호스팅, 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/qrstyling-1.6/qr-code-styling.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var qr=null;
  function vcard(){ var v=function(id){return $(id).value.trim();};
    return 'BEGIN:VCARD\nVERSION:3.0\nN:'+v('name')+'\nFN:'+v('name')+'\nORG:'+v('org')+'\nTITLE:'+v('title')+'\nTEL;TYPE=CELL:'+v('tel')+'\nEMAIL:'+v('email')+'\nURL:'+v('url')+'\nEND:VCARD'; }
  function build(){ var opt={width:260,height:260,data:vcard(),margin:8,dotsOptions:{color:'#111',type:'rounded'},backgroundOptions:{color:'#fff'}};
    if(!qr){ qr=new QRCodeStyling(opt); $('qr').innerHTML=''; qr.append($('qr')); } else qr.update(opt); }
  ['name','org','title','tel','email','url'].forEach(function(id){$(id).addEventListener('input',build);});
  $('png').addEventListener('click',function(){ if(qr)qr.download({name:'vcard-qr',extension:'png'}); });
  build();
</script>
