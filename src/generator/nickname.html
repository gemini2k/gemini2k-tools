<body>
<div class="toolwrap" style="max-width:560px;">
  <h1>랜덤 닉네임 생성기</h1>
  <p class="sub">버튼을 누르면 귀엽고 재미있는 닉네임을 만들어 줍니다. 클릭하면 복사돼요.</p>
  <div class="card">
    <div class="big" id="main">생성 버튼을 누르세요</div>
    <div class="opts"><label><input type="checkbox" id="num"/> 숫자 붙이기</label><label><input type="checkbox" id="space"/> 띄어쓰기</label></div>
    <button class="btn" id="gen" type="button" style="width:100%;">🎲 닉네임 10개 생성</button>
    <div class="list" id="list"></div>
    <div class="note">형용사와 명사 목록에서 무작위로 조합합니다. 재미용 아이디어 도구예요. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var ADJ='행복한 졸린 용감한 엉뚱한 반짝이는 포근한 도도한 새침한 든든한 상큼한 느긋한 부지런한 귀여운 멋진 신비한 따뜻한 시원한 통통한 날쌘 우아한 깜찍한 영리한 씩씩한 차분한 활기찬 달콤한 수줍은 다정한 무뚝뚝한 호기심많은'.split(' ');
  var NOUN='판다 너구리 고양이 강아지 여우 곰 토끼 펭귄 수달 다람쥐 부엉이 고래 돌고래 햄스터 코알라 사자 호랑이 사슴 거북이 문어 별 달 구름 바람 파도 단풍 도토리 감자 만두 떡볶이 마카롱 라떼 솜사탕 무지개 햇살'.split(' ');
  function rnd(a){ return a[Math.floor(Math.random()*a.length)]; }
  function one(){ var sp=$('space').checked?' ':''; var n=rnd(ADJ)+sp+rnd(NOUN); if($('num').checked)n+=(Math.floor(Math.random()*90)+10); return n; }
  function gen(){ $('main').textContent=one(); var arr=[]; for(var i=0;i<10;i++)arr.push(one());
    $('list').innerHTML=arr.map(function(n){return '<div>'+n+'</div>';}).join(''); }
  $('gen').addEventListener('click',gen);
  $('main').addEventListener('click',function(){navigator.clipboard.writeText($('main').textContent).then(function(){toast('복사됐습니다');});});
  $('list').addEventListener('click',function(e){var d=e.target.closest('div');if(d&&d.textContent){navigator.clipboard.writeText(d.textContent).then(function(){toast('복사: '+d.textContent);});}});
  gen();
</script>
