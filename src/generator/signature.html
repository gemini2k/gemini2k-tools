  .pad{border:2px dashed var(--border);border-radius:12px;background:#fff;touch-action:none;width:100%;display:block;cursor:crosshair;}
  .opts{display:flex;gap:1rem;align-items:center;margin:.8rem 0;font-size:.9rem;flex-wrap:wrap;}.opts label{display:inline-flex;gap:.4rem;align-items:center;font-weight:600;}

  .note{margin-top:1.1rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"전자 서명 패드","description":"서명을 그려 투명 배경 PNG로 저장합니다(signature_pad).","url":"https://gemini2k.co.kr/signature.html","applicationCategory":"BusinessApplication","operatingSystem":"Web","inLanguage":"ko","isAccessibleForFree":true,"license":"https://opensource.org/licenses/MIT","offers":{"@type":"Offer","price":"0","priceCurrency":"KRW"},"publisher":{"@type":"Organization","name":"빛의여행(gemini2k) 도구","url":"https://gemini2k.co.kr/"}}</script>

<body>
<div class="toolwrap" style="max-width:680px;">
  <h1>전자 서명 패드</h1>
  <p class="sub">아래 영역에 마우스나 손가락으로 서명하고 투명 배경 PNG로 저장하세요.</p>
  <div class="card">
    <div class="opts"><label>펜 색<input id="color" type="color" value="#111111"/></label><label>굵기 <input id="w" type="range" min="1" max="6" value="2.5" step="0.5"/></label><label><input type="checkbox" id="bg"/> 흰 배경 포함</label></div>
    <canvas class="pad" id="pad" width="640" height="260"></canvas>
    <div class="actions" style="margin-top:.7rem;"><button class="btn" id="dl" type="button">⬇️ PNG 저장</button><button class="btn btn-ghost" id="undo" type="button">↶ 실행취소</button><button class="btn btn-ghost" id="clear" type="button">지우기</button></div>
    <div class="note">오픈소스 <b>signature_pad</b>(MIT, <a href="https://github.com/szimek/signature_pad" target="_blank" rel="noopener">szimek/signature_pad</a>)을 자체 호스팅합니다. 기본은 투명 배경으로 저장되며, 서명 이미지는 서버로 전송되지 않습니다.</div>
  </div>
</div>
<script src="/vendor/signature_pad-4/signature_pad.umd.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var cv=$('pad');
  function fit(){ var ratio=Math.max(1,window.devicePixelRatio||1); var w=cv.offsetWidth||640; cv.width=w*ratio; cv.height=260*ratio; cv.getContext('2d').scale(ratio,ratio); }
  var pad;
  function init(){ fit(); pad=new SignaturePad(cv,{penColor:$('color').value, minWidth:+$('w').value*0.6, maxWidth:+$('w').value*1.4, backgroundColor:'rgba(0,0,0,0)'}); }
  init();
  $('color').addEventListener('input',function(){ pad.penColor=$('color').value; });
  $('w').addEventListener('input',function(){ pad.minWidth=+$('w').value*0.6; pad.maxWidth=+$('w').value*1.4; });
  $('clear').addEventListener('click',function(){ pad.clear(); });
  $('undo').addEventListener('click',function(){ var d=pad.toData(); if(d.length){ d.pop(); pad.fromData(d); } });
  $('dl').addEventListener('click',function(){ if(pad.isEmpty()){toast('먼저 서명해 주세요');return;}
    var url; if($('bg').checked){ var tmp=document.createElement('canvas');tmp.width=cv.width;tmp.height=cv.height;var x=tmp.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,tmp.width,tmp.height);x.drawImage(cv,0,0);url=tmp.toDataURL('image/png'); }
    else url=pad.toDataURL('image/png');
    var a=document.createElement('a');a.href=url;a.download='signature.png';document.body.appendChild(a);a.click();setTimeout(function(){a.remove();},100); });
</script>
</body>
