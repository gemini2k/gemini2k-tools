<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_icalview_title">ICS 캘린더 뷰어</h1>
  <p class="sub" data-i18n="b_icalview_sub">ICS(iCalendar) 파일이나 내용을 넣으면 일정을 표로 정리해 줍니다.</p>
  <div class="card">
    <div class="drop" id="drop"><span data-i18n="b_icalview_drop">📅 .ics 파일을 끌어다 놓거나 클릭해서 선택</span><input type="file" id="file" accept=".ics,text/calendar" hidden/></div>
    <textarea id="in">BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:팀 회의
DTSTART:20260701T090000
DTEND:20260701T100000
LOCATION:회의실 A
RRULE:FREQ=WEEKLY;COUNT=4
END:VEVENT
BEGIN:VEVENT
SUMMARY:점심 약속
DTSTART:20260702T120000
LOCATION:식당
END:VEVENT
END:VCALENDAR</textarea>
    <div class="err" id="err"></div>
    <table><thead><tr><th data-i18n="b_icalview_col_title">제목</th><th data-i18n="b_icalview_col_start">시작</th><th data-i18n="b_icalview_col_end">종료</th><th data-i18n="b_icalview_col_location">장소</th><th data-i18n="b_icalview_col_rrule">반복</th></tr></thead><tbody id="tb"></tbody></table>
    <div class="note" data-i18n-html="b_icalview_note">오픈소스 <b>ical.js</b>(MPL-2.0, Mozilla, <a href="https://github.com/kewisch/ical.js" target="_blank" rel="noopener">kewisch/ical.js</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어지며 파일은 업로드되지 않습니다.</div>
  </div>
</div>
<script src="/vendor/icaljs-1/ical.min.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var drop=$('drop'), file=$('file');
  drop.addEventListener('click',function(){file.click();});
  drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('drag');});
  drop.addEventListener('dragleave',function(){drop.classList.remove('drag');});
  drop.addEventListener('drop',function(e){e.preventDefault();drop.classList.remove('drag');if(e.dataTransfer.files[0])read(e.dataTransfer.files[0]);});
  file.addEventListener('change',function(){if(file.files[0])read(file.files[0]);});
  function read(f){ var r=new FileReader(); r.onload=function(){ $('in').value=r.result; run(); }; r.readAsText(f); }
  function fmt(tmp_t){ if(!tmp_t)return '—'; try{ var d=tmp_t.toJSDate(); function p(n){return(n<10?'0':'')+n;} return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes()); }catch(ex){return String(tmp_t);} }
  function run(){ $('err').textContent=''; try{
      var jcal=ICAL.parse($('in').value); var comp=new ICAL.Component(jcal);
      var evts=comp.getAllSubcomponents('vevent');
      if(!evts.length){ $('tb').innerHTML='<tr><td colspan="5">'+t('b_icalview_no_events')+'</td></tr>'; return; }
      $('tb').innerHTML=evts.map(function(ve){ var ev=new ICAL.Event(ve);
        var rrule=ve.getFirstPropertyValue('rrule'); var rr=rrule?(rrule.toString?rrule.toString():String(rrule)):'—';
        return '<tr><td>'+(ev.summary||'—')+'</td><td>'+fmt(ev.startDate)+'</td><td>'+fmt(ev.endDate)+'</td><td>'+(ev.location||'—')+'</td><td>'+rr+'</td></tr>'; }).join('');
    }catch(ex){ $('err').textContent=t('b_icalview_parse_error')+ex.message; $('tb').innerHTML=''; } }
  $('in').addEventListener('input',run);
  window.onI18n=run;
  run();
</script>
</body>
