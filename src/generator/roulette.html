<body>
<div class="toolwrap" style="max-width:760px;">
  <h1 data-i18n="b_roulette_title">돌림판 추첨기</h1>
  <p class="sub" data-i18n="b_roulette_sub">항목을 적고 돌리면 무작위로 하나를 뽑아 줍니다. 점심 메뉴·당첨자·발표 순서 정하기에 딱이에요.</p>

  <div class="howto"><span class="ic">📖</span><div><b data-i18n="b_roulette_howto_title">사용 방법</b><ol>
    <li data-i18n="b_roulette_howto_1">오른쪽에 항목을 한 줄에 하나씩 입력합니다 (2개 이상)</li>
    <li data-i18n="b_roulette_howto_2">'돌리기'를 누르면 돌림판이 회전하고 결과가 나옵니다</li>
    <li data-i18n="b_roulette_howto_3">'당첨 시 제거'를 켜면 뽑힌 항목이 사라져 순서 정하기에 좋아요</li>
  </ol></div></div>

        <div class="wheelwrap"><div class="ptr">▼</div><canvas id="wheel" width="360" height="360"></canvas></div>
        <div class="spinbtn"><button class="btn" id="spin" type="button" style="width:100%;" data-i18n="b_roulette_btn_spin">🎯 돌리기</button></div>

      </div>

        <label style="font-weight:700;font-size:.85rem;" data-i18n="b_roulette_label_items">항목 (한 줄에 하나)</label>
        <textarea id="items">짜장면
짬뽕
탕수육
김치찌개
돈까스</textarea>
        <div class="opts"><label><input type="checkbox" id="remove"/> <span data-i18n="b_roulette_opt_remove">당첨 시 제거</span></label></div>
      </div>
    </div>
    <div class="note" data-i18n="b_roulette_note">결과는 암호학적 난수가 아닌 일반 난수로 공정하게 무작위 선택됩니다. 항목 색상은 자동 배정됩니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>

<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var cv=$('wheel'), x=cv.getContext('2d'), W=cv.width, H=cv.height, cx=W/2, cy=H/2, R=W/2-6;
  var angle=0, spinning=false;
  var COLORS=['#5B5BF5','#15C39A','#F59E0B','#EF4444','#A855F7','#3D7BF0','#EC4899','#10B981','#F97316','#6366F1','#14B8A6','#E11D48'];
  function items(){ return $('items').value.split(/\r?\n/).map(function(s){return s.trim();}).filter(Boolean); }
  function draw(){
    var arr=items(); x.clearRect(0,0,W,H); if(!arr.length){ x.fillStyle='#888'; x.textAlign='center'; x.fillText(t('b_roulette_canvas_empty'),cx,cy); return; }
    var n=arr.length, seg=Math.PI*2/n;
    for(var i=0;i<n;i++){ var a0=angle+i*seg, a1=a0+seg;
      x.beginPath(); x.moveTo(cx,cy); x.arc(cx,cy,R,a0,a1); x.closePath(); x.fillStyle=COLORS[i%COLORS.length]; x.fill();
      x.save(); x.translate(cx,cy); x.rotate(a0+seg/2); x.textAlign='right'; x.fillStyle='#fff'; x.font='bold 15px Pretendard,sans-serif';
      var label=arr[i].length>10?arr[i].slice(0,9)+'…':arr[i]; x.fillText(label, R-12, 5); x.restore();
    }
    x.beginPath(); x.arc(cx,cy,26,0,Math.PI*2); x.fillStyle='#fff'; x.fill(); x.strokeStyle='var(--border)'; x.lineWidth=2; x.stroke();
  }
  function spin(){ var arr=items(); if(spinning||arr.length<2){ if(arr.length<2)$('winner').textContent=t('b_roulette_msg_min2'); return; }
    spinning=true; $('winner').textContent=''; $('spin').disabled=true;
    var n=arr.length, seg=Math.PI*2/n;
    var target=(Math.random()*n)|0;
    // 포인터(상단, -90도)가 가리키도록 회전량 계산
    var spins=5+Math.random()*3;
    var pointer=-Math.PI/2;
    var targetCenter=target*seg+seg/2;
    var finalAngle=spins*Math.PI*2 + (pointer - targetCenter);
    var start=angle, dur=4200+Math.random()*800, t0=performance.now();
    function step(now){ var p=Math.min(1,(now-t0)/dur); var e=1-Math.pow(1-p,3); angle=start+(finalAngle-start)*e; draw();
      if(p<1){ requestAnimationFrame(step); } else { spinning=false; $('spin').disabled=false; angle=((finalAngle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
        $('winner').textContent='🎉 '+arr[target];
        if($('remove').checked){ arr.splice(target,1); $('items').value=arr.join('\n'); draw(); }
        window._winner=arr[target]||$('winner').textContent;
      } }
    requestAnimationFrame(step);
  }
  $('items').addEventListener('input',function(){ if(!spinning) draw(); });
  $('spin').addEventListener('click',spin);
  draw();
  window._spinNow=spin;
  window.onI18n=draw;
</script>
