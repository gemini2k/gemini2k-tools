<style>
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem 1rem;margin-bottom:1rem;}
  .grid label{display:flex;flex-direction:column;gap:.25rem;font-size:.78rem;font-weight:700;color:var(--muted);}
  .grid input[type=text],.grid input[type=number]{padding:.5rem .6rem;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text);font-family:inherit;}
  .grid input[type=color]{width:46px;height:36px;padding:0;border:1px solid var(--border);border-radius:8px;background:none;}
  .cvwrap{text-align:center;border:1px solid var(--border);border-radius:12px;overflow:auto;background:var(--surface);padding:.5rem;}canvas{max-width:100%;height:auto;}
  .actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.8rem;}
  .note{margin-top:1.1rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}

<body>
<div class="toolwrap" style="max-width:640px;">
  <h1>플레이스홀더 이미지 생성기</h1>
  <p class="sub">원하는 크기·색·문구의 더미(자리표시) 이미지를 만들어 저장합니다. 목업·테스트에 쓰세요.</p>
  <div class="card">
    <div class="grid">
      <label>가로(px)<input id="w" type="number" value="600"/></label>
      <label>세로(px)<input id="h" type="number" value="400"/></label>
      <label>배경색<input id="bg" type="color" value="#cccccc"/></label>
      <label>글자색<input id="fg" type="color" value="#666666"/></label>
      <label style="grid-column:1/3;">문구 (비우면 크기 표시)<input id="txt" type="text" placeholder="예: PHOTO"/></label>
    </div>
    <div class="cvwrap"><canvas id="cv"></canvas></div>
    <div class="actions"><button class="btn" id="dl" type="button">⬇️ PNG 다운로드</button><button class="btn btn-ghost" id="copy" type="button">📋 Data URI 복사</button></div>
    <div class="note">외부 placeholder 서비스 없이 브라우저에서 직접 생성하므로 인터넷 없이도 동작하고 추적이 없습니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var cv=$('cv'),x=cv.getContext('2d');
  function render(){ var w=Math.max(1,Math.min(4000,+$('w').value||1)),h=Math.max(1,Math.min(4000,+$('h').value||1));
    cv.width=w;cv.height=h; x.fillStyle=$('bg').value; x.fillRect(0,0,w,h);
    x.fillStyle=$('fg').value; var txt=$('txt').value||(w+' × '+h);
    var fs=Math.max(10,Math.min(w,h)/(txt.length>6?6:4)); x.font='bold '+fs+'px Pretendard,sans-serif'; x.textAlign='center'; x.textBaseline='middle';
    x.fillText(txt,w/2,h/2);
    x.strokeStyle=$('fg').value; x.globalAlpha=.4; x.lineWidth=Math.max(1,Math.min(w,h)/200); x.strokeRect(x.lineWidth/2,x.lineWidth/2,w-x.lineWidth,h-x.lineWidth); x.globalAlpha=1;
  }
  ['w','h','bg','fg','txt'].forEach(function(id){$(id).addEventListener('input',render);});
  $('dl').addEventListener('click',function(){cv.toBlob(function(b){var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='placeholder_'+cv.width+'x'+cv.height+'.png';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},120);});});
  $('copy').addEventListener('click',function(){navigator.clipboard.writeText(cv.toDataURL('image/png')).then(function(){toast('Data URI 복사됨');});});
  render();
</script>
</body>
