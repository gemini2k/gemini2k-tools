<body>
<div class="toolwrap" style="max-width:620px;">
  <h1 data-i18n="b_confetti_title">컨페티(축하 효과) 생성기</h1>
  <p class="sub" data-i18n="b_confetti_sub">버튼을 누르면 축하 효과가 터집니다. 마음에 드는 효과의 코드를 복사해 쓰세요.</p>
  <div class="card">
    <div class="btns">
      <button data-fx="basic" type="button" data-i18n="b_confetti_fx_basic">🎉 기본</button>
      <button data-fx="fireworks" type="button" data-i18n="b_confetti_fx_fireworks">🎆 폭죽</button>
      <button data-fx="cannon" type="button" data-i18n="b_confetti_fx_cannon">💥 좌우 대포</button>
      <button data-fx="stars" type="button" data-i18n="b_confetti_fx_stars">⭐ 별</button>
      <button data-fx="rain" type="button" data-i18n="b_confetti_fx_rain">🌧️ 색종이 비</button>
    </div>
    <div class="out" id="code"></div>
    <button class="btn btn-ghost" id="copy" type="button" style="margin-top:.5rem;" data-i18n="b_confetti_copy_btn">📋 코드 복사</button>
    <div class="note" data-i18n-html="b_confetti_note">오픈소스 <b>canvas-confetti</b>(ISC, <a href="https://github.com/catdad/canvas-confetti" target="_blank" rel="noopener">catdad/canvas-confetti</a>)를 자체 호스팅합니다. 코드를 쓰려면 라이브러리를 함께 불러와야 합니다. 모든 효과는 브라우저에서만 동작합니다.</div>
  </div>
</div>
<script src="/vendor/confetti-1/confetti.browser.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var snippets={
    basic:"confetti({ particleCount: 120, spread: 70, origin: { y: 0.6 } });",
    fireworks:"var end = Date.now() + 1500;\n(function frame(){\n  confetti({ particleCount: 6, angle: 60, spread: 55, origin: { x: 0 } });\n  confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1 } });\n  if (Date.now() < end) requestAnimationFrame(frame);\n})();",
    cannon:"confetti({ particleCount: 80, angle: 60, spread: 55, origin: { x: 0 } });\nconfetti({ particleCount: 80, angle: 120, spread: 55, origin: { x: 1 } });",
    stars:"confetti({ particleCount: 60, spread: 100, shapes: ['star'], colors: ['#FFD700','#FFA500','#fff'] });",
    rain:"confetti({ particleCount: 200, spread: 160, startVelocity: 30, gravity: 0.6, ticks: 200, origin: { y: 0 } });"
  };
  function fire(fx){
    if(fx==='basic')confetti({particleCount:120,spread:70,origin:{y:0.6}});
    else if(fx==='fireworks'){ var end=Date.now()+1500; (function frame(){ confetti({particleCount:6,angle:60,spread:55,origin:{x:0}}); confetti({particleCount:6,angle:120,spread:55,origin:{x:1}}); if(Date.now()<end)requestAnimationFrame(frame); })(); }
    else if(fx==='cannon'){ confetti({particleCount:80,angle:60,spread:55,origin:{x:0}}); confetti({particleCount:80,angle:120,spread:55,origin:{x:1}}); }
    else if(fx==='stars')confetti({particleCount:60,spread:100,shapes:['star'],colors:['#FFD700','#FFA500','#fff']});
    else if(fx==='rain')confetti({particleCount:200,spread:160,startVelocity:30,gravity:0.6,ticks:200,origin:{y:0}});
    $('code').textContent=snippets[fx]; window._o=snippets[fx];
  }
  document.querySelector('.btns').addEventListener('click',function(e){var b=e.target.closest('button');if(b)fire(b.dataset.fx);});
  $('copy').addEventListener('click',function(){if(window._o)navigator.clipboard.writeText(window._o).then(function(){toast(t('b_confetti_copied'));});});
  fire('basic');
</script>
</body>
