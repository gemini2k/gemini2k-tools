<style>
  textarea{width:100%;min-height:110px;padding:.7rem .8rem;border:1px solid var(--border);border-radius:11px;background:var(--input-bg);
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.84rem;color:var(--text);resize:vertical;}
  .ctl{display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-end;margin:1rem 0;}
  .fld{display:flex;flex-direction:column;gap:.3rem;} .fld label{margin:0;font-size:.8rem;font-weight:700;color:var(--muted);}
  .fld select{padding:.5rem .6rem;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text);font-family:inherit;}
  .tbl-scroll{overflow-x:auto;border:1px solid var(--border);border-radius:12px;margin-top:.8rem;}
  table{border-collapse:collapse;width:100%;font-size:.88rem;} th,td{border-bottom:1px solid var(--border);padding:.5rem .8rem;text-align:left;white-space:nowrap;}
  th{background:var(--ground);font-size:.74rem;text-transform:uppercase;color:var(--muted);} td.num{text-align:right;font-variant-numeric:tabular-nums;}
  .actions{display:flex;flex-wrap:wrap;gap:.6rem;}
  .note{margin-top:1.1rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}
  .hide{display:none;}

<body>
<div class="toolwrap" style="max-width:820px;">
  <h1 data-i18n="b_csvpivot_title">CSV 피벗·집계</h1>
  <p class="sub" data-i18n="b_csvpivot_sub">CSV를 기준 열로 묶어 합계·평균·개수 등을 계산합니다. 엑셀 피벗테이블을 빠르게 만든다고 생각하세요.</p>

  <div class="howto"><span class="ic">📖</span><div><b data-i18n="b_csvpivot_howto_title">사용 방법</b><ol>
    <li data-i18n="b_csvpivot_howto1">CSV를 붙여 넣습니다(첫 행은 머리글)</li>
    <li data-i18n="b_csvpivot_howto2">그룹 기준 열과(예: 부서) 집계할 값 열, 집계 방식을 고릅니다</li>
    <li data-i18n="b_csvpivot_howto3">'집계'를 누르면 그룹별 결과 표가 나오고 CSV로 내려받을 수 있습니다</li>
  </ol></div></div>

  <div class="card">
    <label for="input" style="font-weight:700;font-size:.85rem;" data-i18n="b_csvpivot_label_input">CSV 입력</label>
    <textarea id="input" data-i18n-ph="b_csvpivot_placeholder" placeholder="부서,이름,급여&#10;영업,홍길동,3000&#10;개발,김영희,3500&#10;영업,이철수,3200"></textarea>
    <div class="ctl">
      <div class="fld"><label data-i18n="b_csvpivot_label_grp">그룹 기준 열</label><select id="grp"></select></div>
      <div class="fld"><label data-i18n="b_csvpivot_label_agg">집계 방식</label><select id="agg">
        <option value="count" data-i18n="b_csvpivot_agg_count">개수</option>
        <option value="sum" data-i18n="b_csvpivot_agg_sum">합계</option>
        <option value="avg" data-i18n="b_csvpivot_agg_avg">평균</option>
        <option value="min" data-i18n="b_csvpivot_agg_min">최소</option>
        <option value="max" data-i18n="b_csvpivot_agg_max">최대</option>
      </select></div>
      <div class="fld"><label data-i18n="b_csvpivot_label_val">값 열(개수 외)</label><select id="val"></select></div>
      <div class="actions"><button class="btn" id="run" type="button" data-i18n="b_csvpivot_btn_run">집계</button><button class="btn btn-ghost" id="sample" type="button" data-i18n="b_csvpivot_btn_sample">샘플</button></div>
    </div>
    <div id="result" class="hide">
      <div class="actions"><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_csvpivot_btn_copy">📋 복사</button><button class="btn btn-ghost" id="dl" type="button" data-i18n="b_csvpivot_btn_dl">⬇️ CSV</button></div>
      <div class="tbl-scroll"><table id="tbl"></table></div>
    </div>
    <div class="note" data-i18n="b_csvpivot_note">'개수'는 그룹별 행 수를 셉니다. 합계·평균·최소·최대는 값 열을 숫자로 변환해 계산하며, 숫자가 아닌 값은 건너뜁니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }
  function esc(s){ return String(s).replace(/[&<>]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]);}); }
  var lastMatrix=null;

  function fill(){ var tmp=$('input').value.trim(); if(!tmp){ $('grp').innerHTML=''; $('val').innerHTML=''; return; }
    var p=CSV.parse(tmp,{header:true,delimiter:'auto'}); var opt=p.header.map(function(h,i){return '<option value="'+i+'">'+esc(h)+'</option>';}).join('');
    var pg=$('grp').value, pv=$('val').value; $('grp').innerHTML=opt; $('val').innerHTML=opt;
    if(pg&&$('grp').querySelector('option[value="'+pg+'"]'))$('grp').value=pg; if(pv&&$('val').querySelector('option[value="'+pv+'"]'))$('val').value=pv;
  }
  function run(){
    var tmp=$('input').value.trim(); if(!tmp){ toast(t('b_csvpivot_toast_empty')); return; }
    var p=CSV.parse(tmp,{header:true,delimiter:'auto'}); var gi=+$('grp').value, vi=+$('val').value, agg=$('agg').value;
    var groups={}, order=[];
    p.rows.forEach(function(r){ var k=r[gi]; if(!(k in groups)){ groups[k]={n:0,sum:0,cnt:0,min:Infinity,max:-Infinity}; order.push(k); }
      var g=groups[k]; g.n++; var num=parseFloat(r[vi]); if(isFinite(num)){ g.cnt++; g.sum+=num; if(num<g.min)g.min=num; if(num>g.max)g.max=num; } });
    var aggName=t({count:'b_csvpivot_agg_count',sum:'b_csvpivot_agg_sum',avg:'b_csvpivot_agg_avg',min:'b_csvpivot_agg_min',max:'b_csvpivot_agg_max'}[agg]);
    var valName=agg==='count'?'':' ('+p.header[vi]+')';
    var loc={ko:'ko-KR',en:'en-US',zh:'zh-CN',ja:'ja-JP'}[window.curLang?curLang():'ko'];
    function v(g){ if(agg==='count') return g.n; if(!g.cnt) return ''; if(agg==='sum') return Math.round(g.sum*100)/100; if(agg==='avg') return Math.round(g.sum/g.cnt*100)/100; if(agg==='min') return g.min; if(agg==='max') return g.max; }
    var header=[p.header[gi], aggName+valName];
    var rows=order.map(function(k){ return [k, v(groups[k])]; });
    lastMatrix=[header].concat(rows.map(function(r){return [r[0],String(r[1])];}));
    $('tbl').innerHTML='<tr><th>'+esc(header[0])+'</th><th>'+esc(header[1])+'</th></tr>'+
      rows.map(function(r){return '<tr><td>'+esc(r[0])+'</td><td class="num">'+esc(typeof r[1]==='number'?r[1].toLocaleString(loc):r[1])+'</td></tr>';}).join('');
    $('result').classList.remove('hide');
  }
  window.onI18n = function(){ run(); };
  $('input').addEventListener('input', fill);
  $('agg').addEventListener('change', function(){ $('val').disabled = this.value==='count'; });
  $('run').addEventListener('click', run);
  $('copy').addEventListener('click', function(){ if(lastMatrix) navigator.clipboard.writeText(CSV.toText(lastMatrix,{delimiter:','})).then(function(){toast(t('b_csvpivot_toast_copied'));}); });
  $('dl').addEventListener('click', function(){ if(!lastMatrix)return; var blob=new Blob(['﻿'+CSV.toText(lastMatrix,{delimiter:','})],{type:'text/csv;charset=utf-8'}),u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='pivot.csv';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(u);a.remove();},100); });
  $('sample').addEventListener('click', function(){ $('input').value='부서,이름,급여\n영업,홍길동,3000\n개발,김영희,3500\n영업,이철수,3200\n개발,박민수,3300\n총무,최지우,2900'; fill(); $('agg').value='avg'; $('val').disabled=false; run(); });
  fill();
</script>
