<body>
<div class="toolwrap" style="max-width:640px;">
  <h1 data-i18n="b_phone_title">국제 전화번호 변환·검증</h1>
  <p class="sub" data-i18n="b_phone_sub">전화번호를 국가별 표준 표기와 국제표기(E.164)로 바꾸고, 유효한 번호인지 확인합니다.</p>
  <div class="card">
    <div class="row">
      <select id="cc">
        <option value="KR" data-i18n="b_phone_opt_kr">🇰🇷 대한민국</option>
        <option value="US" data-i18n="b_phone_opt_us">🇺🇸 미국</option>
        <option value="JP" data-i18n="b_phone_opt_jp">🇯🇵 일본</option>
        <option value="CN" data-i18n="b_phone_opt_cn">🇨🇳 중국</option>
        <option value="GB" data-i18n="b_phone_opt_gb">🇬🇧 영국</option>
        <option value="DE" data-i18n="b_phone_opt_de">🇩🇪 독일</option>
        <option value="FR" data-i18n="b_phone_opt_fr">🇫🇷 프랑스</option>
        <option value="AU" data-i18n="b_phone_opt_au">🇦🇺 호주</option>
      </select>
      <input type="text" id="num" value="01012345678" data-i18n-ph="b_phone_input_ph" placeholder="전화번호 입력"/>
    </div>
    <table><tbody id="tb"></tbody></table>
    <div class="note" data-i18n-html="b_phone_note">오픈소스 <b>libphonenumber-js</b>(MIT, <a href="https://github.com/catamphetamine/libphonenumber-js" target="_blank" rel="noopener">catamphetamine/libphonenumber-js</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/libphone-1/libphonenumber-max.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  var L=window.libphonenumber;
  function row(k,v){return '<tr><td>'+k+'</td><td><b>'+(v||'—')+'</b></td></tr>';}
  function run(){ var cc=$('cc').value, raw=$('num').value, tb=$('tb');
    var html='';
    try{ var p=L.parsePhoneNumber(raw,cc);
      var valid=p&&p.isValid();
      html+='<tr><td>'+t('b_phone_row_validity')+'</td><td><span class="valid '+(valid?'y':'n')+'">'+(valid?t('b_phone_valid_ok'):t('b_phone_valid_fail'))+'</span></td></tr>';
      if(p){ html+=row(t('b_phone_row_country'),p.country||'—');
        html+=row(t('b_phone_row_e164'),p.number);
        html+=row(t('b_phone_row_national'),p.formatNational());
        html+=row(t('b_phone_row_international'),p.formatInternational());
        html+=row(t('b_phone_row_callingcode'),'+'+p.countryCallingCode);
        var ptype=p.getType(); var tmap={MOBILE:t('b_phone_type_mobile'),FIXED_LINE:t('b_phone_type_fixed'),FIXED_LINE_OR_MOBILE:t('b_phone_type_fixed_or_mobile'),TOLL_FREE:t('b_phone_type_toll_free'),PREMIUM_RATE:t('b_phone_type_premium')};
        html+=row(t('b_phone_row_type'),tmap[ptype]||ptype||'—');
        html+=row(t('b_phone_row_uri'),p.getURI()); }
    }catch(e){ html='<tr><td>'+t('b_phone_row_validity')+'</td><td><span class="valid n">'+t('b_phone_format_error')+'</span></td></tr>'; }
    tb.innerHTML=html; }
  window.onI18n=run;
  ['cc','num'].forEach(function(id){$(id).addEventListener('input',run);$(id).addEventListener('change',run);});
  run();
</script>
</body>
