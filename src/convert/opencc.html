<body>
<div class="toolwrap" style="max-width:760px;">
  <h1 data-i18n="b_opencc_title">중국어 간체 ↔ 번체 변환기</h1>
  <p class="sub" data-i18n="b_opencc_sub">중국어 간체자(简体)와 번체자(繁體)를 서로 바꿔 줍니다. 대만·홍콩 표기도 선택할 수 있어요.</p>
  <div class="card">
    <textarea id="in">汉字转换测试：这是简体中文。</textarea>
    <div class="row"><span data-i18n="b_opencc_convert_label">변환</span>:
      <select id="from">
        <option value="cn" data-i18n="b_opencc_opt_cn">간체(대륙)</option>
        <option value="tw" data-i18n="b_opencc_opt_tw">번체(대만)</option>
        <option value="hk" data-i18n="b_opencc_opt_hk">번체(홍콩)</option>
        <option value="t" data-i18n="b_opencc_opt_t">번체(표준)</option>
      </select>
      →
      <select id="to">
        <option value="tw" data-i18n="b_opencc_opt_tw">번체(대만)</option>
        <option value="hk" data-i18n="b_opencc_opt_hk">번체(홍콩)</option>
        <option value="t" data-i18n="b_opencc_opt_t">번체(표준)</option>
        <option value="cn" data-i18n="b_opencc_opt_cn">간체(대륙)</option>
      </select>
      <button class="btn btn-ghost" id="copy" type="button">📋 <span data-i18n="b_opencc_btn_copy">복사</span></button>
    </div>
    <div class="out" id="out"></div>
    <div class="note" data-i18n-html="b_opencc_note">오픈소스 <b>OpenCC</b>(opencc-js, MIT/Apache-2.0, <a href="https://github.com/nk2028/opencc-js" target="_blank" rel="noopener">nk2028/opencc-js</a>)를 자체 호스팅합니다. 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="/vendor/opencc-1/full.js"></script>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  function run(){ try{ var conv=OpenCC.Converter({from:$('from').value,to:$('to').value}); $('out').textContent=conv($('in').value); }catch(e){ $('out').textContent='⚠️ '+e.message; } }
  ['in','from','to'].forEach(function(id){$(id).addEventListener('input',run);$(id).addEventListener('change',run);});
  $('copy').addEventListener('click',function(){if($('out').textContent)navigator.clipboard.writeText($('out').textContent).then(function(){toast(t('b_opencc_toast_copied'));});});
  run();
</script>
</body>
