<style>.seg{display:inline-flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:.7rem;}.seg button{padding:.5rem .9rem;border:0;background:var(--surface);color:var(--text);font-family:inherit;font-weight:700;cursor:pointer;}.seg button.on{background:var(--accent);color:#fff;}
.drop{border:2px dashed var(--border);border-radius:12px;padding:1.4rem;text-align:center;cursor:pointer;color:var(--muted);}.drop.drag{border-color:var(--accent);background:var(--accent-soft);}
textarea{width:100%;min-height:120px;padding:.7rem;border:1px solid var(--border);border-radius:11px;background:var(--input-bg);font-family:ui-monospace,monospace;font-size:.78rem;color:var(--text);resize:vertical;word-break:break-all;}

.note{margin-top:1.1rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}</style>

<body>
<div class="toolwrap" style="max-width:780px;">
  <h1 data-i18n="b_imgbase64_title">이미지 ↔ Base64 변환</h1>
  <p class="sub" data-i18n="b_imgbase64_sub">이미지를 Base64 Data URI로 만들거나, Data URI를 이미지로 되돌립니다. CSS·HTML에 그림을 바로 박아 넣을 때 좋아요.</p>
  <div class="card">
    <div class="seg" id="seg"><button data-m="enc" class="on" type="button" data-i18n="b_imgbase64_btn_enc">이미지 → Base64</button><button data-m="dec" type="button" data-i18n="b_imgbase64_btn_dec">Base64 → 이미지</button></div>
    <div id="encbox">
      <div class="drop" id="drop" data-i18n="b_imgbase64_drop">🖼️ 이미지를 끌어다 놓거나 클릭해서 선택<input type="file" id="file" accept="image/*" hidden/></div>
      <div class="meta" id="meta"></div>
      <div class="actions"><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_imgbase64_btn_copy">📋 복사</button><button class="btn btn-ghost" id="copycss" type="button" data-i18n="b_imgbase64_btn_copycss">📋 CSS 복사</button></div>
      <textarea id="out" readonly data-i18n-ph="b_imgbase64_out_ph" placeholder="Base64 결과가 여기에 표시됩니다"></textarea>
    </div>
    <div id="decbox" style="display:none;">
      <textarea id="din" data-i18n-ph="b_imgbase64_din_ph" placeholder="data:image/...;base64,... 를 붙여넣으세요"></textarea>
      <div class="actions"><button class="btn" id="dl" type="button" data-i18n="b_imgbase64_btn_dl">⬇️ 이미지 저장</button></div>
      <div class="prev" id="prev"></div>
    </div>
    <div class="note" data-i18n="b_imgbase64_note">데이터 URI는 작은 아이콘에 적합합니다(큰 이미지는 용량이 33% 커집니다). 모든 처리는 브라우저에서만 이루어지며 파일은 업로드되지 않습니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  $('seg').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;Array.prototype.forEach.call($('seg').children,function(x){x.classList.toggle('on',x===b);});
    $('encbox').style.display=b.dataset.m==='enc'?'':'none';$('decbox').style.display=b.dataset.m==='dec'?'':'none';});
  var drop=$('drop'),file=$('file');
  drop.addEventListener('click',function(){file.click();});
  drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('drag');});
  drop.addEventListener('dragleave',function(){drop.classList.remove('drag');});
  drop.addEventListener('drop',function(e){e.preventDefault();drop.classList.remove('drag');if(e.dataTransfer.files[0])enc(e.dataTransfer.files[0]);});
  file.addEventListener('change',function(){if(file.files[0])enc(file.files[0]);});
  function enc(f){ if(!/^image\//.test(f.type)){toast(t('b_imgbase64_err_not_image'));return;} var r=new FileReader();
    r.onload=function(){ $('out').value=r.result; drop.textContent='🖼️ '+f.name;
      $('meta').textContent=t('b_imgbase64_meta').replace('{orig}',(f.size/1024).toFixed(1)).replace('{b64}',(r.result.length/1024).toFixed(1)); }; r.readAsDataURL(f); }
  $('copy').addEventListener('click',function(){if($('out').value)navigator.clipboard.writeText($('out').value).then(function(){toast(t('b_imgbase64_toast_copied'));});});
  $('copycss').addEventListener('click',function(){if($('out').value)navigator.clipboard.writeText("background-image: url('"+$('out').value+"');").then(function(){toast(t('b_imgbase64_toast_css_copied'));});});
  function dec(){ var v=$('din').value.trim(); if(/^data:image\//.test(v))$('prev').innerHTML='<img src="'+v.replace(/"/g,'')+'" alt="preview">'; else $('prev').innerHTML='<span style="color:#888">'+t('b_imgbase64_dec_invalid')+'</span>'; }
  $('din').addEventListener('input',dec);
  $('dl').addEventListener('click',function(){ var v=$('din').value.trim(); if(!/^data:image\//.test(v)){toast(t('b_imgbase64_err_invalid_uri'));return;}
    var ext=(v.match(/^data:image\/(\w+)/)||[])[1]||'png'; var a=document.createElement('a');a.href=v;a.download='image.'+ext;document.body.appendChild(a);a.click();a.remove(); });
</script>
</body>
