<body>
<div class="toolwrap">
  <h1 data-i18n="b_roman_title">로마 숫자 변환기</h1>
  <p class="sub" data-i18n="b_roman_sub">아라비아 숫자와 로마 숫자를 서로 바꿉니다(1~3999). 아무 칸에나 입력하면 반대쪽이 즉시 바뀝니다.</p>

  <div class="card">
    <div class="rrow"><label for="arabic" data-i18n="b_roman_label_arabic">숫자</label><input id="arabic" inputmode="numeric" value="2026" autocomplete="off"/></div>
    <div class="rrow"><label for="roman" data-i18n="b_roman_label_roman">로마 숫자</label><input id="roman" autocomplete="off"/></div>
    <div class="note" data-i18n="b_roman_note">표준 로마 숫자 규칙(I·V·X·L·C·D·M, 뺄셈 표기 IV·IX 등)을 사용하며 1~3999 범위를 지원합니다. 로마 숫자 입력은 대소문자를 가리지 않습니다. 모든 변환은 브라우저에서 이루어집니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  var MAP=[[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
  function toRoman(n){ if(!(n>=1&&n<=3999))return null; var r=''; MAP.forEach(function(p){ while(n>=p[0]){ r+=p[1]; n-=p[0]; } }); return r; }
  function fromRoman(s){ s=s.toUpperCase(); if(!/^[IVXLCDM]+$/.test(s)) return null;
    var val={I:1,V:5,X:10,L:50,C:100,D:500,M:1000}, total=0;
    for(var i=0;i<s.length;i++){ var c=val[s[i]], nx=val[s[i+1]]||0; total += c<nx ? -c : c; }
    if(total<1||total>3999 || toRoman(total)!==s) return null;   // 정규형 검증
    return total;
  }
  var lock=false;
  $('arabic').addEventListener('input', function(){ if(lock)return; lock=true; this.classList.remove('bad');
    var n=parseInt(this.value,10); if(this.value===''){ $('roman').value=''; } else { var r=toRoman(n); if(r==null){ this.classList.add('bad'); $('roman').value=''; } else $('roman').value=r; } lock=false; });
  $('roman').addEventListener('input', function(){ if(lock)return; lock=true; this.classList.remove('bad');
    if(this.value===''){ $('arabic').value=''; } else { var n=fromRoman(this.value); if(n==null){ this.classList.add('bad'); $('arabic').value=''; } else $('arabic').value=n; } lock=false; });
  $('roman').value=toRoman(2026);
</script>
