<body>
<div class="toolwrap">
  <h1 data-i18n="b_numkor_title">숫자 → 한글 금액 변환기</h1>
  <p class="sub" data-i18n="b_numkor_sub">숫자를 한글 금액과 갖은자 한자로 바꿉니다. 계약서·영수증·세금계산서의 "일금 ○○원정" 표기에 그대로 쓰세요.</p>

  <div class="card">
    <label for="num" data-i18n="b_numkor_label_num">숫자 입력</label>
    <input id="num" class="bignum" type="text" inputmode="numeric" value="1234567" autocomplete="off" aria-label="숫자"/>
    <div class="reslist">
      <div class="rrow"><span class="rlab" data-i18n="b_numkor_lab_comma">콤마 표기</span><span class="rval" id="oComma"></span><button class="cp" data-t="oComma" data-i18n="b_numkor_copy">복사</button></div>
      <div class="rrow"><span class="rlab" data-i18n="b_numkor_lab_ko">한글</span><span class="rval" id="oKo"></span><button class="cp" data-t="oKo" data-i18n="b_numkor_copy">복사</button></div>
      <div class="rrow"><span class="rlab" data-i18n="b_numkor_lab_amt">금액 표기</span><span class="rval" id="oAmt"></span><button class="cp" data-t="oAmt" data-i18n="b_numkor_copy">복사</button></div>
      <div class="rrow"><span class="rlab" data-i18n="b_numkor_lab_hanja">갖은자 한자</span><span class="rval hanja" id="oHanja"></span><button class="cp" data-t="oHanja" data-i18n="b_numkor_copy">복사</button></div>
    </div>
    <div class="note" data-i18n="b_numkor_note">
      갖은자(壹貳參…)는 위·변조를 막기 위해 계약서·어음에 쓰는 정자 한자입니다. 정수(원 단위)만 변환하며 소수점 이하는 버립니다. 모든 계산은 브라우저에서 이루어지고 입력값은 전송되지 않습니다.
    </div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  var D_KO=['','일','이','삼','사','오','육','칠','팔','구'];
  var U_KO=['','십','백','천'];
  var BIG_KO=['','만','억','조','경','해','자','양','구','간','정','재','극'];
  var D_HJ=['零','壹','貳','參','肆','伍','陸','柒','捌','玖'];
  var U_HJ=['','拾','佰','仟'];
  var BIG_HJ=['','萬','億','兆','京','垓','秭','穰','溝','澗','正','載','極'];

  function comma(s){ return s.replace(/\B(?=(\d{3})+(?!\d))/g,','); }

  function group(g, D, U, omitLeadOne){
    if(g===0) return '';
    var str=String(g), s='';
    for(var i=0;i<str.length;i++){
      var n=+str[i], pos=str.length-1-i;     // 0=일,1=십,2=백,3=천
      if(n===0) continue;
      s += ((omitLeadOne && n===1 && pos>0) ? '' : D[n]) + U[pos];
    }
    return s;
  }
  function convert(digits, D, U, BIG, omitLeadOne, zero){
    digits = digits.replace(/^0+/,'');
    if(digits==='') return zero;
    if(digits.length > BIG.length*4) return null;   // 표현 범위 초과
    var groups=[];
    for(var i=digits.length;i>0;i-=4) groups.unshift(digits.slice(Math.max(0,i-4), i));
    var parts=[];
    for(var j=0;j<groups.length;j++){
      var g=+groups[j]; if(g===0) continue;
      parts.push(group(g, D, U, omitLeadOne) + BIG[groups.length-1-j]);
    }
    return parts.join(omitLeadOne ? ' ' : '');   // 한글은 만/억 사이 띄어쓰기, 한자는 붙여쓰기
  }

  function render(){
    var raw=$('num').value;
    var digits=(raw.split('.')[0].match(/\d/g)||[]).join('');   // 정수부 숫자만
    if(digits==='') digits='0';
    var ko=convert(digits, D_KO, U_KO, BIG_KO, true, '영');
    var hj=convert(digits, D_HJ, U_HJ, BIG_HJ, false, '零');
    if(ko===null){ $('oComma').textContent=comma(digits); $('oKo').textContent=t('b_numkor_overflow'); $('oAmt').textContent='—'; $('oHanja').textContent='—'; return; }
    $('oComma').textContent = comma(digits);
    $('oKo').textContent = ko;
    $('oAmt').textContent = t('b_numkor_amt_prefix') + ko + t('b_numkor_amt_suffix');
    $('oHanja').textContent = '金' + hj + '圓整';
  }
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }

  window.onI18n = render;

  $('num').addEventListener('input', render);
  document.querySelector('.reslist').addEventListener('click', function(e){
    var b=e.target.closest('.cp'); if(!b) return;
    var v=$(b.dataset.t).textContent;
    navigator.clipboard.writeText(v).then(function(){ toast(t('b_numkor_copied')); });
  });
  render();
</script>
