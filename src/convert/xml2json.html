<body>
<div class="toolwrap" style="max-width:800px;">
  <h1 data-i18n="b_xml2json_title">XML ↔ JSON 변환기</h1>
  <p class="sub" data-i18n="b_xml2json_sub">XML과 JSON을 서로 변환합니다.</p>
  <div class="card">
    <div class="seg" id="seg"><button data-d="x2j" class="on" type="button" data-i18n="b_xml2json_btn_x2j">XML → JSON</button><button data-d="j2x" type="button" data-i18n="b_xml2json_btn_j2x">JSON → XML</button></div>
    <textarea id="in">&lt;catalog&gt;
  &lt;book id="1"&gt;
    &lt;title&gt;자바스크립트&lt;/title&gt;
    &lt;price&gt;28000&lt;/price&gt;
  &lt;/book&gt;
  &lt;book id="2"&gt;
    &lt;title&gt;파이썬&lt;/title&gt;
    &lt;price&gt;25000&lt;/price&gt;
  &lt;/book&gt;
&lt;/catalog&gt;</textarea>
    <div class="actions"><button class="btn btn-ghost" id="copy" type="button" data-i18n="b_xml2json_btn_copy">📋 복사</button></div>
    <div class="err" id="err"></div>
    <div class="arrow">↓</div>
    <div class="out" id="out"></div>
    <div class="note" data-i18n-html="b_xml2json_note">XML 속성은 <code>@attr</code>, 텍스트는 <code>#text</code>로 표현합니다. 같은 태그가 반복되면 배열로 변환합니다. 브라우저 내장 파서(DOMParser)를 사용하며 모든 처리는 브라우저에서만 이루어집니다.</div>
  </div>
</div>
<script src="tool-shell.js"></script>
<script>
  var $=function(id){return document.getElementById(id);};
  function toast(m){var el=$('toast');if(!el)return;el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1400);}
  var dir='x2j';
  function x2jNode(node){ var obj={};
    if(node.attributes)for(var i=0;i<node.attributes.length;i++){var a=node.attributes[i];obj['@'+a.name]=a.value;}
    var kids=node.childNodes, textParts=[];
    for(var k=0;k<kids.length;k++){ var c=kids[k];
      if(c.nodeType===3){ var tmp=c.nodeValue.trim(); if(tmp)textParts.push(tmp); }
      else if(c.nodeType===1){ var val=x2jNode(c); if(obj[c.nodeName]!==undefined){ if(!Array.isArray(obj[c.nodeName]))obj[c.nodeName]=[obj[c.nodeName]]; obj[c.nodeName].push(val); } else obj[c.nodeName]=val; } }
    if(textParts.length){ if(Object.keys(obj).length)obj['#text']=textParts.join(' '); else return textParts.join(' '); }
    return obj; }
  function j2x(obj,name){ var xml='';
    function ser(o,tag){ if(o===null||typeof o!=='object'){ return '<'+tag+'>'+String(o)+'</'+tag+'>'; }
      if(Array.isArray(o))return o.map(function(it){return ser(it,tag);}).join('');
      var attrs='',inner='',text='';
      Object.keys(o).forEach(function(k){ if(k[0]==='@')attrs+=' '+k.slice(1)+'="'+o[k]+'"'; else if(k==='#text')text=o[k]; else inner+=ser(o[k],k); });
      return '<'+tag+attrs+'>'+text+inner+'</'+tag+'>'; }
    Object.keys(obj).forEach(function(k){ xml+=ser(obj[k],k); }); return xml; }
  function pretty(xml){ var formatted='',pad=0; xml=xml.replace(/>\s*</g,'><').replace(/></g,'>\n<');
    xml.split('\n').forEach(function(line){ if(/^<\/\w/.test(line))pad--; formatted+=Array(Math.max(0,pad)+1).join('  ')+line+'\n'; if(/^<\w[^>]*[^\/]>$/.test(line)&&!/<\//.test(line))pad++; }); return formatted.trim(); }
  function run(){ $('err').textContent='';
    try{ if(dir==='x2j'){ var doc=new DOMParser().parseFromString($('in').value,'application/xml');
        var pe=doc.querySelector('parsererror'); if(pe)throw new Error(t('b_xml2json_err_xml'));
        var o={}; o[doc.documentElement.nodeName]=x2jNode(doc.documentElement); $('out').textContent=JSON.stringify(o,null,2); }
      else { var obj=JSON.parse($('in').value); $('out').textContent=pretty(j2x(obj)); }
      window._o=$('out').textContent;
    }catch(e){ $('out').textContent=''; $('err').textContent='⚠️ '+e.message; } }
  $('seg').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;dir=b.dataset.d;Array.prototype.forEach.call($('seg').children,function(x){x.classList.toggle('on',x===b);});
    $('in').value = dir==='x2j'?'<catalog>\n  <book id="1">\n    <title>자바스크립트</title>\n    <price>28000</price>\n  </book>\n</catalog>':'{\n  "catalog": {\n    "book": { "@id": "1", "title": "자바스크립트", "price": "28000" }\n  }\n}';run();});
  $('in').addEventListener('input',run);
  $('copy').addEventListener('click',function(){if(window._o)navigator.clipboard.writeText(window._o).then(function(){toast(t('b_xml2json_toast_copied'));});});
  run();
</script>
