<body>
<div class="toolwrap" style="max-width:920px;">
  <h1 data-i18n="b_k6gen_title">k6 / JMeter 부하 스크립트 생성기</h1>
  <p class="sub" data-i18n="b_k6gen_sub">대상·부하 조건을 입력하면 k6(JS)와 JMeter(.jmx) 부하시험 스크립트를 만들어 줍니다.</p>
  <div class="card" style="max-width:none;">
    <div class="frm"><label style="flex:1;min-width:240px"><span data-i18n="b_k6gen_lbl_url">대상 URL</span><input type="text" id="url" value="https://example.com/api"></label><label><span data-i18n="b_k6gen_lbl_method">메서드</span><select id="method"><option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option></select></label></div>
    <div class="frm"><label><span data-i18n="b_k6gen_lbl_vu">VU(가상사용자)</span><input type="number" id="vu" value="50" min="1"></label><label><span data-i18n="b_k6gen_lbl_dur">지속(초)</span><input type="number" id="dur" value="60" min="1"></label><label><span data-i18n="b_k6gen_lbl_ramp">Ramp-up(초)</span><input type="number" id="ramp" value="10" min="0"></label><label><span data-i18n="b_k6gen_lbl_think">Think time(초)</span><input type="number" id="think" value="1" step="any" min="0"></label></div>
    <details style="margin:.2rem 0 .5rem"><summary style="cursor:pointer;font-size:.85rem;color:var(--muted)" data-i18n="b_k6gen_body_summary">요청 본문(Body) · POST/PUT용 — 선택</summary><textarea class="in" id="body" spellcheck="false" style="min-height:60px;margin-top:.4rem" placeholder='{"key":"value"}'></textarea></details>
    <div class="tiertog" id="fmt" style="margin:.2rem 0"><button type="button" data-f="k6" class="on">k6 (JS)</button><button type="button" data-f="jmx">JMeter (.jmx)</button></div>
    <div class="frm"><button class="btn" id="copy" type="button" data-i18n="b_k6gen_btn_copy">복사</button><button class="btn btn-ghost" id="dl" type="button" data-i18n="b_k6gen_btn_dl">다운로드</button><span id="st" style="align-self:center;color:var(--muted);font-size:.85rem"></span></div>
    <textarea class="out" id="out" readonly style="min-height:300px"></textarea>
    <div class="note" data-i18n-html="b_k6gen_note">생성된 스크립트는 외부로 전송되지 않고 브라우저에서만 만들어집니다. 실제 부하 발생은 내려받은 스크립트를 <b>k6</b> 또는 <b>Apache JMeter</b>로 본인이 권한을 가진 대상에 대해서만 실행하세요. p95&lt;500ms·실패율&lt;1% 임계값이 예시로 포함됩니다.</div>

<script src="tool-shell.js"></script>
<script>
(function(){
  var $=function(i){return document.getElementById(i);};
  var fmt='k6';
  function xesc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function vals(){
    return {
      url:($('url').value.trim()||'https://example.com/'),
      m:$('method').value,
      vu:Math.max(1,parseInt($('vu').value,10)||1),
      dur:Math.max(1,parseInt($('dur').value,10)||1),
      ramp:Math.max(0,parseInt($('ramp').value,10)||0),
      think:Math.max(0,parseFloat($('think').value)||0),
      body:$('body').value
    };
  }
  function k6(v){
    var L=[];
    L.push("import http from 'k6/http';");
    L.push("import { sleep, check } from 'k6';");
    L.push('');
    L.push('export const options = {');
    L.push('  stages: [');
    if(v.ramp>0)L.push("    { duration: '"+v.ramp+"s', target: "+v.vu+" },");
    L.push("    { duration: '"+v.dur+"s', target: "+v.vu+" },");
    if(v.ramp>0)L.push("    { duration: '"+v.ramp+"s', target: 0 },");
    L.push('  ],');
    L.push("  thresholds: { http_req_duration: ['p(95)<500'], http_req_failed: ['rate<0.01'] },");
    L.push('};');
    L.push('');
    L.push('export default function () {');
    var ml=v.m.toLowerCase();
    if(v.m==='GET'||v.m==='DELETE'){
      L.push("  const res = http."+ml+"('"+v.url+"');");
    }else{
      var payload=v.body.trim()?JSON.stringify(v.body):"''";
      L.push('  const payload = '+payload+';');
      L.push("  const params = { headers: { 'Content-Type': 'application/json' } };");
      L.push("  const res = http."+ml+"('"+v.url+"', payload, params);");
    }
    L.push("  check(res, { 'status is 200': (r) => r.status === 200 });");
    if(v.think>0)L.push('  sleep('+v.think+');');
    L.push('}');
    return L.join('\n');
  }
  function jmx(v){
    var u;try{u=new URL(v.url);}catch(e){u={protocol:'https:',hostname:'example.com',port:'',pathname:'/',search:''};}
    var proto=u.protocol.replace(':','');
    var port=u.port||(proto==='https'?'443':'80');
    var path=(u.pathname||'/')+(u.search||'');
    var post=(v.m==='POST'||v.m==='PUT')&&v.body.trim();
    var X=[];
    X.push('<?xml version="1.0" encoding="UTF-8"?>');
    X.push('<jmeterTestPlan version="1.2" properties="5.0" jmeter="5.6.3">');
    X.push('  <hashTree>');
    X.push('    <TestPlan guiclass="TestPlanGui" testclass="TestPlan" testname="gemini2k Load Test" enabled="true"><boolProp name="TestPlan.functional_mode">false</boolProp><boolProp name="TestPlan.serialize_threadgroups">false</boolProp><elementProp name="TestPlan.user_defined_variables" elementType="Arguments" guiclass="ArgumentsPanel" testclass="Arguments"><collectionProp name="Arguments.arguments"/></elementProp></TestPlan>');
    X.push('    <hashTree>');
    X.push('      <ThreadGroup guiclass="ThreadGroupGui" testclass="ThreadGroup" testname="Thread Group" enabled="true"><stringProp name="ThreadGroup.num_threads">'+v.vu+'</stringProp><stringProp name="ThreadGroup.ramp_time">'+v.ramp+'</stringProp><boolProp name="ThreadGroup.scheduler">true</boolProp><stringProp name="ThreadGroup.duration">'+v.dur+'</stringProp><stringProp name="ThreadGroup.on_sample_error">continue</stringProp><elementProp name="ThreadGroup.main_controller" elementType="LoopController" guiclass="LoopControlPanel" testclass="LoopController"><boolProp name="LoopController.continue_forever">false</boolProp><stringProp name="LoopController.loops">-1</stringProp></elementProp></ThreadGroup>');
    X.push('      <hashTree>');
    X.push('        <HTTPSamplerProxy guiclass="HttpTestSampleGui" testclass="HTTPSamplerProxy" testname="'+xesc(v.m+' '+path)+'" enabled="true">');
    if(post){
      X.push('          <boolProp name="HTTPSampler.postBodyRaw">true</boolProp>');
      X.push('          <elementProp name="HTTPsampler.Arguments" elementType="Arguments"><collectionProp name="Arguments.arguments"><elementProp name="" elementType="HTTPArgument"><boolProp name="HTTPArgument.always_encode">false</boolProp><stringProp name="Argument.value">'+xesc(v.body)+'</stringProp><stringProp name="Argument.metadata">=</stringProp></elementProp></collectionProp></elementProp>');
    }else{
      X.push('          <elementProp name="HTTPsampler.Arguments" elementType="Arguments" guiclass="HTTPArgumentsPanel" testclass="Arguments"><collectionProp name="Arguments.arguments"/></elementProp>');
    }
    X.push('          <stringProp name="HTTPSampler.domain">'+xesc(u.hostname)+'</stringProp>');
    X.push('          <stringProp name="HTTPSampler.port">'+port+'</stringProp>');
    X.push('          <stringProp name="HTTPSampler.protocol">'+proto+'</stringProp>');
    X.push('          <stringProp name="HTTPSampler.path">'+xesc(path)+'</stringProp>');
    X.push('          <stringProp name="HTTPSampler.method">'+v.m+'</stringProp>');
    X.push('          <boolProp name="HTTPSampler.follow_redirects">true</boolProp><boolProp name="HTTPSampler.use_keepalive">true</boolProp>');
    X.push('        </HTTPSamplerProxy>');
    X.push('        <hashTree>');
    if(v.think>0){
      X.push('          <ConstantTimer guiclass="ConstantTimerGui" testclass="ConstantTimer" testname="Think Time" enabled="true"><stringProp name="ConstantTimer.delay">'+Math.round(v.think*1000)+'</stringProp></ConstantTimer>');
      X.push('          <hashTree/>');
    }
    X.push('        </hashTree>');
    X.push('      </hashTree>');
    X.push('    </hashTree>');
    X.push('  </hashTree>');
    X.push('</jmeterTestPlan>');
    return X.join('\n');
  }
  function render(){var v=vals();$('out').value=(fmt==='k6')?k6(v):jmx(v);}
  $('fmt').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;fmt=b.getAttribute('data-f');var bs=this.querySelectorAll('button');for(var i=0;i<bs.length;i++)bs[i].classList.toggle('on',bs[i]===b);render();});
  ['url','method','vu','dur','ramp','think','body'].forEach(function(i){$(i).addEventListener('input',render);$(i).addEventListener('change',render);});
  $('copy').addEventListener('click',function(){$('out').select();try{document.execCommand('copy');}catch(e){}if(navigator.clipboard)navigator.clipboard.writeText($('out').value);$('st').textContent=t('b_k6gen_copied');setTimeout(function(){$('st').textContent='';},1500);});
  $('dl').addEventListener('click',function(){var name=(fmt==='k6')?'loadtest.js':'loadtest.jmx';var blob=new Blob([$('out').value],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(a.href);},1000);});
  render();
})();
</script>
</body>
