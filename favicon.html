<div class="toast" id="toast"></div>
<script>
  function T(k){ return window.t ? window.t(k) : k; }
  function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1700);}
  var textEl=document.getElementById('text'), imgEl=document.getElementById('img'),
      bgEl=document.getElementById('bg'), fgEl=document.getElementById('fg'), shapeEl=document.getElementById('shape'),
      snippet=document.getElementById('snippet');
  var uploaded=null;

  function shapePath(ctx, s, shape){
    ctx.beginPath();
    if(shape==='circle'){ ctx.arc(s/2, s/2, s/2, 0, Math.PI*2); }
    else if(shape==='square'){ ctx.rect(0,0,s,s); }
    else { var r=s*0.22; ctx.moveTo(r,0); ctx.arcTo(s,0,s,s,r); ctx.arcTo(s,s,0,s,r); ctx.arcTo(0,s,0,0,r); ctx.arcTo(0,0,s,0,r); ctx.closePath(); }
  }
  function render(size){
    var cv=document.createElement('canvas'); cv.width=cv.height=size;
    var ctx=cv.getContext('2d');
    if(uploaded){
      ctx.save(); shapePath(ctx,size,shapeEl.value); ctx.clip();
      var iw=uploaded.width, ih=uploaded.height, sc=Math.max(size/iw, size/ih), w=iw*sc, h=ih*sc;
      ctx.drawImage(uploaded, (size-w)/2, (size-h)/2, w, h); ctx.restore();
    } else {
      ctx.fillStyle=bgEl.value; shapePath(ctx,size,shapeEl.value); ctx.fill();
      var t=textEl.value || 'G';
      ctx.fillStyle=fgEl.value; ctx.textAlign='center'; ctx.textBaseline='middle';
      var fs = size * (t.length>=3?0.42:t.length===2?0.52:0.62);
      ctx.font='700 '+fs+"px 'Pretendard Variable',Pretendard,system-ui,'Apple Color Emoji','Segoe UI Emoji',sans-serif";
      ctx.fillText(t, size/2, size/2 + size*0.04);
    }
    return cv;
  }
  function drawTo(id, size){ var d=document.getElementById(id), c=d.getContext('2d'); c.clearRect(0,0,size,size); c.drawImage(render(size),0,0); }
  function refresh(){ drawTo('p64',64); drawTo('p32',32); drawTo('p16',16); }

  function pngBytes(size){ return new Promise(function(res){ render(size).toBlob(function(b){ b.arrayBuffer().then(function(buf){ res(new Uint8Array(buf)); }); }, 'image/png'); }); }
  function dlBlob(blob, name){ var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove(); }
  function dlPng(size, name){ render(size).toBlob(function(b){ dlBlob(b, name); }, 'image/png'); }

  async function buildIco(sizes){
    var imgs=[]; for(var i=0;i<sizes.length;i++){ imgs.push({s:sizes[i], data:await pngBytes(sizes[i])}); }
    var count=imgs.length, header=6+16*count, total=header;
    imgs.forEach(function(im){ total+=im.data.length; });
    var buf=new Uint8Array(total), dv=new DataView(buf.buffer);
    dv.setUint16(0,0,true); dv.setUint16(2,1,true); dv.setUint16(4,count,true);
    var off=header;
    imgs.forEach(function(im,idx){
      var e=6+idx*16, b=im.s>=256?0:im.s;
      buf[e]=b; buf[e+1]=b; buf[e+2]=0; buf[e+3]=0;
      dv.setUint16(e+4,1,true); dv.setUint16(e+6,32,true);
      dv.setUint32(e+8, im.data.length, true); dv.setUint32(e+12, off, true);
      buf.set(im.data, off); off+=im.data.length;
    });
    return new Blob([buf], {type:'image/x-icon'});
  }

  imgEl.addEventListener('change', function(){
    var f=imgEl.files[0]; if(!f){ uploaded=null; refresh(); return; }
    var im=new Image(); im.onload=function(){ uploaded=im; refresh(); }; im.src=URL.createObjectURL(f);
  });
  [bgEl,fgEl,shapeEl].forEach(function(el){ el.addEventListener('input', refresh); });
  textEl.addEventListener('input', function(){ uploaded=null; imgEl.value=''; refresh(); });

  document.getElementById('dl32').addEventListener('click', function(){ dlPng(32,'favicon-32.png'); });
  document.getElementById('dl180').addEventListener('click', function(){ dlPng(180,'apple-touch-icon.png'); });
  document.getElementById('dl512').addEventListener('click', function(){ dlPng(512,'icon-512.png'); });
  document.getElementById('dlico').addEventListener('click', async function(){ var blob=await buildIco([16,32,48]); dlBlob(blob,'favicon.ico'); toast(T('fav.icodone')); });

  snippet.value = '<link rel="icon" href="/favicon.ico" sizes="any">\n<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">\n<link rel="apple-touch-icon" href="/apple-touch-icon.png">';
  document.getElementById('copysnip').addEventListener('click', function(){
    navigator.clipboard.writeText(snippet.value).then(function(){toast(T('toast.copied'));}).catch(function(){toast(T('toast.copied'));});
  });
  refresh();
</script>
