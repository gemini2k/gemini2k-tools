<body>

<div class="toolwrap">
  <h1 data-i18n="tool.img2pdf.t">이미지 → PDF 변환</h1>
  <p class="sub" data-i18n="ip.sub">여러 이미지를 원하는 순서로 한 개의 PDF로 만듭니다.</p>

  <div class="card">
    <label for="file" data-i18n="ip.pick">이미지 선택 (여러 장, JPG·PNG·WebP)</label>
    <input type="file" id="file" accept="image/*" multiple/>
    <ul class="flist" id="list"></ul>
    <p class="hint" id="empty" data-i18n="ip.empty">선택된 이미지가 없습니다.</p>

    <div style="margin-top:1rem;max-width:280px;">
      <label for="mode" data-i18n="ip.mode">페이지 크기</label>
      <select id="mode">
        <option value="a4" data-i18n="ip.mode.a4">A4 (이미지를 가운데 맞춤)</option>
        <option value="fit" data-i18n="ip.mode.fit">이미지 원본 크기</option>
      </select>
    </div>
    <div class="row" style="margin-top:1.1rem;">
      <button class="btn" id="make" disabled data-i18n="ip.make">📄 PDF 만들기</button>
      <button class="btn btn-ghost" id="clear" data-i18n="btn.clear">지우기</button>
    </div>
    <p class="hint" data-i18n="pdf.note">모든 처리는 브라우저에서 이루어지며, 파일은 서버로 전송되지 않습니다.</p>
  </div>

  <div class="card" id="resultCard" style="display:none;">
    <p class="hint" id="result" style="margin:0 0 .6rem;"></p>
    <label for="fname" data-i18n="pdf.fname">파일 이름</label>
    <div class="row" style="gap:.5rem;align-items:center;">
      <input type="text" id="fname" style="flex:1;min-width:150px;"/><span style="color:var(--muted);">.pdf</span>
      <button class="btn" id="download" data-i18n="im.dl">⬇️ 다운로드</button>
    </div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  function T(k){ return window.t ? window.t(k) : k; }
  function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1800);}
  function kb(n){ return n<1024 ? n+' B' : n<1048576 ? (n/1024).toFixed(1)+' KB' : (n/1048576).toFixed(2)+' MB'; }
  function stamp(){ var d=new Date(),p=function(n){return(n<10?'0':'')+n;}; return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds()); }
  function fileName(def){ var v=(document.getElementById('fname').value||'').replace(/[\\/:*?"<>|]+/g,'').replace(/\.pdf$/i,'').trim(); return (v||def)+'.pdf'; }
  var fileEl=document.getElementById('file'), listEl=document.getElementById('list'), emptyEl=document.getElementById('empty'),
      makeBtn=document.getElementById('make'), modeEl=document.getElementById('mode'),
      resultCard=document.getElementById('resultCard'), result=document.getElementById('result'), dl=document.getElementById('download');
  var imgs=[], outBlob=null;

  fileEl.addEventListener('change', function(){
    Array.prototype.forEach.call(fileEl.files, function(f){
      if(/^image\//.test(f.type)) imgs.push({name:f.name, file:f, url:URL.createObjectURL(f)});
    });
    fileEl.value=''; render();
  });
  function move(i,d){ var j=i+d; if(j<0||j>=imgs.length) return; var t=imgs[i]; imgs[i]=imgs[j]; imgs[j]=t; render(); }
  function remove(i){ imgs.splice(i,1); render(); }
  function render(){
    listEl.innerHTML = imgs.map(function(f,i){
      return '<li class="fitem"><img src="'+f.url+'" alt=""/><span class="nm">'+(i+1)+'. '+f.name+'</span>'
        + '<button data-a="up" data-i="'+i+'"'+(i===0?' disabled':'')+'>↑</button>'
        + '<button data-a="down" data-i="'+i+'"'+(i===imgs.length-1?' disabled':'')+'>↓</button>'
        + '<button data-a="del" data-i="'+i+'">✕</button></li>';
    }).join('');
    emptyEl.style.display = imgs.length ? 'none' : '';
    makeBtn.disabled = imgs.length < 1;
    resultCard.style.display='none';
  }
  listEl.addEventListener('click', function(e){
    var b=e.target.closest('button'); if(!b) return; var i=+b.dataset.i, a=b.dataset.a;
    if(a==='up') move(i,-1); else if(a==='down') move(i,1); else remove(i);
  });
  document.getElementById('clear').addEventListener('click', function(){ imgs=[]; render(); });

  function toJpeg(file){   // 모든 포맷을 캔버스로 통일 → JPEG (투명은 흰 배경)
    return new Promise(function(resolve, reject){
      var im=new Image();
      im.onload=function(){
        var cv=document.createElement('canvas'); cv.width=im.naturalWidth; cv.height=im.naturalHeight;
        var ctx=cv.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,cv.width,cv.height); ctx.drawImage(im,0,0);
        cv.toBlob(function(b){ b.arrayBuffer().then(function(buf){ resolve({buf:buf, w:cv.width, h:cv.height}); }); }, 'image/jpeg', 0.92);
      };
      im.onerror=function(){ reject(new Error('img')); };
      im.src=URL.createObjectURL(file);
    });
  }

  makeBtn.addEventListener('click', async function(){
    if(!imgs.length){ return; }
    makeBtn.disabled=true; var label=makeBtn.textContent; makeBtn.textContent=T('pdf.processing');
    try{
      var out = await PDFLib.PDFDocument.create();
      var A4=[595.28, 841.89], mode=modeEl.value;
      for(var i=0;i<imgs.length;i++){
        var j = await toJpeg(imgs[i].file);
        var img = await out.embedJpg(j.buf);
        if(mode==='fit'){
          var pg = out.addPage([j.w, j.h]);
          pg.drawImage(img, {x:0, y:0, width:j.w, height:j.h});
        } else {
          var land = j.w > j.h;
          var size = land ? [A4[1], A4[0]] : A4;
          var pg2 = out.addPage(size);
          var sc = Math.min(size[0]/j.w, size[1]/j.h);
          var w=j.w*sc, h=j.h*sc;
          pg2.drawImage(img, {x:(size[0]-w)/2, y:(size[1]-h)/2, width:w, height:h});
        }
      }
      var bytes = await out.save();
      outBlob = new Blob([bytes], {type:'application/pdf'});
      result.textContent = T('ip.done').replace('{p}', out.getPageCount()).replace('{s}', kb(outBlob.size));
      document.getElementById('fname').value = 'images_' + stamp();
      resultCard.style.display='';
    }catch(err){ toast(T('pdf.err')); }
    makeBtn.textContent=label; makeBtn.disabled = imgs.length<1;
  });
  dl.addEventListener('click', function(){
    if(!outBlob) return;
    var a=document.createElement('a'); a.href=URL.createObjectURL(outBlob); a.download=fileName('images');
    document.body.appendChild(a); a.click(); a.remove();
  });
</script>
</body>
