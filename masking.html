<div class="toolwrap">
  <a class="back" href="index.html" data-i18n="back">← 전체 도구</a>
  <h1 data-i18n="tool.mask.t">개인정보 마스킹기</h1>
  <p class="sub" data-i18n="msk.sub">텍스트 속 개인정보를 자동 탐지해 마스킹합니다. 업로드 없이 브라우저에서만.</p>

  <div class="card">
    <label for="input" data-i18n="msk.label">원문 (붙여넣기)</label>
    <textarea id="input" data-i18n-ph="msk.ph" placeholder="개인정보가 포함된 텍스트를 붙여넣으세요…" autofocus></textarea>
    <div class="opts">
      <span style="font-weight:700;" data-i18n="msk.types">탐지 항목</span>
      <label class="chk"><input type="checkbox" id="t_rrn" checked/> <span data-i18n="msk.t.rrn">주민등록번호</span></label>
      <label class="chk"><input type="checkbox" id="t_phone" checked/> <span data-i18n="msk.t.phone">전화번호</span></label>
      <label class="chk"><input type="checkbox" id="t_email" checked/> <span data-i18n="msk.t.email">이메일</span></label>
      <label class="chk"><input type="checkbox" id="t_card" checked/> <span data-i18n="msk.t.card">카드번호</span></label>
    </div>
    <div class="opts">
      <span style="font-weight:700;" data-i18n="msk.style">마스킹 방식</span>
      <select id="style">
        <option value="partial" data-i18n="msk.style.partial">부분 가림</option>
        <option value="full" data-i18n="msk.style.full">전체 가림</option>
        <option value="remove" data-i18n="msk.style.remove">[항목]으로 치환</option>
      </select>
    </div>
    <p class="stat" id="stat"></p>
  </div>

  <div class="card">
    <label for="output" data-i18n="msk.out">결과</label>
    <textarea id="output" data-i18n-ph="msk.outph" placeholder="마스킹 결과가 여기에 표시됩니다." readonly></textarea>
    <div class="row" style="margin-top:.9rem;">
      <button class="btn" id="copy" data-i18n="b64.copy">📋 결과 복사</button>
      <button class="btn btn-ghost" id="clear" data-i18n="btn.clear">지우기</button>
    </div>
    <p class="hint" data-i18n="msk.note">※ 보조 도구입니다 — 결과를 반드시 확인하세요. 계좌번호·이름·주소는 형식이 다양해 자동 탐지에서 제외됩니다. 모든 처리는 브라우저에서만 이루어집니다.</p>

<div class="toast" id="toast"></div>
<script>
  function T(k){ return window.t ? window.t(k) : k; }
  function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1700);}
  var input=document.getElementById('input'), output=document.getElementById('output'), statEl=document.getElementById('stat'), styleSel=document.getElementById('style');
  function star(n){ return new Array(Math.max(1,n)+1).join('*'); }
  function mask(s){
    var st=styleSel.value, n=0;
    function rep(label, partialFn){
      return function(m){ n++; if(st==='remove') return '['+T(label)+']'; if(st==='full') return star(m.length); return partialFn.apply(null, arguments); };
    }
    if(document.getElementById('t_email').checked)
      s=s.replace(/\b([A-Za-z0-9._%+-]+)@([A-Za-z0-9.-]+\.[A-Za-z]{2,})\b/g,
        rep('msk.t.email', function(m,a,b){ return a.slice(0,2)+star(a.length-2)+'@'+b; }));
    if(document.getElementById('t_rrn').checked)
      s=s.replace(/\b(\d{6})[-\s]?(\d{7})\b/g,
        rep('msk.t.rrn', function(m,a,b){ return a+'-'+b.charAt(0)+'******'; }));
    if(document.getElementById('t_card').checked)
      s=s.replace(/\b(\d{4})[-\s]?(\d{4})[-\s]?(\d{4})[-\s]?(\d{4})\b/g,
        rep('msk.t.card', function(m,a,b,c,d){ return a+'-****-****-'+d; }));
    if(document.getElementById('t_phone').checked)
      s=s.replace(/\b(0\d{1,2})[-\s]?(\d{3,4})[-\s]?(\d{4})\b/g,
        rep('msk.t.phone', function(m,a,b,c){ return a+'-'+star(b.length)+'-'+c; }));
    return { text:s, n:n };
  }
  function run(){
    var r = mask(input.value);
    output.value = r.text;
    statEl.textContent = input.value ? T('msk.count').replace('{n}', r.n) : '';
  }
  input.addEventListener('input', run);
  styleSel.addEventListener('change', run);
  ['t_rrn','t_phone','t_email','t_card'].forEach(function(id){ document.getElementById(id).addEventListener('change', run); });
  document.getElementById('copy').addEventListener('click', function(){
    if(!output.value){ toast(T('toast.nocopy')); return; }
    navigator.clipboard.writeText(output.value).then(function(){toast(T('toast.copied'));}).catch(function(){toast(T('toast.copied'));});
  });
  document.getElementById('clear').addEventListener('click', function(){ input.value=''; output.value=''; statEl.textContent=''; input.focus(); });
  window.onI18n = run;
</script>
