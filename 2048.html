<style>
  .gbar{display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap;}
  .scores{display:flex;gap:.6rem;}
  .sbox{background:var(--ground);border:1px solid var(--border);border-radius:10px;padding:.4rem .9rem;text-align:center;min-width:84px;}
  .sbox .l{font-size:.66rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
  .sbox .v{font-size:1.3rem;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;}
  .board{position:relative;background:#bbada0;border-radius:12px;padding:10px;width:100%;max-width:420px;margin:0 auto;
    aspect-ratio:1/1;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:10px;touch-action:none;user-select:none;}
  :root[data-theme="dark"] .board{background:#3a3530;}
  .cell{background:rgba(238,228,218,.35);border-radius:8px;}
  :root[data-theme="dark"] .cell{background:rgba(255,255,255,.06);}
  .tile{position:absolute;display:grid;place-items:center;border-radius:8px;font-weight:800;
    transition:transform .09s ease;font-variant-numeric:tabular-nums;}
  .tile.pop{animation:pop .14s ease;}
  @keyframes pop{0%{transform:scale(.5)}100%{transform:scale(1)}}
  .dpad{display:grid;grid-template-columns:repeat(3,56px);grid-template-rows:repeat(2,56px);gap:.4rem;justify-content:center;margin:1.2rem auto 0;}
  .dpad button{border:1px solid var(--border);background:var(--surface);border-radius:12px;font-size:1.3rem;color:var(--text);cursor:pointer;}
  .dpad button:active{background:var(--accent-soft);}
  .d-up{grid-column:2;grid-row:1;} .d-left{grid-column:1;grid-row:2;} .d-down{grid-column:2;grid-row:2;} .d-right{grid-column:3;grid-row:2;}
  .msg{text-align:center;margin-top:1rem;font-weight:800;font-size:1.1rem;min-height:1.4em;color:var(--accent);}
  .note{margin-top:1.2rem;font-size:.8rem;line-height:1.6;color:var(--muted);background:var(--accent-soft);border:1px solid var(--border);border-radius:10px;padding:.8rem .9rem;}
</style>

<body>
<div class="toolwrap" style="max-width:480px;">
  <h1>2048</h1>
  <p class="sub">같은 숫자 타일을 밀어서 합치세요. 2048 타일을 만들면 승리!</p>

  <div class="howto"><span class="ic">📖</span><div><b>조작법</b><ol>
    <li>PC: 방향키(↑↓←→) · 모바일: 화면을 쓸어넘기기(스와이프)</li>
    <li>아래 방향 버튼으로도 움직일 수 있습니다</li>
    <li>같은 숫자가 만나면 합쳐지고 점수가 오릅니다</li>
  </ol></div></div>

  <div class="card">
    <div class="gbar">
      <button class="btn" id="newgame" type="button">새 게임</button>
      <div class="scores">
        <div class="sbox"><div class="l">점수</div><div class="v" id="score">0</div></div>
        <div class="sbox"><div class="l">최고</div><div class="v" id="best">0</div></div>
      </div>
    </div>
    <div class="board" id="board" tabindex="0" aria-label="2048 보드">
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="dpad">
      <button class="d-up" data-dir="up" aria-label="위">▲</button>
      <button class="d-left" data-dir="left" aria-label="왼쪽">◀</button>
      <button class="d-down" data-dir="down" aria-label="아래">▼</button>
      <button class="d-right" data-dir="right" aria-label="오른쪽">▶</button>
    </div>
    <div class="msg" id="msg"></div>
    <div class="note">모든 진행은 브라우저에서만 이루어지며, 최고 점수만 이 기기에 저장됩니다. 데이터는 전송되지 않습니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  var N=4, board=$('board'), grid, score, best=+(localStorage.getItem('2048:best')||0), won=false, over=false;
  var COLORS={2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'};
  $('best').textContent=best;

  function empty(){ var e=[]; for(var r=0;r<N;r++)for(var c=0;c<N;c++) if(!grid[r][c]) e.push([r,c]); return e; }
  function spawn(){ var e=empty(); if(!e.length) return; var p=e[Math.floor(Math.random()*e.length)]; grid[p[0]][p[1]]=Math.random()<0.9?2:4; }
  function reset(){ grid=[]; for(var r=0;r<N;r++){grid.push([0,0,0,0]);} score=0; won=false; over=false; $('msg').textContent=''; spawn(); spawn(); render(true); }

  function render(pop){
    // 기존 타일 제거
    board.querySelectorAll('.tile').forEach(function(t){t.remove();});
    var pad=10, gap=10, size=(board.clientWidth - pad*2 - gap*3)/4;
    for(var r=0;r<N;r++)for(var c=0;c<N;c++){ var v=grid[r][c]; if(!v) continue;
      var t=document.createElement('div'); t.className='tile'+(pop?' pop':'');
      t.style.width=t.style.height=size+'px';
      t.style.transform='translate('+(pad+c*(size+gap))+'px,'+(pad+r*(size+gap))+'px)';
      t.style.background=COLORS[v]||'#3c3a32';
      t.style.color=v<=4?'#776e65':'#fff';
      t.style.fontSize=(v<100?size*0.42:v<1000?size*0.34:size*0.26)+'px';
      t.textContent=v; board.appendChild(t);
    }
    $('score').textContent=score;
    if(score>best){ best=score; localStorage.setItem('2048:best',best); $('best').textContent=best; }
  }

  function slide(row){ // 왼쪽으로 압축+병합
    var a=row.filter(function(x){return x;}), gained=0;
    for(var i=0;i<a.length-1;i++){ if(a[i]===a[i+1]){ a[i]*=2; gained+=a[i]; if(a[i]===2048) won=true; a.splice(i+1,1); } }
    while(a.length<N) a.push(0);
    return {row:a, gained:gained};
  }
  function rotate(g){ var n=[]; for(var c=0;c<N;c++){ n.push([]); for(var r=N-1;r>=0;r--) n[c].push(g[r][c]); } return n; } // 시계방향
  function move(dir){
    if(over) return;
    var rot = dir==='left'?0 : dir==='up'?3 : dir==='right'?2 : 1;
    var g=grid; for(var i=0;i<rot;i++) g=rotate(g);
    var moved=false, gain=0, ng=[];
    for(var r=0;r<N;r++){ var s=slide(g[r]); ng.push(s.row); gain+=s.gained; if(s.row.join()!==g[r].join()) moved=true; }
    for(var j=0;j<(4-rot)%4;j++) ng=rotate(ng);
    if(!moved) return;
    grid=ng; score+=gain; spawn(); render(true);
    if(won){ $('msg').textContent='🎉 2048 달성! 계속 도전하세요'; won=false; }
    if(!canMove()){ over=true; $('msg').textContent='게임 오버 — 새 게임을 눌러 다시 시작'; }
  }
  function canMove(){ if(empty().length) return true;
    for(var r=0;r<N;r++)for(var c=0;c<N;c++){ var v=grid[r][c]; if((c<N-1&&grid[r][c+1]===v)||(r<N-1&&grid[r+1][c]===v)) return true; } return false; }

  document.addEventListener('keydown', function(e){
    var m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'}[e.key];
    if(m){ e.preventDefault(); move(m); }
  });
  document.querySelector('.dpad').addEventListener('click', function(e){ var b=e.target.closest('button'); if(b) move(b.dataset.dir); });
  $('newgame').addEventListener('click', reset);
  // 스와이프
  var sx,sy;
  board.addEventListener('touchstart', function(e){ var t=e.touches[0]; sx=t.clientX; sy=t.clientY; }, {passive:true});
  board.addEventListener('touchend', function(e){ if(sx==null) return; var t=e.changedTouches[0], dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.max(Math.abs(dx),Math.abs(dy))<24){ sx=null; return; }
    move(Math.abs(dx)>Math.abs(dy) ? (dx>0?'right':'left') : (dy>0?'down':'up')); sx=null; });
  window.addEventListener('resize', function(){ render(false); });
  reset();
</script>
