<script id="md-sample" type="text/plain"># 안녕하세요 👋

**마크다운 에디터**에 오신 것을 환영합니다.

- 왼쪽에 작성하면
- 오른쪽에 *실시간* 미리보기

> 인용문도 지원합니다.

```js
console.log("Hello, world!");
```

| 기능 | 지원 |
|------|:---:|
| 표 | ✅ |
| 코드 | ✅ |
</script>

<script>
  function T(k){ return window.t ? window.t(k) : k; }
  function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1700);}
  function stamp(){ var d=new Date(),p=function(n){return(n<10?'0':'')+n;}; return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds()); }
  var md=document.getElementById('md'), preview=document.getElementById('preview');
  if(window.marked){ marked.setOptions({ breaks:true, gfm:true }); }
  function render(){
    var html = window.marked ? marked.parse(md.value) : md.value;
    preview.innerHTML = window.DOMPurify ? DOMPurify.sanitize(html) : html;
  }
  function wrap(pre, post, placeholder){
    var s=md.selectionStart, e=md.selectionEnd, val=md.value, sel=val.slice(s,e)||placeholder||'';
    md.value = val.slice(0,s) + pre + sel + post + val.slice(e);
    md.focus(); md.selectionStart = s+pre.length; md.selectionEnd = s+pre.length+sel.length;
    render();
  }
  function linePrefix(prefix){
    var s=md.selectionStart, val=md.value, ls=val.lastIndexOf('\n', s-1)+1;
    md.value = val.slice(0,ls) + prefix + val.slice(ls);
    md.focus(); md.selectionStart = md.selectionEnd = s+prefix.length; render();
  }
  document.querySelector('.mdtools').addEventListener('click', function(ev){
    var b=ev.target.closest('button'); if(!b) return; var a=b.dataset.md;
    if(a==='h') linePrefix('## ');
    else if(a==='b') wrap('**','**','굵게');
    else if(a==='i') wrap('*','*','기울임');
    else if(a==='link') wrap('[','](https://)','링크');
    else if(a==='code') wrap('`','`','코드');
    else if(a==='ul') linePrefix('- ');
    else if(a==='quote') linePrefix('> ');
  });
  md.addEventListener('input', render);
  document.getElementById('copyhtml').addEventListener('click', function(){
    navigator.clipboard.writeText(preview.innerHTML).then(function(){toast(T('toast.copied'));}).catch(function(){toast(T('toast.copied'));});
  });
  function save(name, content, type){
    var a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([content],{type:type})); a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
  }
  document.getElementById('dlmd').addEventListener('click', function(){ save('markdown_'+stamp()+'.md', md.value, 'text/markdown'); });
  document.getElementById('dlhtml').addEventListener('click', function(){
    var doc='<!doctype html><html><head><meta charset="utf-8"><script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "마크다운 에디터",
  "description": "마크다운을 작성하면 실시간으로 미리보기를 보여주고 HTML·MD로 내보내는 무료 온라인 에디터. 업로드 없이 브라우저에서 바로.",
  "url": "https://gemini2k.co.kr/markdown.html",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Web",
  "inLanguage": "ko",
  "isAccessibleForFree": true,
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "KRW"
  },
  "publisher": {
    "@type": "Organization",
    "name": "빛의여행(gemini2k) 도구",
    "url": "https://gemini2k.co.kr/"
  }
}
</script>
</head><body>'+preview.innerHTML+'</body></html>';
    save('markdown_'+stamp()+'.html', doc, 'text/html');
  });
  md.value = (document.getElementById('md-sample').textContent || '').replace(/^\n/, '');
  render();
</script>
