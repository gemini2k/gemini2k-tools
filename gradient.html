<body>
<div class="toolwrap">
  <h1>CSS 그라데이션 생성기</h1>
  <p class="sub">선형·원형 그라데이션을 눈으로 보며 만들고, 그대로 쓸 수 있는 CSS를 복사하거나 PNG 이미지로 내려받습니다.</p>

  <div class="howto"><span class="ic">📖</span><div><b>사용 방법</b><ol>
    <li>유형(선형/원형)과 각도를 고릅니다</li>
    <li>색상 정지점의 색과 위치를 조절하거나 ‘＋ 색상 추가’로 늘립니다</li>
    <li>아래 CSS를 복사하거나 PNG로 내려받습니다</li>
  </ol></div></div>

  <div class="card">
    <div class="preview" id="preview"></div>
    <div class="row">
      <label>유형 <select id="type"><option value="linear">선형(linear)</option><option value="radial">원형(radial)</option></select></label>
      <label id="angleWrap">각도 <input id="angle" type="range" min="0" max="360" value="90"/> <span class="pos" id="angleVal">90°</span></label>
    </div>
    <div class="stops" id="stops"></div>
    <div class="actions">
      <button class="btn btn-ghost" id="add" type="button">＋ 색상 추가</button>
      <button class="btn btn-ghost" id="random" type="button">🎲 랜덤</button>
    </div>
    <textarea class="css-out" id="css" readonly></textarea>
    <div class="actions" style="margin-top:.8rem;margin-bottom:0;">
      <button class="btn" id="copy" type="button">📋 CSS 복사</button>
      <button class="btn btn-ghost" id="dl" type="button">⬇️ PNG 내려받기</button>
    </div>
    <div class="note">생성된 <code>background</code> 값을 그대로 CSS에 붙여 넣으면 됩니다. PNG는 1200×600 크기로 저장됩니다. 모든 처리는 브라우저에서 이루어집니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }
  var stops=[{c:'#7C3AED',p:0},{c:'#2DD4BF',p:100}];

  function renderStops(){
    $('stops').innerHTML='';
    stops.forEach(function(st,i){
      var row=document.createElement('div'); row.className='stop';
      row.innerHTML='<input type="color" value="'+st.c+'"/>'
        +'<input type="text" value="'+st.c.toUpperCase()+'"/>'
        +'<input type="range" min="0" max="100" value="'+st.p+'"/>'
        +'<span class="pos">'+st.p+'%</span>'
        +'<button class="del" title="삭제" type="button">✕</button>';
      var col=row.children[0], hex=row.children[1], rng=row.children[2], pos=row.children[3], del=row.children[4];
      col.addEventListener('input', function(){ st.c=col.value; hex.value=col.value.toUpperCase(); update(); });
      hex.addEventListener('input', function(){ if(/^#?[0-9a-fA-F]{6}$/.test(hex.value)){ st.c=(hex.value[0]==='#'?'':'#')+hex.value; col.value=st.c; update(); } });
      rng.addEventListener('input', function(){ st.p=+rng.value; pos.textContent=rng.value+'%'; update(); });
      del.addEventListener('click', function(){ if(stops.length<=2){ toast('정지점은 최소 2개입니다'); return; } stops.splice(i,1); renderStops(); update(); });
      $('stops').appendChild(row);
    });
  }
  function cssValue(){
    var ordered=stops.slice().sort(function(a,b){return a.p-b.p;});
    var list=ordered.map(function(s){return s.c+' '+s.p+'%';}).join(', ');
    return $('type').value==='radial' ? 'radial-gradient(circle, '+list+')' : 'linear-gradient('+$('angle').value+'deg, '+list+')';
  }
  function update(){
    var v=cssValue();
    $('preview').style.background=v;
    $('css').value='background: '+v+';';
    $('angleWrap').style.display = $('type').value==='radial' ? 'none' : '';
  }
  $('type').addEventListener('change', update);
  $('angle').addEventListener('input', function(){ $('angleVal').textContent=this.value+'°'; update(); });
  $('add').addEventListener('click', function(){ if(stops.length>=8){ toast('정지점은 최대 8개입니다'); return; } stops.push({c:'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'),p:50}); renderStops(); update(); });
  $('random').addEventListener('click', function(){
    var n=2+Math.floor(Math.random()*3); stops=[];
    for(var i=0;i<n;i++) stops.push({c:'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'), p:Math.round(i/(n-1)*100)});
    $('angle').value=Math.floor(Math.random()*360); $('angleVal').textContent=$('angle').value+'°'; renderStops(); update();
  });
  $('copy').addEventListener('click', function(){ navigator.clipboard.writeText($('css').value).then(function(){ toast('CSS를 복사했습니다'); }); });
  $('dl').addEventListener('click', function(){
    var W=1200,H=600, cv=document.createElement('canvas'); cv.width=W; cv.height=H; var x=cv.getContext('2d');
    var ordered=stops.slice().sort(function(a,b){return a.p-b.p;}), g;
    if($('type').value==='radial'){ g=x.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)/2); }
    else { var a=(+$('angle').value-90)*Math.PI/180, cx=W/2,cy=H/2, len=Math.abs(W*Math.cos(a))/2+Math.abs(H*Math.sin(a))/2;
      g=x.createLinearGradient(cx-Math.cos(a)*len, cy-Math.sin(a)*len, cx+Math.cos(a)*len, cy+Math.sin(a)*len); }
    ordered.forEach(function(s){ g.addColorStop(Math.min(1,Math.max(0,s.p/100)), s.c); });
    x.fillStyle=g; x.fillRect(0,0,W,H);
    var url=cv.toDataURL('image/png'), aEl=document.createElement('a'); aEl.href=url; aEl.download='gradient.png'; document.body.appendChild(aEl); aEl.click(); setTimeout(function(){aEl.remove();},100);
  });
  renderStops(); update();
</script>
</body>
