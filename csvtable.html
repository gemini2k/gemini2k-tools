<body>
<div class="toolwrap" style="max-width:860px;">
  <h1>CSV → 표 변환기</h1>
  <p class="sub">CSV를 깃허브·블로그·문서에 바로 붙여 넣을 수 있는 마크다운 표와 HTML 표로 바꿉니다. 미리보기로 결과를 확인하세요.</p>

  <div class="card">
    <label for="input">CSV 입력</label>
    <textarea id="input" placeholder="이름,점수,비고&#10;홍길동,95,우수&#10;김영희,88,"></textarea>
    <div class="opts">
      <label><input type="checkbox" id="hasHeader" checked/> 첫 행을 머리글로</label>
    </div>
    <div class="seg">
      <button id="tMd" class="on" type="button">Markdown</button>
      <button id="tHtml" type="button">HTML</button>
    </div>
    <textarea id="out" class="out" readonly></textarea>
    <div class="actions" style="margin-top:.8rem;">
      <button class="btn" id="copy" type="button">📋 복사</button>
      <button class="btn btn-ghost" id="sample" type="button">샘플</button>
    </div>
    <div class="pv" id="preview"></div>
    <div class="note">구분자(쉼표·세미콜론·탭)는 자동 감지합니다. 마크다운 표는 GitHub·노션 등에서, HTML 표는 웹페이지에 바로 쓸 수 있습니다. 모든 변환은 브라우저에서만 이루어집니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }
  function esc(s){ return String(s).replace(/[&<>]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]);}); }
  var fmt='md';

  function build(){
    var text=$('input').value;
    if(!text.trim()){ $('out').value=''; $('preview').innerHTML=''; return; }
    var parsed=CSV.parse(text, {header:false, delimiter:'auto'});
    var matrix=parsed.rows; if(!matrix.length){ $('out').value=''; $('preview').innerHTML=''; return; }
    var hasH=$('hasHeader').checked;
    var header = hasH ? matrix[0] : matrix[0].map(function(_,i){return '열'+(i+1);});
    var body = hasH ? matrix.slice(1) : matrix;
    var cols=header.length;
    body=body.map(function(r){ var x=r.slice(); while(x.length<cols)x.push(''); return x.slice(0,cols); });

    if(fmt==='md'){
      var mdCell=function(s){ return String(s).replace(/\|/g,'\\|').replace(/\n/g,' '); };
      var out='| '+header.map(mdCell).join(' | ')+' |\n';
      out+='| '+header.map(function(){return '---';}).join(' | ')+' |\n';
      out+=body.map(function(r){ return '| '+r.map(mdCell).join(' | ')+' |'; }).join('\n');
      $('out').value=out;
    } else {
      var h='<table>\n  <thead>\n    <tr>'+header.map(function(c){return '<th>'+esc(c)+'</th>';}).join('')+'</tr>\n  </thead>\n  <tbody>\n';
      h+=body.map(function(r){ return '    <tr>'+r.map(function(c){return '<td>'+esc(c)+'</td>';}).join('')+'</tr>'; }).join('\n');
      h+='\n  </tbody>\n</table>';
      $('out').value=h;
    }
    // 미리보기(항상 실제 표)
    var pv='<table><thead><tr>'+header.map(function(c){return '<th>'+esc(c)+'</th>';}).join('')+'</tr></thead><tbody>';
    pv+=body.map(function(r){return '<tr>'+r.map(function(c){return '<td>'+esc(c)+'</td>';}).join('')+'</tr>';}).join('');
    pv+='</tbody></table>';
    $('preview').innerHTML=pv;
  }
  function setFmt(f){ fmt=f; $('tMd').classList.toggle('on',f==='md'); $('tHtml').classList.toggle('on',f==='html'); build(); }
  $('tMd').addEventListener('click',function(){setFmt('md');});
  $('tHtml').addEventListener('click',function(){setFmt('html');});
  $('input').addEventListener('input', build);
  $('hasHeader').addEventListener('change', build);
  $('copy').addEventListener('click',function(){ if(!$('out').value) return; navigator.clipboard.writeText($('out').value).then(function(){ toast('복사됐습니다'); }); });
  $('sample').addEventListener('click',function(){ $('input').value='이름,점수,비고\n홍길동,95,우수\n김영희,88,\n이철수,72,재시험'; build(); });
  build();
</script>
