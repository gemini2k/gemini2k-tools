<div class="toolwrap">
  <a class="back" href="index.html" data-i18n="back">← 전체 도구</a>
  <h1 data-i18n="tool.base64.t">Base64 인코더·디코더</h1>
  <p class="sub" data-i18n="b64.sub">텍스트를 Base64로 인코딩하거나, Base64를 원래 텍스트로 디코딩합니다. (한글 UTF-8 지원)</p>

  <div class="card">
    <label for="input" data-i18n="b64.in">입력</label>
    <textarea id="input" data-i18n-ph="b64.inph" placeholder="텍스트 또는 Base64 문자열을 입력하세요…" autofocus></textarea>
    <div class="row" style="margin-top:1rem;">
      <button class="btn" data-act="encode" data-i18n="b64.enc">인코딩 →</button>
      <button class="btn btn-ghost" data-act="decode" data-i18n="b64.dec">← 디코딩</button>
    </div>
    <label for="output" style="margin-top:1.2rem;" data-i18n="b64.out">결과</label>
    <textarea id="output" data-i18n-ph="b64.outph" placeholder="결과가 여기에 표시됩니다." readonly></textarea>
    <div class="row" style="margin-top:.9rem;">
      <button class="btn" data-act="copy" data-i18n="b64.copy">📋 결과 복사</button>
      <button class="btn btn-ghost" data-act="clear" data-i18n="btn.clear">지우기</button>
    </div>
    <p class="hint" data-i18n="b64.hint">모든 처리는 브라우저에서만 이루어집니다.</p>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
  var inp=document.getElementById('input'), out=document.getElementById('output');
  function T(k){ return window.t ? window.t(k) : k; }
  function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1600);}
  function enc(s){ return btoa(unescape(encodeURIComponent(s))); }       // UTF-8 안전
  function dec(s){ return decodeURIComponent(escape(atob(s.trim()))); }
  document.querySelectorAll('[data-act]').forEach(function(b){
    b.addEventListener('click', function(){
      var a=b.dataset.act;
      if(a==='copy'){ if(!out.value){toast(T('toast.nocopy'));return;} navigator.clipboard.writeText(out.value).then(function(){toast(T('toast.copied'));}).catch(function(){toast(T('b64.failed'));}); return; }
      if(a==='clear'){ inp.value=''; out.value=''; inp.focus(); return; }
      if(!inp.value){ toast(T('b64.noinput')); return; }
      try{ out.value = a==='encode' ? enc(inp.value) : dec(inp.value); }
      catch(e){ out.value=''; toast(a==='decode' ? T('b64.badb64') : T('b64.failed')); }
    });
  });
</script>
