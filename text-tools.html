<body>
<header class="top"><div class="top-in">
  <a class="logo" href="index.html"><span class="mk">🧰</span> 빛의여행(gemini2k) 도구</a>
  <nav><a href="index.html">전체 도구</a><a href="https://gemini2k.kr" target="_blank" rel="noopener">블로그</a></nav>
</div></header>

<div class="toolwrap">
  <a class="back" href="index.html">← 전체 도구</a>
  <h1>텍스트 정리 도구</h1>
  <p class="sub">버튼을 누르면 아래 텍스트가 바로 정리됩니다.</p>

  <div class="card">
    <label for="t">텍스트</label>
    <textarea id="t" placeholder="여기에 텍스트를 입력하거나 붙여넣으세요…" autofocus></textarea>
    <div class="row" style="margin-top:1rem;">
      <button class="btn btn-ghost" data-act="upper">대문자</button>
      <button class="btn btn-ghost" data-act="lower">소문자</button>
      <button class="btn btn-ghost" data-act="title">단어 첫글자 대문자</button>
      <button class="btn btn-ghost" data-act="spaces">공백 정리</button>
      <button class="btn btn-ghost" data-act="blank">빈 줄 제거</button>
      <button class="btn btn-ghost" data-act="dedup">중복 줄 제거</button>
      <button class="btn btn-ghost" data-act="sort">줄 가나다 정렬</button>
      <button class="btn btn-ghost" data-act="nl2sp">줄바꿈→공백</button>
    </div>
    <div class="row" style="margin-top:.9rem;">
      <button class="btn" data-act="copy">📋 복사</button>
      <button class="btn btn-ghost" data-act="clear">지우기</button>
    </div>
    <p class="hint" id="info"></p>
  </div>
</div>

<footer class="foot"><div class="foot-in">
  <span>© 빛의여행(gemini2k) 도구</span><span>· 모든 처리는 브라우저에서</span>
  <span class="sp"></span><a href="index.html">다른 도구 보기 →</a>
</div></footer>

<div class="toast" id="toast"></div>
<script>
  var t=document.getElementById('t'), info=document.getElementById('info');
  function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1600);}
  function lines(s){ return s.split(/\r?\n/); }
  var ACT={
    upper:function(s){return s.toUpperCase();},
    lower:function(s){return s.toLowerCase();},
    title:function(s){return s.replace(/\S+/g,function(w){return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();});},
    spaces:function(s){return lines(s).map(function(l){return l.replace(/\s+/g,' ').trim();}).join('\n');},
    blank:function(s){return lines(s).filter(function(l){return l.trim()!=='';}).join('\n');},
    dedup:function(s){var seen={},out=[];lines(s).forEach(function(l){if(!seen[l]){seen[l]=1;out.push(l);}});return out.join('\n');},
    sort:function(s){return lines(s).sort(function(a,b){return a.localeCompare(b,'ko');}).join('\n');},
    nl2sp:function(s){return s.replace(/\r?\n/g,' ').replace(/\s+/g,' ').trim();}
  };
  function update(){ var n=t.value?lines(t.value).length:0; info.textContent='글자 '+t.value.length+' · 줄 '+n; }
  document.querySelectorAll('[data-act]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var a=btn.dataset.act;
      if(a==='copy'){ if(!t.value){toast('복사할 내용이 없습니다');return;}
        navigator.clipboard.writeText(t.value).then(function(){toast('복사됐습니다');}).catch(function(){toast('복사 실패');}); return; }
      if(a==='clear'){ t.value=''; update(); t.focus(); return; }
      if(ACT[a]){ t.value=ACT[a](t.value); update(); toast('정리 완료'); }
    });
  });
  t.addEventListener('input', update); update();
</script>
</body>
</html>
