<div class="toolwrap">

  <h1 data-i18n="tool.text.t">텍스트 정리 도구</h1>
  <p class="sub" data-i18n="tt.sub">버튼을 누르면 아래 텍스트가 바로 정리됩니다.</p>

  <div class="card">
    <label for="t" data-i18n="tt.label">텍스트</label>
    <textarea id="t" data-i18n-ph="tt.ph" placeholder="여기에 텍스트를 입력하거나 붙여넣으세요…" autofocus></textarea>
    <div class="row" style="margin-top:1rem;">
      <button class="btn btn-ghost" data-act="upper" data-i18n="tt.upper">대문자</button>
      <button class="btn btn-ghost" data-act="lower" data-i18n="tt.lower">소문자</button>
      <button class="btn btn-ghost" data-act="title" data-i18n="tt.title">단어 첫글자 대문자</button>
      <button class="btn btn-ghost" data-act="spaces" data-i18n="tt.spaces">공백 정리</button>
      <button class="btn btn-ghost" data-act="blank" data-i18n="tt.blank">빈 줄 제거</button>
      <button class="btn btn-ghost" data-act="dedup" data-i18n="tt.dedup">중복 줄 제거</button>
      <button class="btn btn-ghost" data-act="sort" data-i18n="tt.sort">줄 가나다 정렬</button>
      <button class="btn btn-ghost" data-act="nl2sp" data-i18n="tt.nl2sp">줄바꿈→공백</button>
    </div>
    <div class="row" style="margin-top:.9rem;">
      <button class="btn" data-act="copy" data-i18n="lot.copy">📋 복사</button>
      <button class="btn btn-ghost" data-act="clear" data-i18n="btn.clear">지우기</button>
    </div>
    <p class="hint" id="info"></p>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
  var t=document.getElementById('t'), info=document.getElementById('info');
  function T(k){ return window.t ? window.t(k) : k; }
  function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1600);}
  function lines(s){ return s.split(/\r?\n/); }
  var ACT={
    upper:function(s){return s.toUpperCase();},
    lower:function(s){return s.toLowerCase();},
    title:function(s){return s.replace(/\S+/g,function(w){return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();});},
    spaces:function(s){return lines(s).map(function(l){return l.replace(/\s+/g,' ').trim();}).join('\n');},
    blank:function(s){return lines(s).filter(function(l){return l.trim()!=='';}).join('\n');},
    dedup:function(s){var seen={},out=[];lines(s).forEach(function(l){if(!seen[l]){seen[l]=1;out.push(l);}});return out.join('\n');},
    sort:function(s){var lc=window.curLang?window.curLang():'ko';return lines(s).sort(function(a,b){return a.localeCompare(b,lc);}).join('\n');},
    nl2sp:function(s){return s.replace(/\r?\n/g,' ').replace(/\s+/g,' ').trim();}
  };
  function update(){ var n=t.value?lines(t.value).length:0; info.textContent=T('tt.info').replace('{c}',t.value.length).replace('{l}',n); }
  document.querySelectorAll('[data-act]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var a=btn.dataset.act;
      if(a==='copy'){ if(!t.value){toast(T('toast.nocopy'));return;}
        navigator.clipboard.writeText(t.value).then(function(){toast(T('toast.copied'));}).catch(function(){toast(T('toast.copied'));}); return; }
      if(a==='clear'){ t.value=''; update(); t.focus(); return; }
      if(ACT[a]){ t.value=ACT[a](t.value); update(); toast(T('tt.done')); }
    });
  });
  window.onI18n = update;
  t.addEventListener('input', update); update();
</script>
