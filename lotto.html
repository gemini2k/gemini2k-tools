<body>

<div class="toolwrap">
  <h1 data-i18n="tool.lotto.t">로또 번호 생성기</h1>
  <p class="sub" data-i18n="lot.sub">1~45 중 6개를 무작위로 뽑아 5게임을 생성합니다.</p>

  <div class="card">
    <div class="games" id="games"></div>
    <div class="row" style="margin-top:1.3rem;">
      <button class="btn" id="gen" data-i18n="lot.gen">🎲 번호 생성</button>
      <button class="btn btn-ghost" id="copy" data-i18n="lot.copy">📋 복사</button>
    </div>
    <p class="hint" data-i18n="lot.hint">재미로 즐기세요. 당첨을 보장하지 않으며, 암호학적 난수로 공정하게 추첨합니다.</p>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var box=document.getElementById('games');
  function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1600);}
  function rnd(n){ var a=new Uint32Array(1), lim=Math.floor(0xFFFFFFFF/n)*n, x; do{crypto.getRandomValues(a);x=a[0];}while(x>=lim); return x%n; }
  function pick6(){ var pool=[]; for(var i=1;i<=45;i++) pool.push(i);
    for(var k=0;k<6;k++){ var j=k+rnd(pool.length-k); var t=pool[k]; pool[k]=pool[j]; pool[j]=t; }
    return pool.slice(0,6).sort(function(a,b){return a-b;}); }
  function cls(n){ return n<=10?'b1':n<=20?'b2':n<=30?'b3':n<=40?'b4':'b5'; }
  function gen(){
    var html='';
    for(var g=0; g<5; g++){
      var nums=pick6();
      html+='<div class="game"><span class="lbl">'+String.fromCharCode(65+g)+'</span>'
        + nums.map(function(n){return '<span class="ball '+cls(n)+'">'+n+'</span>';}).join('') + '</div>';
    }
    box.innerHTML=html;
  }
  function text(){
    return Array.from(box.querySelectorAll('.game')).map(function(row){
      var lbl=row.querySelector('.lbl').textContent;
      var ns=Array.from(row.querySelectorAll('.ball')).map(function(b){return b.textContent;}).join(', ');
      return lbl+': '+ns;
    }).join('\n');
  }
  document.getElementById('gen').addEventListener('click', gen);
  document.getElementById('copy').addEventListener('click', function(){
    var s=text(); if(!s){toast(window.t?window.t('lot.nogen'):'먼저 번호를 생성하세요');return;}
    var ok=window.t?window.t('toast.copied'):'복사됐습니다';
    navigator.clipboard.writeText(s).then(function(){toast(ok);}).catch(function(){toast(ok);});
  });
  gen();
</script>
