server {
    listen 80;
    server_name 54.180.32.78 gemini2k.co.kr www.gemini2k.co.kr;
    root /var/www/tools;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
    # 정적 자산 캐시
    location ~* \.(css|js|png|jpg|jpeg|webp|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
