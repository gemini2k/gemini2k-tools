  textarea{width:100%;min-height:160px;padding:.8rem .9rem;border:1px solid var(--border);border-radius:11px;background:var(--input-bg);font-family:inherit;font-size:1rem;line-height:1.7;color:var(--text);resize:vertical;}

<body>
<div class="toolwrap">
  <h1>텍스트 통계·읽기 시간</h1>
  <p class="sub">문장·단어·문단 수와 평균 문장 길이, 예상 읽기 시간을 실시간으로 보여 줍니다. 글자 수 세기와 달리 ‘읽는 데 걸리는 시간’에 초점을 둡니다.</p>

  <div class="card">
    <textarea id="t" placeholder="여기에 글을 붙여 넣으면 자동으로 분석됩니다."></textarea>
    <div class="grid" id="grid"></div>
    <div class="read" id="read"></div>
    <div class="note">문장은 마침표·물음표·느낌표(. ? ! 。)로, 문단은 빈 줄로 나눕니다. 읽기 시간은 낭독 약 300자/분, 묵독 약 500자/분(한국어 기준)으로 추정하며 글에 따라 달라집니다. 모든 분석은 브라우저에서 이루어집니다.</div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  function calc(){
    var t=$('t').value;
    var chars=t.length, noSpace=t.replace(/\s/g,'').length;
    var words=(t.trim().match(/\S+/g)||[]).length;
    var sentences=(t.match(/[^.!?。\n]+[.!?。]+|\S[^.!?。\n]*$/g)||[]).filter(function(s){return s.trim();}).length;
    var paras=t.split(/\n\s*\n/).filter(function(p){return p.trim();}).length;
    var avg = sentences? Math.round(words/sentences*10)/10 : 0;
    $('grid').innerHTML=[['단어',words],['문장',sentences],['문단',paras],['글자',chars],['공백 제외',noSpace],['문장당 단어',avg]]
      .map(function(s){return '<div class="stat"><div class="v">'+s[1].toLocaleString('ko-KR')+'</div><div class="l">'+s[0]+'</div></div>';}).join('');
    function tm(cpm){ var sec=Math.round(noSpace/cpm*60); if(sec<60) return sec+'초'; var m=Math.floor(sec/60); return m+'분 '+(sec%60)+'초'; }
    $('read').innerHTML='<span class="pill">🗣️ 낭독 약 '+tm(300)+'</span><span class="pill">👀 묵독 약 '+tm(500)+'</span>';
  }
  $('t').addEventListener('input', calc);
  calc();
</script>
</body>
