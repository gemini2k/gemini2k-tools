<div class="toolwrap">
  <a class="back" href="index.html" data-i18n="back">← 전체 도구</a>
  <h1 data-i18n="tool.unit.t">단위 변환기</h1>
  <p class="sub" data-i18n="un.sub">길이·무게·넓이·온도를 즉시 변환합니다.</p>

  <div class="card">
    <div class="chips" id="cats" style="padding:0;margin-bottom:1.2rem;justify-content:flex-start;"></div>
    <div class="row" style="align-items:flex-end;gap:.6rem;">
      <div style="flex:1;min-width:130px;">
        <label for="fval" data-i18n="un.val">값</label>
        <input type="number" id="fval" value="1" step="any"/>
      </div>
      <div style="flex:1;min-width:110px;">
        <label for="funit" data-i18n="un.from">기준 단위</label>
        <select id="funit"></select>
      </div>
      <button class="btn btn-ghost" id="swap" title="단위 교환" style="padding:.75rem .9rem;">⇅</button>
      <div style="flex:1;min-width:110px;">
        <label for="tunit" data-i18n="un.to">변환 단위</label>
        <select id="tunit"></select>
      </div>
    </div>
    <div class="result big" style="margin-top:1.2rem;"><span class="val" id="out">—</span></div>
    <p class="hint" id="formula"></p>
  </div>
</div>

<script>
  // 길이/무게/넓이 = 기준단위 대비 배수. 온도는 별도 처리.
  var DATA = {
    '길이': { 'm':1, 'km':1000, 'cm':0.01, 'mm':0.001, 'inch':0.0254, 'ft':0.3048, 'yd':0.9144, 'mile':1609.344 },
    '무게': { 'g':1, 'kg':1000, 'mg':0.001, 't':1000000, 'lb':453.59237, 'oz':28.349523 },
    '넓이': { 'm²':1, '평':3.3057851, 'km²':1000000, 'ha':10000, 'ft²':0.09290304, '㏊':10000 },
    '온도': { '℃':1, '℉':1, 'K':1 }   // 값은 placeholder, 변환은 함수로
  };
  function T(k){ return window.t ? window.t(k) : k; }
  var CATKEY = { '길이':'un.cat.length','무게':'un.cat.weight','넓이':'un.cat.area','온도':'un.cat.temp' };
  var cur = '길이';
  var cats = document.getElementById('cats'), fval = document.getElementById('fval'),
      funit = document.getElementById('funit'), tunit = document.getElementById('tunit'),
      out = document.getElementById('out'), formula = document.getElementById('formula'),
      swap = document.getElementById('swap');

  function renderCats(){
    cats.innerHTML = Object.keys(DATA).map(function(c){
      return '<button class="chip'+(c===cur?' on':'')+'" data-c="'+c+'">'+T(CATKEY[c])+'</button>';
    }).join('');
  }

  function fillUnits(){
    var keys = Object.keys(DATA[cur]);
    var opt = keys.map(function(u){ return '<option>'+u+'</option>'; }).join('');
    funit.innerHTML = opt; tunit.innerHTML = opt;
    funit.selectedIndex = 0; tunit.selectedIndex = Math.min(1, keys.length-1);
  }
  function tempTo(v,u){ return u==='℃'? v : u==='℉'? (v-32)*5/9 : v-273.15; }   // → ℃
  function tempFrom(c,u){ return u==='℃'? c : u==='℉'? c*9/5+32 : c+273.15; }    // ℃ →
  function round(n){ return Math.round(n*1e6)/1e6; }

  function calc(){
    var v = parseFloat(fval.value), fu = funit.value, tu = tunit.value;
    if(isNaN(v)){ out.textContent='—'; formula.textContent=''; return; }
    var r;
    if(cur==='온도'){ r = tempFrom(tempTo(v, fu), tu); }
    else { r = v * DATA[cur][fu] / DATA[cur][tu]; }
    out.textContent = round(r).toLocaleString(undefined, {maximumFractionDigits:6}) + ' ' + tu;
    formula.textContent = v.toLocaleString() + ' ' + fu + ' = ' + round(r).toLocaleString(undefined,{maximumFractionDigits:6}) + ' ' + tu;
  }
  cats.addEventListener('click', function(e){
    var b=e.target.closest('.chip'); if(!b) return;
    cur=b.dataset.c; cats.querySelectorAll('.chip').forEach(function(c){c.classList.toggle('on',c===b);});
    fillUnits(); calc();
  });
  [fval,funit,tunit].forEach(function(el){ el.addEventListener('input', calc); });
  swap.addEventListener('click', function(){
    var i=funit.selectedIndex; funit.selectedIndex=tunit.selectedIndex; tunit.selectedIndex=i; calc();
  });
  window.onI18n = function(){ renderCats(); swap.title = T('un.swap'); calc(); };
  renderCats(); fillUnits(); calc();
</script>
