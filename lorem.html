<body>
<div class="toolwrap">
  <h1>더미 텍스트 생성기</h1>
  <p class="sub">Lorem ipsum 또는 한글 더미 텍스트를 원하는 분량만큼 만듭니다. 디자인 시안·레이아웃 테스트·목업의 자리 채우기에 쓰세요.</p>

  <div class="card">
    <div class="opts">
      <div class="fld"><label for="lang">종류</label>
        <select id="lang"><option value="lorem">Lorem ipsum (라틴)</option><option value="ko">한글</option></select></div>
      <div class="fld"><label for="unit">단위</label>
        <select id="unit"><option value="para">문단</option><option value="sent">문장</option><option value="word">단어</option></select></div>
      <div class="fld"><label for="count">개수</label><input id="count" type="number" value="3" min="1" max="200"/></div>
      <label class="chk"><input id="startLorem" type="checkbox" checked/> “Lorem ipsum…”으로 시작</label>
    </div>
    <div class="actions" style="margin-top:0;margin-bottom:1rem;">
      <button class="btn" id="gen" type="button">생성</button>
      <button class="btn btn-ghost" id="copy" type="button">📋 복사</button>
    </div>
    <textarea id="out" readonly></textarea>
    <div class="meta" id="meta"></div>
    <div class="note">
      문단은 4~7개의 문장으로, 문장은 6~14개의 단어로 무작위 구성됩니다. ‘Lorem ipsum…으로 시작’을 켜면 첫 문장이 관용적인 “Lorem ipsum dolor sit amet…”로 시작합니다(라틴 모드). 생성·복사는 모두 브라우저에서 이루어집니다.
    </div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  function toast(m){ var el=$('toast'); if(!el) return; el.textContent=m; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1500); }

  var LAT='lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua enim ad minim veniam quis nostrud exercitation ullamco laboris nisi aliquip ex ea commodo consequat duis aute irure in reprehenderit voluptate velit esse cillum eu fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt culpa qui officia deserunt mollit anim id est laborum'.split(' ');
  var KO='가나 다라 마음 바다 사람 아침 자연 차분 하늘 구름 나무 들판 마을 시간 생각 이야기 노을 바람 햇살 강물 새벽 노래 그림 향기 길목 빛깔 숲속 별빛 물결 언덕 마당 골목 풍경 여행 기억 소리 미소 온기 그늘 들꽃'.split(' ');

  function rint(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }
  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

  function sentence(words, ko, first){
    var n=rint(6,14), w=[];
    for(var i=0;i<n;i++) w.push(pick(words));
    if(first && !ko) w = 'lorem ipsum dolor sit amet'.split(' ').concat(w.slice(5));
    var txt = w.join(ko?' ':' ');
    return ko ? (txt+'.') : (cap(txt)+'.');
  }
  function paragraph(words, ko, first){
    var n=rint(4,7), s=[];
    for(var i=0;i<n;i++) s.push(sentence(words, ko, first && i===0));
    return s.join(' ');
  }

  function gen(){
    var ko=$('lang').value==='ko', words=ko?KO:LAT, unit=$('unit').value,
        count=Math.max(1, Math.min(200, parseInt($('count').value)||1)), first=$('startLorem').checked;
    var out='';
    if(unit==='word'){
      var w=[]; for(var i=0;i<count;i++) w.push(pick(words));
      if(first && !ko) w = 'lorem ipsum dolor sit amet'.split(' ').concat(w).slice(0,count);
      out = w.join(' ');
      if(!ko) out = cap(out);
    } else if(unit==='sent'){
      var arr=[]; for(var j=0;j<count;j++) arr.push(sentence(words, ko, first && j===0));
      out = arr.join(' ');
    } else {
      var ps=[]; for(var k=0;k<count;k++) ps.push(paragraph(words, ko, first && k===0));
      out = ps.join('\n\n');
    }
    $('out').value=out;
    var nw=(out.trim().match(/\S+/g)||[]).length;
    $('meta').textContent = nw+' 단어 · '+out.length+' 자';
  }
  $('gen').addEventListener('click', gen);
  ['lang','unit','count','startLorem'].forEach(function(id){ $(id).addEventListener('change', gen); });
  $('copy').addEventListener('click', function(){ if(!$('out').value) return; navigator.clipboard.writeText($('out').value).then(function(){ toast('복사됐습니다'); }); });
  gen();
</script>
</body>
