<div class="toolwrap">
  <a class="back" href="index.html">← 전체 도구</a>
  <h1>만나이·D-Day 계산기</h1>
  <p class="sub">만 나이, 디데이, 두 날짜 사이 일수를 즉시 계산합니다.</p>

  <div class="card">
    <label for="birth">🎂 만 나이 — 생년월일</label>
    <input type="date" id="birth"/>
    <div class="result big" style="margin-top:1rem;"><span class="val" id="age">생년월일을 선택하세요</span></div>
    <p class="hint" id="age-sub"></p>
  </div>

  <div class="card">
    <label for="target">🎯 D-Day — 목표 날짜</label>
    <input type="date" id="target"/>
    <div class="result big" style="margin-top:1rem;"><span class="val" id="dday">목표 날짜를 선택하세요</span></div>
    <p class="hint" id="dday-sub"></p>
  </div>

  <div class="card">
    <label>📏 두 날짜 사이 일수</label>
    <div class="row">
      <input type="date" id="d1" style="flex:1;min-width:140px;"/>
      <input type="date" id="d2" style="flex:1;min-width:140px;"/>
    </div>
    <div class="result big" style="margin-top:1rem;"><span class="val" id="diff">두 날짜를 선택하세요</span></div>
  </div>
</div>

<footer class="foot"><div class="foot-in">

<script>
  var DAY = 86400000;
  function parse(v){ return v ? new Date(v + 'T00:00:00') : null; }   // 로컬 자정 기준
  function today0(){ var t = new Date(); return new Date(t.getFullYear(), t.getMonth(), t.getDate()); }
  function fmt(n){ return Math.abs(n).toLocaleString('ko-KR'); }

  // 만 나이
  var birth = document.getElementById('birth');
  birth.addEventListener('input', function(){
    var b = parse(birth.value), out = document.getElementById('age'), sub = document.getElementById('age-sub');
    if(!b){ out.textContent='생년월일을 선택하세요'; sub.textContent=''; return; }
    var t = today0();
    if(b > t){ out.textContent='미래 날짜예요'; sub.textContent=''; return; }
    var age = t.getFullYear() - b.getFullYear();
    if(t.getMonth() < b.getMonth() || (t.getMonth()===b.getMonth() && t.getDate() < b.getDate())) age--;
    var days = Math.floor((t - b) / DAY);
    out.textContent = '만 ' + age + '세';
    sub.textContent = '태어난 지 ' + fmt(days) + '일째입니다.';
  });

  // D-Day
  var target = document.getElementById('target');
  target.addEventListener('input', function(){
    var d = parse(target.value), out = document.getElementById('dday'), sub = document.getElementById('dday-sub');
    if(!d){ out.textContent='목표 날짜를 선택하세요'; sub.textContent=''; return; }
    var n = Math.round((d - today0()) / DAY);
    if(n === 0){ out.textContent='D-Day 🎉'; sub.textContent='바로 오늘입니다.'; }
    else if(n > 0){ out.textContent='D-' + fmt(n); sub.textContent= fmt(n) + '일 남았습니다.'; }
    else { out.textContent='D+' + fmt(n); sub.textContent= fmt(n) + '일 지났습니다.'; }
  });

  // 두 날짜 차이
  var d1 = document.getElementById('d1'), d2 = document.getElementById('d2');
  function diffCalc(){
    var a = parse(d1.value), b = parse(d2.value), out = document.getElementById('diff');
    if(!a || !b){ out.textContent='두 날짜를 선택하세요'; return; }
    var n = Math.round((b - a) / DAY);
    out.textContent = fmt(n) + '일' + (n!==0 ? ' 차이' : '');
  }
  d1.addEventListener('input', diffCalc);
  d2.addEventListener('input', diffCalc);
</script>
