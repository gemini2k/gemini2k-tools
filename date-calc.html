<body>

<div class="toolwrap">
  <h1 data-i18n="tool.date.t">만나이·D-Day 계산기</h1>
  <p class="sub" data-i18n="dt.sub">만 나이, 디데이, 두 날짜 사이 일수를 즉시 계산합니다.</p>

  <div class="card">
    <label for="birth" data-i18n="dt.age.label">🎂 만 나이 — 생년월일</label>
    <input type="date" id="birth"/>
    <div class="result big" style="margin-top:1rem;"><span class="val" id="age"></span></div>
    <p class="hint" id="age-sub"></p>
  </div>

  <div class="card">
    <label for="target" data-i18n="dt.dday.label">🎯 D-Day — 목표 날짜</label>
    <input type="date" id="target"/>
    <div class="result big" style="margin-top:1rem;"><span class="val" id="dday"></span></div>
    <p class="hint" id="dday-sub"></p>
  </div>

  <div class="card">
    <label data-i18n="dt.diff.label">📏 두 날짜 사이 일수</label>
    <div class="row">
      <input type="date" id="d1" style="flex:1;min-width:140px;"/>
      <input type="date" id="d2" style="flex:1;min-width:140px;"/>
    </div>
    <div class="result big" style="margin-top:1rem;"><span class="val" id="diff"></span></div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  function T(k){ return window.t ? window.t(k) : k; }
  var DAY = 86400000;
  function parse(v){ return v ? new Date(v + 'T00:00:00') : null; }   // 로컬 자정 기준
  function today0(){ var t = new Date(); return new Date(t.getFullYear(), t.getMonth(), t.getDate()); }
  function fmt(n){ return Math.abs(n).toLocaleString(); }

  var birth = document.getElementById('birth'), target = document.getElementById('target'),
      d1 = document.getElementById('d1'), d2 = document.getElementById('d2');

  function calcAge(){
    var b = parse(birth.value), out = document.getElementById('age'), sub = document.getElementById('age-sub');
    sub.textContent = '';
    if(!b){ out.textContent = T('dt.age.empty'); return; }
    var t = today0();
    if(b > t){ out.textContent = T('dt.future'); return; }
    var age = t.getFullYear() - b.getFullYear();
    if(t.getMonth() < b.getMonth() || (t.getMonth()===b.getMonth() && t.getDate() < b.getDate())) age--;
    var days = Math.floor((t - b) / DAY);
    out.textContent = T('dt.age.val').replace('{n}', age);
    sub.textContent = T('dt.age.sub').replace('{d}', fmt(days));
  }
  function calcDday(){
    var d = parse(target.value), out = document.getElementById('dday'), sub = document.getElementById('dday-sub');
    sub.textContent = '';
    if(!d){ out.textContent = T('dt.dday.empty'); return; }
    var n = Math.round((d - today0()) / DAY);
    if(n === 0){ out.textContent = T('dt.dday.today'); sub.textContent = T('dt.dday.todaysub'); }
    else if(n > 0){ out.textContent = 'D-' + fmt(n); sub.textContent = T('dt.dday.left').replace('{n}', fmt(n)); }
    else { out.textContent = 'D+' + fmt(n); sub.textContent = T('dt.dday.past').replace('{n}', fmt(n)); }
  }
  function diffCalc(){
    var a = parse(d1.value), b = parse(d2.value), out = document.getElementById('diff');
    if(!a || !b){ out.textContent = T('dt.diff.empty'); return; }
    var n = Math.round((b - a) / DAY);
    out.textContent = n === 0 ? T('dt.diff.same') : T('dt.diff.val').replace('{n}', fmt(n));
  }
  birth.addEventListener('input', calcAge);
  target.addEventListener('input', calcDday);
  d1.addEventListener('input', diffCalc);
  d2.addEventListener('input', diffCalc);
  window.onI18n = function(){ calcAge(); calcDday(); diffCalc(); };
  calcAge(); calcDday(); diffCalc();
</script>
