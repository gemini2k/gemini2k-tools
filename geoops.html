<body>

<div class="toolwrap" style="max-width:1100px;">
  <h1 data-i18n="tool.geoops.t">공간 연산기</h1>
  <p class="sub" data-i18n="go.sub">WKT·GeoJSON 도형에 버퍼·컨벡스 헐·단순화·중심점·바운딩 박스를 적용하고 결과를 지도·WKT·GeoJSON으로 얻습니다.</p>

  <div class="card">
    <div class="op-grid">
      <div>
        <div class="lbl" style="font-weight:700;font-size:.9rem;margin-bottom:.4rem;" data-i18n="go.input">입력 (WKT 또는 GeoJSON)</div>
        <textarea id="oin" data-i18n-ph="go.ph" placeholder="WKT 또는 GeoJSON 을 붙여넣으세요…&#10;예) LINESTRING(127.0 37.5, 127.1 37.55, 127.05 37.6)"></textarea>
        <div class="row" style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.6rem;">
          <button class="btn btn-ghost" id="sampleBtn" data-i18n="go.sample">예시</button>
          <button class="btn btn-ghost" id="clearBtn" data-i18n="go.clear">지우기</button>
        </div>
        <div class="methods" id="methods">
          <label class="on"><input type="radio" name="op" value="buffer" checked><span data-i18n="go.o.buffer">버퍼</span></label>
          <label><input type="radio" name="op" value="simplify"><span data-i18n="go.o.simplify">단순화</span></label>
          <label><input type="radio" name="op" value="convex"><span data-i18n="go.o.convex">컨벡스 헐</span></label>
          <label><input type="radio" name="op" value="centroid"><span data-i18n="go.o.centroid">중심점</span></label>
          <label><input type="radio" name="op" value="bbox"><span data-i18n="go.o.bbox">바운딩 박스</span></label>
        </div>
        <div class="params" id="params"></div>
        <div class="row" style="margin-top:.8rem;"><button class="btn" id="runBtn" data-i18n="go.run">연산 실행</button></div>
        <div class="err" id="err"></div>
        <div class="stats" id="stats"></div>
      </div>
      <div>
        <div id="omap"></div>
        <div class="legend">
          <span><i style="background:#bbb"></i><span data-i18n="go.lg.in">입력</span></span>
          <span><i style="background:#5B5BF5"></i><span data-i18n="go.lg.out">결과</span></span>
        </div>
      </div>
    </div>

    <div id="outputs" style="margin-top:1rem;display:none;">
      <div class="out-row">
        <div class="lbl">GeoJSON <button class="btn btn-ghost" data-copy="ogeo" data-i18n="go.copy">복사</button></div>
        <textarea id="ogeo" readonly></textarea>
      </div>
      <div class="out-row">
        <div class="lbl">WKT <button class="btn btn-ghost" data-copy="owkt" data-i18n="go.copy">복사</button></div>
        <textarea id="owkt" readonly style="min-height:44px;"></textarea>
      </div>
    </div>
    <p class="hint" data-i18n="go.note">※ 좌표는 경위도(EPSG:4326)로 간주합니다. 버퍼·단순화 거리는 미터 단위이며 측지 계산(Turf)을 사용합니다. 음수 버퍼는 폴리곤 축소입니다. 모든 처리는 브라우저에서만 이루어집니다.</p>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  function T(k){ return window.t ? window.t(k) : k; }
  function $(id){ return document.getElementById(id); }
  function toast(m){var el=$('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1600);}

  var LL='EPSG:4326', MAP='EPSG:3857';
  var fmtWKT=new ol.format.WKT(), fmtGeo=new ol.format.GeoJSON();

  // 입력 파싱 → GeoJSON geometry (4326)
  function parseInput(text){
    var s=text.trim(); if(!s) throw new Error(T('go.e.empty'));
    var geom;
    if(s[0]==='{'||s[0]==='['){ var o=JSON.parse(s); if(o.type==='FeatureCollection')geom=o.features[0].geometry; else if(o.type==='Feature')geom=o.geometry; else geom=o; return geom; }
    // WKT
    var g=fmtWKT.readGeometry(s.replace(/^\s*SRID=\d+\s*;\s*/i,''));
    return JSON.parse(fmtGeo.writeGeometry(g));
  }
  function asFeature(geom){ return {type:'Feature',properties:{},geometry:geom}; }

  // 지도
  var srcI=new ol.source.Vector(), srcO=new ol.source.Vector();
  var layI=new ol.layer.Vector({ source:srcI, style:new ol.style.Style({ stroke:new ol.style.Stroke({color:'#9aa',width:2}), fill:new ol.style.Fill({color:'rgba(150,160,170,.12)'}), image:new ol.style.Circle({radius:4,fill:new ol.style.Fill({color:'#9aa'})}) }) });
  var layO=new ol.layer.Vector({ source:srcO, style:new ol.style.Style({ stroke:new ol.style.Stroke({color:'#5B5BF5',width:2.5}), fill:new ol.style.Fill({color:'rgba(91,91,245,.18)'}), image:new ol.style.Circle({radius:6,fill:new ol.style.Fill({color:'#5B5BF5'}),stroke:new ol.style.Stroke({color:'#fff',width:1.5})}) }) });
  var omap=new ol.Map({ target:'omap', layers:[ new ol.layer.Tile({source:new ol.source.OSM()}), layI, layO ],
    view:new ol.View({ center:ol.proj.fromLonLat([127.6,36.3]), zoom:6 }),
    controls:[ new ol.control.Zoom(), new ol.control.Attribution({collapsible:true}) ] });
  function showOnMap(inGeom, outGeom){
    srcI.clear(); srcO.clear();
    try{ var fi=fmtGeo.readFeature(asFeature(inGeom),{dataProjection:LL,featureProjection:MAP}); srcI.addFeature(fi); }catch(e){}
    try{ var fo=fmtGeo.readFeature(asFeature(outGeom),{dataProjection:LL,featureProjection:MAP}); srcO.addFeature(fo); }catch(e){}
    var ext=srcO.getExtent(); if(!isFinite(ext[0])) ext=srcI.getExtent();
    if(isFinite(ext[0])) omap.getView().fit(ext,{padding:[40,40,40,40],maxZoom:16,duration:300});
  }

  function curOp(){ return (document.querySelector('input[name=op]:checked')||{}).value||'buffer'; }
  function renderParams(){
    var op=curOp(), html='';
    if(op==='buffer') html='<div class="mdesc" data-i18n="go.d.buffer"></div><div class="fld" style="margin-top:.5rem;"><label data-i18n="go.p.dist">거리(m, 음수=축소)</label><input type="number" id="p_dist" value="100" step="10"></div>';
    else if(op==='simplify') html='<div class="mdesc" data-i18n="go.d.simplify"></div><div class="fld" style="margin-top:.5rem;"><label data-i18n="go.p.tol">허용오차(m)</label><input type="number" id="p_tol" value="10" min="0" step="1"></div>';
    else if(op==='convex') html='<div class="mdesc" data-i18n="go.d.convex"></div>';
    else if(op==='centroid') html='<div class="mdesc" data-i18n="go.d.centroid"></div>';
    else if(op==='bbox') html='<div class="mdesc" data-i18n="go.d.bbox"></div>';
    $('params').innerHTML=html;
    document.querySelectorAll('#params [data-i18n]').forEach(function(el){ el.textContent=T(el.getAttribute('data-i18n')); });
  }

  function vcount(geom){ try{ return turf.coordAll(asFeature(geom)).length; }catch(e){ return 0; } }
  function fmtArea(a){ return a>1000000 ? (a/1000000).toFixed(3)+' km²' : Math.round(a).toLocaleString()+' m²'; }
  function fmtLen(l){ return l>1000 ? (l/1000).toFixed(3)+' km' : Math.round(l).toLocaleString()+' m'; }

  function run(){
    $('err').textContent=''; $('outputs').style.display='none';
    var inGeom; try{ inGeom=parseInput($('oin').value); }catch(e){ $('err').textContent=T('go.e.parse')+' '+(e&&e.message||e); return; }
    var op=curOp(), feat=asFeature(inGeom), out, stats=[];
    try{
      if(op==='buffer'){ var d=Number($('p_dist').value)||0; out=turf.buffer(feat, d/1000, {units:'kilometers'}); if(!out||!out.geometry) throw new Error(T('go.e.result')); out=out.geometry; stats.push(['go.s.area', fmtArea(turf.area(asFeature(out)))]); }
      else if(op==='simplify'){ var tolM=Math.max(0,Number($('p_tol').value)||0); var tol=tolM/111320; var s=turf.simplify(feat,{tolerance:tol,highQuality:true,mutate:false}); out=s.geometry; stats.push(['go.s.vin', vcount(inGeom).toLocaleString()]); stats.push(['go.s.vout', vcount(out).toLocaleString()]); }
      else if(op==='convex'){ var pts=turf.explode(feat); var c=turf.convex(pts); if(!c) throw new Error(T('go.e.convex')); out=c.geometry; stats.push(['go.s.area', fmtArea(turf.area(asFeature(out)))]); }
      else if(op==='centroid'){ out=turf.centroid(feat).geometry; stats.push(['go.s.center', out.coordinates[0].toFixed(6)+', '+out.coordinates[1].toFixed(6)]); }
      else if(op==='bbox'){ var bb=turf.bbox(feat); out=turf.bboxPolygon(bb).geometry; stats.push(['go.s.bbox', bb.map(function(n){return n.toFixed(5);}).join(', ')]); stats.push(['go.s.area', fmtArea(turf.area(asFeature(out)))]); }
    }catch(e){ $('err').textContent=T('go.e.run')+' '+(e&&e.message||e); return; }

    // 출력
    var gjStr=JSON.stringify(out,null,2), wktStr='';
    try{ wktStr=fmtWKT.writeGeometry(fmtGeo.readGeometry(out)); }catch(e){ wktStr='(WKT 변환 불가)'; }
    $('ogeo').value=gjStr; $('owkt').value=wktStr; $('outputs').style.display='block';
    // 공통 통계
    var t=out.type; stats.unshift(['go.s.type', t]);
    if(/LineString/.test(t)) stats.push(['go.s.len', fmtLen(turf.length(asFeature(out),{units:'kilometers'})*1000)]);
    $('stats').innerHTML=stats.map(function(s){ return '<span class="stat">'+T(s[0])+' <b>'+s[1]+'</b></span>'; }).join('');
    showOnMap(inGeom, out);
  }

  $('methods').addEventListener('change', function(){ document.querySelectorAll('#methods label').forEach(function(l){l.classList.remove('on');}); var c=document.querySelector('input[name=op]:checked'); if(c)c.closest('label').classList.add('on'); renderParams(); });
  $('runBtn').addEventListener('click', run);
  $('sampleBtn').addEventListener('click', function(){ $('oin').value='POLYGON((126.97 37.55, 127.02 37.55, 127.04 37.58, 127.0 37.6, 126.96 37.58, 126.97 37.55))'; run(); });
  $('clearBtn').addEventListener('click', function(){ $('oin').value=''; $('outputs').style.display='none'; $('stats').innerHTML=''; $('err').textContent=''; srcI.clear(); srcO.clear(); $('oin').focus(); });
  document.querySelectorAll('[data-copy]').forEach(function(b){ b.addEventListener('click', function(){ var v=$(b.getAttribute('data-copy')).value; if(v&&navigator.clipboard) navigator.clipboard.writeText(v).then(function(){toast(T('toast.copied'));}); }); });
  renderParams();
</script>
</body>
