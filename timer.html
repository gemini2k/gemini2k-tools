<body>
<div class="toolwrap">
  <h1>타이머 · 스톱워치</h1>
  <p class="sub">카운트다운 타이머와 스톱워치를 한곳에서. 타이머는 끝나면 알림음이 울리고, 스톱워치는 랩(구간)을 기록합니다.</p>

  <div class="card">
    <div class="seg">
      <button id="tabTimer" class="on" type="button">⏲️ 타이머</button>
      <button id="tabSw" type="button">⏱️ 스톱워치</button>
    </div>

    <!-- 타이머 -->
    <div id="paneTimer">
      <div class="setrow" id="setrow">
        <input id="mm" type="number" value="5" min="0" max="999" aria-label="분"/><span>분</span>
        <input id="ss" type="number" value="0" min="0" max="59" aria-label="초"/><span>초</span>
      </div>
      <div class="presets">
        <button data-sec="60">1분</button><button data-sec="180">3분</button><button data-sec="300">5분</button>
        <button data-sec="600">10분</button><button data-sec="1500">25분</button>
      </div>
      <div class="disp" id="tDisp">05:00</div>
      <div class="ctl">
        <button class="btn" id="tStart" type="button">시작</button>
        <button class="btn btn-ghost hide" id="tPause" type="button">일시정지</button>
        <button class="btn btn-ghost" id="tReset" type="button">초기화</button>
      </div>
    </div>

    <!-- 스톱워치 -->
    <div id="paneSw" class="hide">
      <div class="disp" id="swDisp">00:00<span class="cs">.00</span></div>
      <div class="ctl">
        <button class="btn" id="swStart" type="button">시작</button>
        <button class="btn btn-ghost" id="swLap" type="button" disabled>랩</button>
        <button class="btn btn-ghost" id="swReset" type="button">초기화</button>
      </div>
      <div class="laps hide" id="laps"></div>
    </div>
  </div>
</div>

<script src="tool-shell.js"></script>
<script>
  var $ = function(id){ return document.getElementById(id); };
  function pad(n){ return (n<10?'0':'')+n; }
  function beep(){
    try{
      var AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
      var ctx=new AC();
      [0,0.25,0.5].forEach(function(t){
        var o=ctx.createOscillator(), g=ctx.createGain();
        o.frequency.value=880; o.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0.001, ctx.currentTime+t);
        g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime+t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.18);
        o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.2);
      });
      setTimeout(function(){ ctx.close(); }, 1200);
    }catch(e){}
  }

  /* 탭 전환 */
  function tab(timer){
    $('tabTimer').classList.toggle('on', timer); $('tabSw').classList.toggle('on', !timer);
    $('paneTimer').classList.toggle('hide', !timer); $('paneSw').classList.toggle('hide', timer);
  }
  $('tabTimer').addEventListener('click', function(){ tab(true); });
  $('tabSw').addEventListener('click', function(){ tab(false); });

  /* ── 타이머 ── */
  var tTotal=300, tRemain=300, tEnd=0, tRAF=0, tRunning=false;
  function tShow(sec){
    sec=Math.max(0, Math.ceil(sec));
    var h=Math.floor(sec/3600), m=Math.floor(sec%3600/60), s=sec%60;
    $('tDisp').textContent = (h>0? pad(h)+':' : '') + pad(m)+':'+pad(s);
  }
  function tFromInputs(){ tTotal=tRemain=(parseInt($('mm').value)||0)*60 + (parseInt($('ss').value)||0); tShow(tRemain); }
  function tTick(){
    var left=(tEnd-performance.now())/1000;
    if(left<=0){ tShow(0); tStop(true); $('tDisp').classList.add('done'); beep(); return; }
    tRemain=left; tShow(left); tRAF=requestAnimationFrame(tTick);
  }
  function tStart(){
    if(tRunning) return;
    if(tRemain<=0) tFromInputs();
    if(tRemain<=0) return;
    tRunning=true; tEnd=performance.now()+tRemain*1000;
    $('tStart').classList.add('hide'); $('tPause').classList.remove('hide');
    $('tDisp').classList.remove('done'); $('setrow').style.opacity=.5;
    tRAF=requestAnimationFrame(tTick);
  }
  function tStop(finished){
    tRunning=false; cancelAnimationFrame(tRAF);
    $('tStart').classList.remove('hide'); $('tPause').classList.add('hide');
    if(finished){ tRemain=0; $('setrow').style.opacity=1; }
  }
  $('tStart').addEventListener('click', tStart);
  $('tPause').addEventListener('click', function(){ tStop(false); });
  $('tReset').addEventListener('click', function(){ tStop(false); $('tDisp').classList.remove('done'); tFromInputs(); $('setrow').style.opacity=1; });
  ['mm','ss'].forEach(function(id){ $(id).addEventListener('input', function(){ if(!tRunning) tFromInputs(); }); });
  document.querySelector('.presets').addEventListener('click', function(e){
    var b=e.target.closest('button'); if(!b) return;
    tStop(false); var sec=+b.dataset.sec; $('mm').value=Math.floor(sec/60); $('ss').value=sec%60; tFromInputs(); $('tDisp').classList.remove('done');
  });
  tFromInputs();

  /* ── 스톱워치 ── */
  var swStartT=0, swAcc=0, swRAF=0, swRunning=false, swLaps=[], swLast=0;
  function swMs(){ return swAcc + (swRunning ? performance.now()-swStartT : 0); }
  function fmt(ms){ var t=Math.floor(ms), cs=Math.floor(t%1000/10), s=Math.floor(t/1000)%60, m=Math.floor(t/60000); return pad(m)+':'+pad(s)+'<span class="cs">.'+pad(cs)+'</span>'; }
  function swTick(){ $('swDisp').innerHTML=fmt(swMs()); swRAF=requestAnimationFrame(swTick); }
  $('swStart').addEventListener('click', function(){
    if(swRunning){ swAcc=swMs(); swRunning=false; cancelAnimationFrame(swRAF); $('swStart').textContent='시작'; $('swLap').disabled=true; }
    else { swStartT=performance.now(); swRunning=true; swRAF=requestAnimationFrame(swTick); $('swStart').textContent='정지'; $('swLap').disabled=false; }
  });
  $('swLap').addEventListener('click', function(){
    if(!swRunning) return;
    var now=swMs(), split=now-swLast; swLast=now; swLaps.unshift({n:swLaps.length+1, lap:split, total:now});
    $('laps').classList.remove('hide');
    $('laps').innerHTML=swLaps.map(function(l){ return '<div class="lap"><span class="n">랩 '+l.n+'</span><span>'+fmt(l.lap)+'</span><span class="n">'+fmt(l.total)+'</span></div>'; }).join('');
  });
  $('swReset').addEventListener('click', function(){
    swRunning=false; cancelAnimationFrame(swRAF); swAcc=0; swLast=0; swLaps=[];
    $('swDisp').innerHTML='00:00<span class="cs">.00</span>'; $('swStart').textContent='시작'; $('swLap').disabled=true;
    $('laps').classList.add('hide'); $('laps').innerHTML='';
  });
</script>
</body>
