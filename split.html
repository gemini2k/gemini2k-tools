  <h1 data-i18n="tool.psplit.t">PDF 쪼개기·페이지 추출</h1>
  <p class="sub" data-i18n="ps.sub">PDF에서 원하는 페이지만 골라 새 PDF로 추출합니다.</p>

  <div class="card">
    <label for="file" data-i18n="ps.pick">PDF 파일 선택</label>
    <input type="file" id="file" accept="application/pdf"/>
    <p class="hint" id="info" data-i18n="ps.empty">선택된 PDF가 없습니다.</p>

      <div class="row" style="margin-top:1rem;">

        <button class="btn btn-ghost" id="all" data-i18n="ps.all">전체 선택</button>
      </div>
    </div>

<div class="toast" id="toast"></div>
<script>
  function T(k){ return window.t ? window.t(k) : k; }
  function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},1800);}
  function kb(n){ return n<1024 ? n+' B' : n<1048576 ? (n/1024).toFixed(1)+' KB' : (n/1048576).toFixed(2)+' MB'; }
  function stamp(){ var d=new Date(),p=function(n){return(n<10?'0':'')+n;}; return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds()); }
  function fileName(def){ var v=(document.getElementById('fname').value||'').replace(/[\\/:*?"<>|]+/g,'').replace(/\.pdf$/i,'').trim(); return (v||def)+'.pdf'; }
  var fileEl=document.getElementById('file'), info=document.getElementById('info'), opts=document.getElementById('opts'),
      rangeEl=document.getElementById('range'), resultCard=document.getElementById('resultCard'),
      result=document.getElementById('result'), dl=document.getElementById('download');
  var srcBuf=null, total=0, outBlob=null;

  function renderInfo(){ if(total) info.textContent = T('ps.info').replace('{n}', total); else info.textContent = T('ps.empty'); }

  fileEl.addEventListener('change', async function(){
    var f=fileEl.files[0]; if(!f){ return; }
    try{
      srcBuf = await f.arrayBuffer();
      var doc = await PDFLib.PDFDocument.load(srcBuf, {ignoreEncryption:true});
      total = doc.getPageCount();
      renderInfo(); opts.style.display=''; rangeEl.value='1-'+total;
    }catch(err){ total=0; srcBuf=null; opts.style.display='none'; toast(T('pdf.err')); }
    resultCard.style.display='none';
  });
  document.getElementById('all').addEventListener('click', function(){ if(total) rangeEl.value='1-'+total; });

  function parseRange(s, max){
    var idx=[], parts=s.split(',');
    for(var i=0;i<parts.length;i++){
      var p=parts[i].trim(); if(!p) continue;
      var m=p.match(/^(\d+)\s*-\s*(\d+)$/);
      if(m){ var a=+m[1], b=+m[2]; if(a<1||b<1||a>max||b>max) return null; var lo=Math.min(a,b), hi=Math.max(a,b); for(var n=lo;n<=hi;n++) idx.push(n-1); }
      else if(/^\d+$/.test(p)){ var v=+p; if(v<1||v>max) return null; idx.push(v-1); }
      else return null;
    }
    return idx.length ? idx : null;
  }

  document.getElementById('extract').addEventListener('click', async function(){
    if(!srcBuf){ toast(T('ps.empty')); return; }
    var idx = parseRange(rangeEl.value, total);
    if(!idx){ toast(T('ps.badrange')); return; }
    try{
      var src = await PDFLib.PDFDocument.load(srcBuf, {ignoreEncryption:true});
      var out = await PDFLib.PDFDocument.create();
      var pages = await out.copyPages(src, idx);
      pages.forEach(function(p){ out.addPage(p); });
      var bytes = await out.save();
      outBlob = new Blob([bytes], {type:'application/pdf'});
      result.textContent = T('ps.done').replace('{p}', idx.length).replace('{s}', kb(outBlob.size));
      document.getElementById('fname').value = 'extracted_' + stamp();
      resultCard.style.display='';
    }catch(err){ toast(T('pdf.err')); }
  });
  dl.addEventListener('click', function(){
    if(!outBlob) return;
    var a=document.createElement('a'); a.href=URL.createObjectURL(outBlob); a.download=fileName('extracted');
    document.body.appendChild(a); a.click(); a.remove();
  });
  window.onI18n = renderInfo;
</script>
