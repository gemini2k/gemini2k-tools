<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>글자수 세기 — gemini2k 도구</title>
<meta name="description" content="공백 포함/제외 글자수, 단어 수, 줄 수, 원고지 매수, 바이트를 실시간으로 세는 무료 도구. 자소서·리포트·SNS 글자 제한 확인에."/>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<header class="top"><div class="top-in">
  <a class="logo" href="index.html"><span class="mk">🧰</span> gemini2k 도구</a>
  <nav><a href="index.html">전체 도구</a><a href="https://gemini2k.kr" target="_blank" rel="noopener">블로그</a></nav>
</div></header>

<div class="toolwrap">
  <a class="back" href="index.html">← 전체 도구</a>
  <h1>글자수 세기</h1>
  <p class="sub">공백 포함/제외 글자수, 단어·줄·원고지 매수를 실시간으로 보여줍니다.</p>

  <div class="card">
    <label for="t">텍스트 입력</label>
    <textarea id="t" placeholder="여기에 글을 붙여넣거나 입력하세요…" autofocus></textarea>
    <div class="stats">
      <div class="stat"><div class="n" id="s-all">0</div><div class="l">글자수 (공백 포함)</div></div>
      <div class="stat"><div class="n" id="s-nospace">0</div><div class="l">글자수 (공백 제외)</div></div>
      <div class="stat"><div class="n" id="s-word">0</div><div class="l">단어 수</div></div>
      <div class="stat"><div class="n" id="s-line">0</div><div class="l">줄 수</div></div>
      <div class="stat"><div class="n" id="s-manu">0</div><div class="l">원고지 (200자)</div></div>
      <div class="stat"><div class="n" id="s-byte">0</div><div class="l">바이트 (UTF-8)</div></div>
    </div>
    <div class="row" style="margin-top:1.2rem;">
      <button class="btn" id="copy">📋 텍스트 복사</button>
      <button class="btn btn-ghost" id="clear">지우기</button>
    </div>
    <p class="hint">입력한 내용은 서버로 전송되지 않고 브라우저에서만 계산됩니다.</p>
  </div>
</div>

<footer class="foot"><div class="foot-in">
  <span>© gemini2k 도구</span><span>· 모든 처리는 브라우저에서</span>
  <span class="sp"></span><a href="index.html">다른 도구 보기 →</a>
</div></footer>

<div class="toast" id="toast"></div>
<script>
  var t = document.getElementById('t');
  var enc = new TextEncoder();
  function fmt(n){ return n.toLocaleString('ko-KR'); }
  function update(){
    var v = t.value;
    var all = Array.from(v).length;                 // 코드포인트 기준(이모지 안전)
    var nospace = Array.from(v.replace(/\s/g,'')).length;
    var trimmed = v.trim();
    var words = trimmed ? trimmed.split(/\s+/).length : 0;
    var lines = v === '' ? 0 : v.split(/\n/).length;
    var manu = Math.ceil(all / 200);
    var bytes = enc.encode(v).length;
    document.getElementById('s-all').textContent = fmt(all);
    document.getElementById('s-nospace').textContent = fmt(nospace);
    document.getElementById('s-word').textContent = fmt(words);
    document.getElementById('s-line').textContent = fmt(lines);
    document.getElementById('s-manu').textContent = fmt(manu);
    document.getElementById('s-byte').textContent = fmt(bytes);
  }
  function toast(m){ var el=document.getElementById('toast'); el.textContent=m; el.classList.add('show');
    clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1600); }
  t.addEventListener('input', update);
  document.getElementById('copy').addEventListener('click', function(){
    if(!t.value){ toast('복사할 내용이 없습니다'); return; }
    navigator.clipboard.writeText(t.value).then(function(){toast('복사됐습니다');})
      .catch(function(){ t.select(); document.execCommand('copy'); toast('복사됐습니다'); });
  });
  document.getElementById('clear').addEventListener('click', function(){ t.value=''; update(); t.focus(); });
  update();
</script>
</body>
</html>
