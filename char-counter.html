  <p class="sub" data-i18n="char.sub">공백 포함/제외 글자수, 단어·줄·원고지 매수를 실시간으로 보여줍니다.</p>

  <div class="card">
    <label for="t" data-i18n="char.label">텍스트 입력</label>
    <textarea id="t" data-i18n-ph="char.ph" placeholder="여기에 글을 붙여넣거나 입력하세요…" autofocus></textarea>
    <div class="stats">
      <div class="stat"><div class="n" id="s-all">0</div><div class="l" data-i18n="char.s.all">글자수 (공백 포함)</div></div>
      <div class="stat"><div class="n" id="s-nospace">0</div><div class="l" data-i18n="char.s.nospace">글자수 (공백 제외)</div></div>
      <div class="stat"><div class="n" id="s-word">0</div><div class="l" data-i18n="char.s.word">단어 수</div></div>
      <div class="stat"><div class="n" id="s-line">0</div><div class="l" data-i18n="char.s.line">줄 수</div></div>
      <div class="stat"><div class="n" id="s-manu">0</div><div class="l" data-i18n="char.s.manu">원고지 (200자)</div></div>
      <div class="stat"><div class="n" id="s-byte">0</div><div class="l" data-i18n="char.s.byte">바이트 (UTF-8)</div></div>
    </div>
    <div class="row" style="margin-top:1.2rem;">
      <button class="btn" id="copy" data-i18n="char.copy">📋 텍스트 복사</button>
      <button class="btn btn-ghost" id="clear" data-i18n="char.clear">지우기</button>
    </div>
    <p class="hint" data-i18n="char.hint">입력한 내용은 서버로 전송되지 않고 브라우저에서만 계산됩니다.</p>
  </div>

<div class="toast" id="toast"></div>
<script>
  var t = document.getElementById('t');
  var enc = new TextEncoder();
  function fmt(n){ return n.toLocaleString(); }
  function update(){
    var v = t.value;
    var all = Array.from(v).length;                 // 코드포인트 기준(이모지 안전)
    var nospace = Array.from(v.replace(/\s/g,'')).length;
    var trimmed = v.trim();
    var words = trimmed ? trimmed.split(/\s+/).length : 0;
    var lines = v === '' ? 0 : v.split(/\n/).length;
    var manu = Math.ceil(all / 200);
    var bytes = enc.encode(v).length;
    document.getElementById('s-all').textContent = fmt(all);
    document.getElementById('s-nospace').textContent = fmt(nospace);
    document.getElementById('s-word').textContent = fmt(words);
    document.getElementById('s-line').textContent = fmt(lines);
    document.getElementById('s-manu').textContent = fmt(manu);
    document.getElementById('s-byte').textContent = fmt(bytes);
  }
  function toast(m){ var el=document.getElementById('toast'); el.textContent=m; el.classList.add('show');
    clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},1600); }
  t.addEventListener('input', update);
  document.getElementById('copy').addEventListener('click', function(){
    if(!t.value){ toast(window.t?window.t('toast.nocopy'):'복사할 내용이 없습니다'); return; }
    var ok = window.t?window.t('toast.copied'):'복사됐습니다';
    navigator.clipboard.writeText(t.value).then(function(){toast(ok);})
      .catch(function(){ t.select(); document.execCommand('copy'); toast(ok); });
  });
  document.getElementById('clear').addEventListener('click', function(){ t.value=''; update(); t.focus(); });
  update();
</script>
